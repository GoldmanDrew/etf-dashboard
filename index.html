<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ETF Borrow Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='85'>⚡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0e17;
    --bg-secondary: #111827;
    --bg-card: #151d2e;
    --bg-card-hover: #1a2438;
    --bg-input: #0d1424;
    --border: #1e2d46;
    --border-active: #3b82f6;
    --text-primary: #e8ecf4;
    --text-secondary: #8896ae;
    --text-muted: #566580;
    --accent-blue: #3b82f6;
    --accent-green: #10b981;
    --accent-red: #ef4444;
    --accent-amber: #f59e0b;
    --accent-purple: #8b5cf6;
    --accent-cyan: #06b6d4;
    --positive: #10b981;
    --negative: #ef4444;
    --warning: #f59e0b;
    --stale: #6b7280;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg-primary); color: var(--text-primary);
    line-height: 1.5; min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  #root { min-height: 100vh; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-primary); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .app { display: flex; flex-direction: column; min-height: 100vh; }

  /* ── Topbar ──────────────── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px; background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar-logo {
    font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 16px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px; cursor: pointer;
  }
  .topbar-meta {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .topbar-meta a { color: var(--accent-purple); text-decoration: none; }
  .topbar-meta a:hover { text-decoration: underline; }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .dot-green { background: var(--accent-green); }
  .dot-amber { background: var(--accent-amber); }
  .fresh-badge {
    display: inline-flex; align-items: center;
    padding: 1px 7px; border-radius: 999px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.3px;
    border: 1px solid transparent;
  }
  .fresh-good { color: var(--positive); background: rgba(16,185,129,0.12); border-color: rgba(16,185,129,0.35); }
  .fresh-warn { color: var(--warning); background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.35); }
  .fresh-bad { color: var(--negative); background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.35); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .topbar-btn {
    padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border); background: var(--bg-card);
    color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .topbar-btn:hover { border-color: var(--accent-blue); color: var(--text-primary); }
  .topbar-btn.active { background: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }

  /* ── Summary ─────────────── */
  .summary-strip {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(195px, 1fr));
    gap: 10px; padding: 14px 24px;
    background: var(--bg-secondary); border-bottom: 1px solid var(--border);
  }
  .summary-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px; transition: border-color 0.15s;
  }
  .summary-card:hover { border-color: var(--border-active); }
  .summary-card .label {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.6px; color: var(--text-muted); margin-bottom: 5px;
  }
  .summary-card .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px; font-weight: 700;
  }
  .summary-card .sub {
    font-size: 11px; color: var(--text-muted); margin-top: 3px;
    font-family: 'JetBrains Mono', monospace;
  }
  .highlight-list { list-style: none; padding: 0; }
  .highlight-list li {
    display: flex; justify-content: space-between; align-items: center;
    padding: 3px 0; font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .highlight-list .sym { font-weight: 600; color: var(--text-primary); }

  /* ── Tabs ─────────────────── */
  .tab-bar { display: flex; align-items: center; gap: 4px; padding: 12px 24px 0; }
  .tab {
    padding: 10px 18px; border-radius: 8px 8px 0 0;
    font-size: 13px; font-weight: 600; color: var(--text-muted);
    cursor: pointer; border: 1px solid transparent; border-bottom: none;
    transition: all 0.15s; background: transparent;
    font-family: 'DM Sans', sans-serif;
  }
  .tab:hover { color: var(--text-secondary); background: var(--bg-card); }
  .tab.active { color: var(--text-primary); background: var(--bg-card); border-color: var(--border); }
  .tab .count {
    display: inline-block; margin-left: 6px; padding: 1px 7px;
    border-radius: 10px; font-size: 11px; font-weight: 600;
    background: var(--bg-primary); color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .tab.active .count { background: var(--accent-blue); color: #fff; }

  /* ── Controls ────────────── */
  .controls-bar {
    display: flex; align-items: center; gap: 12px; padding: 12px 24px;
    background: var(--bg-card); border: 1px solid var(--border); border-top: none;
  }
  .search-wrapper { position: relative; flex: 1; max-width: 360px; }
  .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); font-size: 13px; pointer-events: none;
  }
  .search-box {
    width: 100%; padding: 8px 14px 8px 36px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg-input);
    color: var(--text-primary); font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    outline: none; transition: border-color 0.15s;
  }
  .search-box:focus { border-color: var(--accent-blue); }
  .toggle-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-secondary); cursor: pointer; user-select: none;
  }
  .toggle-label input[type="checkbox"] { accent-color: var(--accent-blue); width: 14px; height: 14px; }

  /* ── Table ────────────────── */
  .table-container { padding: 0 24px 24px; overflow-x: auto; }
  .etf-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
    background: var(--bg-card); border: 1px solid var(--border); border-top: none;
    table-layout: fixed;
  }
  .etf-table thead th {
    position: sticky; top: 0; z-index: 10; background: var(--bg-secondary);
    padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted);
    border-bottom: 1px solid var(--border); cursor: pointer; user-select: none;
    white-space: nowrap; transition: color 0.15s;
  }
  .etf-table thead th:hover { color: var(--text-primary); }
  .etf-table thead th.sorted { color: var(--accent-blue); }
  .etf-table thead th .sort-arrow { margin-left: 4px; font-size: 10px; }
  .etf-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: pointer; }
  .etf-table tbody tr:hover { background: var(--bg-card-hover); }
  .etf-table tbody td {
    padding: 9px 12px; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    vertical-align: middle;
  }
  .sym-cell {
    font-weight: 700; color: var(--accent-cyan); font-size: 13px;
    text-decoration: underline; text-decoration-color: rgba(6,182,212,0.3);
    text-underline-offset: 2px; cursor: pointer; transition: color 0.15s;
  }
  .sym-cell:hover { color: var(--accent-blue); text-decoration-color: var(--accent-blue); }
  .underlying-cell { color: var(--text-secondary); }

  /* ── Value Colors ────────── */
  .val-positive { color: var(--positive); }
  .val-negative { color: var(--negative); }
  .val-warning { color: var(--warning); }
  .val-muted { color: var(--text-muted); }

  .badge {
    display: inline-block; padding: 2px 7px; border-radius: 4px;
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .badge-good { background: rgba(16,185,129,0.12); color: var(--positive); }
  .badge-bad { background: rgba(239,68,68,0.12); color: var(--negative); }
  .badge-warn { background: rgba(245,158,11,0.12); color: var(--warning); }
  .badge-stale { background: rgba(107,114,128,0.12); color: var(--stale); }
  .badge-ftp { background: rgba(6,182,212,0.12); color: var(--accent-cyan); }

  /* ── Detail Expand ───────── */
  .detail-row td {
    padding: 16px 24px; background: var(--bg-primary);
    border-bottom: 2px solid var(--border);
  }
  .detail-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(175px, 1fr)); gap: 12px;
  }
  .detail-item .dlabel {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-muted); margin-bottom: 2px;
  }
  .detail-item .dval { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; }

  /* ── Info Page ────────────── */
  .info-page { padding: 24px; max-width: 860px; }
  .info-row {
    display: flex; justify-content: space-between; padding: 10px 0;
    border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .info-key { color: var(--text-muted); }
  .info-val { font-family: 'JetBrains Mono', monospace; color: var(--text-primary); }
  .info-section {
    margin-top: 24px; margin-bottom: 10px; font-size: 15px; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }

  /* ── Expected Decay Calculator ── */
  .calc-card {
    margin: 10px 24px 0;
    padding: 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-card);
  }
  .calc-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .calc-helper {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .calc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
  }
  .calc-field label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .calc-field input, .calc-field select {
    width: 100%;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-input);
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .calc-field input:focus, .calc-field select:focus {
    border-color: var(--accent-blue);
    outline: none;
  }
  .calc-error {
    margin-top: 8px;
    font-size: 11px;
    color: var(--accent-red);
  }
  .calc-out-grid {
    margin-top: 12px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 8px;
  }
  .calc-out {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-primary);
    padding: 8px 10px;
  }
  .calc-out .k {
    color: var(--text-muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .calc-out .v {
    font-family: 'JetBrains Mono', monospace;
    margin-top: 2px;
    font-size: 14px;
    font-weight: 700;
  }
  .calc-formula {
    margin-top: 10px;
    font-size: 11px;
    color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace;
  }
  .calc-example {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── Loading / Error ─────── */
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 400px; color: var(--text-muted); font-size: 14px;
  }
  .spinner {
    width: 24px; height: 24px; border: 2px solid var(--border);
    border-top-color: var(--accent-blue); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-right: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-banner {
    margin: 24px; padding: 16px 20px; border-radius: 8px;
    background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
    color: var(--accent-red); font-size: 14px;
  }

  /* ── Chart Page ─────────── */
  .chart-page {
    padding: 0 24px 12px; flex: 1; display: flex; flex-direction: column;
    height: calc(100vh - 50px); /* viewport minus topbar */
    min-height: 0;
  }

  .chart-header {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 0 8px; flex-wrap: wrap; flex-shrink: 0;
  }
  .chart-view-switch {
    display: flex;
    gap: 3px;
    background: var(--bg-primary);
    border-radius: 6px;
    padding: 3px;
    border: 1px solid var(--border);
  }
  .chart-view-btn {
    padding: 5px 10px;
    border-radius: 4px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
  }
  .chart-view-btn:hover { color: var(--text-primary); background: var(--bg-card); }
  .chart-view-btn.active { background: var(--accent-purple); color: #fff; }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border); background: var(--bg-card);
    color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .back-btn:hover { border-color: var(--accent-blue); color: var(--text-primary); }
  .back-btn svg { width: 14px; height: 14px; }

  .chart-title {
    font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700;
    display: flex; align-items: baseline; gap: 10px;
  }
  .chart-title .etf-sym {
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .chart-title .vs { color: var(--text-muted); font-size: 14px; font-weight: 400; }
  .chart-title .und-sym { color: var(--accent-amber); }

  .chart-bucket-badge {
    padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 600;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.3px;
  }
  .chart-bucket-badge.b1 { background: rgba(59,130,246,0.12); color: var(--accent-blue); }
  .chart-bucket-badge.b2 { background: rgba(139,92,246,0.12); color: var(--accent-purple); }
  .chart-bucket-badge.b3 { background: rgba(245,158,11,0.12); color: var(--accent-amber); }

  .chart-container {
    border-radius: 10px; overflow: hidden;
    border: 1px solid var(--border); background: var(--bg-card);
    flex: 1; min-height: 0; position: relative;
  }
  .chart-container iframe {
    border: none; display: block;
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  }
  .chart-loading {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: var(--bg-card); color: var(--text-muted); font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
  }

  .chart-stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 6px; margin-top: 8px; flex-shrink: 0;
  }
  .chart-stat {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 10px; transition: border-color 0.15s;
  }
  .chart-stat:hover { border-color: var(--border-active); }
  .chart-stat .cs-label {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 3px;
  }
  .chart-stat .cs-value {
    font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700;
  }
  .chart-stat .cs-sub {
    font-size: 10px; color: var(--text-muted); margin-top: 2px;
    font-family: 'JetBrains Mono', monospace;
  }

  .chart-note {
    margin-top: 6px; padding: 6px 12px; border-radius: 6px;
    background: var(--bg-card); border: 1px solid var(--border);
    font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace;
    flex-shrink: 0;
  }
  .chart-section {
    display: flex;
    flex-direction: column;
    min-height: 0;
    flex: 1;
  }

  .scenario-card {
    margin-top: 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-card);
    padding: 10px;
    flex-shrink: 0;
  }
  .scenario-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .scenario-title {
    font-size: 13px;
    font-weight: 700;
  }
  .scenario-sub {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .scenario-table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .scenario-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--bg-primary);
  }
  .scenario-table th, .scenario-table td {
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 6px 8px;
    text-align: right;
    white-space: nowrap;
  }
  .scenario-table th:first-child, .scenario-table td:first-child {
    text-align: left;
    position: sticky;
    left: 0;
    background: var(--bg-secondary);
    z-index: 2;
  }
  .scenario-table th {
    background: var(--bg-secondary);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    font-size: 10px;
  }
  .scenario-formula {
    margin-top: 6px;
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .scenario-warning {
    font-size: 11px;
    color: var(--warning);
    font-family: 'JetBrains Mono', monospace;
  }
  .mc-card {
    margin-top: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-primary);
    padding: 10px;
  }
  .mc-controls {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 8px;
    margin-bottom: 8px;
  }
  .mc-field label {
    display: block;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 4px;
    letter-spacing: 0.4px;
  }
  .mc-field input, .mc-field select {
    width: 100%;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-primary);
    padding: 6px 8px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .mc-plot {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #0b1322;
    height: 300px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .mc-plot svg { width: 100%; height: 100%; display: block; }
  .mc-stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 6px;
  }
  .mc-stat {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-card);
    padding: 7px 8px;
  }
  .mc-stat .k {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .mc-stat .v {
    margin-top: 2px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }
  .mc-list {
    margin-top: 8px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-secondary);
  }
  .mc-list div { margin-top: 2px; }
  .borrow-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;

<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

const DATA_URL = "data/dashboard_data.json";
const BORROW_HISTORY_URL = "data/borrow_history.json";
const OPTIONS_CACHE_URL = "data/options_cache.json";
let BORROW_HISTORY_CACHE = null;

// ── Formatters ──────────────────────────────
const fmt = v => v == null ? '—' : (v * 100).toFixed(2) + '%';
const fmtNum = v => v == null ? '—' : Number(v).toLocaleString();
const fmtTime = iso => {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true });
};
const cls = (...c) => c.filter(Boolean).join(' ');
const getBorrowRate = r => (r?.borrow_current ?? r?.borrow_net_annual ?? null);
const getFreshness = (data) => {
  const built = data?.build_time ? new Date(data.build_time) : null;
  if (!built || Number.isNaN(built.getTime())) {
    return { label: 'Freshness: Unknown', className: 'fresh-warn' };
  }
  const ageMin = Math.max(0, Math.round((Date.now() - built.getTime()) / 60000));
  const target = Number(data?.borrow_refresh_interval_minutes) > 0
    ? Number(data.borrow_refresh_interval_minutes)
    : 30;
  const warnAt = Math.max(target + 10, 45);
  const staleAt = Math.max(target * 2 + 10, 90);
  const ftpOk = Boolean(data?.ibkr_ftp_success);
  if (ageMin >= staleAt) return { label: `Stale (${ageMin}m old)`, className: 'fresh-bad' };
  if (!ftpOk || ageMin >= warnAt) return { label: `Degraded (${ageMin}m old)`, className: 'fresh-warn' };
  return { label: `Fresh (${ageMin}m old)`, className: 'fresh-good' };
};

const HIGH_BETA_THRESHOLD = 1.5;

const borrowCls = v => {
  if (v == null) return 'val-muted';
  if (v > 0.15) return 'val-negative';
  if (v > 0.08) return 'val-warning';
  return 'val-positive';
};
const spreadCls = v => {
  if (v == null) return 'val-muted';
  if (v > 0.05) return 'val-positive';
  if (v > 0) return 'val-warning';
  return 'val-negative';
};
const borrowBadge = v => {
  if (v == null) return null;
  if (v > 0.15) return <span className="badge badge-bad">HIGH</span>;
  if (v > 0.08) return <span className="badge badge-warn">MED</span>;
  return null;
};

const VOL_TF_KEY_BY_RANGE = {
  '1M': '1M',
  '3M': '3M',
  '6M': '6M',
  'YTD': 'YTD',
  '12M': '12M',
  'ALL': 'ALL',
};

const SCENARIO_VOL_MULTIPLIERS = [0.6, 0.8, 1.0, 1.2, 1.4];
const SCENARIO_SHOCK_MULTIPLIERS = [-3, -1, -1 / 3, 0, 1 / 3, 1, 3];
const SCENARIO_HORIZONS = [
  { key: '1M', label: '1M' },
  { key: '3M', label: '3M' },
  { key: '6M', label: '6M' },
  { key: '1Y', label: '1Y' },
];
const MC_PATH_OPTIONS = [100, 500, 1000, 5000];
const MC_DEFAULT_UPSIDE_THRESHOLDS = '50,100,500';

const clampNum = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const scenarioCellBg = val => {
  if (val == null || !Number.isFinite(val)) return 'transparent';
  const clipped = clampNum(val, -1, 1);
  const intensity = 0.12 + 0.28 * Math.abs(clipped);
  if (clipped >= 0) return `rgba(16,185,129,${intensity.toFixed(3)})`;
  return `rgba(239,68,68,${intensity.toFixed(3)})`;
};
const fmtSigmaMultiple = (m) => {
  if (!Number.isFinite(Number(m))) return '—';
  const v = Number(m);
  const sign = v > 0 ? '+' : '';
  if (Math.abs(v) < 1e-12) return '0σ';
  if (Math.abs(Math.abs(v) - 3) < 1e-9) return `${v < 0 ? '-' : '+'}3σ`;
  if (Math.abs(Math.abs(v) - 1) < 1e-9) return `${sign}${v < 0 ? '-' : ''}1σ`.replace('+-', '-');
  if (Math.abs(Math.abs(v) - (1 / 3)) < 1e-9) return `${v < 0 ? '-' : '+'}1/3σ`;
  return `${sign}${v.toFixed(2)}σ`;
};
const parseThresholdInput = (raw) => {
  const txt = String(raw ?? '').trim();
  if (!txt) return [];
  return txt
    .split(',')
    .map(s => Number(s.trim()))
    .filter(v => Number.isFinite(v))
    .map(v => v / 100)
    .filter(v => v >= 0);
};
const quantileSorted = (arr, q) => {
  if (!arr?.length) return null;
  const qq = clampNum(Number(q) || 0, 0, 1);
  const idx = (arr.length - 1) * qq;
  const lo = Math.floor(idx);
  const hi = Math.ceil(idx);
  if (lo === hi) return arr[lo];
  const w = idx - lo;
  return arr[lo] * (1 - w) + arr[hi] * w;
};
function MonteCarloPlot({ result, mode = 'short' }) {
  if (!result?.ok) return null;
  const maxPoints = 180;
  const totalPts = result.settings.steps + 1;
  const stride = Math.max(1, Math.ceil(totalPts / maxPoints));
  const pickIdx = [];
  for (let i = 0; i < totalPts; i += stride) pickIdx.push(i);
  if (pickIdx[pickIdx.length - 1] !== totalPts - 1) pickIdx.push(totalPts - 1);

  const carryAnnual = Number.isFinite(Number(result?.settings?.annualCarryDrag))
    ? Number(result.settings.annualCarryDrag)
    : 0;
  const horizonYears = Number.isFinite(Number(result?.settings?.horizonYears))
    ? Number(result.settings.horizonYears)
    : 0;
  const steps = Math.max(1, Number(result?.settings?.steps) || 1);
  const carryAtIdx = (idxOriginal) => carryAnnual * ((idxOriginal / steps) * horizonYears);
  const toRet = (w, idxOriginal = 0) => {
    const etfRet = Number.isFinite(w) ? (w - 1) : 0;
    if (mode === 'short') return -etfRet - carryAtIdx(idxOriginal);
    return etfRet;
  };
  const allSeries = result.paths.map(p => pickIdx.map(i => toRet(p[i], i)));
  const sampleStride = Math.max(1, Math.floor(allSeries.length / 50));
  const series = allSeries.filter((_, i) => i % sampleStride === 0).slice(0, 50);
  const mean = pickIdx.map(i => toRet(result.overlays.mean[i], i));
  const median = pickIdx.map(i => toRet(result.overlays.p50[i], i));
  const p05 = pickIdx.map(i => toRet(result.overlays.p05[i], i));
  const p95 = pickIdx.map(i => toRet(result.overlays.p95[i], i));
  const meanCenter = mean.reduce((a, b) => a + b, 0) / Math.max(1, mean.length);
  const spreadSeries = p95.map((hi, i) => Math.abs(hi - p05[i])).filter(Number.isFinite);
  const spreadP75 = spreadSeries.length
    ? quantileSorted([...spreadSeries].sort((a, b) => a - b), 0.75)
    : NaN;
  const meanMaxDev = mean.reduce((m, v) => Math.max(m, Math.abs(v - meanCenter)), 0);
  const halfRange = Math.max(
    0.2,
    Number.isFinite(spreadP75) ? spreadP75 * 1.7 : 0,
    Number.isFinite(meanMaxDev) ? meanMaxDev * 1.35 : 0,
  );
  let yMin = meanCenter - halfRange;
  let yMax = meanCenter + halfRange;
  if (!Number.isFinite(yMin) || !Number.isFinite(yMax) || yMin === yMax) {
    yMin = -1;
    yMax = 1;
  }

  const W = 900;
  const H = 260;
  const L = 60;
  const R = 8;
  const T = 8;
  const B = 22;
  const PW = W - L - R;
  const PH = H - T - B;
  const clipId = `mc-clip-${mode}-${result.settings.pathCount}-${result.settings.steps}`;
  const linThresh = Math.max(0.02, halfRange / 12);
  const symlog = (v) => Math.sign(v) * Math.log1p(Math.abs(v) / linThresh);
  const symlogInv = (sv) => Math.sign(sv) * linThresh * (Math.exp(Math.abs(sv)) - 1);
  const yMinS = symlog(yMin);
  const yMaxS = symlog(yMax);
  const x = (i) => L + (i / (pickIdx.length - 1)) * PW;
  const y = (v) => {
    const s = symlog(v);
    return T + (1 - ((s - yMinS) / Math.max(1e-12, (yMaxS - yMinS)))) * PH;
  };
  const linePath = (vals) => vals.map((v, i) => `${i === 0 ? 'M' : 'L'} ${x(i).toFixed(2)} ${y(v).toFixed(2)}`).join(' ');
  const bandPath = `M ${x(0)} ${y(p95[0])} ${p95.map((v, i) => `L ${x(i)} ${y(v)}`).join(' ')} ${[...p05].reverse().map((v, i) => `L ${x(p05.length - 1 - i)} ${y(v)}`).join(' ')} Z`;
  const tickCount = 6;
  const yTicks = Array.from({ length: tickCount }, (_, i) => {
    const q = i / Math.max(1, tickCount - 1);
    const sv = yMaxS - q * (yMaxS - yMinS);
    return symlogInv(sv);
  });

  return (
    <div className="mc-plot">
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
        <defs>
          <clipPath id={clipId}>
            <rect x={L} y={T} width={PW} height={PH} />
          </clipPath>
        </defs>
        <rect x={L} y={T} width={PW} height={PH} fill="rgba(11,19,34,0.2)" stroke="rgba(56,72,96,0.5)" />
        {yTicks.map((tick, i) => (
          <g key={i}>
            <line x1={L} y1={y(tick)} x2={W - R} y2={y(tick)} stroke="rgba(56,72,96,0.35)" strokeWidth="1" />
            <text x={L - 6} y={y(tick) + 3} textAnchor="end" fontSize="10" fill="#7f8ea8" fontFamily="JetBrains Mono">
              {fmt(tick)}
            </text>
          </g>
        ))}
        <text x="12" y={T + 10} fontSize="10" fill="#7f8ea8" fontFamily="JetBrains Mono">
          {mode === 'short' ? 'Short return (log scale)' : 'ETF return (log scale)'}
        </text>
        <g clipPath={`url(#${clipId})`}>
          <path d={bandPath} fill="rgba(59,130,246,0.14)" stroke="none" />
          {series.map((s, i) => (
            <path key={i} d={linePath(s)} fill="none" stroke="rgba(148,163,184,0.24)" strokeWidth="1" />
          ))}
          <path d={linePath(median)} fill="none" stroke="rgba(139,92,246,0.95)" strokeWidth="2.2" />
          <path d={linePath(mean)} fill="none" stroke="rgba(6,182,212,0.95)" strokeWidth="2.2" />
        </g>
      </svg>
    </div>
  );
}

function SimpleSeriesPlot({ series, valueKey, color, label, formatValue, zeroLabel = '0' }) {
  if (!Array.isArray(series) || !series.length) {
    return <div className="scenario-warning">No data available.</div>;
  }
  const vals = series.map(p => Number(p?.[valueKey])).filter(Number.isFinite);
  if (!vals.length) return <div className="scenario-warning">No finite values available.</div>;

  const W = 980;
  const H = 300;
  const L = 74;
  const R = 12;
  const T = 12;
  const B = 38;
  const PW = W - L - R;
  const PH = H - T - B;

  const yMinRaw = Math.min(...vals);
  const yMaxRaw = Math.max(...vals);
  // Always include zero in axis range so the zero-reference line is explicit.
  const baseMin = Math.min(yMinRaw, 0);
  const baseMax = Math.max(yMaxRaw, 0);
  const pad = (baseMax - baseMin || Math.max(1, Math.abs(baseMax) * 0.1)) * 0.1;
  const yMin = baseMin - pad;
  const yMax = baseMax + pad;
  const x = (i) => L + (i / Math.max(1, series.length - 1)) * PW;
  const y = (v) => T + (1 - ((v - yMin) / Math.max(1e-12, yMax - yMin))) * PH;

  const lineVals = series.map(p => Number(p?.[valueKey]));
  const linePath = lineVals
    .map((v, i) => (Number.isFinite(v) ? `${i === 0 ? 'M' : 'L'} ${x(i).toFixed(2)} ${y(v).toFixed(2)}` : ''))
    .filter(Boolean)
    .join(' ');
  let latestIdx = -1;
  for (let i = lineVals.length - 1; i >= 0; i -= 1) {
    if (Number.isFinite(lineVals[i])) {
      latestIdx = i;
      break;
    }
  }
  const latestVal = latestIdx >= 0 ? lineVals[latestIdx] : NaN;
  const latestLabel = Number.isFinite(latestVal)
    ? `Current: ${formatValue ? formatValue(latestVal) : String(latestVal)}`
    : '';
  const latestLabelY = Number.isFinite(latestVal)
    ? clampNum(y(latestVal) - 7, T + 11, H - B - 4)
    : 0;
  const ticks = [0, 0.25, 0.5, 0.75, 1].map(q => yMin + (yMax - yMin) * q).reverse();
  const yZero = y(0);
  const dateForIdx = (idx) => {
    const raw = series[idx]?.date;
    if (!raw) return '';
    const d = new Date(`${raw}T00:00:00Z`);
    if (Number.isNaN(d.getTime())) return String(raw);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' });
  };
  const xTickIdx = [0, Math.floor((series.length - 1) / 2), Math.max(0, series.length - 1)];
  const xTickIdxUnique = Array.from(new Set(xTickIdx));

  return (
    <div className="mc-plot" style={{ height: 300, marginBottom: 0 }}>
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet">
        <rect x={L} y={T} width={PW} height={PH} fill="rgba(11,19,34,0.2)" stroke="rgba(56,72,96,0.5)" />
        {ticks.map((tick, i) => (
          <g key={i}>
            <line x1={L} y1={y(tick)} x2={W - R} y2={y(tick)} stroke="rgba(56,72,96,0.35)" strokeWidth="1" />
            <text x={L - 8} y={y(tick) + 4} textAnchor="end" fontSize="11" fill="#9db0d2" fontFamily="DM Sans">
              {formatValue ? formatValue(tick) : String(tick)}
            </text>
          </g>
        ))}
        <line
          x1={L}
          y1={yZero}
          x2={W - R}
          y2={yZero}
          stroke="rgba(255,255,255,0.45)"
          strokeWidth="1.3"
          strokeDasharray="6 5"
        />
        <text x={W - R - 4} y={yZero - 5} textAnchor="end" fontSize="11" fill="rgba(255,255,255,0.72)" fontFamily="DM Sans">
          {zeroLabel}
        </text>
        <path d={linePath} fill="none" stroke={color || "rgba(6,182,212,0.95)"} strokeWidth="2" />
        {Number.isFinite(latestVal) && (
          <>
            <circle cx={x(latestIdx)} cy={y(latestVal)} r="3.2" fill={color || "rgba(6,182,212,0.95)"} />
            <text
              x={W - R - 6}
              y={latestLabelY}
              textAnchor="end"
              fontSize="11"
              fill="#d8e4f8"
              fontFamily="DM Sans"
            >
              {latestLabel}
            </text>
          </>
        )}
        <text x="14" y={T + 14} fontSize="12" fill="#c9d7ef" fontFamily="DM Sans">{label}</text>
        {xTickIdxUnique.map((idx, i) => (
          <g key={`x-${i}`}>
            <line x1={x(idx)} y1={H - B + 1} x2={x(idx)} y2={H - B + 6} stroke="rgba(120,138,168,0.7)" strokeWidth="1" />
            <text x={x(idx)} y={H - 8} textAnchor="middle" fontSize="10" fill="#93a7c8" fontFamily="DM Sans">
              {dateForIdx(idx)}
            </text>
          </g>
        ))}
      </svg>
    </div>
  );
}

const COLS = [
  { key: 'symbol', label: 'Symbol', w: 90 },

  { key: 'vol_etf_annual', label: 'Vol ETF', w: 80 },
];

// ── Summary Card ────────────────────────────
function SummaryCard({ label, value, sub, color }) {
  return (
    <div className="summary-card">
      <div className="label">{label}</div>
      <div className="value" style={color ? { color } : {}}>{value}</div>
      {sub && <div className="sub">{sub}</div>}
    </div>

}

function ExpectedDecayCalculator() {
  const [beta, setBeta] = useState('2');
  const [sigmaAnnual, setSigmaAnnual] = useState('130');
  const [periodValue, setPeriodValue] = useState('1');
  const [periodUnit, setPeriodUnit] = useState('months');

  const result = useMemo(() => {
    const fn = window.computeExpectedDecay;
    if (typeof fn !== 'function') {
      return { ok: false, error: 'Calculator utility unavailable.' };
    }
    return fn({ beta, sigmaAnnual, periodValue, periodUnit });
  }, [beta, sigmaAnnual, periodValue, periodUnit]);

  return (
    <div className="calc-card">
      <div className="calc-title">Expected Decay Calculator</div>
      <div className="calc-helper">
        This is theoretical gross decay from volatility drag; not a forecast of realized returns.
      </div>

      <div className="calc-grid">
        <div className="calc-field">
          <label>Beta</label>
          <input value={beta} onChange={e => setBeta(e.target.value)} placeholder="-2, 1.5, 2" />
        </div>
        <div className="calc-field">
          <label>Annualized Volatility (%)</label>
          <input value={sigmaAnnual} onChange={e => setSigmaAnnual(e.target.value)} placeholder="130 or 1.3" />
        </div>
        <div className="calc-field">
          <label>Time Period Value</label>
          <input type="number" min="0" step="any" value={periodValue} onChange={e => setPeriodValue(e.target.value)} />
        </div>
        <div className="calc-field">
          <label>Time Unit</label>
          <select value={periodUnit} onChange={e => setPeriodUnit(e.target.value)}>
            <option value="days">Days</option>
            <option value="weeks">Weeks</option>
            <option value="months">Months</option>
            <option value="years">Years</option>
          </select>
        </div>
      </div>

      {!result.ok ? (
        <div className="calc-error">{result.error || 'Invalid input(s).'}</div>
      ) : (
        <>
          <div className="calc-out-grid">
            <div className="calc-out">
              <div className="k">Period Expected Decay (%)</div>
              <div className="v">{(result.periodExpectedDecay * 100).toFixed(2)}%</div>
            </div>
            <div className="calc-out">
              <div className="k">Period Expected Decay (decimal)</div>
              <div className="v">{result.periodExpectedDecay.toFixed(6)}</div>
            </div>
            <div className="calc-out">
              <div className="k">Annual Expected Decay (%)</div>
              <div className="v">{(result.annualExpectedDecay * 100).toFixed(2)}%</div>
            </div>
          </div>

          <div className="calc-formula">
            expected_decay(T) = 0.5 × |beta| × |beta − 1| × sigma_annual² × T_years
          </div>
          <div className="calc-formula">
            0.5 × |{Number(result.beta).toFixed(4)}| × |{(Number(result.beta) - 1).toFixed(4)}| × {Number(result.sigmaAnnual).toFixed(4)}² × {Number(result.periodYears).toFixed(6)}
          </div>
          <div className="calc-example">
            Example: beta=2, sigma=130%, T=1 month → {(0.5 * Math.abs(2) * Math.abs(1) * (1.3 ** 2) / 12 * 100).toFixed(2)}%
          </div>
        </>
      )}
    </div>
  );
}

const TIMEFRAMES = [
  { label: '1M',  range: '1M',  interval: 'D' },
  { label: '3M',  range: '3M',  interval: 'D' },
  { label: '6M',  range: '6M',  interval: 'D' },
  { label: 'YTD', range: 'YTD', interval: 'D' },
  { label: '1Y',  range: '12M', interval: 'W' },
  { label: 'ALL', range: 'ALL', interval: 'W' },
];

function buildWidgetHtml(symbol, compareSymbol, range, interval) {
  const config = JSON.stringify({
    autosize: true,
    symbol: symbol,
    interval: interval || 'D',
    range: range || '6M',
    timezone: 'exchange',
    theme: 'dark',
    style: '2',
    locale: 'en',
    allow_symbol_change: false,
    compareSymbols: compareSymbol
      ? [{ symbol: compareSymbol, position: 'SameScale' }]
      : [],
    backgroundColor: 'rgba(10, 14, 23, 1)',
    gridColor: 'rgba(30, 45, 70, 0.4)',
    hide_top_toolbar: false,
    hide_legend: false,
    hide_side_toolbar: true,
    save_image: false,
    calendar: false,
    hide_volume: true,
    support_host: 'https://www.tradingview.com',
  });

  return `<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0a0e17}
  .tradingview-widget-container{height:100%;width:100%}
  .tradingview-widget-container__widget{height:100%;width:100%}
</style></head><body>
<div class="tradingview-widget-container">
  <div class="tradingview-widget-container__widget"></div>
  <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
  ${config}
  \x3c/script>
</div>
</body></html>`;
}

function ChartPage({ record, onBack }) {
  const [activeTf, setActiveTf] = useState(TIMEFRAMES[2]); // 6M
  const [activePanel, setActivePanel] = useState('chart');
  const [scenarioHorizon, setScenarioHorizon] = useState('1Y');
  const [mcPathCount, setMcPathCount] = useState(500);
  const [mcSeed, setMcSeed] = useState(42);
  const [mcRuinThresholdPct, setMcRuinThresholdPct] = useState(-80);
  const [mcUpsideThresholdsText, setMcUpsideThresholdsText] = useState(MC_DEFAULT_UPSIDE_THRESHOLDS);
  const [borrowHistoryMap, setBorrowHistoryMap] = useState({});
  const [borrowHistoryLoading, setBorrowHistoryLoading] = useState(false);
  const [borrowHistoryError, setBorrowHistoryError] = useState(null);
  const [optionsCache, setOptionsCache] = useState(null);
  const [optionsCacheError, setOptionsCacheError] = useState(null);
  const [tradeUseScenarioAssumptions, setTradeUseScenarioAssumptions] = useState(true);
  const [tradeBaseLegs, setTradeBaseLegs] = useState([]);
  const [tradeOptionLegs, setTradeOptionLegs] = useState([]);
  const [tradeTtxDays, setTradeTtxDays] = useState(30);
  const [tradeRatePct, setTradeRatePct] = useState(4.0);
  const [tradeShortProceedsPct, setTradeShortProceedsPct] = useState(1.0);
  const [iframeLoaded, setIframeLoaded] = useState(false);
  const iframeRef = useRef(null);
  const keyRef = useRef(0);

  const r = record;
  const etfSym = r.symbol;
  const undSym = r.underlying;
  const tradeFns = window.TradeLab || {};

  const bucketLabel = r.bucket === 'bucket_1_high_beta' ? 'Bucket 1 — High β'
    : r.bucket === 'bucket_2_low_beta' ? 'Bucket 2 — Low β'
    : r.bucket === 'bucket_3_inverse' ? 'Bucket 3 — Inverse' : '';
  const bucketCls = r.bucket === 'bucket_1_high_beta' ? 'b1'
    : r.bucket === 'bucket_2_low_beta' ? 'b2' : 'b3';

  const widgetHtml = useMemo(() => {
    keyRef.current++;
    return buildWidgetHtml(etfSym, undSym, activeTf.range, activeTf.interval);
  }, [etfSym, undSym, activeTf]);

  // Reset loaded state when widget changes
  useEffect(() => { setIframeLoaded(false); }, [widgetHtml]);
  useEffect(() => {
    let cancelled = false;
    const run = async () => {
      if (BORROW_HISTORY_CACHE) {
        setBorrowHistoryMap(BORROW_HISTORY_CACHE);
        return;
      }
      setBorrowHistoryLoading(true);
      setBorrowHistoryError(null);
      try {
        const cacheBust = `?t=${Math.floor(Date.now() / 60000)}`;
        const res = await fetch(`${BORROW_HISTORY_URL}${cacheBust}`, { cache: 'no-store' });
        if (!res.ok) throw new Error(`borrow history HTTP ${res.status}`);
        const payload = await res.json();
        const symbols = payload?.symbols && typeof payload.symbols === 'object' ? payload.symbols : {};
        BORROW_HISTORY_CACHE = symbols;
        if (!cancelled) setBorrowHistoryMap(symbols);
      } catch (e) {
        if (!cancelled) setBorrowHistoryError(e?.message || 'borrow history unavailable');
      } finally {
        if (!cancelled) setBorrowHistoryLoading(false);
      }
    };
    run();
    return () => { cancelled = true; };
  }, []);
  useEffect(() => {
    let cancelled = false;
    const run = async () => {
      setOptionsCacheError(null);
      try {
        const cacheBust = `?t=${Math.floor(Date.now() / 1800)}`;
        const res = await fetch(`${OPTIONS_CACHE_URL}${cacheBust}`, { cache: 'no-store' });
        if (!res.ok) throw new Error(`options cache HTTP ${res.status}`);
        const payload = await res.json();
        if (!cancelled) setOptionsCache(payload);
      } catch (e) {
        if (!cancelled) setOptionsCacheError(e?.message || 'options cache unavailable');
      }
    };
    run();
    return () => { cancelled = true; };
  }, []);

  const volWindowKey = VOL_TF_KEY_BY_RANGE[activeTf.range] || '6M';
  const volPoint = r?.realized_vol?.[volWindowKey] || null;
  const realizedUnd = volPoint?.underlying ?? r.vol_underlying_annual ?? null;
  const realizedEtf = volPoint?.etf ?? r.vol_etf_annual ?? null;
  const ewmaUnd = volPoint?.underlying_ewma ?? realizedUnd;
  const ewmaEtf = volPoint?.etf_ewma ?? realizedEtf;
  const realizedLabel = volPoint ? `${activeTf.label} lookback` : 'screener snapshot';
  const realizedUndSub = volPoint?.n_returns_underlying ? `${realizedLabel} • ${fmtNum(volPoint.n_returns_underlying)} rets` : realizedLabel;
  const realizedEtfSub = volPoint?.n_returns_etf ? `${realizedLabel} • ${fmtNum(volPoint.n_returns_etf)} rets` : realizedLabel;
  const scenarioFns = window.ScenarioReturns || {};
  const horizonYears = typeof scenarioFns.horizonToYears === 'function'
    ? scenarioFns.horizonToYears(scenarioHorizon)
    : NaN;
  const scenarioLeverage = Number.isFinite(Number(r.beta)) ? Number(r.beta) : 1;
  const etfBorrowSeries = Array.isArray(borrowHistoryMap?.[etfSym]) ? borrowHistoryMap[etfSym] : [];
  const avgBorrowFromHistory = (() => {
    const vals = etfBorrowSeries.map(x => Number(x?.borrow_current)).filter(Number.isFinite);
    if (!vals.length) return null;
    return vals.reduce((a, b) => a + b, 0) / vals.length;
  })();
  const annualCarryDragRaw = Number.isFinite(avgBorrowFromHistory)
    ? avgBorrowFromHistory
    : (Number.isFinite(Number(r.borrow_avg_annual)) ? Number(r.borrow_avg_annual) : Number(getBorrowRate(r)));
  const annualCarryDrag = Number.isFinite(annualCarryDragRaw) ? Math.max(0, annualCarryDragRaw) : 0;
  const tradeBorrowBySymbol = useMemo(() => ({ [etfSym]: annualCarryDrag }), [etfSym, annualCarryDrag]);
  const minObsForScenario = 10;
  const undObs = Number(volPoint?.n_returns_underlying) || 0;
  const scenarioSigmaBest = Number(ewmaUnd);
  const scenarioSigmaRef = Number(realizedUnd);

  const scenarioGrid = useMemo(() => {
    if (typeof scenarioFns.buildScenarioGrid !== 'function') {
      return { ok: false, error: 'Scenario utility unavailable.' };
    }
    if (!Number.isFinite(Number(ewmaUnd)) || Number(ewmaUnd) <= 0) {
      return { ok: false, error: 'Missing valid underlying EWMA volatility for this lookback.' };
    }
    if (!Number.isFinite(horizonYears) || horizonYears <= 0) {
      return { ok: false, error: 'Invalid scenario horizon.' };
    }
    if (undObs < minObsForScenario) {
      return { ok: false, error: `Insufficient lookback observations (${undObs}).` };
    }
    return scenarioFns.buildScenarioGrid({
      leverage: scenarioLeverage,
      bestVolAnnual: Number(ewmaUnd),
      horizonYears,
      annualCarryDrag: 0,
      volMultipliers: SCENARIO_VOL_MULTIPLIERS,
      shockMultipliers: SCENARIO_SHOCK_MULTIPLIERS,
      minReturn: -0.9999,
    });
  }, [scenarioFns, ewmaUnd, horizonYears, undObs, scenarioLeverage, annualCarryDrag]);

  const mcUpsideThresholds = useMemo(
    () => parseThresholdInput(mcUpsideThresholdsText),
    [mcUpsideThresholdsText],
  );
  const monteCarloResult = useMemo(() => {
    if (typeof scenarioFns.simulateMonteCarloPaths !== 'function') {
      return { ok: false, error: 'Monte Carlo utility unavailable.' };
    }
    if (!Number.isFinite(scenarioSigmaBest) || scenarioSigmaBest <= 0) {
      return { ok: false, error: 'Missing valid EWMA sigma for Monte Carlo.' };
    }
    if (!Number.isFinite(horizonYears) || horizonYears <= 0) {
      return { ok: false, error: 'Invalid Monte Carlo horizon.' };
    }
    if (undObs < minObsForScenario) {
      return { ok: false, error: `Insufficient lookback observations (${undObs}).` };
    }
    return scenarioFns.simulateMonteCarloPaths({
      pathCount: Number(mcPathCount),
      sigmaAnnual: scenarioSigmaBest,
      leverage: scenarioLeverage,
      horizonYears,
      annualCarryDrag,
      seed: Number(mcSeed),
      ruinThreshold: Number(mcRuinThresholdPct) / 100,
      upsideThresholds: mcUpsideThresholds.length ? mcUpsideThresholds : [0.25, 0.5, 1.0],
    });
  }, [
    scenarioFns,
    scenarioSigmaBest,
    horizonYears,
    undObs,
    minObsForScenario,
    mcPathCount,
    scenarioLeverage,
    annualCarryDrag,
    mcSeed,
    mcRuinThresholdPct,
    mcUpsideThresholds,
  ]);

  const cachedSpotUnd = Number(optionsCache?.symbols?.[undSym]?.spot);
  const cachedSpotEtf = Number(optionsCache?.symbols?.[etfSym]?.spot);
  const undOptionsRows = Array.isArray(optionsCache?.symbols?.[undSym]?.options) ? optionsCache.symbols[undSym].options : [];
  const etfOptionsRows = Array.isArray(optionsCache?.symbols?.[etfSym]?.options) ? optionsCache.symbols[etfSym].options : [];
  const optionsErrUnd = optionsCache?.errors_by_symbol?.[undSym];
  const optionsErrEtf = optionsCache?.errors_by_symbol?.[etfSym];
  const hasCachedSpotUnd = Number.isFinite(cachedSpotUnd);
  const hasCachedSpotEtf = Number.isFinite(cachedSpotEtf);
  const tradeSpotUnderlying = Number.isFinite(cachedSpotUnd) ? cachedSpotUnd : 100;
  const tradeSpotEtf = Number.isFinite(cachedSpotEtf) ? cachedSpotEtf : 100;

  useEffect(() => {
    setTradeBaseLegs([
      { id: 1, symbol: undSym, side: 'short', quantity: 100, entry: tradeSpotUnderlying },
      { id: 2, symbol: etfSym, side: 'long', quantity: 100, entry: tradeSpotEtf },
    ]);
    setTradeOptionLegs([]);
  }, [undSym, etfSym, tradeSpotUnderlying, tradeSpotEtf]);

  const symbolChoices = useMemo(() => Array.from(new Set([undSym, etfSym])), [undSym, etfSym]);
  const optionsForSymbol = useCallback((sym) => {
    const rows = optionsCache?.symbols?.[sym]?.options;
    return Array.isArray(rows) ? rows : [];
  }, [optionsCache]);
  const expiriesForSymbol = useCallback((sym) => {
    const rows = optionsForSymbol(sym);
    return Array.from(new Set(rows.map((x) => x.expiration_date).filter(Boolean))).sort();
  }, [optionsForSymbol]);
  const strikesForSymbolExpiryType = useCallback((sym, exp, type) => {
    const rows = optionsForSymbol(sym).filter((x) => x.expiration_date === exp && String(x.contract_type || '').toLowerCase() === String(type || '').toLowerCase());
    return Array.from(new Set(rows.map((x) => Number(x.strike_price)).filter(Number.isFinite))).sort((a, b) => a - b);
  }, [optionsForSymbol]);
  const findContract = useCallback((sym, exp, type, strike) => {
    return optionsForSymbol(sym).find((x) => x.expiration_date === exp
      && String(x.contract_type || '').toLowerCase() === String(type || '').toLowerCase()
      && Math.abs(Number(x.strike_price) - Number(strike)) < 1e-9) || null;
  }, [optionsForSymbol]);

  const tradeScenarioGrid = useMemo(() => {
    if (typeof tradeFns.buildTradeScenarioGrid !== 'function') return { ok: false, error: 'Trade Lab utility unavailable.' };
    if (!scenarioGrid?.ok) return { ok: false, error: 'Scenario inputs unavailable.' };
    const optionLegs = tradeOptionLegs.map((leg) => {
      const c = findContract(leg.symbol, leg.expiry, leg.type, leg.strike);
      return {
        ...leg,
        premium: Number.isFinite(Number(leg.premium)) ? Number(leg.premium) : Number(c?.mid),
        iv: Number.isFinite(Number(leg.iv)) ? Number(leg.iv) : Number(c?.iv),
      };
    });
    const tradeSigmaAnnual = tradeUseScenarioAssumptions ? scenarioSigmaBest : (Number.isFinite(Number(realizedUnd)) ? Number(realizedUnd) : scenarioSigmaBest);
    const tradeHYears = tradeUseScenarioAssumptions ? horizonYears : 1;
    const tradeLev = tradeUseScenarioAssumptions ? scenarioLeverage : (Number.isFinite(Number(r.beta)) ? Number(r.beta) : scenarioLeverage);
    return tradeFns.buildTradeScenarioGrid({
      baseLegs: tradeBaseLegs,
      optionLegs,
      underlyingSymbol: undSym,
      etfSymbol: etfSym,
      spotUnderlying: tradeSpotUnderlying,
      spotEtf: tradeSpotEtf,
      leverage: tradeLev,
      horizonYears: tradeHYears,
      baseVolAnnual: tradeSigmaAnnual,
      shockRows: scenarioGrid.rows.map((x) => ({ sigmaMultiple: x.sigmaMultiple, underlyingReturn: x.underlyingReturn })),
      volColumns: scenarioGrid.volColumns.map((x) => ({ sigmaAnnual: x.sigmaAnnual })),
      ttxDays: tradeTtxDays,
      rate: Number(tradeRatePct) / 100,
      annualBorrowBySymbol: tradeBorrowBySymbol,
      defaultBorrowAnnual: annualCarryDrag,
      shortProceedsRateAnnual: Number(tradeShortProceedsPct) / 100,
    });
  }, [tradeFns, scenarioGrid, tradeOptionLegs, tradeBaseLegs, findContract, undSym, etfSym, tradeSpotUnderlying, tradeSpotEtf, scenarioLeverage, horizonYears, scenarioSigmaBest, tradeTtxDays, tradeRatePct, tradeUseScenarioAssumptions, realizedUnd, r.beta, tradeBorrowBySymbol, annualCarryDrag, tradeShortProceedsPct]);

  const tradeMonteCarlo = useMemo(() => {
    if (typeof tradeFns.evaluateTradeMonteCarlo !== 'function') return { ok: false, error: 'Trade Lab utility unavailable.' };
    if (!monteCarloResult?.ok) return { ok: false, error: 'Monte Carlo unavailable.' };
    if (typeof scenarioFns.simulateMonteCarloPaths !== 'function') return { ok: false, error: 'Monte Carlo engine unavailable.' };
    const tradeSigmaAnnual = tradeUseScenarioAssumptions ? scenarioSigmaBest : (Number.isFinite(Number(realizedUnd)) ? Number(realizedUnd) : scenarioSigmaBest);
    const tradeHYears = tradeUseScenarioAssumptions ? horizonYears : 1;
    const underlyingMc = scenarioFns.simulateMonteCarloPaths({
      pathCount: Number(mcPathCount),
      sigmaAnnual: tradeSigmaAnnual,
      leverage: 1,
      horizonYears: tradeHYears,
      annualCarryDrag: 0,
      seed: Number(mcSeed),
      ruinThreshold: -0.99,
      upsideThresholds: [0.25],
    });
    if (!underlyingMc.ok) return { ok: false, error: underlyingMc.error || 'Underlying MC unavailable.' };
    const optionLegs = tradeOptionLegs.map((leg) => {
      const c = findContract(leg.symbol, leg.expiry, leg.type, leg.strike);
      return {
        ...leg,
        premium: Number.isFinite(Number(leg.premium)) ? Number(leg.premium) : Number(c?.mid),
        iv: Number.isFinite(Number(leg.iv)) ? Number(leg.iv) : Number(c?.iv),
      };
    });
    return tradeFns.evaluateTradeMonteCarlo({
      baseLegs: tradeBaseLegs,
      optionLegs,
      underlyingSymbol: undSym,
      etfSymbol: etfSym,
      spotUnderlying: tradeSpotUnderlying,
      spotEtf: tradeSpotEtf,
      ttxDaysStart: tradeTtxDays,
      horizonYears: tradeHYears,
      volAnnual: tradeSigmaAnnual,
      rate: Number(tradeRatePct) / 100,
      annualBorrowBySymbol: tradeBorrowBySymbol,
      defaultBorrowAnnual: annualCarryDrag,
      shortProceedsRateAnnual: Number(tradeShortProceedsPct) / 100,
      etfPaths: monteCarloResult.paths,
      underlyingPaths: underlyingMc.paths,
    });
  }, [tradeFns, monteCarloResult, scenarioFns, mcPathCount, scenarioSigmaBest, horizonYears, mcSeed, tradeOptionLegs, tradeBaseLegs, findContract, undSym, etfSym, tradeSpotUnderlying, tradeSpotEtf, tradeTtxDays, tradeRatePct, tradeUseScenarioAssumptions, realizedUnd, tradeBorrowBySymbol, annualCarryDrag, tradeShortProceedsPct]);

  const tradeTtxSeries = useMemo(() => {
    if (typeof tradeFns.buildTtxSensitivity !== 'function') return [];
    if (!scenarioGrid?.ok) return [];
    const optionLegs = tradeOptionLegs.map((leg) => {
      const c = findContract(leg.symbol, leg.expiry, leg.type, leg.strike);
      return {
        ...leg,
        premium: Number.isFinite(Number(leg.premium)) ? Number(leg.premium) : Number(c?.mid),
        iv: Number.isFinite(Number(leg.iv)) ? Number(leg.iv) : Number(c?.iv),
      };
    });
    const tradeSigmaAnnual = tradeUseScenarioAssumptions ? scenarioSigmaBest : (Number.isFinite(Number(realizedUnd)) ? Number(realizedUnd) : scenarioSigmaBest);
    const tradeHYears = tradeUseScenarioAssumptions ? horizonYears : 1;
    const tradeLev = tradeUseScenarioAssumptions ? scenarioLeverage : (Number.isFinite(Number(r.beta)) ? Number(r.beta) : scenarioLeverage);
    return tradeFns.buildTtxSensitivity({
      baseLegs: tradeBaseLegs,
      optionLegs,
      underlyingSymbol: undSym,
      etfSymbol: etfSym,
      spotUnderlying: tradeSpotUnderlying,
      spotEtf: tradeSpotEtf,
      leverage: tradeLev,
      horizonYears: tradeHYears,
      baseVolAnnual: tradeSigmaAnnual,
      shockRows: scenarioGrid.rows.map((x) => ({ sigmaMultiple: x.sigmaMultiple, underlyingReturn: x.underlyingReturn })),
      volColumns: scenarioGrid.volColumns.map((x) => ({ sigmaAnnual: x.sigmaAnnual })),
      ttxList: [1, 7, 14, 30, 60, 90],
      rate: Number(tradeRatePct) / 100,
      annualBorrowBySymbol: tradeBorrowBySymbol,
      defaultBorrowAnnual: annualCarryDrag,
      shortProceedsRateAnnual: Number(tradeShortProceedsPct) / 100,
    });
  }, [tradeFns, scenarioGrid, tradeOptionLegs, tradeBaseLegs, findContract, undSym, etfSym, tradeSpotUnderlying, tradeSpotEtf, scenarioLeverage, horizonYears, scenarioSigmaBest, tradeRatePct, tradeUseScenarioAssumptions, realizedUnd, r.beta, tradeBorrowBySymbol, annualCarryDrag, tradeShortProceedsPct]);

  return (
    <div className="chart-page">
      {/* Header */}
      <div className="chart-header">
        <button className="back-btn" onClick={onBack}>
          <svg viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M17 10a.75.75 0 01-.75.75H5.612l4.158 3.96a.75.75 0 11-1.04 1.08l-5.5-5.25a.75.75 0 010-1.08l5.5-5.25a.75.75 0 111.04 1.08L5.612 9.25H16.25A.75.75 0 0117 10z" clipRule="evenodd"/></svg>
          Back
        </button>
        <div className="chart-title">
          <span className="etf-sym">{etfSym}</span>
          {undSym && <>
            <span className="vs">vs</span>
            <span className="und-sym">{undSym}</span>
          </>}
        </div>

              </div>
              {borrowHistoryLoading ? (
                <div className="scenario-warning">Loading borrow history…</div>
              ) : borrowHistoryError ? (
                <div className="scenario-warning">{borrowHistoryError}</div>
              ) : (
                <SimpleSeriesPlot
                  series={etfBorrowSeries}
                  valueKey="borrow_current"
                  color="rgba(245,158,11,0.95)"
                  label="Borrow rate (annual, fee-only)"
                  formatValue={(v) => fmt(v)}
                  zeroLabel="0% borrow"
                />
              )}
            </div>

            <div className="borrow-card">
              <div className="scenario-title">Shares Available History</div>
              <div className="borrow-meta">
                Source: historical `etf_screened_today.csv` snapshots across available commit history.
              </div>
              {borrowHistoryLoading ? (
                <div className="scenario-warning">Loading borrow history…</div>
              ) : borrowHistoryError ? (
                <div className="scenario-warning">{borrowHistoryError}</div>
              ) : (
                <SimpleSeriesPlot
                  series={etfBorrowSeries}
                  valueKey="shares_available"
                  color="rgba(6,182,212,0.95)"
                  label="Shares available"
                  formatValue={(v) => fmtNum(Math.round(v))}
                  zeroLabel="0 shares"
                />
              )}
            </div>
          </div>

          <div className="chart-note">
            Monte Carlo carry drag uses average historical fee-only borrow when available, otherwise falls back to current borrow.
          </div>
        </div>
      )}
    </div>
  );
}

// ── Info Page ────────────────────────────────
function InfoPage({ data }) {
  if (!data) return null;
  const s = data.summary;
  const c = data.last_commit;
  return (
    <div className="info-page">
      <div className="info-section"><span style={{ color: 'var(--accent-cyan)' }}>◈</span> Build Info</div>
      <div className="info-row"><span className="info-key">Data Built</span><span className="info-val">{fmtTime(data.build_time)}</span></div>
      <div className="info-row"><span className="info-key">Source Repo</span><span className="info-val"><a href={`https://github.com/${data.source_repo}`} target="_blank" style={{ color: 'var(--accent-purple)' }}>{data.source_repo}</a></span></div>
      <div className="info-row"><span className="info-key">Branch</span><span className="info-val">{data.source_branch}</span></div>

      <div className="info-section"><span style={{ color: 'var(--accent-green)' }}>◈</span> Screener</div>
      {c && <>
        <div className="info-row"><span className="info-key">Last Screener Run</span><span className="info-val">{fmtTime(c.date)}</span></div>
        <div className="info-row"><span className="info-key">Commit</span><span className="info-val">{c.sha} — {c.message}</span></div>
      </>}
      <div className="info-row"><span className="info-key">Total Symbols</span><span className="info-val">{s.total_symbols}</span></div>

      <div className="info-section"><span style={{ color: 'var(--accent-blue)' }}>◈</span> IBKR Borrow Data</div>
      <div className="info-row">
        <span className="info-key">IBKR FTP Status</span>
        <span className="info-val" style={{ color: data.ibkr_ftp_success ? 'var(--positive)' : 'var(--warning)' }}>
          {data.ibkr_ftp_success ? `✓ Live (${data.ibkr_symbols_fetched} symbols)` : '✗ Using CSV fallback'}
        </span>
      </div>

      <div className="info-section"><span style={{ color: 'var(--accent-purple)' }}>◈</span> Buckets</div>
      <div className="info-row"><span className="info-key">Bucket 1 (High β &gt; 1.5)</span><span className="info-val">{s.bucket_1_count}</span></div>
      <div className="info-row"><span className="info-key">Bucket 2 (Low β ≤ 1.5)</span><span className="info-val">{s.bucket_2_count}</span></div>
      <div className="info-row"><span className="info-key">Bucket 3 (Inverse)</span><span className="info-val">{s.bucket_3_count}</span></div>

      <div style={{ marginTop: 24, padding: 14, borderRadius: 8, background: 'var(--bg-card)', border: '1px solid var(--border)', fontSize: 12, color: 'var(--text-muted)', fontFamily: "'JetBrains Mono', monospace" }}>
        Universe/analytics refresh daily via GitHub Actions. Borrow rates and shares available refresh every 30 minutes.
        Borrow shown in the dashboard is fee-only (not net of rebate). Data comes from
        IBKR's public FTP when reachable, otherwise from the screener CSV.
        Decay is measured as simple linear annualized rate from total-return series.
      </div>
    </div>
  );
}

// ── Main App ────────────────────────────────
function App() {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(true);
  const [activeTab, setActiveTab] = useState('all');
  const [search, setSearch] = useState('');
  const [sortKey, setSortKey] = useState('net_decay');
  const [sortDesc, setSortDesc] = useState(true);
  const [expandedSym, setExpandedSym] = useState(null);
  const [showInfo, setShowInfo] = useState(false);
  const [chartRecord, setChartRecord] = useState(null);

  useEffect(() => {
    const cacheBust = `?t=${Math.floor(Date.now() / 60000)}`;
    fetch(DATA_URL + cacheBust)
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(d => { setData(d); setLoading(false); })
      .catch(e => { setError(e.message); setLoading(false); });
  }, []);

  // Hash-based routing for chart page
  useEffect(() => {
    const handleHash = () => {
      const hash = window.location.hash;
      if (hash.startsWith('#/chart/') && data) {
        const sym = decodeURIComponent(hash.slice(8)).toUpperCase();
        const rec = (data.records || []).find(r => r.symbol === sym);
        if (rec) {
          setChartRecord(rec);
          setShowInfo(false);
          return;
        }
      }
      setChartRecord(null);
    };
    handleHash();
    window.addEventListener('hashchange', handleHash);
    return () => window.removeEventListener('hashchange', handleHash);
  }, [data]);

  const navigateToChart = useCallback((record) => {
    window.location.hash = `/chart/${encodeURIComponent(record.symbol)}`;
  }, []);

  const navigateBack = useCallback(() => {
    window.location.hash = '';
  }, []);

  const records = data?.records || [];
  const summary = data?.summary || {};
  const freshness = useMemo(() => getFreshness(data), [data]);

  const bucketMap = {
    all: null,
    bucket_1: 'bucket_1_high_beta',
    bucket_2: 'bucket_2_low_beta',
    bucket_3: 'bucket_3_inverse',
  };

  const filtered = useMemo(() => {
    let d = [...records];
    const bf = bucketMap[activeTab];
    if (bf) d = d.filter(r => r.bucket === bf);
    if (search) {
      const s = search.toUpperCase();
      d = d.filter(r => r.symbol.includes(s) || r.underlying.includes(s));
    }
    d.sort((a, b) => {
      let av = a[sortKey], bv = b[sortKey];
      if (av == null) av = sortDesc ? -Infinity : Infinity;
      if (bv == null) bv = sortDesc ? -Infinity : Infinity;
      if (typeof av === 'string') return sortDesc ? bv.localeCompare(av) : av.localeCompare(bv);
      if (typeof av === 'boolean') { av = av ? 1 : 0; bv = bv ? 1 : 0; }
      return sortDesc ? bv - av : av - bv;
    });
    return d;
  }, [records, activeTab, search, sortKey, sortDesc]);

  const tabCounts = useMemo(() => {
    const c = { all: records.length, bucket_1: 0, bucket_2: 0, bucket_3: 0 };
    records.forEach(r => {
      if (r.bucket === 'bucket_1_high_beta') c.bucket_1++;
      if (r.bucket === 'bucket_2_low_beta') c.bucket_2++;
      if (r.bucket === 'bucket_3_inverse') c.bucket_3++;
    });
    return c;
  }, [records]);

  const handleSort = key => {
    if (sortKey === key) setSortDesc(d => !d);
    else { setSortKey(key); setSortDesc(true); }
  };

  if (loading) return <div className="app"><div className="loading"><div className="spinner"/>Loading dashboard data…</div></div>;
  if (error) return <div className="app"><div className="error-banner">Failed to load data: {error}. Make sure <code>data/dashboard_data.json</code> exists. Run <code>python scripts/build_data.py</code> to generate it.</div></div>;

  return (
    <div className="app">
      {/* ── Topbar ──────── */}
      <div className="topbar">
        <div className="topbar-left">
          <div className="topbar-logo" onClick={() => { navigateBack(); setShowInfo(false); }}>ETF BORROW DASH</div>
          <div className="topbar-meta">
            <span className={cls('dot', data.ibkr_ftp_success ? 'dot-green' : 'dot-amber')} />
            {data.ibkr_ftp_success ? 'IBKR Live' : 'CSV Data'}
            <span className={cls('fresh-badge', freshness.className)}>{freshness.label}</span>
            <span style={{ margin: '0 4px' }}>·</span>
            Built {fmtTime(data.build_time)}
            {data.last_commit && <>
              <span style={{ margin: '0 4px' }}>·</span>
              Screener: <a href={`https://github.com/${data.source_repo}/blob/${data.source_branch}/${data.source_path || 'data/etf_screened_today.csv'}`} target="_blank">{data.last_commit.sha}</a>
            </>}
          </div>
        </div>
        <div className="topbar-right">
          <button className={cls('topbar-btn', showInfo && !chartRecord && 'active')} onClick={() => { navigateBack(); setShowInfo(s => !s); }}>
            ◉ Info
          </button>
        </div>
      </div>

      {/* ── Chart Page ──────── */}
      {chartRecord ? (
        <ChartPage record={chartRecord} onBack={navigateBack} />
      ) : showInfo ? (
        <InfoPage data={data} />
      ) : (
        <>
          {/* ── Summary ──────── */}
          <div className="summary-strip">
            <SummaryCard label="Total Symbols" value={fmtNum(summary.total_symbols)} />
            <SummaryCard
              label="Best Net Decay"
              value={summary.best_net_decay?.[0] ? fmt(summary.best_net_decay[0].net_decay) : '—'}
              sub={summary.best_net_decay?.[0]?.symbol || ''}
              color="var(--positive)"
            />
            <SummaryCard
              label="Worst Borrow"
              value={summary.worst_borrows?.[0] ? fmt(summary.worst_borrows[0].borrow) : '—'}
              sub={summary.worst_borrows?.[0]?.symbol || ''}
              color="var(--negative)"
            />
            <SummaryCard label="IBKR FTP" value={data.ibkr_ftp_success ? `${data.ibkr_symbols_fetched}` : 'Offline'}
              sub={data.ibkr_ftp_success ? 'symbols live' : 'using CSV'}
              color={data.ibkr_ftp_success ? 'var(--positive)' : 'var(--warning)'}
            />
            <div className="summary-card">
              <div className="label">Top 5 Net Decay</div>
              <ul className="highlight-list">
                {(summary.best_net_decay || []).map(s => (
                  <li key={s.symbol}>
                    <span className="sym">{s.symbol}</span>
                    <span className="val-positive">{fmt(s.net_decay)}</span>
                  </li>
                ))}
              </ul>
            </div>
            <div className="summary-card">
              <div className="label">Top 5 Worst Borrows</div>
              <ul className="highlight-list">
                {(summary.worst_borrows || []).map(s => (
                  <li key={s.symbol}>
                    <span className="sym">{s.symbol}</span>
                    <span className="val-negative">{fmt(s.borrow)}</span>
                  </li>
                ))}
              </ul>
            </div>
          </div>

          <ExpectedDecayCalculator />

          {/* ── Tabs ──────────── */}
          <div className="tab-bar">
            {[
              { key: 'all', label: 'All ETFs' },
              { key: 'bucket_1', label: 'Bucket 1 — High β' },
              { key: 'bucket_2', label: 'Bucket 2 — Low β' },
              { key: 'bucket_3', label: 'Bucket 3 — Inverse' },
            ].map(t => (
              <div key={t.key} className={cls('tab', activeTab === t.key && 'active')}
                onClick={() => setActiveTab(t.key)}>
                {t.label}<span className="count">{tabCounts[t.key]}</span>
              </div>
            ))}
          </div>

          {/* ── Controls ──────── */}
          <div className="controls-bar">
            <div className="search-wrapper">
              <span className="search-icon">⌕</span>
              <input className="search-box" placeholder="Search symbol or underlying…"
                value={search} onChange={e => setSearch(e.target.value)} />
            </div>
            <span style={{ fontSize: 12, color: 'var(--text-muted)', fontFamily: "'JetBrains Mono', monospace" }}>
              {filtered.length} results
            </span>
          </div>

          {/* ── Table ─────────── */}
          <div className="table-container">
            <table className="etf-table">
              <thead>
                <tr>
                  <th style={{ width: 30 }}></th>
                  {COLS.map(col => (
                    <th key={col.key} style={{ width: col.w }}
                      className={sortKey === col.key ? 'sorted' : ''}
                      onClick={() => handleSort(col.key)}>
                      {col.label}
                      {sortKey === col.key && <span className="sort-arrow">{sortDesc ? '▼' : '▲'}</span>}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map(r => {
                  const expanded = expandedSym === r.symbol;
                  return (
                    <React.Fragment key={r.symbol}>
                      <tr onClick={() => setExpandedSym(expanded ? null : r.symbol)}>
                        <td style={{ textAlign: 'center', fontSize: 10, color: 'var(--text-muted)' }}>
                          {expanded ? '▾' : '▸'}
                        </td>
                        <td>
                          <span className="sym-cell" onClick={e => { e.stopPropagation(); navigateToChart(r); }}>
                            {r.symbol}
                          </span>
                        </td>
                        <td className="underlying-cell">{r.underlying}</td>
                        <td>{r.beta?.toFixed(2) ?? '—'}</td>
                        <td className={borrowCls(getBorrowRate(r))}>
                          {fmt(getBorrowRate(r))} {borrowBadge(getBorrowRate(r))}
                        </td>
                        <td>{fmtNum(r.shares_available)}</td>
                        <td>{fmt(r.gross_decay_annual)}</td>
                        <td className={spreadCls(r.net_decay)}>{fmt(r.net_decay)}</td>
                        <td>{fmt(r.vol_underlying_annual)}</td>
                        <td>{fmt(r.vol_etf_annual)}</td>
                      </tr>
                      {expanded && <DetailRow r={r} />}
                    </React.Fragment>
                  );
                })}
                {filtered.length === 0 && (
                  <tr>
                    <td colSpan={COLS.length + 1} style={{
                      textAlign: 'center', padding: 40, color: 'var(--text-muted)', fontSize: 14,
                    }}>
                      No matching ETFs found.
                    </td>
                  </tr>
                )}
              </tbody>
            </table>
          </div>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
