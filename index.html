<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

const DATA_URL = "data/dashboard_data.json";
const INVESTORS_URL = "data/investors.json";
const AUTH_STORAGE_KEY = "etf_dash_session_v1";
const AUTH_SESSION_MS = 7 * 86400000;
const BORROW_HISTORY_URL = "data/borrow_history.json";
const BORROW_SPIKE_RISK_URL = "data/borrow_spike_risk.json";
const OPTIONS_CACHE_URL = "data/options_cache.json";
const ETF_METRICS_DAILY_URL = "data/etf_metrics_daily.json";
const ETF_DISTRIBUTIONS_URL = "data/etf_distributions.json";
const CORPORATE_ACTIONS_URL = "data/corporate_actions.json";
const ETF_NEWS_URL = "data/etf_news.json";
let BORROW_HISTORY_CACHE = null;
let BORROW_SPIKE_RISK_CACHE = null;
let ETF_METRICS_CACHE = null;
let ETF_DISTRIBUTIONS_CACHE = null;

// ── Formatters ──────────────────────────────
const fmt = v => v == null ? '—' : (v * 100).toFixed(2) + '%';
const fmtNum = v => v == null ? '—' : Number(v).toLocaleString();
/** Whole-share counts (ETF shares outstanding, etc.): integer separators only — avoids 87,333.079 misread as 87,333,079. */
const fmtSharesCount = v => (
  v == null || !Number.isFinite(Number(v)) ? '—' : Math.round(Number(v)).toLocaleString('en-US')
);
const fmtUsd = v => (v == null || !Number.isFinite(Number(v))) ? '—' : `$${Number(v).toFixed(2)}`;
const fmtMoney = v => (v == null || !Number.isFinite(Number(v))) ? '—' : `$${Math.round(Number(v)).toLocaleString()}`;
const fmtTime = iso => {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true });
};
const cls = (...c) => c.filter(Boolean).join(' ');
const toFiniteNum = (v) => {
  if (typeof v === 'string') {
    const s = v.trim().replace(/,/g, '').replace(/%$/, '');
    if (!s) return null;
    const n = Number(s);
    return Number.isFinite(n) ? n : null;
  }
  const n = Number(v);
  return Number.isFinite(n) ? n : null;
};
const normalizeOptionIv = (v) => {
  const n = toFiniteNum(v);
  if (n == null || n <= 0) return null;
  if (n > 5) return n / 100;
  return n;
};
const optionMidFromContract = (c) => {
  if (!c) return null;
  const bid = toFiniteNum(c.bid);
  const ask = toFiniteNum(c.ask);
  if (bid != null && ask != null && bid >= 0 && ask >= bid) return 0.5 * (bid + ask);
  const fallbacks = [c.mid, c.mark, c.last, c.close];
  for (const v of fallbacks) {
    const n = toFiniteNum(v);
    if (n != null && n > 0) return n;
  }
  if (bid != null && bid > 0) return bid;
  if (ask != null && ask > 0) return ask;
  return null;
};
const getBorrowRate = r => (r?.borrow_current ?? r?.borrow_net_annual ?? null);
/** Match scripts/build_data.py:_borrow_history_point_for_avg — exclude ~0% fee when no positive locates. */
const borrowHistoryPointForAvg = (pt) => {
  const b = Number(pt?.borrow_current);
  if (!Number.isFinite(b)) return false;
  const eps = 1e-9;
  if (Math.abs(b) > eps) return true;
  const shRaw = pt?.shares_available;
  if (shRaw == null || (typeof shRaw === 'number' && Number.isNaN(shRaw))) return false;
  const sstr = String(shRaw).trim();
  if (!sstr || /^nan$/i.test(sstr)) return false;
  const si = Number(sstr);
  if (!Number.isFinite(si)) return false;
  return Math.trunc(si) > 0;
};
const getFreshness = (data) => {
  const built = data?.build_time ? new Date(data.build_time) : null;
  if (!built || Number.isNaN(built.getTime())) {
    return { label: 'Freshness: Unknown', className: 'fresh-warn' };
  }
  const ageMin = Math.max(0, Math.round((Date.now() - built.getTime()) / 60000));
  const target = Number(data?.borrow_refresh_interval_minutes) > 0
    ? Number(data.borrow_refresh_interval_minutes)
    : 30;
  const warnAt = Math.max(target + 10, 45);
  const staleAt = Math.max(target * 2 + 10, 90);
  const ftpOk = Boolean(data?.ibkr_ftp_success);
  if (ageMin >= staleAt) return { label: `Stale (${ageMin}m old)`, className: 'fresh-bad' };
  if (!ftpOk || ageMin >= warnAt) return { label: `Degraded (${ageMin}m old)`, className: 'fresh-warn' };
  return { label: `Fresh (${ageMin}m old)`, className: 'fresh-good' };
};

const HIGH_BETA_THRESHOLD = 1.5;

function timingSafeEqualBytes(a, b) {
  if (!(a instanceof Uint8Array) || !(b instanceof Uint8Array) || a.length !== b.length) return false;
  let x = 0;
  for (let i = 0; i < a.length; i++) x |= a[i] ^ b[i];
  return x === 0;
}

function readAuthSession(validUserIds) {
  try {
    const raw = sessionStorage.getItem(AUTH_STORAGE_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (!s || typeof s.uid !== 'string' || typeof s.exp !== 'number') return null;
    if (Date.now() > s.exp) {
      sessionStorage.removeItem(AUTH_STORAGE_KEY);
      return null;
    }
    const uid = s.uid.toLowerCase();
    if (!validUserIds.has(uid)) {
      sessionStorage.removeItem(AUTH_STORAGE_KEY);
      return null;
    }
    return uid;
  } catch {
    return null;
  }
}

function writeAuthSession(uid) {
  sessionStorage.setItem(
    AUTH_STORAGE_KEY,
    JSON.stringify({ uid: uid.toLowerCase(), exp: Date.now() + AUTH_SESSION_MS }),
  );
}

function clearAuthSession() {
  sessionStorage.removeItem(AUTH_STORAGE_KEY);
}

async function verifyInvestorPassword(userId, password, users) {
  const uid = userId.trim().toLowerCase();
  const u = users.find(x => String(x.id || '').toLowerCase() === uid);
  if (!u || !u.salt_b64 || !u.hash_b64) return false;
  const iterations = Number(u.iterations) > 0 ? Number(u.iterations) : 250000;
  let salt;
  let expected;
  try {
    salt = Uint8Array.from(atob(String(u.salt_b64)), c => c.charCodeAt(0));
    expected = Uint8Array.from(atob(String(u.hash_b64)), c => c.charCodeAt(0));
  } catch {
    return false;
  }
  if (expected.length !== 32) return false;
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw',
    enc.encode(password),
    'PBKDF2',
    false,
    ['deriveBits'],
  );
  const bits = await crypto.subtle.deriveBits(
    { name: 'PBKDF2', salt, iterations, hash: 'SHA-256' },
    keyMaterial,
    256,
  );
  const out = new Uint8Array(bits);
  return timingSafeEqualBytes(out, expected);
}

function LoginScreen({ users, onSuccess }) {
  const [userId, setUserId] = useState('');
  const [password, setPassword] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const submit = async (e) => {
    e.preventDefault();
    setErr('');
    if (!userId.trim()) {
      setErr('Login id is required.');
      return;
    }
    setBusy(true);
    try {
      const ok = await verifyInvestorPassword(userId, password, users);
      if (!ok) {
        setErr('Invalid login id or password.');
        return;
      }
      const row = users.find(x => String(x.id || '').toLowerCase() === userId.trim().toLowerCase());
      onSuccess(String(row.id).toLowerCase());
    } catch {
      setErr('Sign in failed. Try another browser or use HTTPS.');
    } finally {
      setBusy(false);
    }
  };
  return (
    <div className="login-wrap">
      <div className="login-card">
        <form onSubmit={submit}>
          <div className="login-field">
            <label htmlFor="inv-user">Login id</label>
            <input
              id="inv-user"
              autoComplete="username"
              value={userId}
              onChange={e => setUserId(e.target.value)}
            />
          </div>
          <div className="login-field">
            <label htmlFor="inv-pass">Password</label>
            <input
              id="inv-pass"
              type="password"
              autoComplete="current-password"
              value={password}
              onChange={e => setPassword(e.target.value)}
            />
          </div>
          <button type="submit" className="login-btn" disabled={busy}>
            {busy ? 'Signing in…' : 'Sign in'}
          </button>
        </form>
        {err ? <div className="login-error">{err}</div> : null}
      </div>
    </div>
  );
}

function DashboardRoot() {
  const [gate, setGate] = useState('loading');
  const [users, setUsers] = useState([]);
  const [sessionUid, setSessionUid] = useState(null);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      const bust = `?t=${Date.now()}`;
      let list = [];
      try {
        const res = await fetch(INVESTORS_URL + bust, { cache: 'no-store' });
        if (res.ok) {
          const doc = await res.json();
          if (Array.isArray(doc.users)) list = doc.users.filter(u => u && u.id && u.salt_b64 && u.hash_b64);
        }
      } catch {
        list = [];
      }
      if (cancelled) return;
      setUsers(list);
      if (!list.length) {
        setSessionUid(null);
        setGate('open');
        return;
      }
      const ids = new Set(list.map(u => String(u.id).toLowerCase()));
      const existing = readAuthSession(ids);
      if (existing) {
        setSessionUid(existing);
        setGate('open');
      } else {
        setGate('locked');
      }
    })();
    return () => { cancelled = true; };
  }, []);

  if (gate === 'loading') {
    return (
      <div className="app">
        <div className="loading"><div className="spinner"/>Loading…</div>
      </div>
    );
  }
  if (gate === 'locked') {
    return (
      <LoginScreen
        users={users}
        onSuccess={(uid) => {
          writeAuthSession(uid);
          setSessionUid(uid);
          setGate('open');
        }}
      />
    );
  }
  const authEnabled = users.length > 0;
  return (
    <App
      authUser={sessionUid}
      authEnabled={authEnabled}
      onLogout={authEnabled ? () => {
        clearAuthSession();
        setSessionUid(null);
        setGate('locked');
      } : null}
    />
  );
}

const borrowCls = v => {
  if (v == null) return 'val-muted';
  if (v > 0.15) return 'val-negative';
  if (v > 0.08) return 'val-warning';
  return 'val-positive';
};
const spreadCls = v => {
  if (v == null) return 'val-muted';
  if (v > 0.05) return 'val-positive';
  if (v > 0) return 'val-warning';
  return 'val-negative';
};
/** More negative modeled ETF return → better for a structural short (Scenarios-style). */
const scenShortFavCls = v => {
  if (v == null || !Number.isFinite(v)) return 'val-muted';
  if (v <= -0.03) return 'val-positive';
  if (v < 0) return 'val-warning';
  return 'val-negative';
};

// Sort key for the headline expected-ETF-return column.
// Convention: scenario_etf_<horizon>_0und_<sigma_source>.
//   horizon       = 3M (chosen over 1M for stability — CV scales as 1/√T,
//                   so 3M is ~42% less noisy in relative terms; structural
//                   decay accumulates ~3× while noise only grows √3×).
//   underlying    = 0% (flat) — same as Scenarios tab "0×" shock column.
//   sigma_source  = shared forecast σ (50/50 model-implied variance +
//                   robust 6M EWMA variance when both exist).
const SCENARIO_ETF_3M_FLAT_SORT_KEY = 'scenario_etf_3m_0und_forecast_sigma';

const YIELDBOOST_INCOME_PAIRS = new Set([
  'AMYY|AMD', 'AZYY|AMZN', 'BBYY|BABA', 'COYY|COIN', 'CWY|CRWV',
  'HMYY|HIMS', 'HOYY|HOOD', 'IOYY|IONQ', 'MAAY|MARA', 'FBYY|META',
  'MTYY|MSTR', 'MUYY|MU', 'NUGY|GDX', 'NVYY|NVDA', 'PLYY|PLTR',
  'QBY|QBTS', 'RGYY|RGTI', 'RTYY|RIOT', 'SEMY|SOXX', 'SMYY|SMCI',
  'TMYY|TSM', 'TQQY|QQQ', 'TSYY|TSLA', 'XBTY|IBIT', 'YSPY|SPY',
]);
const VOLATILITY_ETP_SYMBOLS = new Set(['UVIX', 'SVIX', 'UVXY', 'SVXY', 'VXX', 'VIXY', 'VIXM', 'VIX', 'VIX1D', 'VIX3M']);
const isYieldBoostIncomeStrategy = r => {
  if (r?.is_yieldboost === true || r?.scenario_style === 'income_style') return true;
  const sym = String(r?.symbol || '').toUpperCase();
  const und = String(r?.underlying || '').toUpperCase();
  return YIELDBOOST_INCOME_PAIRS.has(`${sym}|${und}`);
};
const isVolatilityEtp = r => (
  r?.product_class === 'volatility_etp'
  || VOLATILITY_ETP_SYMBOLS.has(String(r?.symbol || '').toUpperCase())
  || VOLATILITY_ETP_SYMBOLS.has(String(r?.underlying || '').toUpperCase())
);
const suppressScenarioForRow = r => r?.bucket === 'bucket_2_low_beta' && !isYieldBoostIncomeStrategy(r);
// Both YieldBOOST and LETF/inverse/vol-ETP rows now show a long-perspective
// expected ETF return, so the coloring is unified: more-negative = better for
// a structural short = green (scenShortFavCls).
const scenarioValueCls = (_r, v) => scenShortFavCls(v);

function expectedDecayDisplayValue(r) {
  const expected = Number(r?.expected_gross_decay_annual);
  if (!isVolatilityEtp(r)) return Number.isFinite(expected) ? expected : null;
  const adjusted = Number(r?.expected_gross_decay_adjusted_annual);
  if (Number.isFinite(adjusted)) return adjusted;
  const simple = Number(r?.expected_gross_decay_simple_ito_annual);
  const base = Number.isFinite(simple) ? simple : expected;
  const adj = Number(r?.expected_decay_adjustment_annual);
  if (Number.isFinite(base) && Number.isFinite(adj)) return base + adj;
  const gross = Number(r?.gross_decay_annual);
  if (Number.isFinite(gross) && Number.isFinite(base)) return gross;
  return Number.isFinite(base) ? base : null;
}

// Distributional forecast surfaced from ls-algo/decay_distribution.py.
// Returns null when the screener row didn't carry the new fields, so
// callers can fall back to expectedDecayDisplayValue() seamlessly.
function expectedDecayDistribution(r) {
  const p10 = Number(r?.expected_gross_decay_p10_annual);
  const p50 = Number(r?.expected_gross_decay_p50_annual);
  const p90 = Number(r?.expected_gross_decay_p90_annual);
  if (!Number.isFinite(p10) || !Number.isFinite(p50) || !Number.isFinite(p90)) {
    return null;
  }
  const mean = Number(r?.expected_gross_decay_mean_annual);
  const sigma = Number(r?.expected_logIV_sigma_annual);
  const mu = Number(r?.expected_logIV_mu_annual);
  const nObs = Number(r?.expected_gross_decay_dist_n_obs);
  const horizon = Number(r?.expected_gross_decay_dist_horizon_days);
  return {
    p10,
    p50,
    p90,
    mean: Number.isFinite(mean) ? mean : null,
    sigma: Number.isFinite(sigma) ? sigma : null,
    mu: Number.isFinite(mu) ? mu : null,
    model: r?.expected_gross_decay_dist_model || null,
    nObs: Number.isFinite(nObs) ? nObs : null,
    horizon: Number.isFinite(horizon) ? horizon : null,
  };
}

// Annualized intrinsic NAV decay for YieldBOOST income-style products.
// Income ETFs sell weekly 95/88 SPX-style put-spreads; the put-spread
// premium decays the NAV before any distributions are paid out. We
// reuse the same put-spread NAV decay model that powers the Scenarios
// tab so the headline expected-decay column, the Scenarios heatmap,
// and the 1M ETF flat-underlying scenario all agree.
const YB_DEFAULT_EXPENSE_RATIO_ANNUAL = 0.0099;
function yieldBoostUnderlyingSigmaAnnual(r) {
  const v = Number(r?.vol_underlying_annual);
  if (Number.isFinite(v) && v > 0) return v;
  const ewma6m = Number(r?.realized_vol?.['6M']?.underlying_ewma);
  if (Number.isFinite(ewma6m) && ewma6m > 0) return ewma6m;
  const real6m = Number(r?.realized_vol?.['6M']?.underlying);
  if (Number.isFinite(real6m) && real6m > 0) return real6m;
  return null;
}
function yieldBoostIntrinsicAnnualDecay(r) {
  if (!isYieldBoostIncomeStrategy(r)) return null;
  const sigma = yieldBoostUnderlyingSigmaAnnual(r);
  if (!Number.isFinite(sigma) || sigma <= 0) return null;
  const horizonYears = 1.0;
  const weeklyLoss = expectedPutSpreadLossWeekly({
    underlyingReturn: 0, sigmaAnnual: sigma, horizonYears,
  });
  if (weeklyLoss == null || !Number.isFinite(weeklyLoss)) return null;
  const expenseAnnual = YB_DEFAULT_EXPENSE_RATIO_ANNUAL;
  const weeklyExpense = expenseAnnual / 52;
  const weeks = 52;
  const q = Math.max(0.0001, Math.min(1.5, 1 - weeklyLoss - weeklyExpense));
  const navEndRatio = Math.pow(q, weeks);
  return 1 - navEndRatio;
}

// Passive low-β policy: Itô identity (β² − β)/2·σ² ≈ 0 around β ≈ 1,
// so any "expected decay" we report is at best noise. We therefore
// suppress the headline expected-decay/Net edge/Scenario cells for
// these rows on the dashboard and rely on the realized gross drag
// column for the falsifiable measure. See ls-algo daily_screener
// Step 5d ("passive_low_beta policy") and screener_v2_fields
// _expected_decay_available.
function isPassiveLowBetaRow(r) {
  if (r?.product_class === 'passive_low_beta') return true;
  if (r?.expected_decay_available === false && r?.bucket === 'bucket_2_low_beta') {
    return true;
  }
  if (r?.bucket === 'bucket_2_low_beta' && !isYieldBoostIncomeStrategy(r)) {
    return true;
  }
  return false;
}
function expectedDecayAvailableForRow(r) {
  if (r?.expected_decay_available === false) return false;
  if (isPassiveLowBetaRow(r)) return false;
  return true;
}
const PASSIVE_LOW_BETA_POLICY_TOOLTIP =
  'β ≈ 1: vol-drag ≈ 0 in the Itô identity ½·β·(β−1)·σ², so expected decay is hidden by design. Use Gross (realized) instead.';

// Single number used for sorting and the headline cell value.
// Routing (unified across product classes — see decay_distribution.py):
//   - passive_low_beta / expected_decay_available=false → null (renders '—').
//   - Distributional p50 is available for every product class with a
//     non-trivial expected component (LETF, inverse, vol-ETP, YB);
//     YB ships through the put-spread Monte-Carlo (model name
//     'yieldboost_put_spread' / 'yieldboost_put_spread_point'), so the
//     same `dist.p50` field carries the put-spread NAV-decay forecast
//     and matches the Net edge anchor.
//   - YB client-side intrinsic is only a fallback when the server row
//     didn't ship the distribution (very short underlying history,
//     pipeline rerun mid-day, etc.).
//   - Else legacy model-aware point estimate (Itô / vol-ETP adjusted).
function expectedDecayHeadlineValue(r) {
  if (!expectedDecayAvailableForRow(r)) return null;
  const dist = expectedDecayDistribution(r);
  if (dist) return dist.p50;
  if (isYieldBoostIncomeStrategy(r)) {
    const yb = yieldBoostIntrinsicAnnualDecay(r);
    if (yb != null) return yb;
  }
  return expectedDecayDisplayValue(r);
}

const DECAY_DIST_MODEL_LABELS = {
  harq_log_anchored: 'HARQ-Log',
  empirical_lognormal: 'empirical lognormal',
  simple_ito_fallback: 'Itô fallback',
  no_drag_beta: 'no drag (β∈{0,1})',
  yieldboost_put_spread: 'YB put-spread MC',
  yieldboost_put_spread_point: 'YB put-spread (σ-trailing)',
};

const isYieldBoostPutSpreadDistModel = m =>
  m === 'yieldboost_put_spread' || m === 'yieldboost_put_spread_point';

function decayDistTooltip(r) {
  if (!expectedDecayAvailableForRow(r)) {
    return PASSIVE_LOW_BETA_POLICY_TOOLTIP;
  }
  const dist = expectedDecayDistribution(r);
  // YB tooltip when server shipped the put-spread MC distribution (preferred path).
  if (dist && isYieldBoostPutSpreadDistModel(dist.model)) {
    const sigma = yieldBoostUnderlyingSigmaAnnual(r);
    const isPoint = dist.model === 'yieldboost_put_spread_point';
    const lines = [
      'YieldBOOST — NAV loss from the option sleeve only (before cash payouts; borrow separate).',
      isPoint
        ? 'Single σ from trailing realized vol (thin history → p10=p50=p90).'
        : 'σ drawn from HARQ-Log law → weekly 95/88 put on 2× sleeve, 52× compounded, net of expense (same engine as Scenarios).',
      `p50 (median):  ${fmt(dist.p50)}`,
      `p10 / p90:     ${fmt(dist.p10)}  /  ${fmt(dist.p90)}`,
    ];
    if (Number.isFinite(sigma) && sigma > 0) {
      lines.push(`σ (underlying, annual): ${fmt(sigma)}`);
    }
    if (dist.mean != null) lines.push(`mean: ${fmt(dist.mean)}`);
    if (dist.nObs != null) lines.push(`n=${Math.round(dist.nObs)} underlying obs`);
    lines.push('Net edge is shifted to this p50 as the “location” of gross decay.');
    lines.push('Cash schedule: Scenarios tab.');
    return lines.join('\n');
  }
  // YB legacy fallback when server distribution is missing.
  if (isYieldBoostIncomeStrategy(r) && !dist) {
    const yb = yieldBoostIntrinsicAnnualDecay(r);
    const sigma = yieldBoostUnderlyingSigmaAnnual(r);
    const lines = [
      'YieldBOOST — NAV loss from option sleeve only (cash payouts separate).',
      'Server band unavailable — client 95/88 weekly put model, one σ.',
      `52× compound net of ${(YB_DEFAULT_EXPENSE_RATIO_ANNUAL * 100).toFixed(2)}% expense.`,
    ];
    if (yb != null) lines.push(`Annualized: ${fmt(yb)}`);
    if (Number.isFinite(sigma) && sigma > 0) {
      lines.push(`σ_underlying (annual): ${fmt(sigma)}`);
    }
    return lines.join('\n');
  }
  if (!dist) {
    return isVolatilityEtp(r)
      ? 'Vol ETP: Itô decay + roll/tracking (Itô alone understates VIX futures names).'
      : 'Itô single-σ decay (no HARQ band on file).';
  }
  const modelLabel = DECAY_DIST_MODEL_LABELS[dist.model] || dist.model || '—';
  const horizon = dist.horizon
    ? `${Math.round(dist.horizon)}d`
    : '252d';
  const threshold = dist.horizon
    ? Math.ceil(2.5 * Number(dist.horizon))
    : 630;
  const nObsRounded = dist.nObs != null ? Math.round(dist.nObs) : null;
  let fallbackReason = null;
  if (dist.model === 'simple_ito_fallback') {
    if (nObsRounded == null || nObsRounded <= 0) {
      fallbackReason = 'Fallback: no usable underlying history.';
    } else if (nObsRounded < threshold) {
      fallbackReason =
        `Fallback: short history (n=${nObsRounded} < ${threshold} for ${horizon}).`;
    } else {
      fallbackReason = `Fallback: empirical moments missing (n=${nObsRounded}).`;
    }
  }
  const lines = [
    `Decay band (${horizon}, before borrow)`,
    `${modelLabel}` + (nObsRounded != null ? ` · n=${nObsRounded}` : ''),
    `p50: ${fmt(dist.p50)}`,
    `p10 / p90: ${fmt(dist.p10)} / ${fmt(dist.p90)}`,
  ];
  if (fallbackReason) lines.push(fallbackReason);
  if (dist.mean != null) lines.push(`LN mean: ${fmt(dist.mean)}`);
  if (dist.sigma != null) lines.push(`σ(log IV): ${dist.sigma.toFixed(3)}`);
  const simple = Number(r?.expected_gross_decay_simple_ito_annual);
  if (Number.isFinite(simple)) lines.push(`Itô point: ${fmt(simple)}`);
  if (isVolatilityEtp(r)) {
    lines.push('volatility ETP — Itô alone understates VIX-futures decay');
  }
  return lines.join('\n');
}

function expectedDecayDisplayLabel(r) {
  if (!expectedDecayAvailableForRow(r)) return 'Exp. (N/A)';
  if (expectedDecayDistribution(r)) return 'Exp. (median)';
  if (isYieldBoostIncomeStrategy(r)) return 'Exp. (intrinsic)';
  return isVolatilityEtp(r) ? 'Exp. (vol-adj)' : 'Exp. (Itô)';
}

/**
 * Annual cash distribution yield for income-style scenario math.
 * Prefer trailing/recent from the distributions build; when those are
 * absent (e.g. borrow-only refresh), fall back to annualized ETF cash
 * yield from `dividend_adjustment` for the chart lookback window — same
 * window logic as the non-income dividend add-on.
 */
function incomeAnnualYieldForScenario(r, chartVolLookbackRange) {
  const trailing = Number(r?.income_yield_trailing_annual);
  if (Number.isFinite(trailing) && trailing > 0) return trailing;
  const recent = Number(r?.income_yield_recent_annual);
  if (Number.isFinite(recent) && recent > 0) return recent;
  if (!isYieldBoostIncomeStrategy(r)) return null;
  const raw = chartVolLookbackRange != null && String(chartVolLookbackRange).trim() !== ''
    ? String(chartVolLookbackRange)
    : '6M';
  const vk = VOL_TF_KEY_BY_RANGE[raw] || '6M';
  const yw = Number(r?.dividend_adjustment?.[vk]?.etf_dividend_yield);
  const winY = DIV_YIELD_WINDOW_YEARS[vk] ?? 0.5;
  if (!Number.isFinite(yw) || yw <= 0 || !(winY > 0)) return null;
  return yw / winY;
}

function normalCdf(x) {
  const z = Number(x);
  if (!Number.isFinite(z)) return z < 0 ? 0 : 1;
  const sign = z < 0 ? -1 : 1;
  const a = Math.abs(z) / Math.SQRT2;
  const p = 0.3275911;
  const t = 1 / (1 + p * a);
  const y = 1 - (((((1.061405429 * t - 1.453152027) * t) + 1.421413741) * t - 0.284496736) * t + 0.254829592) * t * Math.exp(-a * a);
  return 0.5 * (1 + sign * y);
}

function expectedPutSpreadLossWeekly({ underlyingReturn, sigmaAnnual, horizonYears }) {
  const u = Number(underlyingReturn);
  const sigma = Number(sigmaAnnual);
  const t = Number(horizonYears);
  if (!Number.isFinite(u) || u <= -0.9999 || !Number.isFinite(sigma) || sigma <= 0 || !Number.isFinite(t) || t <= 0) {
    return null;
  }
  const tau = 1 / 52;
  const muAnnual = Math.log1p(u) / t;
  const m = (2 * muAnnual - 2 * sigma * sigma) * tau;
  const s = 2 * sigma * Math.sqrt(tau);
  if (!Number.isFinite(m) || !Number.isFinite(s) || s <= 0) return null;

  const spreadPut = (k) => {
    const alpha = (Math.log(k) - m) / s;
    const beta = alpha - s;
    const forward = Math.exp(m + 0.5 * s * s);
    return k * normalCdf(alpha) - forward * normalCdf(beta);
  };
  const shortStrike = 0.95;
  const longStrike = 0.88;
  const loss = spreadPut(shortStrike) - spreadPut(longStrike);
  return Number.isFinite(loss) ? Math.max(0, Math.min(shortStrike - longStrike, loss)) : null;
}

function estimateIncomeStyleScenarioReturn({ underlyingReturn, sigmaAnnual, annualIncomeYield, annualBorrowCost, horizonYears, expenseRatioAnnual = 0.0099 }) {
  if (annualIncomeYield == null) return null;
  const dAnnual = Number(annualIncomeYield);
  const borrowAnnual = Number(annualBorrowCost);
  const t = Number(horizonYears);
  if (!Number.isFinite(dAnnual) || dAnnual < 0 || !Number.isFinite(t) || t <= 0) return null;
  const weeklySpreadLoss = expectedPutSpreadLossWeekly({ underlyingReturn, sigmaAnnual, horizonYears });
  if (weeklySpreadLoss == null) return null;
  const weeks = Math.max(1, Math.round(t * 52));
  const weeklyExpense = Math.max(0, Number(expenseRatioAnnual) || 0) / 52;
  const weeklyDistribution = dAnnual / 52;
  const q = clampNum(1 - weeklySpreadLoss - weeklyExpense, 0.0001, 1.5);
  const navEndRatio = Math.pow(q, weeks);
  const navDecay = 1 - navEndRatio;
  const geomSum = Math.abs(1 - q) < 1e-9 ? weeks : (1 - Math.pow(q, weeks)) / (1 - q);
  const distributionsPaid = weeklyDistribution * geomSum;
  const borrowCost = Number.isFinite(borrowAnnual) && borrowAnnual > 0 ? borrowAnnual * t : 0;
  const netShortPnl = navDecay - distributionsPaid - borrowCost;
  return {
    weeklySpreadLoss,
    navDecay,
    navReturn: -navDecay,
    distributionsPaid,
    borrowCost,
    netShortPnl,
    longTotalReturn: -navDecay + distributionsPaid,
  };
}

/**
 * Vol block for the **chart lookback** (`chartVolLookbackRange` = TIMEFRAMES[].range), same key as ChartPage `volPoint`.
 * Used for diagnostics and as a backward-compatible fallback when the data
 * build has not shipped forecast_vol_underlying_annual.
 */
function realizedVolPointForScenarioColumn(r, chartVolLookbackRange) {
  const raw = chartVolLookbackRange != null && String(chartVolLookbackRange).trim() !== ''
    ? String(chartVolLookbackRange)
    : '6M';
  const volWindowKey = VOL_TF_KEY_BY_RANGE[raw] || '6M';
  return r?.realized_vol?.[volWindowKey] || null;
}

function forecastVolForScenario(r, chartVolLookbackRange) {
  const forecast = Number(r?.forecast_vol_underlying_annual);
  if (Number.isFinite(forecast) && forecast > 0) {
    return {
      sigma: forecast,
      source: r?.forecast_vol_source || 'forecast_vol',
      model: Number.isFinite(Number(r?.forecast_vol_model_annual)) ? Number(r.forecast_vol_model_annual) : null,
      robustEwma: Number.isFinite(Number(r?.forecast_vol_robust_ewma_annual)) ? Number(r.forecast_vol_robust_ewma_annual) : null,
      rawEwma: Number.isFinite(Number(r?.forecast_vol_raw_ewma_annual)) ? Number(r.forecast_vol_raw_ewma_annual) : null,
      realized: Number.isFinite(Number(r?.forecast_vol_realized_annual)) ? Number(r.forecast_vol_realized_annual) : null,
      eventAdjusted: !!r?.forecast_vol_event_adjusted,
      note: r?.forecast_vol_note || null,
      isFallback: false,
    };
  }
  const vp = realizedVolPointForScenarioColumn(r, chartVolLookbackRange);
  const fallback = Number(vp?.underlying_ewma) || Number(vp?.underlying);
  return {
    sigma: Number.isFinite(fallback) && fallback > 0 ? fallback : null,
    source: 'chart_ewma_fallback',
    model: null,
    robustEwma: Number.isFinite(Number(vp?.underlying_robust_ewma)) ? Number(vp.underlying_robust_ewma) : null,
    rawEwma: Number.isFinite(Number(vp?.underlying_ewma)) ? Number(vp.underlying_ewma) : null,
    realized: Number.isFinite(Number(vp?.underlying)) ? Number(vp.underlying) : null,
    eventAdjusted: !!vp?.underlying_robust_event_flag,
    note: 'Fallback: forecast_vol_underlying_annual missing, using chart-lookback EWMA/realized volatility.',
    isFallback: true,
  };
}

/**
 * Expected ETF return over a flat-underlying horizon, from a **long
 * holder's perspective** (this is the headline of the "Exp. ETF return"
 * column in the main grid).
 *
 *   - LETF / inverse / vol-ETP rows  →  `ScenarioReturns.estimateEtfReturn`
 *     with the shared forecast σ from the data builder (50/50 model-implied
 *     variance + robust 6M EWMA variance when both exist).
 *   - YieldBOOST income rows         →  `estimateIncomeStyleScenarioReturn`
 *     **`navReturn + distributionsPaid`** (= `longTotalReturn`): NAV erosion
 *     from weekly 95/88 put-spread + expense, **plus** modeled cash
 *     distributions (trailing/recent yields from the distributions build, or
 *     annualized `dividend_adjustment` cash yield when those are missing).
 *     Still **excludes borrow** (borrow in Net edge). Pair-trade / short
 *     economics use `netShortPnl` in the Scenarios income table.
 *   - Passive low-β / non-income Bucket 2 → `null` (suppressed by policy).
 *
 * Horizon is **3M** by default (caller passes `'3M'` for the headline cell
 * and `'1M'` for the secondary tooltip number). 3M chosen over 1M because
 * CV of the forecast scales as 1/√T (~42% less noisy in relative terms
 * than 1M) and structural decay is more visible at 3M.
 *
 * `chartVolLookbackRange` is only a backward-compatible fallback when older
 * data does not ship forecast_vol_underlying_annual.
 */
function computeExpectedEtfReturnFlatUnd(r, chartVolLookbackRange, horizonLabel = '3M') {
  if (suppressScenarioForRow(r)) return null;
  const SR = typeof window !== 'undefined' ? window.ScenarioReturns : null;
  if (!SR || typeof SR.horizonToYears !== 'function') return null;
  const horizonYears = SR.horizonToYears(horizonLabel);
  const lev = Number(r?.beta);
  if (!Number.isFinite(horizonYears) || horizonYears <= 0 || !Number.isFinite(lev)) return null;
  const forecastVol = forecastVolForScenario(r, chartVolLookbackRange);
  const sigma = Number(forecastVol?.sigma);
  if (!Number.isFinite(sigma) || sigma <= 0) return null;
  if (isYieldBoostIncomeStrategy(r)) {
    const modeled = estimateIncomeStyleScenarioReturn({
      underlyingReturn: 0,
      sigmaAnnual: sigma,
      annualIncomeYield: incomeAnnualYieldForScenario(r, chartVolLookbackRange),
      annualBorrowCost: Number(getBorrowRate(r)),
      horizonYears,
    });
    // Long holder: NAV decay from put-spread + expense, **plus** cash
    // distributions over the horizon (navReturn + distributionsPaid — same
    // as income Scenarios `longTotalReturn`). Borrow stays out of this cell.
    if (!modeled) return null;
    const navR = Number(modeled.navReturn);
    const dist = Number(modeled.distributionsPaid);
    if (Number.isFinite(navR) && Number.isFinite(dist)) return navR + dist;
    return null;
  }
  if (typeof SR.estimateEtfReturn !== 'function') return null;
  const res = SR.estimateEtfReturn({
    leverage: lev,
    underlyingReturn: 0,
    sigmaAnnual: sigma,
    horizonYears,
    annualCarryDrag: 0,
    minReturn: -0.9999,
  });
  if (!res.ok) return null;
  const divAdd = dividendCashAdditiveForHorizon(r, chartVolLookbackRange, horizonYears);
  if (!Number.isFinite(divAdd) || divAdd === 0) return res.value;
  const combined = Number(res.value) + divAdd;
  return Number.isFinite(combined) ? combined : res.value;
}

// Convenience wrapper: headline 3M return used by the main-table column.
function computeScenarioEtf3mFlatUnd(r, chartVolLookbackRange) {
  return computeExpectedEtfReturnFlatUnd(r, chartVolLookbackRange, '3M');
}
const borrowBadge = v => {
  if (v == null) return null;
  if (v > 0.15) return <span className="badge badge-bad">HIGH</span>;
  if (v > 0.08) return <span className="badge badge-warn">MED</span>;
  return null;
};

const VOL_TF_KEY_BY_RANGE = {
  '1M': '1M',
  '3M': '3M',
  '6M': '6M',
  'YTD': 'YTD',
  '12M': '12M',
  'ALL': 'ALL',
};

/** Window length (years) for `dividend_adjustment` ETF yield keys. */
const DIV_YIELD_WINDOW_YEARS = { '1M': 1 / 12, '3M': 3 / 12, '6M': 6 / 12, 'YTD': 6 / 12, '12M': 1, 'ALL': 1 };

/**
 * Cash dividend contribution to long total return over `horizonYears`:
 * annualizes ETF dividend yield from the chart-lookback window, scales by
 * horizon. Skipped for income-style rows (they use `longTotalReturn`).
 */
function dividendCashAdditiveForHorizon(r, chartVolLookbackRange, horizonYears) {
  if (isYieldBoostIncomeStrategy(r)) return 0;
  const raw = chartVolLookbackRange != null && String(chartVolLookbackRange).trim() !== ''
    ? String(chartVolLookbackRange)
    : '6M';
  const vk = VOL_TF_KEY_BY_RANGE[raw] || '6M';
  const yw = Number(r?.dividend_adjustment?.[vk]?.etf_dividend_yield);
  const winY = DIV_YIELD_WINDOW_YEARS[vk] ?? 0.5;
  if (!Number.isFinite(yw) || yw <= 0 || !Number.isFinite(horizonYears) || horizonYears <= 0 || !(winY > 0)) return 0;
  return (yw / winY) * horizonYears;
}

const SCENARIO_VOL_MULTIPLIERS = [0.6, 0.8, 1.0, 1.2, 1.4];
const SCENARIO_SHOCK_MULTIPLIERS = [-3, -1, -1 / 3, 0, 1 / 3, 1, 3];
const SCENARIO_HORIZONS = [
  { key: '1M', label: '1M' },
  { key: '3M', label: '3M' },
  { key: '6M', label: '6M' },
  { key: '1Y', label: '1Y' },
];
const MC_PATH_OPTIONS = [100, 500, 1000, 5000];
const MC_DEFAULT_UPSIDE_THRESHOLDS = '50,100,500';

const clampNum = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const scenarioCellBg = val => {
  if (val == null || !Number.isFinite(val)) return 'transparent';
  const clipped = clampNum(val, -1, 1);
  const intensity = 0.12 + 0.28 * Math.abs(clipped);
  if (clipped >= 0) return `rgba(16,185,129,${intensity.toFixed(3)})`;
  return `rgba(239,68,68,${intensity.toFixed(3)})`;
};
const fmtSigmaMultiple = (m) => {
  if (!Number.isFinite(Number(m))) return '—';
  const v = Number(m);
  const sign = v > 0 ? '+' : '';
  if (Math.abs(v) < 1e-12) return '0σ';
  if (Math.abs(Math.abs(v) - 3) < 1e-9) return `${v < 0 ? '-' : '+'}3σ`;
  if (Math.abs(Math.abs(v) - 1) < 1e-9) return `${sign}${v < 0 ? '-' : ''}1σ`.replace('+-', '-');
  if (Math.abs(Math.abs(v) - (1 / 3)) < 1e-9) return `${v < 0 ? '-' : '+'}1/3σ`;
  return `${sign}${v.toFixed(2)}σ`;
};
const parseThresholdInput = (raw) => {
  const txt = String(raw ?? '').trim();
  if (!txt) return [];
  return txt
    .split(',')
    .map(s => Number(s.trim()))
    .filter(v => Number.isFinite(v))
    .map(v => v / 100)
    .filter(v => v >= 0);
};
const quantileSorted = (arr, q) => {
  if (!arr?.length) return null;
  const qq = clampNum(Number(q) || 0, 0, 1);
  const idx = (arr.length - 1) * qq;
  const lo = Math.floor(idx);
  const hi = Math.ceil(idx);
  if (lo === hi) return arr[lo];
  const w = idx - lo;
  return arr[lo] * (1 - w) + arr[hi] * w;
};
function MonteCarloPlot({ result, mode = 'short' }) {
  if (!result?.ok) return null;
  const maxPoints = 180;
  const totalPts = result.settings.steps + 1;
  const stride = Math.max(1, Math.ceil(totalPts / maxPoints));
  const pickIdx = [];
  for (let i = 0; i < totalPts; i += stride) pickIdx.push(i);
  if (pickIdx[pickIdx.length - 1] !== totalPts - 1) pickIdx.push(totalPts - 1);

  const carryAnnual = Number.isFinite(Number(result?.settings?.annualCarryDrag))
    ? Number(result.settings.annualCarryDrag)
    : 0;
  const horizonYears = Number.isFinite(Number(result?.settings?.horizonYears))
    ? Number(result.settings.horizonYears)
    : 0;
  const steps = Math.max(1, Number(result?.settings?.steps) || 1);
  const carryAtIdx = (idxOriginal) => carryAnnual * ((idxOriginal / steps) * horizonYears);
  const toRet = (w, idxOriginal = 0) => {
    const etfRet = Number.isFinite(w) ? (w - 1) : 0;
    if (mode === 'short') return -etfRet - carryAtIdx(idxOriginal);
    return etfRet;
  };
  const allSeries = result.paths.map(p => pickIdx.map(i => toRet(p[i], i)));
  const sampleStride = Math.max(1, Math.floor(allSeries.length / 50));
  const series = allSeries.filter((_, i) => i % sampleStride === 0).slice(0, 50);
  const mean = pickIdx.map(i => toRet(result.overlays.mean[i], i));
  const median = pickIdx.map(i => toRet(result.overlays.p50[i], i));
  const p05 = pickIdx.map(i => toRet(result.overlays.p05[i], i));
  const p95 = pickIdx.map(i => toRet(result.overlays.p95[i], i));
  const meanCenter = mean.reduce((a, b) => a + b, 0) / Math.max(1, mean.length);
  const spreadSeries = p95.map((hi, i) => Math.abs(hi - p05[i])).filter(Number.isFinite);
  const spreadP75 = spreadSeries.length
    ? quantileSorted([...spreadSeries].sort((a, b) => a - b), 0.75)
    : NaN;
  const meanMaxDev = mean.reduce((m, v) => Math.max(m, Math.abs(v - meanCenter)), 0);
  const halfRange = Math.max(
    0.2,
    Number.isFinite(spreadP75) ? spreadP75 * 1.7 : 0,
    Number.isFinite(meanMaxDev) ? meanMaxDev * 1.35 : 0,
  );
  let yMin = meanCenter - halfRange;
  let yMax = meanCenter + halfRange;
  if (!Number.isFinite(yMin) || !Number.isFinite(yMax) || yMin === yMax) {
    yMin = -1;
    yMax = 1;
  }

  const W = 900;
  const H = 260;
  const L = 60;
  const R = 8;
  const T = 8;
  const B = 22;
  const PW = W - L - R;
  const PH = H - T - B;
  const clipId = `mc-clip-${mode}-${result.settings.pathCount}-${result.settings.steps}`;
  const linThresh = Math.max(0.02, halfRange / 12);
  const symlog = (v) => Math.sign(v) * Math.log1p(Math.abs(v) / linThresh);
  const symlogInv = (sv) => Math.sign(sv) * linThresh * (Math.exp(Math.abs(sv)) - 1);
  const yMinS = symlog(yMin);
  const yMaxS = symlog(yMax);
  const x = (i) => L + (i / (pickIdx.length - 1)) * PW;
  const y = (v) => {
    const s = symlog(v);
    return T + (1 - ((s - yMinS) / Math.max(1e-12, (yMaxS - yMinS)))) * PH;
  };
  const linePath = (vals) => vals.map((v, i) => `${i === 0 ? 'M' : 'L'} ${x(i).toFixed(2)} ${y(v).toFixed(2)}`).join(' ');
  const bandPath = `M ${x(0)} ${y(p95[0])} ${p95.map((v, i) => `L ${x(i)} ${y(v)}`).join(' ')} ${[...p05].reverse().map((v, i) => `L ${x(p05.length - 1 - i)} ${y(v)}`).join(' ')} Z`;
  const tickCount = 6;
  const yTicks = Array.from({ length: tickCount }, (_, i) => {
    const q = i / Math.max(1, tickCount - 1);
    const sv = yMaxS - q * (yMaxS - yMinS);
    return symlogInv(sv);
  });

  return (
    <div className="mc-plot">
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
        <defs>
          <clipPath id={clipId}>
            <rect x={L} y={T} width={PW} height={PH} />
          </clipPath>
        </defs>
        <rect x={L} y={T} width={PW} height={PH} fill="rgba(11,19,34,0.2)" stroke="rgba(56,72,96,0.5)" />
        {yTicks.map((tick, i) => (
          <g key={i}>
            <line x1={L} y1={y(tick)} x2={W - R} y2={y(tick)} stroke="rgba(56,72,96,0.35)" strokeWidth="1" />
            <text x={L - 6} y={y(tick) + 3} textAnchor="end" fontSize="10" fill="#7f8ea8" fontFamily="JetBrains Mono">
              {fmt(tick)}
            </text>
          </g>
        ))}
        <text x="12" y={T + 10} fontSize="10" fill="#7f8ea8" fontFamily="JetBrains Mono">
          {mode === 'short' ? 'Short return (log scale)' : 'ETF return (log scale)'}
        </text>
        <g clipPath={`url(#${clipId})`}>
          <path d={bandPath} fill="rgba(59,130,246,0.14)" stroke="none" />
          {series.map((s, i) => (
            <path key={i} d={linePath(s)} fill="none" stroke="rgba(148,163,184,0.24)" strokeWidth="1" />
          ))}
          <path d={linePath(median)} fill="none" stroke="rgba(139,92,246,0.95)" strokeWidth="2.2" />
          <path d={linePath(mean)} fill="none" stroke="rgba(6,182,212,0.95)" strokeWidth="2.2" />
        </g>
      </svg>
    </div>
  );
}

function SimpleSeriesPlot({
  series,
  valueKey,
  color,
  label,
  formatValue,
  zeroLabel = '0',
  overlayValueKey,
  overlayColor,
  overlayLabel,
}) {
  if (!Array.isArray(series) || !series.length) {
    return <div className="scenario-warning">No data available.</div>;
  }
  const primaryVals = series.map(p => Number(p?.[valueKey])).filter(Number.isFinite);
  const overlayVals = overlayValueKey
    ? series.map(p => Number(p?.[overlayValueKey])).filter(Number.isFinite)
    : [];
  if (!primaryVals.length && !overlayVals.length) {
    return <div className="scenario-warning">No finite values available.</div>;
  }

  const W = 980;
  const H = 300;
  const L = 74;
  const R = 12;
  const T = 12;
  const B = 38;
  const PW = W - L - R;
  const PH = H - T - B;

  const allVals = [...primaryVals, ...overlayVals];
  const yMinRaw = Math.min(...allVals);
  const yMaxRaw = Math.max(...allVals);
  // Always include zero in axis range so the zero-reference line is explicit.
  const baseMin = Math.min(yMinRaw, 0);
  const baseMax = Math.max(yMaxRaw, 0);
  const pad = (baseMax - baseMin || Math.max(1, Math.abs(baseMax) * 0.1)) * 0.1;
  const yMin = baseMin - pad;
  const yMax = baseMax + pad;
  const x = (i) => L + (i / Math.max(1, series.length - 1)) * PW;
  const y = (v) => T + (1 - ((v - yMin) / Math.max(1e-12, yMax - yMin))) * PH;

  const buildPath = (vals) => vals
    .map((v, i) => (Number.isFinite(v) ? `${i === 0 ? 'M' : 'L'} ${x(i).toFixed(2)} ${y(v).toFixed(2)}` : ''))
    .filter(Boolean)
    .join(' ');

  const lineVals = series.map(p => Number(p?.[valueKey]));
  const linePath = buildPath(lineVals);
  const overlayLineVals = overlayValueKey ? series.map(p => Number(p?.[overlayValueKey])) : [];
  const overlayPath = overlayValueKey ? buildPath(overlayLineVals) : '';

  const findLatestIdx = (vals) => {
    for (let i = vals.length - 1; i >= 0; i -= 1) {
      if (Number.isFinite(vals[i])) return i;
    }
    return -1;
  };
  const latestIdx = findLatestIdx(lineVals);
  const latestVal = latestIdx >= 0 ? lineVals[latestIdx] : NaN;
  const latestLabel = Number.isFinite(latestVal)
    ? `Current: ${formatValue ? formatValue(latestVal) : String(latestVal)}`
    : '';
  const latestLabelY = Number.isFinite(latestVal)
    ? clampNum(y(latestVal) - 7, T + 11, H - B - 4)
    : 0;

  const overlayLatestIdx = overlayValueKey ? findLatestIdx(overlayLineVals) : -1;
  const overlayLatestVal = overlayLatestIdx >= 0 ? overlayLineVals[overlayLatestIdx] : NaN;
  const overlayLatestLabel = Number.isFinite(overlayLatestVal)
    ? `${overlayLabel ? `${overlayLabel}: ` : ''}${formatValue ? formatValue(overlayLatestVal) : String(overlayLatestVal)}`
    : '';

  const ticks = [0, 0.25, 0.5, 0.75, 1].map(q => yMin + (yMax - yMin) * q).reverse();
  const yZero = y(0);
  const dateForIdx = (idx) => {
    const raw = series[idx]?.date;
    if (!raw) return '';
    const d = new Date(`${raw}T00:00:00Z`);
    if (Number.isNaN(d.getTime())) return String(raw);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' });
  };
  const xTickIdx = [0, Math.floor((series.length - 1) / 2), Math.max(0, series.length - 1)];
  const xTickIdxUnique = Array.from(new Set(xTickIdx));

  const primaryColor = color || "rgba(6,182,212,0.95)";
  const ovColor = overlayColor || "rgba(234,179,8,0.95)";

  return (
    <div className="mc-plot" style={{ height: 300, marginBottom: 0 }}>
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet">
        <rect x={L} y={T} width={PW} height={PH} fill="rgba(11,19,34,0.2)" stroke="rgba(56,72,96,0.5)" />
        {ticks.map((tick, i) => (
          <g key={i}>
            <line x1={L} y1={y(tick)} x2={W - R} y2={y(tick)} stroke="rgba(56,72,96,0.35)" strokeWidth="1" />
            <text x={L - 8} y={y(tick) + 4} textAnchor="end" fontSize="11" fill="#9db0d2" fontFamily="DM Sans">
              {formatValue ? formatValue(tick) : String(tick)}
            </text>
          </g>
        ))}
        <line
          x1={L}
          y1={yZero}
          x2={W - R}
          y2={yZero}
          stroke="rgba(255,255,255,0.45)"
          strokeWidth="1.3"
          strokeDasharray="6 5"
        />
        <text x={W - R - 4} y={yZero - 5} textAnchor="end" fontSize="11" fill="rgba(255,255,255,0.72)" fontFamily="DM Sans">
          {zeroLabel}
        </text>
        {overlayPath && (
          <path d={overlayPath} fill="none" stroke={ovColor} strokeWidth="1.6" strokeDasharray="5 4" />
        )}
        <path d={linePath} fill="none" stroke={primaryColor} strokeWidth="2" />
        {Number.isFinite(latestVal) && (
          <>
            <circle cx={x(latestIdx)} cy={y(latestVal)} r="3.2" fill={primaryColor} />
            <text
              x={W - R - 6}
              y={latestLabelY}
              textAnchor="end"
              fontSize="11"
              fill="#d8e4f8"
              fontFamily="DM Sans"
            >
              {latestLabel}
            </text>
          </>
        )}
        {Number.isFinite(overlayLatestVal) && (
          <>
            <circle cx={x(overlayLatestIdx)} cy={y(overlayLatestVal)} r="2.8" fill={ovColor} />
            <text
              x={W - R - 6}
              y={clampNum(y(overlayLatestVal) + 14, T + 22, H - B - 4)}
              textAnchor="end"
              fontSize="11"
              fill={ovColor}
              fontFamily="DM Sans"
            >
              {overlayLatestLabel}
            </text>
          </>
        )}
        <text x="14" y={T + 14} fontSize="12" fill="#c9d7ef" fontFamily="DM Sans">{label}</text>
        {overlayPath && overlayLabel && (
          <g>
            <line x1={L + 14} y1={T + 30} x2={L + 34} y2={T + 30} stroke={ovColor} strokeWidth="1.6" strokeDasharray="5 4" />
            <text x={L + 40} y={T + 34} fontSize="11" fill={ovColor} fontFamily="DM Sans">{overlayLabel}</text>
          </g>
        )}
        {xTickIdxUnique.map((idx, i) => (
          <g key={`x-${i}`}>
            <line x1={x(idx)} y1={H - B + 1} x2={x(idx)} y2={H - B + 6} stroke="rgba(120,138,168,0.7)" strokeWidth="1" />
            <text x={x(idx)} y={H - 8} textAnchor="middle" fontSize="10" fill="#93a7c8" fontFamily="DM Sans">
              {dateForIdx(idx)}
            </text>
          </g>
        ))}
      </svg>
    </div>
  );
}

function ExpectedDecayCalculator() {
  const [beta, setBeta] = useState('2');
  const [sigmaAnnual, setSigmaAnnual] = useState('130');
  const [periodValue, setPeriodValue] = useState('1');
  const [periodUnit, setPeriodUnit] = useState('months');

  const result = useMemo(() => {
    const fn = window.computeExpectedDecay;
    if (typeof fn !== 'function') {
      return { ok: false, error: 'Calculator utility unavailable.' };
    }
    return fn({ beta, sigmaAnnual, periodValue, periodUnit });
  }, [beta, sigmaAnnual, periodValue, periodUnit]);

  return (
    <div className="calc-card">
      <div className="calc-title">Expected Decay Calculator</div>
      <div className="calc-helper">
        This is theoretical gross decay from volatility drag; not a forecast of realized returns.
        Scenario drag uses <code>dragLog = ½·β·(β−1)·σ²·T</code> (this widget shows <code>½·|β|·|β−1|·σ²·T</code> for quick magnitude checks).
      </div>

      <div className="calc-grid">
        <div className="calc-field">
          <label>Beta</label>
          <input value={beta} onChange={e => setBeta(e.target.value)} placeholder="-2, 1.5, 2" />
        </div>
        <div className="calc-field">
          <label>Annualized Volatility (%)</label>
          <input value={sigmaAnnual} onChange={e => setSigmaAnnual(e.target.value)} placeholder="130 or 1.3" />
        </div>
        <div className="calc-field">
          <label>Time Period Value</label>
          <input type="number" min="0" step="any" value={periodValue} onChange={e => setPeriodValue(e.target.value)} />
        </div>
        <div className="calc-field">
          <label>Time Unit</label>
          <select value={periodUnit} onChange={e => setPeriodUnit(e.target.value)}>
            <option value="days">Days</option>
            <option value="weeks">Weeks</option>
            <option value="months">Months</option>
            <option value="years">Years</option>
          </select>
        </div>
      </div>

      {!result.ok ? (
        <div className="calc-error">{result.error || 'Invalid input(s).'}</div>
      ) : (
        <>
          <div className="calc-out-grid">
            <div className="calc-out">
              <div className="k">Period decay (%)</div>
              <div className="v">{(result.periodExpectedDecay * 100).toFixed(2)}%</div>
            </div>
            <div className="calc-out">
              <div className="k">Period decay (dec.)</div>
              <div className="v">{result.periodExpectedDecay.toFixed(6)}</div>
            </div>
            <div className="calc-out">
              <div className="k">Annualized decay (%)</div>
              <div className="v">{(result.annualExpectedDecay * 100).toFixed(2)}%</div>
            </div>
          </div>

          <div className="calc-formula">
            expected_decay(T) = 0.5 × |beta| × |beta − 1| × sigma_annual² × T_years
          </div>
          <div className="calc-formula">
            0.5 × |{Number(result.beta).toFixed(4)}| × |{(Number(result.beta) - 1).toFixed(4)}| × {Number(result.sigmaAnnual).toFixed(4)}² × {Number(result.periodYears).toFixed(6)}
          </div>
          <div className="calc-example">
            Example: beta=2, sigma=130%, T=1 month → {(0.5 * Math.abs(2) * Math.abs(1) * (1.3 ** 2) / 12 * 100).toFixed(2)}%
          </div>
        </>
      )}
    </div>
  );
}

// ── Gross vs net comparison (detail strip): two rails, independent scales ──
function GrossDecayComparisonStrip({ r }) {
  const gR = Number(r.gross_decay_annual);
  const gHead = expectedDecayHeadlineValue(r);
  const gE = gHead != null && Number.isFinite(Number(gHead)) ? Number(gHead) : NaN;

  const bAvg = Number(r?.borrow_avg_annual);
  const netVsAvg = Number.isFinite(gR) && Number.isFinite(bAvg) ? gR - bAvg : NaN;
  const netSpot = Number(r.net_decay);
  const netP50 = Number(r.net_edge_p50_annual);

  const grossPts = [];
  if (Number.isFinite(gR)) grossPts.push({ key: 'gr', v: gR, kind: 'bar', cls: 'realized', legShort: 'Realized gross' });
  if (Number.isFinite(gE)) {
    grossPts.push({
      key: 'ge',
      v: gE,
      kind: 'bar',
      cls: 'expected',
      legShort: `${expectedDecayDisplayLabel(r)} · gross`,
    });
  }

  const netPts = [];
  if (Number.isFinite(netP50)) {
    netPts.push({
      key: 'n50',
      v: netP50,
      kind: 'diamond',
      cls: 'net-edge',
      legShort: 'Net edge (p50, bootstrap)',
    });
  }
  if (Number.isFinite(netVsAvg)) {
    netPts.push({
      key: 'nr',
      v: netVsAvg,
      kind: 'bar',
      cls: 'net-realized',
      legShort: 'Realized net decay (gross − hist. avg borrow)',
    });
  }
  if (Number.isFinite(netSpot)) {
    const sameAsAvg = Number.isFinite(netVsAvg) && Math.abs(netSpot - netVsAvg) < 1e-5;
    if (!sameAsAvg) {
      netPts.push({
        key: 'ns',
        v: netSpot,
        kind: 'bar',
        cls: 'net-spot',
        legShort: 'Net (gross − spot borrow)',
      });
    }
  }

  if (grossPts.length === 0 && netPts.length === 0) return null;

  const fmtPct1 = (x) => `${(x * 100).toFixed(1)}%`;

  function SingleRail({ title, pts }) {
    const vals = pts.map(p => p.v);
    let lo = Math.min(...vals);
    let hi = Math.max(...vals);
    if (!(hi > lo)) {
      lo -= 0.015;
      hi += 0.015;
    }
    const pos = (v) => ((v - lo) / (hi - lo)) * 100;
    return (
      <div className="gross-dumbbell-rail">
        <div className="gross-dumbbell-rail-title">{title}</div>
        <div className="gross-dumbbell gross-dumbbell--rail" aria-hidden="true">
          <div className="gross-dumbbell-track" />
          {pts.map((p) =>
            p.kind === 'diamond' ? (
              <div
                key={p.key}
                className={`gross-dumbbell-mark--diamond ${p.cls}`}
                style={{ left: `${pos(p.v)}%` }}
                title={`${p.legShort}: ${(p.v * 100).toFixed(2)}%`}
              />
            ) : (
              <div
                key={p.key}
                className={`gross-dumbbell-tick ${p.cls}`}
                style={{ left: `${pos(p.v)}%` }}
                title={`${p.legShort}: ${(p.v * 100).toFixed(2)}%`}
              />
            ),
          )}
          <div className="gross-dumbbell-axis">
            <span>{fmtPct1(lo)}</span>
            <span>{fmtPct1(hi)}</span>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="dv-block">
      <div className="dv-title">Annual rates — gross vs net (separate scales)</div>
      <div className="gross-dumbbell-stack">
        {grossPts.length > 0 ? <SingleRail title="Gross (before borrow)" pts={grossPts} /> : null}
        {netPts.length > 0 ? <SingleRail title="Net (after borrow)" pts={netPts} /> : null}
      </div>
      <div className="gross-dumbbell-legends">
        {grossPts.length > 0 ? (
          <div className="gross-dumbbell-legend-group">
            <div className="gross-dumbbell-legend-group-label">Gross</div>
            <div className="gross-dumbbell-legend">
              {grossPts.map((p) => (
                <span key={`g-${p.key}`}>
                  <i style={{ background: p.cls === 'realized' ? 'var(--accent-blue)' : 'var(--accent-purple)' }} />
                  {p.legShort}
                </span>
              ))}
            </div>
          </div>
        ) : null}
        {netPts.length > 0 ? (
          <div className="gross-dumbbell-legend-group">
            <div className="gross-dumbbell-legend-group-label">Net</div>
            <div className="gross-dumbbell-legend">
              {netPts.map((p) => (
                <span key={`n-${p.key}`}>
                  {p.kind === 'diamond' ? (
                    <i className="gross-legend-diamond" aria-hidden="true" />
                  ) : (
                    <i style={{ background: p.cls === 'net-realized' ? 'var(--positive)' : 'var(--accent-cyan)' }} />
                  )}
                  {p.legShort}
                </span>
              ))}
            </div>
          </div>
        ) : null}
      </div>
    </div>
  );
}

function NetEdgeBootstrapViz({ r }) {
  const p5 = Number(r.net_edge_p05_annual);
  const p25 = Number(r.net_edge_p25_annual);
  const p50 = Number(r.net_edge_p50_annual);
  const p75 = Number(r.net_edge_p75_annual);
  const p95 = Number(r.net_edge_p95_annual);
  const hasBox = [p5, p25, p50, p75, p95].every(Number.isFinite);
  let hist = null;
  if (r.net_edge_hist_json && typeof r.net_edge_hist_json === 'string') {
    try { hist = JSON.parse(r.net_edge_hist_json); } catch (e) { hist = null; }
  }
  if (!hasBox && !(hist && Array.isArray(hist.c) && hist.e && hist.e.length > 1)) return null;
  let lo = hasBox ? p5 : NaN;
  let hi = hasBox ? p95 : NaN;
  if (!Number.isFinite(lo) || !Number.isFinite(hi)) {
    if (hist && Array.isArray(hist.e) && hist.e.length > 1) {
      lo = Number(hist.e[0]);
      hi = Number(hist.e[hist.e.length - 1]);
    } else {
      lo = 0;
      hi = 1;
    }
  }
  const span = hi > lo ? hi - lo : 1e-6;
  const x = (v) => 10 + ((v - lo) / span) * 180;
  let bars = null;
  if (hist && Array.isArray(hist.c) && hist.c.length) {
    const mx = Math.max(...hist.c.map(Number), 1);
    const edges = Array.isArray(hist.e) ? hist.e : [];
    bars = (
      <div className="net-edge-mini-hist" aria-label="Bootstrap net edge (annual) histogram">
        {hist.c.map((c, i) => {
          const eLo = edges[i] != null ? Number(edges[i]) : NaN;
          const eHi = edges[i + 1] != null ? Number(edges[i + 1]) : NaN;
          const barTitle = Number.isFinite(eLo) && Number.isFinite(eHi)
            ? `${fmt(eLo)} – ${fmt(eHi)} (bin range, annual net edge)`
            : 'Bin range unavailable';
          return (
            <div key={i} className="bar" title={barTitle} style={{ height: `${(Number(c) / mx) * 100}%` }} />
          );
        })}
      </div>
    );
  }
  return (
    <div className="dv-block net-edge-viz">
      <div className="dv-title">Net edge — resampled distribution</div>
      {hasBox ? (
        <svg className="net-edge-box-svg" viewBox="0 0 200 44" preserveAspectRatio="none">
          <title>Net edge fan — same layout as table (hover table cell for numbers).</title>
          <line x1={x(p5)} y1={22} x2={x(p95)} y2={22} stroke="var(--ne-whisker)" strokeWidth="1.75" />
          <rect
            x={x(p25)} y={14} width={Math.max(x(p75) - x(p25), 1)} height={16}
            fill="var(--ne-iqr-fill)" stroke="var(--ne-iqr-stroke)" strokeWidth="1"
          />
          <line x1={x(p50)} y1={10} x2={x(p50)} y2={34} stroke="var(--ne-p50)" strokeWidth="2.25" />
        </svg>
      ) : null}
      {bars}
    </div>
  );
}

/** Shared net-edge fan: whisker (p5–p95) + IQR box + p50 dot — same colors in table and charts. */
function NetEdgeFanGlyph({ r, w = 58, h = 18, vbW = 58 }) {
  const p5 = Number(r.net_edge_p05_annual);
  const p25 = Number(r.net_edge_p25_annual);
  const p50 = Number(r.net_edge_p50_annual);
  const p75 = Number(r.net_edge_p75_annual);
  const p95 = Number(r.net_edge_p95_annual);
  const hasWhisk = Number.isFinite(p5) && Number.isFinite(p95) && Number.isFinite(p50);
  if (!hasWhisk) return null;
  const hasIqr = Number.isFinite(p25) && Number.isFinite(p75);
  const lo = p5;
  const hi = p95;
  const span = hi > lo ? hi - lo : 1e-8;
  const W = 52;
  const x = v => ((v - lo) / span) * W + 3;
  const ymid = 10;
  const tip = [
    `p5 ${fmt(p5)}`,
    hasIqr ? `p25 ${fmt(p25)}` : null,
    `p50 ${fmt(p50)}`,
    hasIqr ? `p75 ${fmt(p75)}` : null,
    `p95 ${fmt(p95)}`,
  ].filter(Boolean).join(' · ');
  return (
    <span title={tip} onClick={e => e.stopPropagation()}>
      <svg width={w} height={h} viewBox={`0 0 ${vbW} 18`} style={{ display: 'block' }} aria-hidden="true">
        <line x1={x(p5)} y1={ymid} x2={x(p95)} y2={ymid} stroke="var(--ne-whisker)" strokeWidth="2" strokeLinecap="round" />
        {hasIqr ? (
          <rect
            x={x(p25)} y={3} width={Math.max(x(p75) - x(p25), 1)} height={14} rx="1"
            fill="var(--ne-iqr-fill)" stroke="var(--ne-iqr-stroke)" strokeWidth="1"
          />
        ) : null}
        <circle cx={x(p50)} cy={ymid} r={hasIqr ? 2.2 : 3} fill="var(--ne-p50)" />
      </svg>
    </span>
  );
}

function NetEdgeMergedCell({ r }) {
  const p50 = r.net_edge_p50_annual;
  const anchorSource = r.gross_anchor_source;
  const anchorShift = Number(r.gross_anchor_shift_annual);
  const anchorTarget = Number(r.gross_anchor_target_annual);
  const baseTip = 'Net edge (annual): number = median; strip = uncertainty (hover glyph for p5–p95).';
  const anchorTipParts = [];
  if (Number.isFinite(anchorTarget)) {
    anchorTipParts.push(`anchor-shifted to expected p50 ${fmt(anchorTarget)}`);
  }
  if (Number.isFinite(anchorShift) && Math.abs(anchorShift) > 1e-6) {
    anchorTipParts.push(`shift ${anchorShift >= 0 ? '+' : ''}${fmt(anchorShift)}`);
  }
  if (anchorSource && anchorSource !== 'realized_only_passive_low_beta') {
    anchorTipParts.push(`source: ${anchorSource}`);
  } else if (anchorSource === 'realized_only_passive_low_beta') {
    anchorTipParts.push('passive low-β: realized-only by policy');
  }
  const tip = anchorTipParts.length
    ? `${baseTip}\n${anchorTipParts.join(' · ')}`
    : baseTip;
  const hasFan = Number.isFinite(Number(r.net_edge_p05_annual)) && Number.isFinite(Number(r.net_edge_p95_annual)) && Number.isFinite(Number(p50));
  return (
    <div className="net-edge-merged" title={tip} onClick={e => e.stopPropagation()}>
      <div className={cls('net-edge-merged-p50', spreadCls(p50))}>{p50 != null ? fmt(p50) : '—'}</div>

      </div>
    </div>
  );
}

/** ETF metrics: fix shares when AUM/NAV implies a consistent count but shares are off by ~10²+ (feed glitches). */
function repairEtfMetricsShareOutliers(rows) {
  if (!Array.isArray(rows) || rows.length === 0) return rows;
  const RATIO_MAX = 80;
  return rows.map((row) => {
    const nav = Number(row?.nav);
    const aum = Number(row?.aum);
    const sh = Number(row?.shares_outstanding);
    const implied = (Number.isFinite(nav) && nav > 0 && Number.isFinite(aum) && aum > 0)
      ? aum / nav
      : null;
    if (implied == null || !Number.isFinite(implied) || implied <= 0 || !Number.isFinite(sh) || sh <= 0) {
      return row;
    }
    const r = Math.max(sh / implied, implied / sh);
    if (r <= RATIO_MAX) return row;
    const base = String(row?.status || 'ok').trim();
    const tag = '· repaired (shares ← AUM/NAV)';
    return {
      ...row,
      shares_outstanding: implied,
      status: base.includes('repaired') ? base : `${base} ${tag}`.trim(),
    };
  });
}

const fmtCategoryLabel = (cat) => {
  const hit = NEWS_CATEGORIES.find(c => c.key === cat);
  return hit ? hit.label : (cat || 'Other').replace(/_/g, ' ');
};

const fmtRelativeTime = (iso) => {
  if (!iso) return '—';
  const then = new Date(iso).getTime();
  if (!Number.isFinite(then)) return '—';
  const now = Date.now();
  const diffMs = now - then;
  if (diffMs < 0) return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  const min = Math.floor(diffMs / 60000);
  if (min < 1) return 'just now';
  if (min < 60) return `${min}m ago`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}h ago`;
  const day = Math.floor(hr / 24);
  if (day < 14) return `${day}d ago`;
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
};

const fmtEventDate = (iso) => {
  if (!iso) return '—';
  const d = new Date(iso + (iso.length === 10 ? 'T00:00:00Z' : ''));
  if (!Number.isFinite(d.getTime())) return iso;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
};

const corporateEventMs = (ev) => {
  const dateStr = ev?.execution_date || ev?.announcement_date;
  if (!dateStr) return 0;
  const s = String(dateStr);
  const t = new Date(s.length === 10 ? `${s}T00:00:00Z` : s).getTime();
  return Number.isFinite(t) ? t : 0;
};

function NewsTickerChip({ symbol, bucketOf, onNavigate }) {
  const sym = (symbol || '').toUpperCase();
  const bucket = bucketOf ? bucketOf(sym) : null;
  const navigable = typeof onNavigate === 'function';
  return (
    <span
      className="ticker-chip"
      title={bucket ? `${sym} · ${bucket.replace(/_/g, ' ')}` : sym}
      onClick={e => {
        e.stopPropagation();
        if (navigable) onNavigate(sym);
      }}
      style={navigable ? {} : { cursor: 'default' }}
    >
      {sym}
    </span>
  );
}

function PinnedEventCard({ event, bucketOf, onNavigate }) {
  const cat = event.type || 'other';
  const isSymbolChange = cat === 'symbol_change';
  const isSplit = cat === 'reverse_split' || cat === 'forward_split';
  const isPending = event.status === 'pending';
  // For symbol_change events, show the full rename chain (old → new) so users
  // immediately see the redirect (e.g. BITF → KEEL) without hunting for it in
  // the headline text.  For everything else we just show the single ticker.
  const tickers = isSymbolChange && event.prior_ticker
    ? [event.prior_ticker, event.ticker].filter(Boolean)
    : [event.ticker].filter(Boolean);
  return (
    <div
      className={cls('pinned-card', `cat-${cat}`, isPending && 'pinned-card-pending')}
      onClick={() => event.ticker && onNavigate?.(event.ticker)}
    >
      <div className="pinned-card-top">
        <div className="pinned-card-tickers">
          {tickers.map((t, i) => (
            <React.Fragment key={t}>
              {i > 0 && <span className="ticker-chain-arrow">→</span>}
              <NewsTickerChip symbol={t} bucketOf={bucketOf} onNavigate={onNavigate} />
            </React.Fragment>
          ))}
        </div>
        <div className="pinned-card-badges">
          {isPending && (
            <span
              className="cat-badge cat-pending"
              title="Announced — not yet confirmed in Polygon records"
            >
              Announced
            </span>
          )}
          <span className={cls('cat-badge', `cat-${cat}`)}>{fmtCategoryLabel(cat)}</span>
        </div>
      </div>
      <div className="pinned-card-headline">
        {event.headline || `${event.ticker} · ${fmtCategoryLabel(cat)}`}
      </div>
      {event.summary && (
        <div className="pinned-card-summary">{event.summary}</div>
      )}
      <div className="pinned-card-foot">
        <span>
          {isPending && event.execution_date
            ? `Effective ${fmtEventDate(event.execution_date)}`
            : fmtEventDate(event.execution_date)}
        </span>
        {isPending && event.announcement_date && (
          <span className="pinned-card-announced" title="Date the issuer announced the event">
            Announced {fmtEventDate(event.announcement_date)}
          </span>
        )}
        {isSplit && event.ratio_label && (
          <span className="ratio">{event.ratio_label}</span>
        )}
      </div>
    </div>
  );
}
