  const scenarioFns = window.ScenarioReturns || {};
  const horizonYears = typeof scenarioFns.horizonToYears === 'function'
    ? scenarioFns.horizonToYears(scenarioHorizon)
    : NaN;
  const scenarioLeverage = Number.isFinite(Number(r.beta)) ? Number(r.beta) : 1;
  const etfBorrowSeries = Array.isArray(borrowHistoryMap?.[etfSym]) ? borrowHistoryMap[etfSym] : [];
  const etfDistributionsSeries = useMemo(() => (
    Array.isArray(etfDistributionsMap?.[etfSym]) ? etfDistributionsMap[etfSym] : []
  ), [etfDistributionsMap, etfSym]);
  const etfMetricsSeries = useMemo(() => {
    const raw = Array.isArray(etfMetricsMap?.[etfSym]) ? etfMetricsMap[etfSym] : [];
    const ok = raw.filter((x) => String(x?.status || '').toLowerCase() === 'ok');
    if (!ok.length) return ok;

    // Build a distribution-adjusted ("total return") NAV series. On each ex-date in our
    // observation window we reinvest the distribution at that day's NAV, so
    //   reinv_factor *= (nav_ex + amount) / nav_ex
    // and nav_total_return[t] = nav[t] * reinv_factor_t. By construction tr NAV equals raw
    // NAV on the first in-window day, then diverges upward by the cumulative cash returned
    // to shareholders. For option-income ETFs like MSTY/ULTY this flattens the NAV-erosion
    // graph into an honest total-return path.
    const dists = etfDistributionsSeries || [];
    let reinvFactor = 1;
    let dIdx = 0;
    const seriesStart = String(ok[0]?.date || '');
    // Skip any distributions on-or-before the window start. We cannot credibly reinvest
    // them because we have no pre-ex-date NAV for that window, and applying them would
    // mystery-inflate TR NAV on day zero.
    while (dIdx < dists.length && String(dists[dIdx].ex_date) <= seriesStart) dIdx += 1;
    return ok.map((row) => {
      const dateStr = String(row?.date || '');
      const nav = Number(row?.nav);
      if (dateStr && Number.isFinite(nav) && nav > 0) {
        while (dIdx < dists.length && String(dists[dIdx].ex_date) <= dateStr) {
          const amt = Number(dists[dIdx].amount);
          if (Number.isFinite(amt) && amt > 0) {
            reinvFactor *= (nav + amt) / nav;
          }
          dIdx += 1;
        }
      }
      const tr = Number.isFinite(nav) && nav > 0 ? nav * reinvFactor : null;
      return { ...row, nav_total_return: tr, tr_reinvestment_factor: reinvFactor };
    });
  }, [etfMetricsMap, etfSym, etfDistributionsSeries]);
  const latestEtfMetric = useMemo(
    () => (etfMetricsSeries.length ? etfMetricsSeries[etfMetricsSeries.length - 1] : null),
    [etfMetricsSeries],
  );
  const etfDistributionCount = etfDistributionsSeries.length;
  const etfLatestDistribution = etfDistributionCount
    ? etfDistributionsSeries[etfDistributionCount - 1]
    : null;
  const avgBorrowFromHistory = (() => {
    const vals = etfBorrowSeries.map(x => Number(x?.borrow_current)).filter(Number.isFinite);
    if (!vals.length) return null;
    return vals.reduce((a, b) => a + b, 0) / vals.length;
  })();
  const etfSpikeRisk = borrowSpikeRiskMap?.[etfSym] || null;
  const etfSpikeProb = Number(etfSpikeRisk?.p_spike_5d);
  const etfSpikeBand = String(etfSpikeRisk?.risk_band || 'unknown').toLowerCase();
  const etfSpikeBandCls = etfSpikeBand === 'high'
    ? 'val-negative'
    : etfSpikeBand === 'elevated'
    ? 'val-warning'
    : etfSpikeBand === 'low'
    ? 'val-positive'
    : 'val-muted';
  const etfSpikeQualityBand = String(etfSpikeRisk?.quality_band || 'insufficient').toLowerCase();
  const etfSpikeQualityCls = etfSpikeQualityBand === 'strong'
    ? 'val-positive'
    : etfSpikeQualityBand === 'moderate'
    ? 'val-warning'
    : 'val-negative';
  const spikeAccuracy = borrowSpikeRiskMeta?.accuracy_tracking || null;
  const annualCarryDragRaw = Number.isFinite(avgBorrowFromHistory)
    ? avgBorrowFromHistory
    : (Number.isFinite(Number(r.borrow_avg_annual)) ? Number(r.borrow_avg_annual) : Number(getBorrowRate(r)));
  const annualCarryDrag = Number.isFinite(annualCarryDragRaw) ? Math.max(0, annualCarryDragRaw) : 0;
  const tradeBorrowBySymbol = useMemo(() => ({ [etfSym]: annualCarryDrag }), [etfSym, annualCarryDrag]);
  const defaultIvBySymbol = useMemo(() => ({
    [undSym]: Number.isFinite(Number(realizedUnd)) && Number(realizedUnd) > 0 ? Number(realizedUnd) : 0.8,
    [etfSym]: Number.isFinite(Number(realizedEtf)) && Number(realizedEtf) > 0 ? Number(realizedEtf) : 0.8,
  }), [undSym, etfSym, realizedUnd, realizedEtf]);
  const resolveLegIv = useCallback((leg, contract) => {
    const legIv = normalizeOptionIv(leg?.iv);
    if (legIv != null) return legIv;
    const contractIv = normalizeOptionIv(contract?.iv);
    if (contractIv != null) return contractIv;
    const sym = String(leg?.symbol || '').toUpperCase();
    const fallback = Number(defaultIvBySymbol[sym]);
    return Number.isFinite(fallback) && fallback > 0 ? fallback : 0.8;
  }, [defaultIvBySymbol]);
  const resolveLegPremium = useCallback((leg, contract) => {
    const marketMid = optionMidFromContract(contract);
    if (Number.isFinite(Number(marketMid)) && Number(marketMid) > 0) return Number(marketMid);

    // Fallback: theoretical premium using current spot + resolved IV.
    const spotNow = String(leg?.symbol || '').toUpperCase() === undSym
      ? Number(tradeSpotUnderlying)
      : String(leg?.symbol || '').toUpperCase() === etfSym
      ? Number(tradeSpotEtf)
      : NaN;
    const strike = Number(leg?.strike);
    const iv = resolveLegIv(leg, contract);
    const tYears = Math.max(0, Number(tradeTtxDays)) / 365;
    const rate = Number(tradeRatePct) / 100;
    const type = String((leg?.type) || 'call').toLowerCase();
    if (typeof tradeFns.bsPrice === 'function' && Number.isFinite(spotNow) && Number.isFinite(strike) && Number.isFinite(iv)) {
      const theo = Number(tradeFns.bsPrice({ spot: spotNow, strike, vol: iv, ttmYears: tYears, rate, type }));
      if (Number.isFinite(theo) && theo > 0) return theo;
    }
    return 0;
  }, [tradeFns, undSym, etfSym, tradeSpotUnderlying, tradeSpotEtf, tradeTtxDays, tradeRatePct, resolveLegIv]);
  const minObsForScenario = 10;
  const undObs = Number(volPoint?.n_returns_underlying) || 0;
  const scenarioSigmaBest = Number(ewmaUnd);
  const scenarioSigmaRef = Number(realizedUnd);

  const scenarioGrid = useMemo(() => {
    if (typeof scenarioFns.buildScenarioGrid !== 'function') {
      return { ok: false, error: 'Scenario utility unavailable.' };
    }
    if (!Number.isFinite(Number(ewmaUnd)) || Number(ewmaUnd) <= 0) {
      return { ok: false, error: 'Missing valid underlying EWMA volatility for this lookback.' };
    }
    if (!Number.isFinite(horizonYears) || horizonYears <= 0) {
      return { ok: false, error: 'Invalid scenario horizon.' };
    }
    if (undObs < minObsForScenario) {
      return { ok: false, error: `Insufficient lookback observations (${undObs}).` };
    }
    return scenarioFns.buildScenarioGrid({
      leverage: scenarioLeverage,
      bestVolAnnual: Number(ewmaUnd),
      horizonYears,
      annualCarryDrag: 0,
      volMultipliers: SCENARIO_VOL_MULTIPLIERS,
      shockMultipliers: SCENARIO_SHOCK_MULTIPLIERS,
      minReturn: -0.9999,
    });
  }, [scenarioFns, ewmaUnd, horizonYears, undObs, scenarioLeverage, annualCarryDrag]);

  const mcUpsideThresholds = useMemo(
    () => parseThresholdInput(mcUpsideThresholdsText),
    [mcUpsideThresholdsText],
  );
  const monteCarloResult = useMemo(() => {
    if (typeof scenarioFns.simulateMonteCarloPaths !== 'function') {
      return { ok: false, error: 'Monte Carlo utility unavailable.' };
    }
    if (!Number.isFinite(scenarioSigmaBest) || scenarioSigmaBest <= 0) {
      return { ok: false, error: 'Missing valid EWMA sigma for Monte Carlo.' };
    }
    if (!Number.isFinite(horizonYears) || horizonYears <= 0) {
      return { ok: false, error: 'Invalid Monte Carlo horizon.' };
    }
    if (undObs < minObsForScenario) {
      return { ok: false, error: `Insufficient lookback observations (${undObs}).` };
    }
    return scenarioFns.simulateMonteCarloPaths({
      pathCount: Number(mcPathCount),
      sigmaAnnual: scenarioSigmaBest,
      leverage: scenarioLeverage,
      horizonYears,
      annualCarryDrag,
      seed: Number(mcSeed),
      ruinThreshold: Number(mcRuinThresholdPct) / 100,
      upsideThresholds: mcUpsideThresholds.length ? mcUpsideThresholds : [0.25, 0.5, 1.0],
    });
  }, [
    scenarioFns,
    scenarioSigmaBest,
    horizonYears,
    undObs,
    minObsForScenario,
    mcPathCount,
    scenarioLeverage,
    annualCarryDrag,
    mcSeed,
    mcRuinThresholdPct,
    mcUpsideThresholds,
  ]);

  const cachedSpotUnd = Number(optionsCache?.symbols?.[undSym]?.spot);
  const cachedSpotEtf = Number(optionsCache?.symbols?.[etfSym]?.spot);
  const undOptionsRows = Array.isArray(optionsCache?.symbols?.[undSym]?.options) ? optionsCache.symbols[undSym].options : [];
  const etfOptionsRows = Array.isArray(optionsCache?.symbols?.[etfSym]?.options) ? optionsCache.symbols[etfSym].options : [];
  const optionsErrUnd = optionsCache?.errors_by_symbol?.[undSym];
  const optionsErrEtf = optionsCache?.errors_by_symbol?.[etfSym];
  const hasCachedSpotUnd = Number.isFinite(cachedSpotUnd);
  const hasCachedSpotEtf = Number.isFinite(cachedSpotEtf);
  const tradeSpotUnderlying = Number.isFinite(cachedSpotUnd) ? cachedSpotUnd : 100;
  const tradeSpotEtf = Number.isFinite(cachedSpotEtf) ? cachedSpotEtf : 100;

  useEffect(() => {
    setTradeBaseLegs([
      { id: 1, symbol: undSym, side: 'short', quantity: 100, entry: tradeSpotUnderlying },
      { id: 2, symbol: etfSym, side: 'long', quantity: 100, entry: tradeSpotEtf },
    ]);
    setTradeOptionLegs([]);
  }, [undSym, etfSym, tradeSpotUnderlying, tradeSpotEtf]);

  const symbolChoices = useMemo(() => Array.from(new Set([undSym, etfSym])), [undSym, etfSym]);
  const optionsForSymbol = useCallback((sym) => {
    const rows = optionsCache?.symbols?.[sym]?.options;
    return Array.isArray(rows) ? rows : [];
  }, [optionsCache]);
  const expiriesForSymbol = useCallback((sym) => {
    const rows = optionsForSymbol(sym);
    return Array.from(new Set(rows.map((x) => x.expiration_date).filter(Boolean))).sort();
  }, [optionsForSymbol]);
  const strikesForSymbolExpiryType = useCallback((sym, exp, type) => {
    const rows = optionsForSymbol(sym).filter((x) => x.expiration_date === exp && String(x.contract_type || '').toLowerCase() === String(type || '').toLowerCase());
    return Array.from(new Set(rows.map((x) => Number(x.strike_price)).filter(Number.isFinite))).sort((a, b) => a - b);
  }, [optionsForSymbol]);
  const findContract = useCallback((sym, exp, type, strike) => {
    return optionsForSymbol(sym).find((x) => x.expiration_date === exp
      && String(x.contract_type || '').toLowerCase() === String(type || '').toLowerCase()
      && Math.abs(Number(x.strike_price) - Number(strike)) < 1e-9) || null;
  }, [optionsForSymbol]);
  const tradeExposure = useMemo(() => {
    let grossLongEq = 0;
    let grossShortEq = 0;
    for (const leg of tradeBaseLegs) {
      const qty = Math.max(0, Number(leg?.quantity));
      const entry = Number(leg?.entry);
      if (!Number.isFinite(qty) || !Number.isFinite(entry) || qty <= 0 || entry <= 0) continue;
      const notional = qty * entry;
      if (String(leg?.side || '').toLowerCase() === 'short') grossShortEq += notional;
      else grossLongEq += notional;
    }
    let optionStrikeNotional = 0;
    let optionPremiumLong = 0;
    let optionPremiumShort = 0;
    let optionContracts = 0;
    for (const leg of tradeOptionLegs) {
      const contracts = Math.max(0, Number(leg?.contracts));
      const strike = Number(leg?.strike);
      if (!Number.isFinite(contracts) || contracts <= 0) continue;
      optionContracts += contracts;
      if (Number.isFinite(strike) && strike > 0) optionStrikeNotional += contracts * 100 * strike;
      const c = findContract(leg.symbol, leg.expiry, leg.type, leg.strike);
      const premium = resolveLegPremium(leg, c);
      const premNotional = contracts * 100 * Math.max(0, Number(premium) || 0);
      if (String(leg?.side || '').toLowerCase() === 'sell') optionPremiumShort += premNotional;
      else optionPremiumLong += premNotional;
    }
    return {
      grossLongEq,
      grossShortEq,
      grossEq: grossLongEq + grossShortEq,
      netEq: grossLongEq - grossShortEq,
      optionContracts,
      optionStrikeNotional,
      optionPremiumLong,
      optionPremiumShort,
      optionPremiumNet: optionPremiumLong - optionPremiumShort,
    };
  }, [tradeBaseLegs, tradeOptionLegs, findContract, resolveLegPremium]);

  const tradeScenarioGrid = useMemo(() => {
    if (typeof tradeFns.buildTradeScenarioGrid !== 'function') return { ok: false, error: 'Trade Lab utility unavailable.' };
    if (!scenarioGrid?.ok) return { ok: false, error: 'Scenario inputs unavailable.' };
    const optionLegs = tradeOptionLegs.map((leg) => {
      const c = findContract(leg.symbol, leg.expiry, leg.type, leg.strike);
      return {
        ...leg,
        premium: resolveLegPremium(leg, c),
        iv: resolveLegIv(leg, c),
      };
    });
    const tradeSigmaAnnual = tradeUseScenarioAssumptions ? scenarioSigmaBest : (Number.isFinite(Number(realizedUnd)) ? Number(realizedUnd) : scenarioSigmaBest);
    const tradeHYears = tradeUseScenarioAssumptions ? horizonYears : 1;
    const tradeLev = tradeUseScenarioAssumptions ? scenarioLeverage : (Number.isFinite(Number(r.beta)) ? Number(r.beta) : scenarioLeverage);
    return tradeFns.buildTradeScenarioGrid({
      baseLegs: tradeBaseLegs,
      optionLegs,
      underlyingSymbol: undSym,
      etfSymbol: etfSym,
      spotUnderlying: tradeSpotUnderlying,
      spotEtf: tradeSpotEtf,
      leverage: tradeLev,
      horizonYears: tradeHYears,
      baseVolAnnual: tradeSigmaAnnual,
      shockRows: scenarioGrid.rows.map((x) => ({ sigmaMultiple: x.sigmaMultiple, underlyingReturn: x.underlyingReturn })),
      volColumns: scenarioGrid.volColumns.map((x) => ({ sigmaAnnual: x.sigmaAnnual })),
      ttxDays: tradeTtxDays,
      rate: Number(tradeRatePct) / 100,
      annualBorrowBySymbol: tradeBorrowBySymbol,
      defaultBorrowAnnual: annualCarryDrag,
      shortProceedsRateAnnual: Number(tradeShortProceedsPct) / 100,
    });
  }, [tradeFns, scenarioGrid, tradeOptionLegs, tradeBaseLegs, findContract, resolveLegIv, resolveLegPremium, undSym, etfSym, tradeSpotUnderlying, tradeSpotEtf, scenarioLeverage, horizonYears, scenarioSigmaBest, tradeTtxDays, tradeRatePct, tradeUseScenarioAssumptions, realizedUnd, r.beta, tradeBorrowBySymbol, annualCarryDrag, tradeShortProceedsPct]);

  const tradeMonteCarlo = useMemo(() => {
    if (typeof tradeFns.evaluateTradeMonteCarlo !== 'function') return { ok: false, error: 'Trade Lab utility unavailable.' };
    if (!monteCarloResult?.ok) return { ok: false, error: 'Monte Carlo unavailable.' };
    if (typeof scenarioFns.simulateMonteCarloPaths !== 'function') return { ok: false, error: 'Monte Carlo engine unavailable.' };
    const tradeSigmaAnnual = tradeUseScenarioAssumptions ? scenarioSigmaBest : (Number.isFinite(Number(realizedUnd)) ? Number(realizedUnd) : scenarioSigmaBest);
    const tradeHYears = tradeUseScenarioAssumptions ? horizonYears : 1;
    const underlyingMc = scenarioFns.simulateMonteCarloPaths({
      pathCount: Number(mcPathCount),
      sigmaAnnual: tradeSigmaAnnual,
      leverage: 1,
      horizonYears: tradeHYears,
      annualCarryDrag: 0,
      seed: Number(mcSeed),
      ruinThreshold: -0.99,
      upsideThresholds: [0.25],
    });
    if (!underlyingMc.ok) return { ok: false, error: underlyingMc.error || 'Underlying MC unavailable.' };
    const optionLegs = tradeOptionLegs.map((leg) => {
      const c = findContract(leg.symbol, leg.expiry, leg.type, leg.strike);
      return {
        ...leg,
        premium: resolveLegPremium(leg, c),
        iv: resolveLegIv(leg, c),
      };
    });
    return tradeFns.evaluateTradeMonteCarlo({
      baseLegs: tradeBaseLegs,
      optionLegs,
      underlyingSymbol: undSym,
      etfSymbol: etfSym,
      spotUnderlying: tradeSpotUnderlying,
      spotEtf: tradeSpotEtf,
      ttxDaysStart: tradeTtxDays,
      horizonYears: tradeHYears,
      volAnnual: tradeSigmaAnnual,
      rate: Number(tradeRatePct) / 100,
      annualBorrowBySymbol: tradeBorrowBySymbol,
      defaultBorrowAnnual: annualCarryDrag,
      shortProceedsRateAnnual: Number(tradeShortProceedsPct) / 100,
      etfPaths: monteCarloResult.paths,
      underlyingPaths: underlyingMc.paths,
    });
  }, [tradeFns, monteCarloResult, scenarioFns, mcPathCount, scenarioSigmaBest, horizonYears, mcSeed, tradeOptionLegs, tradeBaseLegs, findContract, resolveLegIv, resolveLegPremium, undSym, etfSym, tradeSpotUnderlying, tradeSpotEtf, tradeTtxDays, tradeRatePct, tradeUseScenarioAssumptions, realizedUnd, tradeBorrowBySymbol, annualCarryDrag, tradeShortProceedsPct]);

  const tradeTtxSeries = useMemo(() => {
    if (typeof tradeFns.buildTtxSensitivity !== 'function') return [];
    if (!scenarioGrid?.ok) return [];
    const optionLegs = tradeOptionLegs.map((leg) => {
      const c = findContract(leg.symbol, leg.expiry, leg.type, leg.strike);
      return {
        ...leg,
        premium: resolveLegPremium(leg, c),
        iv: resolveLegIv(leg, c),
      };
    });
    const tradeSigmaAnnual = tradeUseScenarioAssumptions ? scenarioSigmaBest : (Number.isFinite(Number(realizedUnd)) ? Number(realizedUnd) : scenarioSigmaBest);
    const tradeHYears = tradeUseScenarioAssumptions ? horizonYears : 1;
    const tradeLev = tradeUseScenarioAssumptions ? scenarioLeverage : (Number.isFinite(Number(r.beta)) ? Number(r.beta) : scenarioLeverage);
    return tradeFns.buildTtxSensitivity({
      baseLegs: tradeBaseLegs,
      optionLegs,
      underlyingSymbol: undSym,
      etfSymbol: etfSym,
      spotUnderlying: tradeSpotUnderlying,
      spotEtf: tradeSpotEtf,
      leverage: tradeLev,
      horizonYears: tradeHYears,
      baseVolAnnual: tradeSigmaAnnual,
      shockRows: scenarioGrid.rows.map((x) => ({ sigmaMultiple: x.sigmaMultiple, underlyingReturn: x.underlyingReturn })),
      volColumns: scenarioGrid.volColumns.map((x) => ({ sigmaAnnual: x.sigmaAnnual })),
      ttxList: [1, 7, 14, 30, 60, 90],
      rate: Number(tradeRatePct) / 100,
      annualBorrowBySymbol: tradeBorrowBySymbol,
      defaultBorrowAnnual: annualCarryDrag,
      shortProceedsRateAnnual: Number(tradeShortProceedsPct) / 100,
    });
  }, [tradeFns, scenarioGrid, tradeOptionLegs, tradeBaseLegs, findContract, resolveLegIv, resolveLegPremium, undSym, etfSym, tradeSpotUnderlying, tradeSpotEtf, scenarioLeverage, horizonYears, scenarioSigmaBest, tradeRatePct, tradeUseScenarioAssumptions, realizedUnd, r.beta, tradeBorrowBySymbol, annualCarryDrag, tradeShortProceedsPct]);

  return (
    <div className="chart-page">
      {/* Header */}
      <div className="chart-header">
        <button className="back-btn" onClick={onBack}>
          <svg viewBox="0 0 20 20" fill="currentColor"><path fillRule="evenodd" d="M17 10a.75.75 0 01-.75.75H5.612l4.158 3.96a.75.75 0 11-1.04 1.08l-5.5-5.25a.75.75 0 010-1.08l5.5-5.25a.75.75 0 111.04 1.08L5.612 9.25H16.25A.75.75 0 0117 10z" clipRule="evenodd"/></svg>
          Back
        </button>
        <div className="chart-title">
          <span className="etf-sym">{etfSym}</span>
          {undSym && <>
            <span className="vs">vs</span>
            <span className="und-sym">{undSym}</span>
          </>}
        </div>
        {bucketLabel && <span className={cls('chart-bucket-badge', bucketCls)}>{bucketLabel}</span>}
        <div className="chart-view-switch">
          <button className={cls('chart-view-btn', activePanel === 'chart' && 'active')} onClick={() => setActivePanel('chart')}>Chart</button>
          <button className={cls('chart-view-btn', activePanel === 'stats' && 'active')} onClick={() => setActivePanel('stats')}>Stats</button>
          {!hideScenarios && (
            <button className={cls('chart-view-btn', activePanel === 'scenarios' && 'active')} onClick={() => setActivePanel('scenarios')}>Scenarios</button>
          )}
          <button className={cls('chart-view-btn', activePanel === 'trade' && 'active')} onClick={() => setActivePanel('trade')}>Trade Lab</button>
          <button className={cls('chart-view-btn', activePanel === 'borrow' && 'active')} onClick={() => setActivePanel('borrow')}>Borrow</button>
        </div>

        {/* Timeframe buttons */}
        <div className="tf-group">
          {TIMEFRAMES.map(tf => (
            <button key={tf.range}
              className={cls('tf-btn', activeTf.range === tf.range && 'tf-active')}
              onClick={() => setActiveTf(tf)}>
              {tf.label}
            </button>
          ))}
        </div>
      </div>

      {activePanel === 'chart' && (
        <div className="chart-section">
          {/* TradingView chart in sandboxed iframe via srcdoc */}
          <div className="chart-container">
            {!iframeLoaded && (
              <div className="chart-loading">
                <div className="spinner" style={{ marginRight: 8 }} />
                Loading chart…
              </div>
            )}
            <iframe
              key={keyRef.current}
              ref={iframeRef}
              srcDoc={widgetHtml}
              style={{ opacity: iframeLoaded ? 1 : 0, transition: 'opacity 0.3s' }}
              onLoad={() => setTimeout(() => setIframeLoaded(true), 600)}
              sandbox="allow-scripts allow-same-origin allow-popups"
              loading="eager"
            />
          </div>

          <div className="chart-note">
            Chart shows % change comparison with {etfSym} (blue) vs {undSym || 'underlying'} (orange).
            TradingView may not expose formal total-return series for every symbol.
            Use the dividend adjustment panel below for explicit period dividend impact.
          </div>

          <div className="chart-stats">
            <div className="chart-stat">
              <div className="cs-label">{etfSym} Dividends ({activeTf.label})</div>
              <div className="cs-value">{Number.isFinite(etfDivTotal) ? fmtUsd(etfDivTotal) : '—'}</div>
              <div className="cs-sub">{Number.isFinite(etfDivYield) ? `${fmt(etfDivYield)} of start px` : etfWindowDates}</div>
            </div>
            <div className="chart-stat">
              <div className="cs-label">{undSym || 'Underlying'} Dividends ({activeTf.label})</div>
              <div className="cs-value">{Number.isFinite(undDivTotal) ? fmtUsd(undDivTotal) : '—'}</div>
              <div className="cs-sub">{Number.isFinite(undDivYield) ? `${fmt(undDivYield)} of start px` : undWindowDates}</div>
            </div>
            <div className="chart-stat">
              <div className="cs-label">{etfSym} Price vs Adj Return</div>
              <div className="cs-value">{Number.isFinite(etfLivePriceRet) ? fmt(etfLivePriceRet) : '—'} / {Number.isFinite(etfAdjRetDisplay) ? fmt(etfAdjRetDisplay) : '—'}</div>
              <div className="cs-sub">live spot vs start px • dividend lift: {etfDivLift == null ? '—' : fmt(etfDivLift)}</div>
            </div>
            <div className="chart-stat">
              <div className="cs-label">{undSym || 'Underlying'} Price vs Adj Return</div>
              <div className="cs-value">{Number.isFinite(undLivePriceRet) ? fmt(undLivePriceRet) : '—'} / {Number.isFinite(undAdjRetDisplay) ? fmt(undAdjRetDisplay) : '—'}</div>
              <div className="cs-sub">live spot vs start px • dividend lift: {undDivLift == null ? '—' : fmt(undDivLift)}</div>
            </div>
          </div>
        </div>
      )}

      {activePanel === 'stats' && (
        <div className="chart-section">
          {/* Stats Grid */}
          <div className="chart-stats" style={{ marginTop: 0 }}>
            <div className="chart-stat">
              <div className="cs-label">Beta</div>
              <div className="cs-value">{r.beta?.toFixed(3) ?? '—'}</div>
              <div className="cs-sub">{fmtNum(r.beta_n_obs)} obs</div>
            </div>

const fmtCategoryLabel = (cat) => {
  const hit = NEWS_CATEGORIES.find(c => c.key === cat);
  return hit ? hit.label : (cat || 'Other').replace(/_/g, ' ');
};

const fmtRelativeTime = (iso) => {
  if (!iso) return '—';
  const then = new Date(iso).getTime();
  if (!Number.isFinite(then)) return '—';
  const now = Date.now();
  const diffMs = now - then;
  if (diffMs < 0) return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  const min = Math.floor(diffMs / 60000);
  if (min < 1) return 'just now';
  if (min < 60) return `${min}m ago`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}h ago`;
  const day = Math.floor(hr / 24);
  if (day < 14) return `${day}d ago`;
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
};

const fmtEventDate = (iso) => {
  if (!iso) return '—';
  const d = new Date(iso + (iso.length === 10 ? 'T00:00:00Z' : ''));
  if (!Number.isFinite(d.getTime())) return iso;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
};

const corporateEventMs = (ev) => {
  const dateStr = ev?.execution_date || ev?.announcement_date;
  if (!dateStr) return 0;
  const s = String(dateStr);
  const t = new Date(s.length === 10 ? `${s}T00:00:00Z` : s).getTime();
  return Number.isFinite(t) ? t : 0;
};

function NewsTickerChip({ symbol, bucketOf, onNavigate }) {

  const isSymbolChange = cat === 'symbol_change';
  const isSplit = cat === 'reverse_split' || cat === 'forward_split';
  const isPending = event.status === 'pending';
  // For symbol_change events, show the full rename chain (old → new) so users
  // immediately see the redirect (e.g. BITF → KEEL) without hunting for it in

  const tickers = isSymbolChange && event.prior_ticker

  return (
    <div
      className={cls('pinned-card', `cat-${cat}`, isPending && 'pinned-card-pending')}

      <div className="pinned-card-foot">
        <span>

function NewsPage({
  eventsPayload,
  newsPayload,
  loadError,
  bucketOf,
  onNavigateToChart,
}) {
  const events = useMemo(() => eventsPayload?.events || [], [eventsPayload]);
  const items = useMemo(() => newsPayload?.items || [], [newsPayload]);

  const [category, setCategory] = useState('all');
  // Default to full window: corporate-action headlines are sparse (especially on free-tier
  // Polygon), and most split events are older than 30 days — a narrow default hid them all.
  const [windowKey, setWindowKey] = useState('all');
  const [sortKey, setSortKey] = useState('published_desc');
  const [search, setSearch] = useState('');
  const [onlyHighConfidence, setOnlyHighConfidence] = useState(true);
  const [hideInferredOnly, setHideInferredOnly] = useState(true);
  const [groupByTickerCategory, setGroupByTickerCategory] = useState(true);
  const [expandedGroups, setExpandedGroups] = useState({});

  const activeWindow = NEWS_TIME_WINDOWS.find(w => w.key === windowKey) || NEWS_TIME_WINDOWS[3];
  const cutoffMs = activeWindow.days == null ? -Infinity : Date.now() - activeWindow.days * 86400_000;

  const eventsById = useMemo(() => {
    const m = {};
    events.forEach(e => { if (e.id) m[e.id] = e; });
    return m;
  }, [events]);

  // Structured events (splits, delistings, …) share the same category + time window as
  // headlines so historical splits are visible when Window = All available.
  const { structuredMatchCount, filteredStructuredEvents } = useMemo(() => {
    let out = events.filter(ev => (category === 'all' ? true : ev.type === category));
    if (activeWindow.days != null) {
      out = out.filter(ev => corporateEventMs(ev) >= cutoffMs);
    }
    const matchCount = out.length;
    out.sort((a, b) => corporateEventMs(b) - corporateEventMs(a));
    return { structuredMatchCount: matchCount, filteredStructuredEvents: out.slice(0, 100) };
  }, [events, category, windowKey, activeWindow.days, cutoffMs]);

  const filteredItems = useMemo(() => {
    const s = (search || '').trim().toLowerCase();
    let out = items.filter(it => {
      if (category !== 'all' && it.category !== category) return false;
      if (activeWindow.days != null) {
        const t = it.published_utc ? new Date(it.published_utc).getTime() : 0;
        if (!Number.isFinite(t) || t < cutoffMs) return false;
      }
      if (s) {
        const hay = `${it.title || ''} ${it.summary || ''} ${(it.tickers || []).join(' ')}`.toLowerCase();
        if (!hay.includes(s)) return false;
      }
      if (onlyHighConfidence && Number.isFinite(it.confidence) && Number(it.confidence) < 0.8) return false;
      if (hideInferredOnly && (it.match_tier || '') === 'inferred') return false;
      return true;
    });

    const priorityOf = (c) => (NEWS_CATEGORIES.find(nc => nc.key === c)?.priority ?? 0);
    const pubMs = (iso) => (iso ? new Date(iso).getTime() : 0);
    out.sort((a, b) => {
      switch (sortKey) {
        case 'published_asc':  return pubMs(a.published_utc) - pubMs(b.published_utc);
        case 'priority':
          return (priorityOf(b.category) - priorityOf(a.category))
              || (pubMs(b.published_utc) - pubMs(a.published_utc));
        case 'ticker':
          return ((a.tickers?.[0] || '').localeCompare(b.tickers?.[0] || ''))
              || (pubMs(b.published_utc) - pubMs(a.published_utc));
        case 'published_desc':
        default:               return pubMs(b.published_utc) - pubMs(a.published_utc);
      }
    });
    return out;
  }, [items, category, windowKey, sortKey, search, onlyHighConfidence, hideInferredOnly]);

  const groupedHeadlines = useMemo(() => {
    const groups = {};
    for (const it of filteredItems) {
      const ticker = (it.tickers?.[0] || '').toUpperCase();
      const cat = it.category || 'other';
      const key = `${cat}::${ticker || 'UNKNOWN'}`;
      if (!groups[key]) groups[key] = { key, category: cat, ticker, items: [] };
      groups[key].items.push(it);
    }
    const rankTier = (t) => ({ explicit: 3, high: 2, inferred: 1 }[t] || 0);
    const pubMs = (iso) => (iso ? new Date(iso).getTime() : 0);
    const out = Object.values(groups).map(g => {
      g.items.sort((a, b) => pubMs(b.published_utc) - pubMs(a.published_utc));
      g.primary = [...g.items].sort((a, b) => (
        (rankTier(b.match_tier) - rankTier(a.match_tier))
        || ((Number(b.confidence) || 0) - (Number(a.confidence) || 0))
        || (pubMs(b.published_utc) - pubMs(a.published_utc))
      ))[0] || g.items[0];
      g.sourceCount = g.items.reduce((acc, it) => acc + (Number(it.source_count) > 0 ? Number(it.source_count) : 1), 0);
      g.publishers = Array.from(new Set(g.items.flatMap(it => it.source_publishers || (it.publisher ? [it.publisher] : []))));
      return g;
    });
    out.sort((a, b) => pubMs(b.primary?.published_utc) - pubMs(a.primary?.published_utc));
    return out;
  }, [filteredItems]);

  // Chip counts reflect everything the page actually renders for that category:
  // structured corporate-action events + classified news headlines.  The old
  // version counted only `items`, so e.g. "Reverse Split 1" was shown while the
  // page simultaneously listed 87 structured reverse-split events below the
  // chip — a confusing "count doesn't match what I see" discrepancy.
  const categoryCounts = useMemo(() => {
    const c = { all: events.length + items.length };
    events.forEach(ev => {
      const k = ev.type || 'other';
      c[k] = (c[k] || 0) + 1;
    });
    items.forEach(it => {
      const k = it.category || 'other';
      c[k] = (c[k] || 0) + 1;
    });
    return c;
  }, [events, items]);

  const buildTime = eventsPayload?.build_time || newsPayload?.build_time;
  const isSeed = !buildTime || buildTime.startsWith('1970');
  const hasAnyData = (events.length + items.length) > 0;

  return (
    <div className="news-page">
      <div className="news-header">
        <div>
          <div className="news-title">
            <span className="news-title-accent" />
            News & Corporate Actions
          </div>
          <div className="news-subtitle">
            Splits · Reverse splits · Delistings · Symbol changes · Mergers — across all tracked ETFs
          </div>
        </div>
        <div className="news-meta">
          {buildTime && !isSeed && <span>Last refresh <b>{fmtRelativeTime(buildTime)}</b></span>}
          <span>Events <b>{events.length}</b></span>
          <span>
            Headlines <b>{filteredItems.length}</b> shown
            {filteredItems.length !== items.length && (
              <span> · {items.length} loaded</span>
            )}
          </span>
        </div>
      </div>

      {loadError && (
        <div className="news-error-banner">
          Failed to load news data: {loadError}. The scheduled workflow populates{' '}
          <code>data/corporate_actions.json</code> and <code>data/etf_news.json</code> every 6 hours.
        </div>
      )}

      {/* Toolbar */}
      <div className="news-toolbar">
        <div className="news-chips">
          {NEWS_CATEGORIES.map(c => (
            <div
              key={c.key}
              className={cls('news-chip', category === c.key && 'active', c.key !== 'all' && `cat-${c.key}`)}
              onClick={() => setCategory(c.key)}
            >
              {c.label}
              <span className="count">{categoryCounts[c.key] ?? 0}</span>
            </div>
          ))}
        </div>
        <div className="news-toolbar-divider" />
        <span className="news-toolbar-label">Window</span>
        <select
          className="news-select"
          value={windowKey}
          onChange={e => setWindowKey(e.target.value)}
        >
          {NEWS_TIME_WINDOWS.map(w => (
            <option key={w.key} value={w.key}>{w.label}</option>
          ))}
        </select>
        <div className="news-toolbar-right">
          <span className="news-toolbar-label">Sort</span>
          <select
            className="news-select"
            value={sortKey}
            onChange={e => setSortKey(e.target.value)}
          >
            {NEWS_SORTS.map(s => (
              <option key={s.key} value={s.key}>{s.label}</option>
            ))}
          </select>
          <input
            className="news-search"
            placeholder="Search title, summary, ticker…"
            value={search}
            onChange={e => setSearch(e.target.value)}
          />
        </div>
      </div>
      <div className="news-toggles">
        <div
          className={cls('news-toggle', onlyHighConfidence && 'active')}
          onClick={() => setOnlyHighConfidence(v => !v)}
        >
          {onlyHighConfidence ? '[x]' : '[ ]'} Only high confidence
        </div>
        <div
          className={cls('news-toggle', hideInferredOnly && 'active')}
          onClick={() => setHideInferredOnly(v => !v)}
        >
          {hideInferredOnly ? '[x]' : '[ ]'} Hide inferred-only
        </div>
        <div
          className={cls('news-toggle', groupByTickerCategory && 'active')}
          onClick={() => setGroupByTickerCategory(v => !v)}
        >
          {groupByTickerCategory ? '[x]' : '[ ]'} One row per ticker/category
        </div>
      </div>

      {/* Structured corporate actions (splits, delistings, …) */}
      {filteredStructuredEvents.length > 0 && (
        <div className="pinned-section">
          <div className="pinned-section-title">
            Structured corporate actions · {filteredStructuredEvents.length}
            {structuredMatchCount > filteredStructuredEvents.length
              ? ` of ${structuredMatchCount} (newest 100)`
              : ''}
          </div>
          <div className="pinned-grid">
            {filteredStructuredEvents.map(ev => (
              <PinnedEventCard
                key={ev.id}
                event={ev}
                bucketOf={bucketOf}
                onNavigate={onNavigateToChart}
              />
            ))}
          </div>
        </div>
      )}
      {filteredStructuredEvents.length === 0 && events.length > 0 && (
        <div className="news-empty" style={{ marginBottom: 18, padding: '22px 18px' }}>
          <div className="news-empty-title">{events.length} structured events loaded</div>
          <div>
            None match the current category + time window. Try <b>All</b> categories and set
            Window to <b>All available</b> to see historical splits (most execution dates are
            older than 30–60 days).
          </div>
        </div>
      )}

      {/* News feed */}
      <div className="news-feed-title">
        Related Headlines · {groupByTickerCategory ? groupedHeadlines.length : filteredItems.length} of {items.length}
      </div>
      {(groupByTickerCategory ? groupedHeadlines.length === 0 : filteredItems.length === 0) ? (
        <div className="news-empty">
          <div className="news-empty-icon">◉</div>
          <div className="news-empty-title">
            {isSeed && !hasAnyData
              ? 'No data yet — first scheduled refresh pending'
              : 'No matching news in this window'}
          </div>
          <div>
            {isSeed && !hasAnyData
              ? 'The GitHub Actions workflow update-corporate-actions.yml runs every 6 hours and will populate this feed.'
              : 'Try widening the time window, clearing the search, or switching to All categories.'}
          </div>
        </div>
      ) : (
        groupByTickerCategory ? (
          <div className="news-group-list">
            {groupedHeadlines.map(g => {
              const primary = g.primary || g.items[0];
              const exp = !!expandedGroups[g.key];
              return (
                <div key={g.key} className="news-group">
                  <div
                    className="news-group-head"
                    onClick={() => setExpandedGroups(prev => ({ ...prev, [g.key]: !prev[g.key] }))}
                  >
                    <div className="news-group-main">
                      <div className="news-group-title">
                        <span className={cls('cat-badge', `cat-${g.category || 'other'}`)}>{fmtCategoryLabel(g.category)}</span>
                        {g.ticker && <NewsTickerChip symbol={g.ticker} bucketOf={bucketOf} onNavigate={onNavigateToChart} />}
                        {primary?.match_tier && (
                          <span className={cls('tier-badge', `tier-${primary.match_tier}`)} style={{ display: 'inline-flex' }}>
                            {primary.match_tier}
                          </span>
                        )}
                      </div>
                      <div className="news-group-meta">
                        <span>{fmtRelativeTime(primary?.published_utc)}</span>
                        <span>conf {Math.round((Number(primary?.confidence) || 0) * 100)}%</span>
                        <span title={(g.publishers || []).join(', ')}>{g.sourceCount} sources</span>
                      </div>
                    </div>
                    <div className="news-group-count">{g.items.length} article{g.items.length === 1 ? '' : 's'} {exp ? 'v' : '>'}</div>
                  </div>
                  {exp && (
                    <div className="news-group-links">
                      {g.items.map(it => (
                        <a
                          key={it.id}
                          className="news-group-link"
                          href={it.url || '#'}
                          target="_blank"
                          rel="noopener noreferrer"
                          onClick={e => { if (!it.url) e.preventDefault(); }}
                        >
                          <span>{it.title || '(no title)'}</span>
                          <span>{fmtRelativeTime(it.published_utc)}</span>
                        </a>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        ) : (
          <div className="news-feed">
            {filteredItems.map(it => (
              <NewsCard
                key={it.id}
                item={it}
                bucketOf={bucketOf}
                onNavigate={onNavigateToChart}
                eventsById={eventsById}
              />
            ))}
          </div>
        )
      )}
    </div>
  );
}

// ── Main App ────────────────────────────────
function App({ authUser = null, onLogout = null, authEnabled = false } = {}) {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(true);
  const [activeTab, setActiveTab] = useState('all');
  const [search, setSearch] = useState('');
  const [sortKey, setSortKey] = useState('net_decay');
  const [sortDesc, setSortDesc] = useState(true);
  const [expandedSym, setExpandedSym] = useState(null);
  const [showInfo, setShowInfo] = useState(false);
  const [showNews, setShowNews] = useState(false);
  const [chartRecord, setChartRecord] = useState(null);
  const [corporateActions, setCorporateActions] = useState(null);
  const [etfNews, setEtfNews] = useState(null);
  const [newsError, setNewsError] = useState(null);

  useEffect(() => {
    const cacheBust = `?t=${Math.floor(Date.now() / 60000)}`;
    fetch(DATA_URL + cacheBust)
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(d => { setData(d); setLoading(false); })
      .catch(e => { setError(e.message); setLoading(false); });
  }, []);

  // Corporate actions + news: refetch whenever the News tab opens so we never keep an
  // empty first-load stuck in memory after GitHub Actions commits new JSON.  No
  // module-level cache — each open uses a fresh cache-bust (GitHub Pages can be
  // sticky on static assets otherwise).
  useEffect(() => {
    if (!showNews) return undefined;
    let cancelled = false;
    setNewsError(null);
    const cacheBust = `?t=${Date.now()}`;
    const fetchJson = async (url) => {
      const res = await fetch(`${url}${cacheBust}`, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
      return res.json();
    };
    (async () => {
      try {
        const [ca, nw] = await Promise.all([
          fetchJson(CORPORATE_ACTIONS_URL),
          fetchJson(ETF_NEWS_URL),
        ]);
        if (cancelled) return;
        setCorporateActions(ca);
        setEtfNews(nw);
      } catch (e) {
        if (!cancelled) setNewsError(e?.message || 'News data unavailable');
      }
    })();
    return () => { cancelled = true; };
  }, [showNews]);

  // Hash-based routing for chart + news pages.
  useEffect(() => {
    const handleHash = () => {
      const hash = window.location.hash;
      if (hash.startsWith('#/chart/') && data) {
        const sym = decodeURIComponent(hash.slice(8)).toUpperCase();
        const rec = (data.records || []).find(r => r.symbol === sym);
        if (rec) {
          setChartRecord(rec);
          setShowInfo(false);
          setShowNews(false);
          return;
        }
      }
      if (hash === '#/news') {
        setChartRecord(null);
        setShowInfo(false);
        setShowNews(true);
        return;
      }
      setChartRecord(null);
      setShowNews(false);
    };
    handleHash();
    window.addEventListener('hashchange', handleHash);
    return () => window.removeEventListener('hashchange', handleHash);
  }, [data]);

  const navigateToChart = useCallback((recordOrSymbol) => {
    const sym = typeof recordOrSymbol === 'string'
      ? recordOrSymbol
      : (recordOrSymbol?.symbol || '');
    if (!sym) return;
    window.location.hash = `/chart/${encodeURIComponent(String(sym).toUpperCase())}`;
  }, []);

  const navigateToNews = useCallback(() => {
    window.location.hash = '/news';
  }, []);

  const navigateBack = useCallback(() => {
    window.location.hash = '';
  }, []);

  // Stable lookup: symbol -> bucket, for coloring ticker chips in the News tab.
  const bucketOf = useCallback((sym) => {
    if (!sym || !data?.records) return null;
    const hit = data.records.find(r => r.symbol === sym.toUpperCase());
    return hit?.bucket || null;
  }, [data]);

  const records = data?.records || [];
  const summary = data?.summary || {};
  const freshness = useMemo(() => getFreshness(data), [data]);

  const bucketMap = {
    all: null,
    bucket_1: 'bucket_1_high_beta',
    bucket_2: 'bucket_2_low_beta',
    bucket_3: 'bucket_3_inverse',
  };

  const filtered = useMemo(() => {
    let d = [...records];
    const bf = bucketMap[activeTab];
    if (bf) d = d.filter(r => r.bucket === bf);
    if (search) {
      const s = search.toUpperCase();
      d = d.filter(r => r.symbol.includes(s) || r.underlying.includes(s));
    }
    d.sort((a, b) => {
      let av = a[sortKey], bv = b[sortKey];
      if (av == null) av = sortDesc ? -Infinity : Infinity;
      if (bv == null) bv = sortDesc ? -Infinity : Infinity;
      if (typeof av === 'string') return sortDesc ? bv.localeCompare(av) : av.localeCompare(bv);
      if (typeof av === 'boolean') { av = av ? 1 : 0; bv = bv ? 1 : 0; }
      return sortDesc ? bv - av : av - bv;
    });
    return d;
  }, [records, activeTab, search, sortKey, sortDesc]);

  const tabCounts = useMemo(() => {
    const c = { all: records.length, bucket_1: 0, bucket_2: 0, bucket_3: 0 };
    records.forEach(r => {
      if (r.bucket === 'bucket_1_high_beta') c.bucket_1++;
      if (r.bucket === 'bucket_2_low_beta') c.bucket_2++;
      if (r.bucket === 'bucket_3_inverse') c.bucket_3++;
    });
    return c;
  }, [records]);

  const handleSort = key => {
    if (sortKey === key) setSortDesc(d => !d);
    else { setSortKey(key); setSortDesc(true); }
  };

  if (loading) return <div className="app"><div className="loading"><div className="spinner"/>Loading dashboard data…</div></div>;
  if (error) return <div className="app"><div className="error-banner">Failed to load data: {error}. Make sure <code>data/dashboard_data.json</code> exists. Run <code>python scripts/build_data.py</code> to generate it.</div></div>;

  return (
    <div className="app">
      {/* ── Topbar ──────── */}
      <div className="topbar">
        <div className="topbar-left">
          <div className="topbar-logo" onClick={() => { navigateBack(); setShowInfo(false); }}>ETF BORROW DASH</div>
          <div className="topbar-meta">
            <span className={cls('dot', data.ibkr_ftp_success ? 'dot-green' : 'dot-amber')} />
            {data.ibkr_ftp_success ? 'IBKR Live' : 'CSV Data'}
            <span className={cls('fresh-badge', freshness.className)}>{freshness.label}</span>
            <span style={{ margin: '0 4px' }}>·</span>
            Built {fmtTime(data.build_time)}
            {data.last_commit && <>
              <span style={{ margin: '0 4px' }}>·</span>
              Screener: <a href={`https://github.com/${data.source_repo}/blob/${data.source_branch}/${data.source_path || 'data/etf_screened_today.csv'}`} target="_blank">{data.last_commit.sha}</a>
            </>}
          </div>
        </div>
        <div className="topbar-right">
          {authEnabled && authUser && (
            <>
              <span className="topbar-user" title={authUser}>{authUser}</span>
              <button type="button" className="topbar-btn" onClick={() => { onLogout && onLogout(); }}>
                Log out
              </button>
            </>
          )}
          <button
            className={cls('topbar-btn', showNews && !chartRecord && 'active')}
            onClick={() => { if (showNews) navigateBack(); else navigateToNews(); }}
          >
            ▦ News
          </button>
          <button className={cls('topbar-btn', showInfo && !chartRecord && !showNews && 'active')} onClick={() => { navigateBack(); setShowInfo(s => !s); }}>
            ◉ Info
          </button>
        </div>
      </div>

      {/* ── Chart Page ──────── */}
      {chartRecord ? (
        <ChartPage record={chartRecord} onBack={navigateBack} />
      ) : showNews ? (
        <NewsPage
          eventsPayload={corporateActions}
          newsPayload={etfNews}
          loadError={newsError}
          bucketOf={bucketOf}
          onNavigateToChart={navigateToChart}
        />
      ) : showInfo ? (
        <InfoPage data={data} />
      ) : (
        <>
          {/* ── Summary ──────── */}
          <div className="summary-strip">
            <SummaryCard label="Total Symbols" value={fmtNum(summary.total_symbols)} />
            <SummaryCard
              label="Best Net Decay"
              value={summary.best_net_decay?.[0] ? fmt(summary.best_net_decay[0].net_decay) : '—'}
              sub={summary.best_net_decay?.[0]?.symbol || ''}
              color="var(--positive)"
            />
            <SummaryCard
              label="Worst Borrow"
              value={summary.worst_borrows?.[0] ? fmt(summary.worst_borrows[0].borrow) : '—'}
              sub={summary.worst_borrows?.[0]?.symbol || ''}
              color="var(--negative)"
            />
            <SummaryCard label="IBKR FTP" value={data.ibkr_ftp_success ? `${data.ibkr_symbols_fetched}` : 'Offline'}
              sub={data.ibkr_ftp_success ? 'symbols live' : 'using CSV'}
              color={data.ibkr_ftp_success ? 'var(--positive)' : 'var(--warning)'}
            />
            <div className="summary-card">
              <div className="label">Top 5 Net Decay</div>
              <ul className="highlight-list">
                {(summary.best_net_decay || []).map(s => (
                  <li key={s.symbol}>
                    <span className="sym">{s.symbol}</span>
                    <span className="val-positive">{fmt(s.net_decay)}</span>
                  </li>
                ))}
              </ul>
            </div>
            <div className="summary-card">
              <div className="label">Top 5 Worst Borrows</div>
              <ul className="highlight-list">
                {(summary.worst_borrows || []).map(s => (
                  <li key={s.symbol}>
                    <span className="sym">{s.symbol}</span>
                    <span className="val-negative">{fmt(s.borrow)}</span>
                  </li>
                ))}
              </ul>
            </div>
          </div>

          <ExpectedDecayCalculator />

          {/* ── Tabs ──────────── */}
          <div className="tab-bar">
            {[
              { key: 'all', label: 'All ETFs' },
              { key: 'bucket_1', label: 'Bucket 1 — High β' },
              { key: 'bucket_2', label: 'Bucket 2 — Low β' },
              { key: 'bucket_3', label: 'Bucket 3 — Inverse' },
            ].map(t => (
              <div key={t.key} className={cls('tab', activeTab === t.key && 'active')}
                onClick={() => setActiveTab(t.key)}>
                {t.label}<span className="count">{tabCounts[t.key]}</span>
              </div>
            ))}
          </div>

          {/* ── Controls ──────── */}
          <div className="controls-bar">
            <div className="search-wrapper">
              <span className="search-icon">⌕</span>
              <input className="search-box" placeholder="Search symbol or underlying…"
                value={search} onChange={e => setSearch(e.target.value)} />
            </div>
            <span style={{ fontSize: 12, color: 'var(--text-muted)', fontFamily: "'JetBrains Mono', monospace" }}>
              {filtered.length} results
            </span>
          </div>

          <p style={{ padding: '0 24px 8px', margin: 0, fontSize: 11, color: 'var(--text-muted)', lineHeight: 1.45, maxWidth: 1100 }}>
            <strong style={{ color: 'var(--text-secondary)' }}>Decay / edge —</strong>{' '}
            <em>Gross (realized)</em> and <em>net (gross−borrow)</em> are screener points. <em>Exp. (Itô)</em> is the mechanical expectation.{' '}
            <em>Net edge p50 / p5–p95</em> = block bootstrap on daily log-drag (sampling uncertainty on net edge).{' '}
            β &lt; 0 → <strong>Bucket 3 (inverse)</strong> (no separate bucket 4).
            {data?.uncertainty_footnote && (
              <span> {data.uncertainty_footnote}</span>
            )}
          </p>

          {/* ── Table ─────────── */}
          <div className="table-container">
            <table className="etf-table">
              <thead>
                <tr>
                  <th style={{ width: 30 }}></th>
                  {COLS.map(col => (
                    <th key={col.key} style={{ width: col.w }}
                      className={sortKey === col.key ? 'sorted' : ''}
                      onClick={() => handleSort(col.key)}
                      title={col.hint || col.label}
                    >
                      {col.label}
                      {sortKey === col.key && <span className="sort-arrow">{sortDesc ? '▼' : '▲'}</span>}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map(r => {
                  const expanded = expandedSym === r.symbol;
                  return (
                    <React.Fragment key={r.symbol}>
                      <tr onClick={() => setExpandedSym(expanded ? null : r.symbol)}>
                        <td style={{ textAlign: 'center', fontSize: 10, color: 'var(--text-muted)' }}>
                          {expanded ? '▾' : '▸'}
                        </td>
                        <td>
                          <span className="sym-cell" onClick={e => { e.stopPropagation(); navigateToChart(r); }}>
                            {r.symbol}
                          </span>
                        </td>
                        <td className="underlying-cell">{r.underlying}</td>
                        <td>{r.beta?.toFixed(2) ?? '—'}</td>
                        <td className={borrowCls(getBorrowRate(r))}>
                          {fmt(getBorrowRate(r))} {borrowBadge(getBorrowRate(r))}
                        </td>
                        <td>{fmtNum(r.shares_available)}</td>
                        <td>{fmt(r.gross_decay_annual)}</td>
                        <td>{fmt(r.expected_gross_decay_annual)}</td>
                        <td className={spreadCls(r.net_decay)}>{fmt(r.net_decay)}</td>
                        <td className={spreadCls(r.net_edge_p50_annual)}>{r.net_edge_p50_annual != null ? fmt(r.net_edge_p50_annual) : '—'}</td>
                        <td style={{ fontSize: 11, color: 'var(--text-muted)' }} title={r.net_edge_fan_label || ''}>
                          {r.net_edge_p05_annual != null && r.net_edge_p95_annual != null
                            ? `${fmt(r.net_edge_p05_annual)} / ${fmt(r.net_edge_p95_annual)}`
                            : (r.net_edge_fan_label || '—')}
                        </td>
                        <td>{fmt(r.vol_underlying_annual)}</td>
                        <td>{fmt(r.vol_etf_annual)}</td>
                      </tr>
                      {expanded && <DetailRow r={r} />}
                    </React.Fragment>
                  );
                })}
                {filtered.length === 0 && (
                  <tr>
                    <td colSpan={COLS.length + 1} style={{
                      textAlign: 'center', padding: 40, color: 'var(--text-muted)', fontSize: 14,
                    }}>
                      No matching ETFs found.
                    </td>
                  </tr>
                )}
              </tbody>
            </table>
          </div>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<DashboardRoot />);
</script>
</body>
</html>
