function NewsPage({
  eventsPayload,
  newsPayload,
  loadError,
  bucketOf,
  onNavigateToChart,
}) {
  const events = useMemo(() => eventsPayload?.events || [], [eventsPayload]);
  const items = useMemo(() => newsPayload?.items || [], [newsPayload]);

  const [category, setCategory] = useState('all');
  // Default to full window: corporate-action headlines are sparse (especially on free-tier
  // Polygon), and most split events are older than 30 days — a narrow default hid them all.
  const [windowKey, setWindowKey] = useState('all');
  const [sortKey, setSortKey] = useState('published_desc');
  const [search, setSearch] = useState('');
  const [onlyHighConfidence, setOnlyHighConfidence] = useState(true);
  const [hideInferredOnly, setHideInferredOnly] = useState(true);
  const [groupByTickerCategory, setGroupByTickerCategory] = useState(true);
  const [expandedGroups, setExpandedGroups] = useState({});

  const activeWindow = NEWS_TIME_WINDOWS.find(w => w.key === windowKey) || NEWS_TIME_WINDOWS[3];
  const cutoffMs = activeWindow.days == null ? -Infinity : Date.now() - activeWindow.days * 86400_000;

  const eventsById = useMemo(() => {
    const m = {};
    events.forEach(e => { if (e.id) m[e.id] = e; });
    return m;
  }, [events]);

  // Structured events (splits, delistings, …) share the same category + time window as
  // headlines so historical splits are visible when Window = All available.
  const { structuredMatchCount, filteredStructuredEvents } = useMemo(() => {
    let out = events.filter(ev => (category === 'all' ? true : ev.type === category));
    if (activeWindow.days != null) {
      out = out.filter(ev => corporateEventMs(ev) >= cutoffMs);
    }
    const matchCount = out.length;
    out.sort((a, b) => corporateEventMs(b) - corporateEventMs(a));
    return { structuredMatchCount: matchCount, filteredStructuredEvents: out.slice(0, 100) };
  }, [events, category, windowKey, activeWindow.days, cutoffMs]);

  const filteredItems = useMemo(() => {
    const s = (search || '').trim().toLowerCase();
    let out = items.filter(it => {
      if (category !== 'all' && it.category !== category) return false;
      if (activeWindow.days != null) {
        const t = it.published_utc ? new Date(it.published_utc).getTime() : 0;
        if (!Number.isFinite(t) || t < cutoffMs) return false;
      }
      if (s) {
        const hay = `${it.title || ''} ${it.summary || ''} ${(it.tickers || []).join(' ')}`.toLowerCase();
        if (!hay.includes(s)) return false;
      }
      if (onlyHighConfidence && Number.isFinite(it.confidence) && Number(it.confidence) < 0.8) return false;
      if (hideInferredOnly && (it.match_tier || '') === 'inferred') return false;
      return true;
    });

    const priorityOf = (c) => (NEWS_CATEGORIES.find(nc => nc.key === c)?.priority ?? 0);
    const pubMs = (iso) => (iso ? new Date(iso).getTime() : 0);
    out.sort((a, b) => {
      switch (sortKey) {
        case 'published_asc':  return pubMs(a.published_utc) - pubMs(b.published_utc);
        case 'priority':
          return (priorityOf(b.category) - priorityOf(a.category))
              || (pubMs(b.published_utc) - pubMs(a.published_utc));
        case 'ticker':
          return ((a.tickers?.[0] || '').localeCompare(b.tickers?.[0] || ''))
              || (pubMs(b.published_utc) - pubMs(a.published_utc));
        case 'published_desc':
        default:               return pubMs(b.published_utc) - pubMs(a.published_utc);
      }
    });
    return out;
  }, [items, category, windowKey, sortKey, search, onlyHighConfidence, hideInferredOnly]);

  const groupedHeadlines = useMemo(() => {
    const groups = {};
    for (const it of filteredItems) {
      const ticker = (it.tickers?.[0] || '').toUpperCase();
      const cat = it.category || 'other';
      const key = `${cat}::${ticker || 'UNKNOWN'}`;
      if (!groups[key]) groups[key] = { key, category: cat, ticker, items: [] };
      groups[key].items.push(it);
    }
    const rankTier = (t) => ({ explicit: 3, high: 2, inferred: 1 }[t] || 0);
    const pubMs = (iso) => (iso ? new Date(iso).getTime() : 0);
    const out = Object.values(groups).map(g => {
      g.items.sort((a, b) => pubMs(b.published_utc) - pubMs(a.published_utc));
      g.primary = [...g.items].sort((a, b) => (
        (rankTier(b.match_tier) - rankTier(a.match_tier))
        || ((Number(b.confidence) || 0) - (Number(a.confidence) || 0))
        || (pubMs(b.published_utc) - pubMs(a.published_utc))
      ))[0] || g.items[0];
      g.sourceCount = g.items.reduce((acc, it) => acc + (Number(it.source_count) > 0 ? Number(it.source_count) : 1), 0);
      g.publishers = Array.from(new Set(g.items.flatMap(it => it.source_publishers || (it.publisher ? [it.publisher] : []))));
      return g;
    });
    out.sort((a, b) => pubMs(b.primary?.published_utc) - pubMs(a.primary?.published_utc));
    return out;
  }, [filteredItems]);

  // Chip counts reflect everything the page actually renders for that category:
  // structured corporate-action events + classified news headlines.  The old
  // version counted only `items`, so e.g. "Reverse Split 1" was shown while the
  // page simultaneously listed 87 structured reverse-split events below the
  // chip — a confusing "count doesn't match what I see" discrepancy.
  const categoryCounts = useMemo(() => {
    const c = { all: events.length + items.length };
    events.forEach(ev => {
      const k = ev.type || 'other';
      c[k] = (c[k] || 0) + 1;
    });
    items.forEach(it => {
      const k = it.category || 'other';
      c[k] = (c[k] || 0) + 1;
    });
    return c;
  }, [events, items]);

  const buildTime = eventsPayload?.build_time || newsPayload?.build_time;
  const isSeed = !buildTime || buildTime.startsWith('1970');
  const hasAnyData = (events.length + items.length) > 0;

  return (
    <div className="news-page">
      <div className="news-header">
        <div>
          <div className="news-title">
            <span className="news-title-accent" />
            News & Corporate Actions
          </div>
          <div className="news-subtitle">
            Splits, delists, ticker changes, M&A — all tracked ETFs
          </div>
        </div>
        <div className="news-meta">
          {buildTime && !isSeed && <span>Last refresh <b>{fmtRelativeTime(buildTime)}</b></span>}
          <span>Events <b>{events.length}</b></span>
          <span>
            Headlines <b>{filteredItems.length}</b> shown
            {filteredItems.length !== items.length && (
              <span> · {items.length} loaded</span>
            )}
          </span>
        </div>
      </div>

      {loadError && (
        <div className="news-error-banner">
          {loadError}. Workflow fills <code>data/corporate_actions.json</code> + <code>data/etf_news.json</code> every 6h.
        </div>
      )}

      {/* Toolbar */}
      <div className="news-toolbar">
        <div className="news-chips">
          {NEWS_CATEGORIES.map(c => (
            <div
              key={c.key}
              className={cls('news-chip', category === c.key && 'active', c.key !== 'all' && `cat-${c.key}`)}
              onClick={() => setCategory(c.key)}
            >
              {c.label}
              <span className="count">{categoryCounts[c.key] ?? 0}</span>
            </div>
          ))}
        </div>
        <div className="news-toolbar-divider" />
        <span className="news-toolbar-label">Window</span>
        <select
          className="news-select"
          value={windowKey}
          onChange={e => setWindowKey(e.target.value)}
        >
          {NEWS_TIME_WINDOWS.map(w => (
            <option key={w.key} value={w.key}>{w.label}</option>
          ))}
        </select>
        <div className="news-toolbar-right">
          <span className="news-toolbar-label">Sort</span>
          <select
            className="news-select"
            value={sortKey}
            onChange={e => setSortKey(e.target.value)}
          >
            {NEWS_SORTS.map(s => (
              <option key={s.key} value={s.key}>{s.label}</option>
            ))}
          </select>
          <input
            className="news-search"
            placeholder="Search title, summary, ticker…"
            value={search}
            onChange={e => setSearch(e.target.value)}
          />
        </div>
      </div>
      <div className="news-toggles">
        <div
          className={cls('news-toggle', onlyHighConfidence && 'active')}
          onClick={() => setOnlyHighConfidence(v => !v)}
        >
          {onlyHighConfidence ? '[x]' : '[ ]'} Conf ≥ 80%
        </div>
        <div
          className={cls('news-toggle', hideInferredOnly && 'active')}
          onClick={() => setHideInferredOnly(v => !v)}
        >
          {hideInferredOnly ? '[x]' : '[ ]'} Hide inferred tier
        </div>
        <div
          className={cls('news-toggle', groupByTickerCategory && 'active')}
          onClick={() => setGroupByTickerCategory(v => !v)}
        >
          {groupByTickerCategory ? '[x]' : '[ ]'} Group by ticker + category
        </div>
      </div>

      {/* Structured corporate actions (splits, delistings, …) */}
      {filteredStructuredEvents.length > 0 && (
        <div className="pinned-section">
          <div className="pinned-section-title">
            Structured corporate actions · {filteredStructuredEvents.length}
            {structuredMatchCount > filteredStructuredEvents.length
              ? ` of ${structuredMatchCount} (newest 100)`
              : ''}
          </div>
          <div className="pinned-grid">
            {filteredStructuredEvents.map(ev => (
              <PinnedEventCard
                key={ev.id}
                event={ev}
                bucketOf={bucketOf}
                onNavigate={onNavigateToChart}
              />
            ))}
          </div>
        </div>
      )}
      {filteredStructuredEvents.length === 0 && events.length > 0 && (
        <div className="news-empty" style={{ marginBottom: 18, padding: '22px 18px' }}>
          <div className="news-empty-title">{events.length} structured events loaded</div>
          <div>
            Widen filters: category <b>All</b>, window <b>All available</b> — most splits are older than 30–60d.
          </div>
        </div>
      )}

      {/* News feed */}
      <div className="news-feed-title">
        Related Headlines · {groupByTickerCategory ? groupedHeadlines.length : filteredItems.length} of {items.length}
      </div>
      {(groupByTickerCategory ? groupedHeadlines.length === 0 : filteredItems.length === 0) ? (
        <div className="news-empty">
          <div className="news-empty-icon">◉</div>
          <div className="news-empty-title">
            {isSeed && !hasAnyData
              ? 'No data yet — first scheduled refresh pending'
              : 'No matching news in this window'}
          </div>
          <div>
            {isSeed && !hasAnyData
              ? 'Workflow `update-corporate-actions.yml` runs every 6h — first payload pending.'
              : 'Widen window, clear search, or pick All categories.'}
          </div>
        </div>
      ) : (
        groupByTickerCategory ? (
          <div className="news-group-list">
            {groupedHeadlines.map(g => {
              const primary = g.primary || g.items[0];
              const exp = !!expandedGroups[g.key];
              return (
                <div key={g.key} className="news-group">
                  <div
                    className="news-group-head"
                    onClick={() => setExpandedGroups(prev => ({ ...prev, [g.key]: !prev[g.key] }))}
                  >
                    <div className="news-group-main">
                      <div className="news-group-title">
                        <span className={cls('cat-badge', `cat-${g.category || 'other'}`)}>{fmtCategoryLabel(g.category)}</span>
                        {g.ticker && <NewsTickerChip symbol={g.ticker} bucketOf={bucketOf} onNavigate={onNavigateToChart} />}
                        {primary?.match_tier && (
                          <span className={cls('tier-badge', `tier-${primary.match_tier}`)} style={{ display: 'inline-flex' }} title="explicit = issuer text; high = model sure; inferred = weak match">
                            {primary.match_tier}
                          </span>
                        )}
                      </div>
                      <div className="news-group-meta">
                        <span>{fmtRelativeTime(primary?.published_utc)}</span>
                        <span>conf {Math.round((Number(primary?.confidence) || 0) * 100)}%</span>
                        <span title={(g.publishers || []).join(', ')}>{g.sourceCount} sources</span>
                      </div>
                    </div>
                    <div className="news-group-count">{g.items.length} article{g.items.length === 1 ? '' : 's'} {exp ? 'v' : '>'}</div>
                  </div>
                  {exp && (
                    <div className="news-group-links">
                      {g.items.map(it => (
                        <a
                          key={it.id}
                          className="news-group-link"
                          href={it.url || '#'}
                          target="_blank"
                          rel="noopener noreferrer"
                          onClick={e => { if (!it.url) e.preventDefault(); }}
                        >
                          <span>{it.title || '(no title)'}</span>
                          <span>{fmtRelativeTime(it.published_utc)}</span>
                        </a>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        ) : (
          <div className="news-feed">
            {filteredItems.map(it => (
              <NewsCard
                key={it.id}
                item={it}
                bucketOf={bucketOf}
                onNavigate={onNavigateToChart}
                eventsById={eventsById}
              />
            ))}
          </div>
        )
      )}
    </div>
  );
}

// ── Main App ────────────────────────────────
function App({ authUser = null, onLogout = null, authEnabled = false } = {}) {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(true);
  const [activeTab, setActiveTab] = useState('all');
  const [search, setSearch] = useState('');
  const [sortKey, setSortKey] = useState('net_edge_p50_annual');
  const [sortDesc, setSortDesc] = useState(true);
  const [expandedSym, setExpandedSym] = useState(null);
  const [showInfo, setShowInfo] = useState(false);
  const [showNews, setShowNews] = useState(false);
  const [chartRecord, setChartRecord] = useState(null);
  /** Persisted chart timeframe (TIMEFRAMES[].range); drives TradingView embed and realized-vol diagnostics. Scenarios/default Exp. ETF return use forecast_vol_underlying_annual. */
  const [chartVolLookbackRange, setChartVolLookbackRange] = useState(TIMEFRAMES[2].range);
  const [corporateActions, setCorporateActions] = useState(null);
  const [etfNews, setEtfNews] = useState(null);
  const [newsError, setNewsError] = useState(null);

  useEffect(() => {
    const cacheBust = `?t=${Math.floor(Date.now() / 60000)}`;
    fetch(DATA_URL + cacheBust)
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(d => { setData(d); setLoading(false); })
      .catch(e => { setError(e.message); setLoading(false); });
  }, []);

  // Corporate actions + news: refetch whenever the News tab opens so we never keep an
  // empty first-load stuck in memory after GitHub Actions commits new JSON.  No
  // module-level cache — each open uses a fresh cache-bust (GitHub Pages can be
  // sticky on static assets otherwise).
  useEffect(() => {
    if (!showNews) return undefined;
    let cancelled = false;
    setNewsError(null);
    const cacheBust = `?t=${Date.now()}`;
    const fetchJson = async (url) => {
      const res = await fetch(`${url}${cacheBust}`, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
      return res.json();
    };
    (async () => {
      try {
        const [ca, nw] = await Promise.all([
          fetchJson(CORPORATE_ACTIONS_URL),
          fetchJson(ETF_NEWS_URL),
        ]);
        if (cancelled) return;
        setCorporateActions(ca);
        setEtfNews(nw);
      } catch (e) {
        if (!cancelled) setNewsError(e?.message || 'News data unavailable');
      }
    })();
    return () => { cancelled = true; };
  }, [showNews]);

  // Hash-based routing for chart + news pages.
  useEffect(() => {
    const handleHash = () => {
      const hash = window.location.hash;
      if (hash.startsWith('#/chart/') && data) {
        const sym = decodeURIComponent(hash.slice(8)).toUpperCase();
        const rec = (data.records || []).find(r => r.symbol === sym);
        if (rec) {
          setChartRecord(rec);
          setShowInfo(false);
          setShowNews(false);
          return;
        }
      }
      if (hash === '#/news') {
        setChartRecord(null);
        setShowInfo(false);
        setShowNews(true);
        return;
      }
      setChartRecord(null);
      setShowNews(false);
    };
    handleHash();
    window.addEventListener('hashchange', handleHash);
    return () => window.removeEventListener('hashchange', handleHash);
  }, [data]);

  const navigateToChart = useCallback((recordOrSymbol) => {
    const sym = typeof recordOrSymbol === 'string'
      ? recordOrSymbol
      : (recordOrSymbol?.symbol || '');
    if (!sym) return;
    window.location.hash = `/chart/${encodeURIComponent(String(sym).toUpperCase())}`;
  }, []);

  const navigateToNews = useCallback(() => {
    window.location.hash = '/news';
  }, []);

  const navigateBack = useCallback(() => {
    window.location.hash = '';
  }, []);

  // Stable lookup: symbol -> bucket, for coloring ticker chips in the News tab.
  const bucketOf = useCallback((sym) => {
    if (!sym || !data?.records) return null;
    const hit = data.records.find(r => r.symbol === sym.toUpperCase());
    return hit?.bucket || null;
  }, [data]);

  const chartVolTfLabel = useMemo(
    () => (TIMEFRAMES.find(t => t.range === chartVolLookbackRange) || TIMEFRAMES[2]).label,
    [chartVolLookbackRange],
  );

  const records = data?.records || [];
  const summary = data?.summary || {};
  const freshness = useMemo(() => getFreshness(data), [data]);

  const bucketMap = {
    all: null,
    bucket_1: 'bucket_1_high_beta',
    bucket_2: 'bucket_2_low_beta',
    bucket_3: 'bucket_3_inverse',
  };

  const filtered = useMemo(() => {
    let d = [...records];
    const bf = bucketMap[activeTab];
    if (bf) d = d.filter(r => r.bucket === bf);
    if (search) {
      const s = search.toUpperCase();
      d = d.filter(r => r.symbol.includes(s) || r.underlying.includes(s));
    }
    d.sort((a, b) => {
      let av = sortKey === SCENARIO_ETF_3M_FLAT_SORT_KEY
        ? computeScenarioEtf3mFlatUnd(a, chartVolLookbackRange)
        : sortKey === 'expected_gross_decay_p50_annual' || sortKey === 'expected_gross_decay_annual'
        ? expectedDecayHeadlineValue(a)
        : a[sortKey];
      let bv = sortKey === SCENARIO_ETF_3M_FLAT_SORT_KEY
        ? computeScenarioEtf3mFlatUnd(b, chartVolLookbackRange)
        : sortKey === 'expected_gross_decay_p50_annual' || sortKey === 'expected_gross_decay_annual'
        ? expectedDecayHeadlineValue(b)
        : b[sortKey];
      if (av == null) av = sortDesc ? -Infinity : Infinity;
      if (bv == null) bv = sortDesc ? -Infinity : Infinity;
      if (typeof av === 'string') return sortDesc ? bv.localeCompare(av) : av.localeCompare(bv);
      if (typeof av === 'boolean') { av = av ? 1 : 0; bv = bv ? 1 : 0; }
      return sortDesc ? bv - av : av - bv;
    });
    return d;
  }, [records, activeTab, search, sortKey, sortDesc, chartVolLookbackRange]);

  const tabCounts = useMemo(() => {
    const c = { all: records.length, bucket_1: 0, bucket_2: 0, bucket_3: 0 };
    records.forEach(r => {
      if (r.bucket === 'bucket_1_high_beta') c.bucket_1++;
      if (r.bucket === 'bucket_2_low_beta') c.bucket_2++;
      if (r.bucket === 'bucket_3_inverse') c.bucket_3++;
    });
    return c;
  }, [records]);

  const handleSort = key => {
    if (sortKey === key) setSortDesc(d => !d);
    else { setSortKey(key); setSortDesc(true); }
  };

  if (loading) return <div className="app"><div className="loading"><div className="spinner"/>Loading dashboard data…</div></div>;
  if (error) return <div className="app"><div className="error-banner">Failed to load data: {error}. Make sure <code>data/dashboard_data.json</code> exists. Run <code>python scripts/build_data.py</code> to generate it.</div></div>;

  return (
    <div className="app">
      {/* ── Topbar ──────── */}
      <div className="topbar">
        <div className="topbar-left">
          <div className="topbar-logo" onClick={() => { navigateBack(); setShowInfo(false); }}>ETF BORROW DASH</div>
          <div className="topbar-meta">
            <span className={cls('dot', data.ibkr_ftp_success ? 'dot-green' : 'dot-amber')} />
            {data.ibkr_ftp_success ? 'IBKR Live' : 'CSV Data'}
            <span className={cls('fresh-badge', freshness.className)}>{freshness.label}</span>
            <span style={{ margin: '0 4px' }}>·</span>
            <span title={data.build_time ? `UTC: ${data.build_time}` : ''}>Built {fmtTime(data.build_time)}</span>
            {data.last_commit && <>
              <span style={{ margin: '0 4px' }}>·</span>
              Screener: <a href={`https://github.com/${data.source_repo}/blob/${data.source_branch}/${data.source_path || 'data/etf_screened_today.csv'}`} target="_blank">{data.last_commit.sha}</a>
            </>}
          </div>
        </div>
        <div className="topbar-right">
          {authEnabled && authUser && (
            <>
              <span className="topbar-user" title={authUser}>{authUser}</span>
              <button type="button" className="topbar-btn" onClick={() => { onLogout && onLogout(); }}>
                Log out
              </button>
            </>
          )}
          <button
            className={cls('topbar-btn', showNews && !chartRecord && 'active')}
            onClick={() => { if (showNews) navigateBack(); else navigateToNews(); }}
          >
            ▦ News
          </button>
          <button className={cls('topbar-btn', showInfo && !chartRecord && !showNews && 'active')} onClick={() => { navigateBack(); setShowInfo(s => !s); }}>
            ◉ Info
          </button>
        </div>
      </div>

      {/* ── Chart Page ──────── */}
      {chartRecord ? (
        <ChartPage
          record={chartRecord}
          onBack={navigateBack}
          chartVolLookbackRange={chartVolLookbackRange}
          setChartVolLookbackRange={setChartVolLookbackRange}
        />
      ) : showNews ? (
        <NewsPage
          eventsPayload={corporateActions}
          newsPayload={etfNews}
          loadError={newsError}
          bucketOf={bucketOf}
          onNavigateToChart={navigateToChart}
        />
      ) : showInfo ? (
        <InfoPage data={data} />
      ) : (
        <>
          {/* ── Summary ──────── */}
          <div className="summary-strip">
            <SummaryCard label="Total Symbols" value={fmtNum(summary.total_symbols)} />
            <SummaryCard
              label="Top realized net (gross − avg borrow)"
              value={summary.top_realized_net_vs_avg_borrow?.[0] ? fmt(summary.top_realized_net_vs_avg_borrow[0].realized_net_vs_avg_borrow) : '—'}
              sub={summary.top_realized_net_vs_avg_borrow?.[0]?.symbol || ''}
              color="var(--positive)"
            />
            <SummaryCard
              label="Top net edge (p50)"
              value={summary.top_net_edge?.[0] ? fmt(summary.top_net_edge[0].net_edge_p50_annual) : '—'}
              sub={summary.top_net_edge?.[0]?.symbol || ''}
              color="var(--positive)"
            />
            <SummaryCard label="IBKR FTP" value={data.ibkr_ftp_success ? `${data.ibkr_symbols_fetched}` : 'Offline'}
              sub={data.ibkr_ftp_success ? 'symbols live' : 'using CSV'}
              color={data.ibkr_ftp_success ? 'var(--positive)' : 'var(--warning)'}
            />
            <div className="summary-card">
              <div className="label">Top 5 realized net (gross − hist. borrow)</div>
              <ul className="highlight-list">
                {(summary.top_realized_net_vs_avg_borrow || []).map(s => (
                  <li key={s.symbol}>
                    <span className="sym">{s.symbol}</span>
                    <span className="val-positive">{fmt(s.realized_net_vs_avg_borrow)}</span>
                  </li>
                ))}
              </ul>
            </div>
            <div className="summary-card">
              <div className="label">Top 5 net edge (p50)</div>
              <ul className="highlight-list">
                {(summary.top_net_edge || []).map(s => (
                  <li key={s.symbol}>
                    <span className="sym">{s.symbol}</span>
                    <span className="val-positive">{fmt(s.net_edge_p50_annual)}</span>
                  </li>
                ))}
              </ul>
            </div>
          </div>

          <ExpectedDecayCalculator />

          {/* ── Tabs ──────────── */}
          <div className="tab-bar">
            {[
              { key: 'all', label: 'All ETFs' },
              { key: 'bucket_1', label: 'Bucket 1 — High β' },
              { key: 'bucket_2', label: 'Bucket 2 — Low β' },
              { key: 'bucket_3', label: 'Bucket 3 — Inverse' },
            ].map(t => (
              <div key={t.key} className={cls('tab', activeTab === t.key && 'active')}
                onClick={() => setActiveTab(t.key)}>
                {t.label}<span className="count">{tabCounts[t.key]}</span>
              </div>
            ))}
          </div>

          {/* ── Controls ──────── */}
          <div className="controls-bar">
            <div className="search-wrapper">
              <span className="search-icon">⌕</span>
              <input className="search-box" placeholder="Search symbol or underlying…"
                value={search} onChange={e => setSearch(e.target.value)} />
            </div>
            <span style={{ fontSize: 12, color: 'var(--text-muted)', fontFamily: "'JetBrains Mono', monospace" }}>
              {filtered.length} results
            </span>
          </div>

          <p style={{ padding: '0 24px 6px', margin: 0, fontSize: 11, color: 'var(--text-muted)', lineHeight: 1.45, maxWidth: 1100 }}>
            <strong style={{ color: 'var(--text-secondary)' }}>Short lens (annual, + better for a β-hedged short):</strong>{' '}
            <strong>Gross (realized)</strong> — trailing hedge drag from daily log returns (β·r<sub>U</sub> − r<sub>ETF</sub>), ×252.{' '}
            <strong>Exp. decay</strong> — forward <em>median</em> gross decay (distribution when data allow; YieldBOOST → weekly 95/88 put-spread on 2× sleeve; vol-ETPs add roll/tracking).{' '}
            <strong>Net edge</strong> — resample past gross paths and borrow, shift level to that forward median, then subtract borrow; dot = median, whisker = tail risk.{' '}
            <strong>LETF vol intuition:</strong>{' '}
            <span style={{ fontFamily: "'JetBrains Mono', monospace", color: 'var(--text-secondary)' }}>½·β·(β−1)·σ²·T</span> drag in log space (β from regression; σ = forecast for scenarios).
          </p>
          <p style={{ padding: '0 24px 8px', margin: 0, fontSize: 11, color: 'var(--text-muted)', lineHeight: 1.45, maxWidth: 1100 }}>
            <strong style={{ color: 'var(--text-secondary)' }}>Long lens (3M, different sign):</strong>{' '}
            <strong>Exp. ETF return</strong> — long <strong>total return</strong> if the underlying is flat, <strong>borrow excluded</strong>; income names add <strong>cash payouts</strong> on top of the NAV path (+ is good for longs, bad for naked shorts). Same forecast σ as Scenarios. Hover for 1M/6M. Passive low-β (non-income): <strong>—</strong>.{' '}
            <strong>Vol Und / Vol ETF</strong> — trailing <strong>realized</strong> σ (12M preferred); <em>not</em> the scenario σ above.
            {data?.uncertainty_footnote && (
              <span> {data.uncertainty_footnote}</span>
            )}
          </p>

          <details className="decay-methodology">
            <summary>Decay math — compact reference for the main columns</summary>
            <div className="dm-body">
              <div className="dm-block">
                <div className="dm-title">Sign convention &amp; column map</div>
                <p style={{ margin: '0 0 8px', lineHeight: 1.5 }}>
                  <strong>Gross (realized)</strong>, <strong>Exp. decay</strong>, <strong>Net edge</strong>: <em>short-favorable +</em> means more structural decay vs borrow for a β-hedged short (before your execution costs).
                  <br /><br />
                  <strong>Exp. ETF return (3M)</strong>: <em>long</em> total return (NAV path <strong>+</strong> cash), flat underlying, <strong>no borrow</strong>. Sign reads like a long investor (+ up). It can be strongly + on income ETFs when payouts dominate — <strong>do not</strong> line up its sign with the decay columns. <strong>Net edge</strong> is anchored on forward <em>gross decay</em> vs borrow; it is <strong>not</strong> the same object as long total return.
                </p>
              </div>
              <div className="dm-block">
                <div className="dm-title">Volatility — which σ feeds what</div>
                <p style={{ margin: '0 0 8px', lineHeight: 1.5 }}>
                  <strong>HARQ-Log (LETF / inverse)</strong> forecasts a <em>distribution</em> of integrated variance from daily <em>RV</em> + quarticity, then maps to decay quantiles (see <code>ls-algo/decay_distribution.py</code>).
                  <br /><br />
                  <strong>Itô fallback / CSV point</strong> uses one σ:{' '}
                  <code className="dm-formula">σ = √( mean(r²<sub>U,t</sub>) × 252 )</code> on underlying log returns.
                  <br /><br />
                  <strong>YieldBOOST</strong>: σ-draws from that law (or one trailing σ if thin) feed the weekly 95/88 put-spread engine (<code>yieldboost_put_spread</code> vs <code>_point</code>).
                  <br /><br />
                  <strong>Scenarios + Exp. ETF return</strong> share <code>forecast_vol_underlying_annual</code>, a <strong>variance blend</strong>:{' '}
                  <code className="dm-formula">σ²_forecast = ½·σ²_model + ½·σ²_robust6M EWMA</code>
                  (model σ from forward decay; EWMA leg can be event-clipped). <strong>Vol Und / Vol ETF</strong> in the grid are <strong>trailing realized</strong> σ (12M→shorter), not this forecast.
                </p>
              </div>
              <div className="dm-block">
                <div className="dm-title">Net edge fan (visual)</div>
                <p style={{ margin: '0 0 8px', lineHeight: 1.5 }}>
                  <strong>Whisker</strong> slate = p5–p95 · <strong>Box</strong> cyan = p25–p75 · <strong>Dot</strong> blue = p50.
                  Flow: block-bootstrap daily hedge drag → annual gross draws → <strong>add one shift</strong> so the mean hits forward Exp. decay p50 (when available) → subtract borrow resamples → net quantiles. Row JSON fields <code>gross_anchor_*</code> show the shift; expanded row histogram uses <code>net_edge_hist_json</code> when present.
                </p>
              </div>
              <div className="dm-block">
                <div className="dm-title">Gross (realized) — <code>gross_decay_annual</code></div>
                <p style={{ margin: '0 0 8px', lineHeight: 1.5 }}>
                  With r<sub>L</sub>, r<sub>U</sub> daily log returns (ETF, underlying):{' '}
                  <code className="dm-formula">d<sub>t</sub> = β·r<sub>U,t</sub> − r<sub>L,t</sub></code>,{' '}
                  <code className="dm-formula">gross_decay_annual = mean(d_t) × 252</code>.
                  Same for every product: <em>realized hedge drag</em>, not the YieldBOOST put-spread <strong>Exp. decay</strong> object.
                </p>
              </div>
              <div className="dm-block">
                <div className="dm-title">Exp. decay — <code>expected_gross_decay_p50_annual</code> (+ band in cell)</div>
                <p style={{ margin: '0 0 8px', lineHeight: 1.5 }}>
                  <strong>LETF / inverse</strong>: HARQ-Log decay distribution (or <code>simple_ito_fallback</code> one-σ path).
                  <br /><br />
                  <strong>Vol ETPs</strong>: Itô core + roll/tracking from screener when present.
                  <br /><br />
                  <strong>YieldBOOST</strong>: weekly 95/88 put on 2× sleeve, 52× net of expense — MC (<code>yieldboost_put_spread</code>) or single σ (<code>_point</code>).
                  <br /><br />
                  <strong>Passive low-β (non-income)</strong>: expected decay hidden; gross (realized) still shows. Legacy CSV point <code>expected_gross_decay_annual</code> exists; grid prefers distributional <strong>p50</strong> when shipped.
                </p>
              </div>
              <div className="dm-block">
                <div className="dm-title">Exp. ETF return (3M) — long TR, flat spot, no borrow</div>
                <p style={{ margin: '0 0 8px', lineHeight: 1.5 }}>
                  Horizon <strong>3M</strong>, underlying shock <strong>0</strong>, σ = <code>forecast_vol_underlying_annual</code> (Scenarios match). Cash dates: Scenarios tab.
                  <br /><br />
                  <strong>LETF / inverse / vol-ETP</strong>: vol drag with <em>L</em> = β:{' '}
                  <code className="dm-formula">dragLog = ½·L·(L−1)·σ²·T</code>,{' '}
                  <code className="dm-formula">r<sub>ETF</sub> ≈ e<sup>−dragLog</sup> − 1</code> + dividend accrual when <code>dividend_adjustment</code> exists.
                  <br /><br />
                  <strong>Income</strong>: long TR = <strong>−NAV decay + cash</strong> from the same weekly model (borrow omitted). ≠ annual Exp. decay headline.
                  <br /><br />
                  Hover cell for 1M/6M. Non-income passive Bucket 2: <strong>—</strong>.
                </p>
              </div>
              <div className="dm-block">
                <div className="dm-title">Net (gross−borrow) — expanded row</div>
                <p style={{ margin: '0 0 8px', lineHeight: 1.5 }}>
                  <code className="dm-formula">net_decay ≈ gross_decay_annual − borrow_current</code>
                  — one-line realized bookkeeping; not the bootstrap median.
                </p>
              </div>
              <div className="dm-block">
                <div className="dm-title">Net edge — bootstrap band</div>
                <p style={{ margin: '0 0 8px', lineHeight: 1.5 }}>
                  Resample gross + borrow, shift gross to forward p50, subtract borrow → p5…p95. Copula / ρ grid = stress choices (see table footnote), not a full joint tail model of borrow squeezes + spot.
                </p>
              </div>
            </div>
          </details>

          {/* ── Table ─────────── */}
          <div className="table-container">
            <table className="etf-table">
              <thead>
                <tr>
                  <th style={{ width: 30 }}></th>
                  {COLS.map(col => (
                    <th key={col.key} style={{ width: col.w }}
                      className={sortKey === col.key ? 'sorted' : ''}
                      onClick={() => handleSort(col.key)}
                      title={[col.sublabel ? `${col.label} — ${col.sublabel}` : col.label, col.hint].filter(Boolean).join('. ')}
                    >
                      <div className={col.sublabel ? 'th-stack' : ''}>
                        <span className="th-main">{col.label}</span>
                        {col.sublabel ? <span className="th-sub">{col.sublabel}</span> : null}
                      </div>
                      {sortKey === col.key && <span className="sort-arrow">{sortDesc ? '▼' : '▲'}</span>}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map(r => {
                  const expanded = expandedSym === r.symbol;
                  const expEtf3m = computeExpectedEtfReturnFlatUnd(r, chartVolLookbackRange, '3M');
                  const expEtf1m = computeExpectedEtfReturnFlatUnd(r, chartVolLookbackRange, '1M');
                  const expEtf6m = computeExpectedEtfReturnFlatUnd(r, chartVolLookbackRange, '6M');
                  return (
                    <React.Fragment key={r.symbol}>
                      <tr onClick={() => setExpandedSym(expanded ? null : r.symbol)}>
                        <td style={{ textAlign: 'center', fontSize: 10, color: 'var(--text-muted)' }}>
                          {expanded ? '▾' : '▸'}
                        </td>
                        <td>
                          <span className="sym-cell" onClick={e => { e.stopPropagation(); navigateToChart(r); }}>
                            {r.symbol}
                          </span>
                        </td>
                        <td className="underlying-cell">{r.underlying}</td>
                        <td>{r.beta?.toFixed(2) ?? '—'}</td>
                        <td className={borrowCls(getBorrowRate(r))}>
                          {fmt(getBorrowRate(r))} {borrowBadge(getBorrowRate(r))}
                        </td>
                        <td>{fmtNum(r.shares_available)}</td>
                        <td>{fmt(r.gross_decay_annual)}</td>
                        <td title={decayDistTooltip(r)}>
                          {(() => {
                            if (!expectedDecayAvailableForRow(r)) {
                              return <span style={{ color: 'var(--text-muted)' }}>—</span>;
                            }
                            const dist = expectedDecayDistribution(r);
                            if (dist) {
                              const isYbDist = isYieldBoostPutSpreadDistModel(dist.model);
                              return (
                                <div style={{ lineHeight: 1.15 }}>
                                  <div>{fmt(dist.p50)}</div>
                                  <div style={{ fontSize: 10, color: 'var(--text-muted)', marginTop: 1 }}>
                                    {isYbDist ? 'put-spread · ' : ''}{fmt(dist.p10)} / {fmt(dist.p90)}
                                  </div>
                                </div>
                              );
                            }
                            if (isYieldBoostIncomeStrategy(r)) {
                              const yb = yieldBoostIntrinsicAnnualDecay(r);
                              if (yb != null) {
                                return (
                                  <div style={{ lineHeight: 1.15 }}>
                                    <div>{fmt(yb)}</div>
                                    <div style={{ fontSize: 10, color: 'var(--text-muted)', marginTop: 1 }}>
                                      intrinsic (fallback)
                                    </div>
                                  </div>
                                );
                              }
                            }
                            return fmt(expectedDecayDisplayValue(r));
                          })()}
                        </td>
                        <td style={{ verticalAlign: 'middle' }}>
                          {isPassiveLowBetaRow(r) ? (
                            <span title={PASSIVE_LOW_BETA_POLICY_TOOLTIP} style={{ color: 'var(--text-muted)' }}>
                              —
                            </span>
                          ) : (
                            <NetEdgeMergedCell r={r} />
                          )}
                        </td>
                        <td
                          className={scenarioValueCls(r, expEtf3m)}
                          title={
                            isPassiveLowBetaRow(r)
                              ? PASSIVE_LOW_BETA_POLICY_TOOLTIP
                              : suppressScenarioForRow(r)
                                ? 'Hidden for passive low-β (non-income): scenario not meaningful at β≈1.'
                                : (() => {
                                    const lines = [];
                                    if (isYieldBoostIncomeStrategy(r)) {
                                      lines.push('Long total return, no borrow (cash + NAV path).');
                                      lines.push('= −NAV decay + cash from weekly 95/88 model (0% shock row in Scenarios).');
                                      lines.push(`σ (forecast): ${fmt(forecastVolForScenario(r, chartVolLookbackRange).sigma)} (${r?.forecast_vol_source || 'forecast_vol'}).`);
                                    } else {
                                      lines.push('Long total return, no borrow: Itô vol path + small dividend accrual when data exist.');
                                      lines.push(`σ (forecast): ${fmt(forecastVolForScenario(r, chartVolLookbackRange).sigma)}.`);
                                      lines.push('Ex-dates: Scenarios tab.');
                                    }
                                    if (r?.forecast_vol_event_adjusted) lines.push('EWMA leg clipped a large one-day move.');
                                    lines.push('');
                                    lines.push('Other horizons:');
                                    lines.push(`  1M: ${expEtf1m != null && Number.isFinite(expEtf1m) ? fmt(expEtf1m) : '—'}`);
                                    lines.push(`  3M: ${expEtf3m != null && Number.isFinite(expEtf3m) ? fmt(expEtf3m) : '—'}  (table headline)`);
                                    lines.push(`  6M: ${expEtf6m != null && Number.isFinite(expEtf6m) ? fmt(expEtf6m) : '—'}`);
                                    return lines.join('\n');
                                  })()
                          }
                        >
                          {expEtf3m != null && Number.isFinite(expEtf3m) ? fmt(expEtf3m) : '—'}
                        </td>
                        <td title="Backward-looking realized σ (underlying); builder prefers 12M when available. Not forecast_vol.">{fmt(r.vol_underlying_annual)}</td>
                        <td title="Backward-looking realized σ (ETF); same window ladder as Vol Und.">{fmt(r.vol_etf_annual)}</td>
                      </tr>
                      {expanded && <DetailRow r={r} chartVolLookbackRange={chartVolLookbackRange} />}
                    </React.Fragment>
                  );
                })}
                {filtered.length === 0 && (
                  <tr>
                    <td colSpan={COLS.length + 1} style={{
                      textAlign: 'center', padding: 40, color: 'var(--text-muted)', fontSize: 14,
                    }}>
                      No matching ETFs found.
                    </td>
                  </tr>
                )}
              </tbody>
            </table>
          </div>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<DashboardRoot />);
</script>
</body>
</html>
