<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ETF Borrow Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='85'>⚡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0e17;
    --bg-secondary: #111827;
    --bg-card: #151d2e;
    --bg-card-hover: #1a2438;
    --bg-input: #0d1424;
    --border: #1e2d46;
    --border-active: #3b82f6;
    --text-primary: #e8ecf4;
    --text-secondary: #8896ae;
    --text-muted: #566580;
    --accent-blue: #3b82f6;
    --accent-green: #10b981;
    --accent-red: #ef4444;
    --accent-amber: #f59e0b;
    --accent-purple: #8b5cf6;
    --accent-cyan: #06b6d4;
    --positive: #10b981;
    --negative: #ef4444;
    --warning: #f59e0b;
    --stale: #6b7280;
    --ne-whisker: rgba(148, 163, 184, 0.95);
    --ne-iqr-fill: rgba(6, 182, 212, 0.22);
    --ne-iqr-stroke: rgba(6, 182, 212, 0.65);
    --ne-p50: #60a5fa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg-primary); color: var(--text-primary);
    line-height: 1.5; min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  #root { min-height: 100vh; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-primary); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .app { display: flex; flex-direction: column; min-height: 100vh; }

  /* ── Topbar ──────────────── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px; background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar-logo {
    font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 16px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px; cursor: pointer;
  }
  .topbar-meta {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .topbar-meta a { color: var(--accent-purple); text-decoration: none; }
  .topbar-meta a:hover { text-decoration: underline; }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .dot-green { background: var(--accent-green); }
  .dot-amber { background: var(--accent-amber); }
  .fresh-badge {
    display: inline-flex; align-items: center;
    padding: 1px 7px; border-radius: 999px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.3px;
    border: 1px solid transparent;
  }
  .fresh-good { color: var(--positive); background: rgba(16,185,129,0.12); border-color: rgba(16,185,129,0.35); }
  .fresh-warn { color: var(--warning); background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.35); }
  .fresh-bad { color: var(--negative); background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.35); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .topbar-btn {
    padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border); background: var(--bg-card);
    color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .topbar-btn:hover { border-color: var(--accent-blue); color: var(--text-primary); }
  .topbar-btn.active { background: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }
  .topbar-user {
    font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace;
    max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ── Investor login (optional; see data/investors.json) ── */
  .login-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px; background: var(--bg-primary);
  }
  .login-card {
    width: 100%; max-width: 340px; background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px 26px 26px; box-shadow: 0 20px 50px rgba(0,0,0,0.35);
  }
  .login-field { margin-bottom: 14px; }
  .login-field label {
    display: block; font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 5px;
  }
  .login-field input {
    width: 100%; padding: 10px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg-input); color: var(--text-primary); font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }
  .login-field input:focus {
    outline: none; border-color: var(--accent-blue);
  }
  .login-btn {
    width: 100%; margin-top: 8px; padding: 11px; border-radius: 6px; border: none;
    background: var(--accent-blue); color: #fff; font-weight: 700; font-size: 13px;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
  .login-btn:disabled { opacity: 0.55; cursor: not-allowed; }
  .login-error {
    margin-top: 14px; font-size: 12px; color: var(--accent-red);
  }

  /* ── Summary ─────────────── */
  .summary-strip {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(195px, 1fr));
    gap: 10px; padding: 14px 24px;
    background: var(--bg-secondary); border-bottom: 1px solid var(--border);
  }
  .summary-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px; transition: border-color 0.15s;
  }
  .summary-card:hover { border-color: var(--border-active); }
  .summary-card .label {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.6px; color: var(--text-muted); margin-bottom: 5px;
  }
  .summary-card .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px; font-weight: 700;
  }
  .summary-card .sub {
    font-size: 11px; color: var(--text-muted); margin-top: 3px;
    font-family: 'JetBrains Mono', monospace;
  }
  .highlight-list { list-style: none; padding: 0; }
  .highlight-list li {
    display: flex; justify-content: space-between; align-items: center;
    padding: 3px 0; font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .highlight-list .sym { font-weight: 600; color: var(--text-primary); }

  /* ── Tabs ─────────────────── */
  .tab-bar { display: flex; align-items: center; gap: 4px; padding: 12px 24px 0; }
  .tab {
    padding: 10px 18px; border-radius: 8px 8px 0 0;
    font-size: 13px; font-weight: 600; color: var(--text-muted);
    cursor: pointer; border: 1px solid transparent; border-bottom: none;
    transition: all 0.15s; background: transparent;
    font-family: 'DM Sans', sans-serif;
  }
  .tab:hover { color: var(--text-secondary); background: var(--bg-card); }
  .tab.active { color: var(--text-primary); background: var(--bg-card); border-color: var(--border); }
  .tab .count {
    display: inline-block; margin-left: 6px; padding: 1px 7px;
    border-radius: 10px; font-size: 11px; font-weight: 600;
    background: var(--bg-primary); color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .tab.active .count { background: var(--accent-blue); color: #fff; }

  /* ── Controls ────────────── */
  .controls-bar {
    display: flex; align-items: center; gap: 12px; padding: 12px 24px;
    background: var(--bg-card); border: 1px solid var(--border); border-top: none;
  }
  .search-wrapper { position: relative; flex: 1; max-width: 360px; }
  .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); font-size: 13px; pointer-events: none;
  }
  .search-box {
    width: 100%; padding: 8px 14px 8px 36px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg-input);
    color: var(--text-primary); font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    outline: none; transition: border-color 0.15s;
  }
  .search-box:focus { border-color: var(--accent-blue); }
  .toggle-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-secondary); cursor: pointer; user-select: none;
  }
  .toggle-label input[type="checkbox"] { accent-color: var(--accent-blue); width: 14px; height: 14px; }

  /* ── Table ────────────────── */
  .table-container { padding: 0 24px 24px; overflow-x: auto; }
  .etf-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
    background: var(--bg-card); border: 1px solid var(--border); border-top: none;
    table-layout: fixed;
  }
  .etf-table thead th {
    position: sticky; top: 0; z-index: 10; background: var(--bg-secondary);
    padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted);
    border-bottom: 1px solid var(--border); cursor: pointer; user-select: none;
    white-space: nowrap; transition: color 0.15s;
  }
  .etf-table thead th:hover { color: var(--text-primary); }
  .etf-table thead th.sorted { color: var(--accent-blue); }
  .etf-table thead th .sort-arrow { margin-left: 4px; font-size: 10px; }
  .etf-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: pointer; }
  .etf-table tbody tr:hover { background: var(--bg-card-hover); }
  .etf-table tbody td {
    padding: 9px 12px; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    vertical-align: middle;
  }
  .sym-cell {
    font-weight: 700; color: var(--accent-cyan); font-size: 13px;
    text-decoration: underline; text-decoration-color: rgba(6,182,212,0.3);
    text-underline-offset: 2px; cursor: pointer; transition: color 0.15s;
  }
  .sym-cell:hover { color: var(--accent-blue); text-decoration-color: var(--accent-blue); }
  .underlying-cell { color: var(--text-secondary); }

  /* ── Value Colors ────────── */
  .val-positive { color: var(--positive); }
  .val-negative { color: var(--negative); }
  .val-warning { color: var(--warning); }
  .val-muted { color: var(--text-muted); }

  .badge {
    display: inline-block; padding: 2px 7px; border-radius: 4px;
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .badge-good { background: rgba(16,185,129,0.12); color: var(--positive); }
  .badge-bad { background: rgba(239,68,68,0.12); color: var(--negative); }
  .badge-warn { background: rgba(245,158,11,0.12); color: var(--warning); }
  .badge-stale { background: rgba(107,114,128,0.12); color: var(--stale); }
  .badge-ftp { background: rgba(6,182,212,0.12); color: var(--accent-cyan); }

  /* ── Detail Expand ───────── */
  .detail-row td {
    padding: 16px 24px; background: var(--bg-primary);
    border-bottom: 2px solid var(--border);
  }
  .detail-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(175px, 1fr)); gap: 12px;
  }
  .detail-item {
    min-width: 0;
  }
  .detail-item-hint {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 4px;
    line-height: 1.35;
    overflow-wrap: break-word;
    word-break: break-word;
    max-width: 100%;
  }
  .detail-item .dlabel {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-muted); margin-bottom: 2px;
  }
  .detail-item .dval { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; }

  .detail-visuals {
    display: flex; flex-direction: column; gap: 14px;
    margin-top: 10px; padding-top: 14px; border-top: 1px solid var(--border);
  }

  /* Net edge visual grammar (table fan + expand charts — same colors) */
  .net-edge-merged {
    display: flex; flex-direction: column; align-items: stretch; gap: 5px; min-width: 0;
    max-width: 132px;
  }
  .net-edge-merged-p50 {
    font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; line-height: 1.15;
  }
  .net-edge-merged-fan { align-self: center; }
  .etf-table th .th-stack {
    display: flex; flex-direction: column; align-items: flex-start; gap: 1px; line-height: 1.15;
  }
  .etf-table th .th-main { font-weight: 600; }
  .etf-table th .th-sub {
    font-size: 9px; font-weight: 500; color: var(--text-muted); text-transform: none; letter-spacing: 0;
    font-family: 'JetBrains Mono', monospace;
  }
  .edge-facts-strip {
    display: flex; flex-wrap: wrap; gap: 8px 12px; margin-bottom: 2px;
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
  }
  .edge-fact {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 8px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg-primary); color: var(--text-muted);
  }
  .edge-fact.on { border-color: rgba(16,185,129,0.45); color: var(--positive); background: rgba(16,185,129,0.08); }
  .edge-fact.off { opacity: 0.65; }
  .edge-fact.neutral { border-color: rgba(100,120,160,0.35); color: var(--text-secondary); }
  .neq-table-wrap { max-width: 420px; }
  .neq-table {
    width: 100%; border-collapse: collapse; font-size: 10px; font-family: 'JetBrains Mono', monospace;
    margin-top: 6px; color: var(--text-secondary);
  }
  .neq-table th, .neq-table td { padding: 4px 8px; text-align: right; border-bottom: 1px solid var(--border); }
  .neq-table th { text-align: left; color: var(--text-muted); font-weight: 600; }
  @media (max-width: 900px) {
    .net-edge-merged { max-width: 100%; }
    .net-edge-merged-p50 { font-size: 12px; }
  }
  .dv-block { max-width: 720px; }
  .dv-title {
    font-size: 11px; font-weight: 700; color: var(--text-secondary);
    margin-bottom: 6px; letter-spacing: 0.3px;
  }
  .gross-dumbbell-stack {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .gross-dumbbell-rail {
    min-width: 0;
  }
  .gross-dumbbell-rail-title {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.45px;
    margin-bottom: 2px;
  }
  .gross-dumbbell {
    position: relative; height: 32px; margin: 6px 0 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-muted);
  }
  .gross-dumbbell.gross-dumbbell--rail {
    height: 26px;
    margin: 2px 0 14px;
  }
  .gross-dumbbell-track {
    position: absolute; left: 0; right: 0; top: 50%; height: 4px; margin-top: -2px;
    background: rgba(100,120,160,0.25); border-radius: 3px;
  }
  .gross-dumbbell-axis {
    position: absolute; left: 0; right: 0; top: 100%;
    margin-top: 3px;
    display: flex; justify-content: space-between;
  }
  .gross-dumbbell-tick {
    position: absolute; top: 2px; width: 3px; height: 20px; margin-left: -1.5px; border-radius: 2px;
  }
  .gross-dumbbell-tick.realized { background: var(--accent-blue); }
  .gross-dumbbell-tick.expected { background: var(--accent-purple); }
  .gross-dumbbell-tick.blended { background: #94a3b8; }
  .gross-dumbbell-tick.net { background: var(--positive); width: 4px; margin-left: -2px; }
  .gross-dumbbell-tick.net-realized { background: var(--positive); width: 4px; margin-left: -2px; }
  .gross-dumbbell-tick.net-spot { background: var(--accent-cyan); width: 3px; margin-left: -1.5px; opacity: 0.95; }
  .gross-dumbbell-mark--diamond {
    position: absolute; top: 50%; width: 8px; height: 8px; margin-left: -4px; margin-top: -6px;
    transform: rotate(45deg); border-radius: 1px; background: var(--ne-p50);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.35); z-index: 2;
  }
  .gross-dumbbell-mark--diamond.net-edge { background: var(--ne-p50); }
  .gross-dumbbell-legends {
    display: flex; flex-direction: column; gap: 10px; margin-top: 4px;
  }
  .gross-dumbbell-legend-group-label {
    font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-muted); margin-bottom: 3px;
  }
  .gross-dumbbell-legend {
    display: flex; flex-wrap: wrap; gap: 10px 14px; font-size: 10px; color: var(--text-muted);
  }
  .gross-dumbbell-legend span { display: inline-flex; align-items: center; gap: 5px; }
  .gross-dumbbell-legend i {
    display: inline-block; width: 8px; height: 8px; border-radius: 2px;
  }
  .gross-dumbbell-legend i.gross-legend-diamond {
    width: 7px; height: 7px; border-radius: 1px; transform: rotate(45deg);
    background: var(--ne-p50);
  }
  .net-edge-viz { margin-top: 4px; }
  .net-edge-box-svg { width: 100%; max-width: 420px; height: 44px; display: block; }
  .net-edge-mini-hist {
    display: flex; align-items: flex-end; gap: 1px; height: 40px; margin-top: 8px;
    max-width: 420px;
  }
  .net-edge-mini-hist .bar {
    flex: 1; min-width: 2px; background: rgba(59,130,246,0.55); border-radius: 1px 1px 0 0;
    cursor: help;
  }

  /* ── Realized decay horizons (Decay tab) ── */
  .decay-horizons-wrap { margin-top: 8px; }
  .decay-horizons-bars {
    display: flex; align-items: flex-end; gap: 10px; min-height: 220px;
    padding: 12px 8px 0; border: 1px solid var(--border); border-radius: 8px;
    background: rgba(11, 19, 34, 0.35);
  }
  .decay-horizon-col {
    flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .decay-horizon-bar-stack {
    position: relative; width: 100%; max-width: 72px; height: 160px;
    display: flex; flex-direction: column; justify-content: flex-end;
  }
  .decay-horizon-zero {
    position: absolute; left: 0; right: 0; height: 1px; background: rgba(255,255,255,0.35);
  }
  .decay-horizon-bar {
    width: 100%; border-radius: 4px 4px 0 0; min-height: 2px;
    transition: opacity 0.15s;
  }
  .decay-horizon-bar.pos { background: rgba(16, 185, 129, 0.85); }
  .decay-horizon-bar.neg { background: rgba(239, 68, 68, 0.85); }
  .decay-horizon-bar.insufficient { opacity: 0.45; }
  .decay-horizon-bar.gross { background: rgba(59, 130, 246, 0.9); }
  .decay-horizon-bar.net { background: rgba(6, 182, 212, 0.9); }
  .decay-horizon-dual-bars {
    position: relative; width: 100%; max-width: 80px; height: 160px;
    display: flex; align-items: flex-end; justify-content: center; gap: 5px;
  }
  .decay-horizon-bar-stack--single {
    position: relative; width: 34px; height: 160px;
    display: flex; flex-direction: column; justify-content: flex-end;
  }
  .decay-horizon-val {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600;
    text-align: center; line-height: 1.2;
  }
  .decay-horizon-label {
    font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .decay-horizon-table {
    width: 100%; margin-top: 14px; border-collapse: collapse; font-size: 12px;
  }
  .decay-horizon-table th, .decay-horizon-table td {
    padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: right;
  }
  .decay-horizon-table th:first-child, .decay-horizon-table td:first-child { text-align: left; }
  .decay-horizon-pills { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0 8px; }
  .decay-horizon-pill {
    padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 600;
    border: 1px solid var(--border); background: var(--bg-card); color: var(--text-secondary);
    cursor: pointer;
  }
  .decay-horizon-pill.active {
    background: var(--accent-blue); border-color: var(--accent-blue); color: #fff;
  }
  .tr-coverage-badge {
    margin: 10px 0 14px; padding: 10px 12px; border-radius: 8px; font-size: 12px;
    border: 1px solid var(--border); background: rgba(59, 130, 246, 0.06);
    display: flex; flex-wrap: wrap; gap: 8px 16px; align-items: baseline;
  }
  .tr-coverage-badge.degraded { border-color: rgba(245, 158, 11, 0.45); background: rgba(245, 158, 11, 0.08); }
  .tr-coverage-badge.poor { border-color: rgba(239, 68, 68, 0.45); background: rgba(239, 68, 68, 0.08); }
  .tr-coverage-badge .tcb-title { font-weight: 700; color: var(--text-primary); margin-right: 4px; }
  .tr-coverage-badge .tcb-item { color: var(--text-secondary); white-space: nowrap; }
  .tr-coverage-badge .tcb-warn { flex-basis: 100%; color: var(--negative); font-size: 11px; margin-top: 2px; }

    margin-top: 16px;

  /* ETF metrics daily grid: fixed layout so long underlying labels do not steal width */

    table-layout: fixed;
  }
  .metrics-panel .scenario-table th:nth-child(1),

  .metrics-panel .scenario-table th:nth-child(2),

  .metrics-panel .scenario-table td,

    padding-bottom: 8px;
  }
  .chart-section {
    display: flex;
    flex-direction: column;
    min-height: 0;
    flex: 1;
  }

  .scenario-card {
    margin-top: 8px;
    border: 1px solid var(--border);

  .mc-field input, .mc-field select {

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;
const VrpUi = window.VrpUi || {};

const DATA_URL = "data/dashboard_data.json";
const INVESTORS_URL = "data/investors.json";
const AUTH_STORAGE_KEY = "etf_dash_session_v1";
const AUTH_SESSION_MS = 7 * 86400000;
const BORROW_HISTORY_URL = "data/borrow_history.json";
const BORROW_SPIKE_RISK_URL = "data/borrow_spike_risk.json";
const OPTIONS_CACHE_URL = "data/options_cache.json";
const INTRADAY_SPOT_URL = "data/underlying_intraday_spot.json";
const OPTIONS_POLL_MS = 10 * 60 * 1000;
const ETF_METRICS_DAILY_URL = "data/etf_metrics_daily.json";
const LETF_REBALANCE_FLOWS_DAILY_URL = "data/letf_rebalance_flows_daily.json";
const LETF_REBALANCE_FLOWS_LATEST_URL = "data/letf_rebalance_flows_latest.json";
const LETF_INTRADAY_FLOWS_URL = "data/letf_rebalance_flows_intraday_latest.json";
const LETF_INTRADAY_METRICS_URL = "data/letf_intraday_flow_metrics.json";
const VOL_SHAPE_HISTORY_URL = "data/vol_shape_history.json";
const VRP_LIVE_URL = "data/vrp_live.json";
const VRP_HEALTH_URL = "data/vrp_health.json";
const FRESHNESS_SUMMARY_URL = "data/freshness_summary.json";
const VRP_FIELD_DICT_URL = "data/vrp_field_dictionary.json";
const YIELDBOOST_PUT_SPREADS_URL = "data/yieldboost_put_spreads_latest.json";
/** @type {{ symbols: Record<string, { series: object[], vcrMedian: number|null, window: number }>, buildTime: string|null }|null} */
let VOL_SHAPE_HISTORY_CACHE = null;
const ETF_DISTRIBUTIONS_URL = "data/etf_distributions.json";
const CORPORATE_ACTIONS_URL = "data/corporate_actions.json";
const ETF_NEWS_URL = "data/etf_news.json";
// NAV forecast pipeline (delta_v1) — see data/nav_forecasts/README.md.
const NAV_FORECAST_LATEST_URL = "data/nav_forecasts/_latest.json";
const NAV_FORECAST_METRICS_URL = "data/nav_forecasts/_metrics_daily.json";
const NAV_FORECAST_HISTORY_URL = "data/nav_forecasts/_history_panel.json";
let BORROW_HISTORY_CACHE = null;
let BORROW_HISTORY_BUILD_TIME = null;
let BORROW_SPIKE_RISK_CACHE = null;
/** @type {{ bySymbol: Record<string, object[]>, buildTime: string|null }|null} */
let ETF_METRICS_CACHE = null;
/** @type {{ byTicker: Record<string, object[]>, byUnderlying: Record<string, object>, latestDate: string|null, buildTime: string|null, method: string|null }|null} */
let LETF_REBALANCE_FLOWS_CACHE = null;
/** @type {{ byFund: Record<string, object>, byUnderlying: Record<string, object>, asOf: string|null, buildTime: string|null, minutesToClose: number|null, todayHistory: object[], biasMetrics: object|null }|null} */
let LETF_INTRADAY_FLOWS_CACHE = null;
let ETF_DISTRIBUTIONS_CACHE = null;
let NAV_FORECAST_LATEST_CACHE = null;
let NAV_FORECAST_METRICS_CACHE = null;
let NAV_FORECAST_HISTORY_CACHE = null;

// ── Formatters ──────────────────────────────
const fmt = v => v == null ? '—' : (v * 100).toFixed(2) + '%';
const fmtNum = v => v == null ? '—' : Number(v).toLocaleString();
/** Continuous-compounding annual log-rate, signed, 2 decimals. e.g. +1.20. */
const fmtLogYr = v => {
  if (v == null || !Number.isFinite(Number(v))) return '—';
  const n = Number(v);
  return (n >= 0 ? '+' : '') + n.toFixed(2);
};
/** Percent with sign, no decimals (used for log-axis simple-return display). */
const fmtPct = v => {
  if (v == null || !Number.isFinite(Number(v))) return '—';
  const n = Number(v) * 100;
  return (n >= 0 ? '+' : '') + n.toFixed(0) + '%';
};
// Convert a continuous-compounding annual rate to the equivalent
// 1Y simple return, e.g. +1.20 log/yr -> +232% simple. NaN-safe.
function logToSimpleAnnual(x) {
  if (x == null || !Number.isFinite(Number(x))) return null;
  return Math.expm1(Number(x));
}
/** Headline cell for forward pair P&L: log/yr median + p10/p90 band (same axis as Gross/Net). */
function renderForwardPairPnlCell(pair) {
  if (!pair || !Number.isFinite(Number(pair.p50))) return null;
  const p50Simple = logToSimpleAnnual(pair.p50);
  return (
    <div style={{ lineHeight: 1.15 }}>
      <div>{fmtLogYr(pair.p50)}<span style={{ fontSize: 10, color: 'var(--text-muted)', marginLeft: 4 }}>log/yr</span></div>
      <div style={{ fontSize: 10, color: 'var(--text-muted)', marginTop: 1 }}>
        {pair.p10 != null && pair.p90 != null
          ? `${fmtLogYr(pair.p10)} / ${fmtLogYr(pair.p90)}`
          : null}
        {p50Simple != null ? `${pair.p10 != null ? ' · ' : ''}${fmtPct(p50Simple)} simple` : null}
      </div>
    </div>
  );
}
/** Whole-share counts (ETF shares outstanding, etc.): integer separators only — avoids 87,333.079 misread as 87,333,079. */
const fmtSharesCount = v => (
  v == null || !Number.isFinite(Number(v)) ? '—' : Math.round(Number(v)).toLocaleString('en-US')
);
/** Yahoo daily volume on Stats tab: null/blank is absent data, not zero (avoid Number(null) → 0). */
const fmtSharesTradedStat = (raw) => {
  if (raw == null) return 'N/A';
  if (typeof raw === 'string' && !raw.trim()) return 'N/A';
  const n = typeof raw === 'string' ? Number(raw.trim().replace(/,/g, '')) : Number(raw);
  if (!Number.isFinite(n) || n < 0) return 'N/A';
  return Math.round(n).toLocaleString('en-US');
};
const fmtUsd = v => (v == null || !Number.isFinite(Number(v))) ? '—' : `$${Number(v).toFixed(2)}`;
/** Premium/discount of market close vs issuer NAV (bps when |prem| is small). */
const fmtPremDisc = (nav, close) => {
  const n = Number(nav);
  const c = Number(close);
  if (!Number.isFinite(n) || n <= 0 || !Number.isFinite(c)) return '—';
  const pct = ((c - n) / n) * 100;
  if (Math.abs(pct) < 0.05) return `${pct >= 0 ? '+' : ''}${(pct * 100).toFixed(0)} bp`;
  return `${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%`;
};
const fmtSpreadMid = (mid, spot) => {
  if (mid == null) return '—';
  const usd = fmtUsd(mid);
  const s = Number(spot);
  if (Number.isFinite(s) && s > 0) return `${usd} (${((Number(mid) / s) * 100).toFixed(2)}% of spot)`;
  return usd;
};
/** Hover tooltip for Vol/VRP spread-mid row (full sign convention). */

/** Joint ETF + underlying price days (same gate as pair backtest / vol-shape charts). */
function jointMetricsRowsForVolShape(rawRows) {
  const hasBoth = (row) => {
    const pl = Number(row?.close_price) || Number(row?.nav);
    const ps = Number(row?.underlying_adj_close);
    const ds = String(row?.date || '').trim();
    return Boolean(ds) && Number.isFinite(pl) && pl > 0 && Number.isFinite(ps) && ps > 0;
  };
  return (Array.isArray(rawRows) ? rawRows : [])
    .filter(hasBoth)
    .sort((a, b) => String(a?.date || '').localeCompare(String(b?.date || '')));
}

function volShapeHistoryFromMetricsRows(rawRows, window = VOL_SHAPE_PRIMARY_WINDOW) {

/** Prefer CI-built history JSON; fall back to client recompute from metrics rows. */
function volShapeHistoryForSymbol(sym, metricsRows, window = VOL_SHAPE_PRIMARY_WINDOW) {
  const key = String(sym || '').toUpperCase();
  const pre = VOL_SHAPE_HISTORY_CACHE?.symbols?.[key];

function volShapeLatestFromHistory(volShapeHistory) {
  const series = volShapeHistory?.series;
  if (!Array.isArray(series) || !series.length) return null;
  const last = series[series.length - 1];
  const tr = Number(last?.trend_ratio);
  const vcr = Number(last?.vcr);
  if (!Number.isFinite(tr) && !Number.isFinite(vcr)) return null;
  return {
    tr: Number.isFinite(tr) ? tr : null,
    vcr: Number.isFinite(vcr) ? vcr : null,
    date: String(last?.date || '').trim() || null,
    rvDaily: Number(last?.rv_daily),
    rvWeekly: Number(last?.rv_weekly),
  };
}

function fmtVolShapeTrVcr(tr, vcr) {

}

const VOL_SHAPE_CLOCK_STALE_MS = 6 * 60 * 60 * 1000;

function volShapeClocksDiffer(dashboardBuildTime, metricsBuildTime) {
  const d = dashboardBuildTime ? new Date(dashboardBuildTime).getTime() : NaN;
  const m = metricsBuildTime ? new Date(metricsBuildTime).getTime() : NaN;
  if (!Number.isFinite(d) || !Number.isFinite(m)) return false;
  return Math.abs(d - m) > VOL_SHAPE_CLOCK_STALE_MS;
}

function volShapeSourceHint(display) {
  if (!display) return '';
  const parts = [];
  if (display.source === 'etf_metrics_daily') {
    parts.push(`TR/VCR: dashboard build (joint metrics underlying adj. close${display.asOfDate ? ` through ${display.asOfDate}` : ''})`);
    if (display.dashboardBuildTime) parts.push(`dashboard ${fmtTime(display.dashboardBuildTime)}`);
  } else if (display.source === 'metrics') {
    parts.push(`TR/VCR: metrics underlying adj. close${display.asOfDate ? ` through ${display.asOfDate}` : ''}`);
    if (display.metricsBuildTime) parts.push(`metrics built ${fmtTime(display.metricsBuildTime)}`);
  } else {
    parts.push('TR/VCR: ls-algo screener (full underlying TR series)');
    if (display.dashboardBuildTime) parts.push(`dashboard ${fmtTime(display.dashboardBuildTime)}`);
  }
  if (display.screenerDiffers) {
    parts.push(`screener ${fmtVolShapeTrVcr(display.screenerTr, display.screenerVcr)}`);
  }
  if (volShapeClocksDiffer(display.dashboardBuildTime, display.metricsBuildTime)) {
    parts.push('dashboard vs metrics clocks differ by >6h');
  }
  return parts.join(' · ');
}

async function loadEtfMetricsCache() {
  if (ETF_METRICS_CACHE?.bySymbol) return ETF_METRICS_CACHE;
  const cacheBust = `?t=${Math.floor(Date.now() / 60000)}`;
  const res = await fetch(`${ETF_METRICS_DAILY_URL}${cacheBust}`, { cache: 'no-store' });
  if (!res.ok) throw new Error(`etf metrics HTTP ${res.status}`);
  const payload = await res.json();
  const rows = Array.isArray(payload?.rows) ? payload.rows : [];
  const bySymbol = {};
  rows.forEach((row) => {
    const sym = String(row?.ticker || '').toUpperCase();
    if (!sym) return;
    if (!bySymbol[sym]) bySymbol[sym] = [];
    bySymbol[sym].push(row);
  });
  Object.keys(bySymbol).forEach((sym) => {
    bySymbol[sym].sort((a, b) => String(a?.date || '').localeCompare(String(b?.date || '')));
  });
  ETF_METRICS_CACHE = {
    bySymbol,
    buildTime: payload?.build_time || null,
  };
  return ETF_METRICS_CACHE;
}

async function loadLetfRebalanceFlowsCache() {
  if (LETF_REBALANCE_FLOWS_CACHE?.byTicker) return LETF_REBALANCE_FLOWS_CACHE;
  const cacheBust = `?t=${Math.floor(Date.now() / 60000)}`;
  const [dailyRes, latestRes] = await Promise.all([
    fetch(`${LETF_REBALANCE_FLOWS_DAILY_URL}${cacheBust}`, { cache: 'no-store' }),
    fetch(`${LETF_REBALANCE_FLOWS_LATEST_URL}${cacheBust}`, { cache: 'no-store' }),
  ]);
  if (!dailyRes.ok) throw new Error(`letf rebalance flows daily HTTP ${dailyRes.status}`);
  if (!latestRes.ok) throw new Error(`letf rebalance flows latest HTTP ${latestRes.status}`);
  const dailyPayload = await dailyRes.json();
  const latestPayload = await latestRes.json();
  const rows = Array.isArray(dailyPayload?.rows) ? dailyPayload.rows : [];
  const byTicker = {};
  rows.forEach((row) => {
    const sym = String(row?.ticker || '').toUpperCase();
    if (!sym) return;
    if (!byTicker[sym]) byTicker[sym] = [];
    byTicker[sym].push(row);

    byTicker[sym].sort((a, b) => String(a?.date || '').localeCompare(String(b?.date || '')));

  LETF_REBALANCE_FLOWS_CACHE = {
    byTicker,

/**
 * Fetches the intraday LETF flow snapshot. Always cache-busts so the polling

 * RTH). Bias metrics live in a sibling JSON; loaded lazily and tolerant of
 * 404 (file may not exist yet pre-first-reconciliation).

async function loadLetfIntradayFlowsCache({ force = true } = {}) {
  if (!force && LETF_INTRADAY_FLOWS_CACHE?.buildTime) return LETF_INTRADAY_FLOWS_CACHE;

    fetch(`${LETF_INTRADAY_FLOWS_URL}${cacheBust}`, { cache: 'no-store' }),
    fetch(`${LETF_INTRADAY_METRICS_URL}${cacheBust}`, { cache: 'no-store' }).catch(() => null),
  ]);

  }
  const latest = await latestRes.json();
  let biasMetrics = null;
  if (metricsRes && metricsRes.ok) {
    try { biasMetrics = await metricsRes.json(); } catch { biasMetrics = null; }
  }
  LETF_INTRADAY_FLOWS_CACHE = {
    byFund: latest?.by_fund || {},
    byUnderlying: latest?.by_underlying || {},
    asOf: latest?.as_of || null,
    buildTime: latest?.build_time || null,
    minutesToClose: Number.isFinite(Number(latest?.minutes_to_close)) ? Number(latest.minutes_to_close) : null,
    spotSources: latest?.spot_sources || null,
    spotPricedCount: latest?.spot_priced_count ?? null,
    spotUniverseCount: latest?.spot_universe_count ?? null,
    nFundsPriced: latest?.n_funds_priced ?? null,
    nFundsPricedSpot: latest?.n_funds_priced_spot ?? null,
    nFundsPricedNav: latest?.n_funds_priced_nav ?? null,
    nFundsPricedBlend: latest?.n_funds_priced_blend ?? null,
    nFundsTotal: latest?.n_funds_total ?? null,

    navFundsTotal: latest?.nav_funds_total ?? null,
    navFundsStale: latest?.nav_funds_stale ?? null,
    blendOverridesCount: latest?.blend_overrides_count ?? 0,
    method: latest?.method || null,
    todayHistory: Array.isArray(latest?.today_history) ? latest.today_history : [],

  return LETF_INTRADAY_FLOWS_CACHE;

const fmtSignedMoney = (v) => {

/** Compact "$30M" / "−$3.4B" style for axis ticks and tight columns. */
const fmtCompactSignedMoney = (v, digits = 1) => {
  if (v == null || !Number.isFinite(Number(v))) return '—';
  const n = Number(v);
  const a = Math.abs(n);
  const sign = n > 0 ? '+' : n < 0 ? '−' : '';
  if (a >= 1e12) return `${sign}$${(a / 1e12).toFixed(digits)}T`;
  if (a >= 1e9) return `${sign}$${(a / 1e9).toFixed(digits)}B`;
  if (a >= 1e6) return `${sign}$${(a / 1e6).toFixed(digits)}M`;
  if (a >= 1e3) return `${sign}$${(a / 1e3).toFixed(digits)}K`;
  return `${sign}$${a.toFixed(0)}`;
};
const fmtCompactMoney = (v, digits = 1) => {

/** Pair backtest SVG x-axis: include day + year and avoid duplicate tick strings. */
function formatBacktestAxisDate(raw) {
  if (raw == null || raw === '') return '';
  const d = new Date(`${String(raw).trim()}T00:00:00Z`);
  return Number.isNaN(d.getTime()) ? String(raw) : d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function pickDistinctBacktestDateTickIndices(dateStrings) {
  const n = dateStrings.length;
  if (n < 2) return n === 1 ? [0] : [];
  const lab = (i) => formatBacktestAxisDate(dateStrings[i]);
  const cand = [0, Math.round(0.25 * (n - 1)), Math.round(0.5 * (n - 1)), Math.round(0.75 * (n - 1)), n - 1];
  const ordered = [...new Set(cand)].sort((a, b) => a - b);
  const out = [];
  const seen = new Set();
  for (const i of ordered) {
    const force = i === 0 || i === n - 1;
    const s = lab(i);
    if (force || !seen.has(s)) {
      out.push(i);
      seen.add(s);
    }
  }
  return [...new Set(out)].sort((a, b) => a - b);
}
const cls = (...c) => c.filter(Boolean).join(' ');
const toFiniteNum = (v) => {
  if (typeof v === 'string') {
    const s = v.trim().replace(/,/g, '').replace(/%$/, '');
    if (!s) return null;
    const n = Number(s);
    return Number.isFinite(n) ? n : null;
  }
  const n = Number(v);
  return Number.isFinite(n) ? n : null;
};
const normalizeOptionIv = (v) => {
  const n = toFiniteNum(v);
  if (n == null || n <= 0) return null;
  if (n > 5) return n / 100;
  return n;
};
const optionMidFromContract = (c) => {
  if (!c) return null;
  const bid = toFiniteNum(c.bid);
  const ask = toFiniteNum(c.ask);
  if (bid != null && ask != null && bid >= 0 && ask >= bid) return 0.5 * (bid + ask);
  const fallbacks = [c.mid, c.mark, c.last, c.close];
  for (const v of fallbacks) {
    const n = toFiniteNum(v);
    if (n != null && n > 0) return n;
  }
  if (bid != null && bid > 0) return bid;
  if (ask != null && ask > 0) return ask;
  return null;
};

function annualBorrowForRecord(r) {

const borrowHistoryPointForAvg = (pt) => {

function timingSafeEqualBytes(a, b) {
  if (!(a instanceof Uint8Array) || !(b instanceof Uint8Array) || a.length !== b.length) return false;
  let x = 0;
  for (let i = 0; i < a.length; i++) x |= a[i] ^ b[i];
  return x === 0;
}

function readAuthSession(validUserIds) {
  try {
    const raw = sessionStorage.getItem(AUTH_STORAGE_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (!s || typeof s.uid !== 'string' || typeof s.exp !== 'number') return null;
    if (Date.now() > s.exp) {
      sessionStorage.removeItem(AUTH_STORAGE_KEY);
      return null;
    }
    const uid = s.uid.toLowerCase();
    if (!validUserIds.has(uid)) {
      sessionStorage.removeItem(AUTH_STORAGE_KEY);
      return null;
    }
    return uid;
  } catch {
    return null;
  }
}

async function verifyInvestorPassword(userId, password, users) {
  const uid = userId.trim().toLowerCase();
  const u = users.find(x => String(x.id || '').toLowerCase() === uid);
  if (!u || !u.salt_b64 || !u.hash_b64) return false;
  const iterations = Number(u.iterations) > 0 ? Number(u.iterations) : 250000;
  let salt;
  let expected;
  try {
    salt = Uint8Array.from(atob(String(u.salt_b64)), c => c.charCodeAt(0));
    expected = Uint8Array.from(atob(String(u.hash_b64)), c => c.charCodeAt(0));
  } catch {
    return false;
  }
  if (expected.length !== 32) return false;
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw',
    enc.encode(password),
    'PBKDF2',
    false,
    ['deriveBits'],
  );
  const bits = await crypto.subtle.deriveBits(
    { name: 'PBKDF2', salt, iterations, hash: 'SHA-256' },
    keyMaterial,
    256,
  );
  const out = new Uint8Array(bits);
  return timingSafeEqualBytes(out, expected);
}

function LoginScreen({ users, onSuccess }) {
  const [userId, setUserId] = useState('');
  const [password, setPassword] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const submit = async (e) => {
    e.preventDefault();
    setErr('');
    if (!userId.trim()) {
      setErr('Login id is required.');
      return;
    }
    setBusy(true);
    try {
      const ok = await verifyInvestorPassword(userId, password, users);
      if (!ok) {
        setErr('Invalid login id or password.');
        return;
      }
      const row = users.find(x => String(x.id || '').toLowerCase() === userId.trim().toLowerCase());
      onSuccess(String(row.id).toLowerCase());
    } catch {
      setErr('Sign in failed. Try another browser or use HTTPS.');
    } finally {
      setBusy(false);
    }
  };
  return (
    <div className="login-wrap">
      <div className="login-card">
        <form onSubmit={submit}>
          <div className="login-field">
            <label htmlFor="inv-user">Login id</label>
            <input
              id="inv-user"
              autoComplete="username"
              value={userId}
              onChange={e => setUserId(e.target.value)}
            />
          </div>
          <div className="login-field">
            <label htmlFor="inv-pass">Password</label>
            <input
              id="inv-pass"
              type="password"
              autoComplete="current-password"
              value={password}
              onChange={e => setPassword(e.target.value)}
            />
          </div>
          <button type="submit" className="login-btn" disabled={busy}>
            {busy ? 'Signing in…' : 'Sign in'}
          </button>
        </form>
        {err ? <div className="login-error">{err}</div> : null}
      </div>
    </div>
  );
}

function DashboardRoot() {
  const [gate, setGate] = useState('loading');
  const [users, setUsers] = useState([]);
  const [sessionUid, setSessionUid] = useState(null);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      const bust = `?t=${Date.now()}`;
      let list = [];
      try {
        const res = await fetch(INVESTORS_URL + bust, { cache: 'no-store' });
        if (res.ok) {
          const doc = await res.json();
          if (Array.isArray(doc.users)) list = doc.users.filter(u => u && u.id && u.salt_b64 && u.hash_b64);
        }
      } catch {
        list = [];
      }
      if (cancelled) return;
      setUsers(list);
      if (!list.length) {
        setSessionUid(null);
        setGate('open');
        return;
      }
      const ids = new Set(list.map(u => String(u.id).toLowerCase()));
      const existing = readAuthSession(ids);
      if (existing) {
        setSessionUid(existing);
        setGate('open');
      } else {
        setGate('locked');
      }
    })();
    return () => { cancelled = true; };
  }, []);

  if (gate === 'loading') {
    return (
      <div className="app">
        <div className="loading"><div className="spinner"/>Loading…</div>
      </div>
    );
  }
  if (gate === 'locked') {
    return (
      <LoginScreen
        users={users}
        onSuccess={(uid) => {
          writeAuthSession(uid);
          setSessionUid(uid);
          setGate('open');
        }}
      />
    );
  }
  const authEnabled = users.length > 0;
  return (
    <App
      authUser={sessionUid}
      authEnabled={authEnabled}
      onLogout={authEnabled ? () => {
        clearAuthSession();
        setSessionUid(null);
        setGate('locked');
      } : null}
    />
  );
}

  if (!Number.isFinite(p50)) return null;
  const p10raw = Number(r?.expected_pair_pnl_p10_annual);
  const p25raw = Number(r?.expected_pair_pnl_p25_annual);
  const p75raw = Number(r?.expected_pair_pnl_p75_annual);
  const p90raw = Number(r?.expected_pair_pnl_p90_annual);
  const meanRaw = Number(r?.expected_pair_pnl_mean_annual);
  const stdRaw = Number(r?.expected_pair_pnl_std_annual);
  const lo = Number(r?.expected_pair_pnl_at_sigma_lo_p50_annual);
  const mid = Number(r?.expected_pair_pnl_at_sigma_mid_p50_annual);
  const hi = Number(r?.expected_pair_pnl_at_sigma_hi_p50_annual);
  const sigmaMults = Array.isArray(r?.expected_pair_pnl_sigma_regime_multipliers)
    ? r.expected_pair_pnl_sigma_regime_multipliers.map(Number)
    : [0.7, 1.0, 1.3];
  return {
    // Log-axis headline. YB: put-spread structural gross (= Exp. decay).
    // LETF: gross drag identity (= expected_gross_decay_p*).
    p10: Number.isFinite(p10raw) ? p10raw : null,
    p25: Number.isFinite(p25raw) ? p25raw : null,
    p50,
    p75: Number.isFinite(p75raw) ? p75raw : null,
    p90: Number.isFinite(p90raw) ? p90raw : null,
    mean: Number.isFinite(meanRaw) ? meanRaw : null,
    std: Number.isFinite(stdRaw) ? stdRaw : null,
    // Vol-regime triplet: put-spread structural gross at σ × {0.7, 1.0, 1.3}.
    sigmaRegime: {
      lo: Number.isFinite(lo) ? lo : null,
      mid: Number.isFinite(mid) ? mid : (Number.isFinite(p50) ? p50 : null),
      hi: Number.isFinite(hi) ? hi : null,
      multipliers: sigmaMults,
    },
    navDecaySimple: Number(r?.expected_pair_pnl_nav_decay_annual),
    distributionsSimple: Number(r?.expected_pair_pnl_distributions_annual),
    sigmaForwardForecast: Number(r?.expected_pair_pnl_sigma_forward_annual),
    captureRatio: Number(r?.expected_pair_pnl_capture_ratio_used),
    units: r?.expected_pair_pnl_units || 'log_continuous_annual',
    basis: r?.expected_pair_pnl_basis || null,
    source: r?.expected_pair_pnl_source || null,
    weeklyMc: expectedPairPnlWeeklyMc(r),
  };
}

function expectedPairPnlWeeklyMc(r) {
  const p50 = Number(r?.expected_pair_pnl_weekly_mc_p50_annual);
  if (!Number.isFinite(p50)) return null;
  const p10 = Number(r?.expected_pair_pnl_weekly_mc_p10_annual);
  const p90 = Number(r?.expected_pair_pnl_weekly_mc_p90_annual);
  return {
    p10: Number.isFinite(p10) ? p10 : null,
    p50,
    p90: Number.isFinite(p90) ? p90 : null,
    nPaths: Number(r?.expected_pair_pnl_weekly_mc_n_paths) || null,
  };
}

// Annualized intrinsic NAV decay for YieldBOOST income-style products.
// Income ETFs sell weekly 95/88 SPX-style put-spreads; the put-spread
// premium decays the NAV before any distributions are paid out. We
// reuse the same put-spread NAV decay model that powers the Scenarios
// tab so the headline expected-decay column, the Scenarios heatmap,
// and the 1M ETF flat-underlying scenario all agree.
const YB_DEFAULT_EXPENSE_RATIO_ANNUAL = 0.0099;
function yieldBoostUnderlyingSigmaAnnual(r) {
  const fv = forecastVolForScenario(r, '6M');
  const v = Number(fv?.sigma);
  if (Number.isFinite(v) && v > 0) return v;
  const ewma6m = Number(r?.realized_vol?.['6M']?.underlying_ewma);
  if (Number.isFinite(ewma6m) && ewma6m > 0) return ewma6m;
  const real6m = Number(r?.realized_vol?.['6M']?.underlying);
  if (Number.isFinite(real6m) && real6m > 0) return real6m;
  return null;
}
function yieldBoostIntrinsicAnnualDecay(r) {
  if (!isYieldBoostIncomeStrategy(r)) return null;
  const sigma = yieldBoostUnderlyingSigmaAnnual(r);
  if (!Number.isFinite(sigma) || sigma <= 0) return null;
  const horizonYears = 1.0;
  const weeklyLoss = expectedPutSpreadLossWeekly({
    underlyingReturn: 0, sigmaAnnual: sigma, horizonYears,
  });
  if (weeklyLoss == null || !Number.isFinite(weeklyLoss)) return null;
  const expenseAnnual = YB_DEFAULT_EXPENSE_RATIO_ANNUAL;
  const weeklyExpense = expenseAnnual / 52;
  const weeks = 52;
  const q = Math.max(0.0001, Math.min(1.5, 1 - weeklyLoss - weeklyExpense));
  const navEndRatio = Math.pow(q, weeks);
  return 1 - navEndRatio;
}

// Passive low-β policy: Itô identity (β² − β)/2·σ² ≈ 0 around β ≈ 1,
// so any "expected decay" we report is at best noise. We therefore
// suppress the headline expected-decay/Net edge/Scenario cells for
// these rows on the dashboard and rely on the realized gross drag
// column for the falsifiable measure. See ls-algo daily_screener
// Step 5d ("passive_low_beta policy") and screener_v2_fields
// _expected_decay_available.
function isPassiveLowBetaRow(r) {
  if (r?.product_class === 'passive_low_delta' || r?.product_class === 'passive_low_beta') return true;
  if (r?.expected_decay_available === false && r?.bucket === 'bucket_2_low_beta') {
    return true;
  }
  if (r?.bucket === 'bucket_2_low_beta' && !isYieldBoostIncomeStrategy(r)) {
    return true;
  }
  return false;
}
function expectedDecayAvailableForRow(r) {
  if (r?.expected_decay_available === false) return false;
  if (isPassiveLowBetaRow(r)) return false;
  return true;
}
const PASSIVE_LOW_BETA_POLICY_TOOLTIP =
  'β ≈ 1: vol-drag ≈ 0 in the Itô identity ½·β·(β−1)·σ², so expected decay is hidden by design. Use Gross (realized) instead.';

// Headline Exp. edge (fwd) cell + sort key. Short-favorable positive; log/yr axis.
//   - passive_low_beta / expected_decay_available=false → null (renders '—').
//   - LETF / inverse / vol-ETP: pair P&L = gross vol drag (cash leg absent),
//     so this equals the prior "Exp. decay" column. Sourced from
//     `expected_pair_pnl_p50_annual` (server-side mirror of `expected_gross_decay_p50_annual`).
//   - YieldBOOST: put-spread structural gross from screener (same as Exp. edge
//     anchor for net edge). Weekly pair MC is a separate diagnostic field.
function expectedDecayHeadlineValue(r, chartVolLookbackRange) {
  if (!expectedDecayAvailableForRow(r)) return null;
  const pair = expectedPairPnlDistribution(r);
  if (pair) return pair.p50;
  // Legacy fall-throughs for rows pre-dating the schema migration.
  const dist = expectedDecayDistribution(r);
  if (dist) return dist.p50;
  return expectedDecayDisplayValue(r);
}

/**
 * Annual cash distribution yield for income-style scenario math.
 *
 * Updated (Bucket 2 NAV-normalized calibration, 2026-05): when a scenario
 * sigma is available and the per-ETF income_distribution_calibration block
 * is present (`scripts/income_schedule.py`), derive `d` from
 *     d_weekly = blended_ratio_used * BS_premium(sigma_scenario)
 * so projected cash scales with the scenario vol per the Magis Capital
 * "Bucket 2 Income ETF Structural Decay" research.
 *
 * Legacy `income_yield_trailing_annual` / `income_yield_recent_annual`
 * remain as fallbacks for one release (their semantics were also rewritten
 * to NAV-normalized run-rate by `build_legacy_yield_fields`).
 */
function incomeAnnualYieldForScenario(r, chartVolLookbackRange, scenarioSigma) {
  const IS = typeof window !== 'undefined' ? window.IncomeScenario : null;
  const sigmaScenario = Number(scenarioSigma);
  const calibration = r?.income_distribution_calibration || null;
  if (IS && Number.isFinite(sigmaScenario) && sigmaScenario > 0 && calibration) {
    const calib = IS.calibratedWeeklyDistribution({
      sigmaAnnual: sigmaScenario,
      calibration,
      crossFundRatio: IS.DEFAULT_CROSS_FUND_RATIO,
    });
    if (calib && Number.isFinite(Number(calib.annualizedDistribution))) {
      return Number(calib.annualizedDistribution);
    }
  }
  const trailing = Number(r?.income_yield_trailing_annual);
  if (Number.isFinite(trailing) && trailing > 0) return trailing;
  const recent = Number(r?.income_yield_recent_annual);
  if (Number.isFinite(recent) && recent > 0) return recent;
  if (!isYieldBoostIncomeStrategy(r)) return null;
  const raw = chartVolLookbackRange != null && String(chartVolLookbackRange).trim() !== ''
    ? String(chartVolLookbackRange)
    : '6M';
  const vk = VOL_TF_KEY_BY_RANGE[raw] || '6M';
  const yw = Number(r?.dividend_adjustment?.[vk]?.etf_dividend_yield);
  const winY = DIV_YIELD_WINDOW_YEARS[vk] ?? 0.5;
  if (!Number.isFinite(yw) || yw <= 0 || !(winY > 0)) return null;
  return yw / winY;
}

/**
 * Structural capture-ratio summary for the row (UI column + scenario subhead).
 * Returns null for non-YB rows or when calibration is absent. Band thresholds
 * mirror IncomeScenario.RATIO_BANDS (strong < 0.50, typical 0.50-0.75,
 * weak 0.75-1.00, adverse > 1.00).
 */
function captureRatioSummary(r) {
  if (!isYieldBoostIncomeStrategy(r)) return null;
  const calib = r?.income_distribution_calibration;
  if (!calib) return null;
  const ratio = Number(calib.blended_ratio_used);
  if (!Number.isFinite(ratio)) return null;
  const IS = typeof window !== 'undefined' ? window.IncomeScenario : null;
  const band = IS ? IS.captureRatioBand(ratio) : null;
  const confidence = String(calib.fund_ratio_confidence || 'none');
  let source;
  if (confidence === 'high') source = 'fund (high confidence)';
  else if (confidence === 'medium') source = 'fund + prior (medium)';
  else if (confidence === 'low') source = 'fund + prior (low)';
  else source = 'cross-fund prior';
  return {
    ratio,
    fundMedian: Number(calib.fund_ratio_median),
    p25: Number(calib.fund_ratio_p25),
    p75: Number(calib.fund_ratio_p75),
    crossFund: Number(calib.cross_fund_ratio),
    eventsUsed: Number(calib.events_used) || 0,
    eventsTotal: Number(calib.events_total) || 0,
    confidence,
    source,
    band,
    cadence: String(calib.cadence_label || 'weekly'),
    periodsPerYear: Number(calib.periods_per_year) || 52,
    runRateAnnual: Number(calib.run_rate_annual_display),
  };
}

function normalCdf(x) {
  const z = Number(x);
  if (!Number.isFinite(z)) return z < 0 ? 0 : 1;
  const sign = z < 0 ? -1 : 1;
  const a = Math.abs(z) / Math.SQRT2;
  const p = 0.3275911;
  const t = 1 / (1 + p * a);
  const y = 1 - (((((1.061405429 * t - 1.453152027) * t) + 1.421413741) * t - 0.284496736) * t + 0.254829592) * t * Math.exp(-a * a);
  return 0.5 * (1 + sign * y);
}

function expectedPutSpreadLossWeekly({ underlyingReturn, sigmaAnnual, horizonYears }) {
  const u = Number(underlyingReturn);
  const sigma = Number(sigmaAnnual);
  const t = Number(horizonYears);
  if (!Number.isFinite(u) || u <= -0.9999 || !Number.isFinite(sigma) || sigma <= 0 || !Number.isFinite(t) || t <= 0) {
    return null;
  }
  const tau = 1 / 52;
  const muAnnual = Math.log1p(u) / t;
  const m = (2 * muAnnual - 2 * sigma * sigma) * tau;
  const s = 2 * sigma * Math.sqrt(tau);
  if (!Number.isFinite(m) || !Number.isFinite(s) || s <= 0) return null;

  const spreadPut = (k) => {
    const alpha = (Math.log(k) - m) / s;
    const beta = alpha - s;
    const forward = Math.exp(m + 0.5 * s * s);
    return k * normalCdf(alpha) - forward * normalCdf(beta);
  };
  const shortStrike = 0.95;
  const longStrike = 0.88;
  const loss = spreadPut(shortStrike) - spreadPut(longStrike);
  return Number.isFinite(loss) ? Math.max(0, Math.min(shortStrike - longStrike, loss)) : null;
}

function estimateIncomeStyleScenarioReturn({ underlyingReturn, sigmaAnnual, annualIncomeYield, annualBorrowCost, horizonYears, expenseRatioAnnual = 0.0099 }) {
  if (annualIncomeYield == null) return null;
  const dAnnual = Number(annualIncomeYield);
  const borrowAnnual = Number(annualBorrowCost);
  const t = Number(horizonYears);
  if (!Number.isFinite(dAnnual) || dAnnual < 0 || !Number.isFinite(t) || t <= 0) return null;
  const weeklySpreadLoss = expectedPutSpreadLossWeekly({ underlyingReturn, sigmaAnnual, horizonYears });
  if (weeklySpreadLoss == null) return null;
  const weeks = Math.max(1, Math.round(t * 52));
  const weeklyExpense = Math.max(0, Number(expenseRatioAnnual) || 0) / 52;
  const weeklyDistribution = dAnnual / 52;
  const q = clampNum(1 - weeklySpreadLoss - weeklyExpense, 0.0001, 1.5);
  const navEndRatio = Math.pow(q, weeks);
  const navDecay = 1 - navEndRatio;
  const geomSum = Math.abs(1 - q) < 1e-9 ? weeks : (1 - Math.pow(q, weeks)) / (1 - q);
  const distributionsPaid = weeklyDistribution * geomSum;
  const borrowCost = Number.isFinite(borrowAnnual) && borrowAnnual > 0 ? borrowAnnual * t : 0;
  const netShortPnl = navDecay - distributionsPaid - borrowCost;
  return {
    weeklySpreadLoss,
    navDecay,
    navReturn: -navDecay,
    distributionsPaid,
    borrowCost,
    netShortPnl,
    longTotalReturn: -navDecay + distributionsPaid,
  };
}

/**
 * Vol block for the **chart lookback** (`chartVolLookbackRange` = TIMEFRAMES[].range), same key as ChartPage `volPoint`.
 * Used for diagnostics and as a backward-compatible fallback when the data
 * build has not shipped forecast_vol_underlying_annual.
 */
function realizedVolPointForScenarioColumn(r, chartVolLookbackRange) {
  const raw = chartVolLookbackRange != null && String(chartVolLookbackRange).trim() !== ''
    ? String(chartVolLookbackRange)
    : '6M';
  const volWindowKey = VOL_TF_KEY_BY_RANGE[raw] || '6M';
  return r?.realized_vol?.[volWindowKey] || null;
}

function forecastVolForScenario(r, chartVolLookbackRange) {
  const forecast = Number(r?.forecast_vol_underlying_annual);
  if (Number.isFinite(forecast) && forecast > 0) {
    return {
      sigma: forecast,
      source: r?.forecast_vol_source || 'forecast_vol',
      model: Number.isFinite(Number(r?.forecast_vol_model_annual)) ? Number(r.forecast_vol_model_annual) : null,
      robustEwma: Number.isFinite(Number(r?.forecast_vol_robust_ewma_annual)) ? Number(r.forecast_vol_robust_ewma_annual) : null,
      rawEwma: Number.isFinite(Number(r?.forecast_vol_raw_ewma_annual)) ? Number(r.forecast_vol_raw_ewma_annual) : null,
      realized: Number.isFinite(Number(r?.forecast_vol_realized_annual)) ? Number(r.forecast_vol_realized_annual) : null,
      eventAdjusted: !!r?.forecast_vol_event_adjusted,
      note: r?.forecast_vol_note || null,
      isFallback: false,
    };
  }
  const vp = realizedVolPointForScenarioColumn(r, chartVolLookbackRange);
  const fallback = Number(vp?.underlying_ewma) || Number(vp?.underlying);
  return {
    sigma: Number.isFinite(fallback) && fallback > 0 ? fallback : null,
    source: 'chart_ewma_fallback',
    model: null,
    robustEwma: Number.isFinite(Number(vp?.underlying_robust_ewma)) ? Number(vp.underlying_robust_ewma) : null,
    rawEwma: Number.isFinite(Number(vp?.underlying_ewma)) ? Number(vp.underlying_ewma) : null,
    realized: Number.isFinite(Number(vp?.underlying)) ? Number(vp.underlying) : null,
    eventAdjusted: !!vp?.underlying_robust_event_flag,
    note: 'Fallback: forecast_vol_underlying_annual missing, using chart-lookback EWMA/realized volatility.',
    isFallback: true,
  };
}

/**
 * Expected ETF return over a flat-underlying horizon, from a **long
 * holder's perspective** (this is the headline of the "Exp. ETF return"
 * column in the main grid).
 *
 *   - LETF / inverse / vol-ETP rows  →  `ScenarioReturns.estimateEtfReturn`
 *     with the shared forecast σ from the data builder (50/50 model-implied
 *     variance + robust 6M EWMA variance when both exist).
 *   - YieldBOOST income rows         →  `estimateIncomeStyleScenarioReturn`
 *     **`navReturn + distributionsPaid`** (= `longTotalReturn`): NAV erosion
 *     from weekly 95/88 put-spread + expense, **plus** modeled cash
 *     distributions (trailing/recent yields from the distributions build, or
 *     annualized `dividend_adjustment` cash yield when those are missing).
 *     Still **excludes borrow** (borrow in Net edge). Pair-trade / short
 *     economics use `netShortPnl` in the Scenarios income table.
 *   - Passive low-β / non-income Bucket 2 → `null` (suppressed by policy).
 *
 * Horizon is **3M** by default (caller passes `'3M'` for the headline cell
 * and `'1M'` for the secondary tooltip number). 3M chosen over 1M because
 * CV of the forecast scales as 1/√T (~42% less noisy in relative terms
 * than 1M) and structural decay is more visible at 3M.
 *
 * `chartVolLookbackRange` is only a backward-compatible fallback when older
 * data does not ship forecast_vol_underlying_annual.
 */
// Annualized YieldBOOST expected return at 1Y flat underlying — same engine as
// Exp. ETF return / Scenarios long TR: −NAV decay + cash distributions (no borrow).
function yieldBoostExpectedNetAnnualScenario(r, chartVolLookbackRange, horizonYears = 1) {
  if (!isYieldBoostIncomeStrategy(r)) return null;
  const lookback = chartVolLookbackRange != null && String(chartVolLookbackRange).trim() !== ''
    ? String(chartVolLookbackRange)
    : '6M';
  const t = Number(horizonYears);
  if (!Number.isFinite(t) || t <= 0) return null;
  const forecastVol = forecastVolForScenario(r, lookback);
  const sigma = Number(forecastVol?.sigma);
  if (!Number.isFinite(sigma) || sigma <= 0) return null;
  const annualIncomeYield = incomeAnnualYieldForScenario(r, lookback, sigma);
  if (annualIncomeYield == null || !Number.isFinite(Number(annualIncomeYield))) return null;
  return estimateIncomeStyleScenarioReturn({
    underlyingReturn: 0,
    sigmaAnnual: sigma,
    annualIncomeYield,
    annualBorrowCost: 0,
    horizonYears: t,
  });
}

function computeExpectedEtfReturnFlatUnd(r, chartVolLookbackRange, horizonLabel = '3M') {
  if (suppressScenarioForRow(r)) return null;
  const SR = typeof window !== 'undefined' ? window.ScenarioReturns : null;
  if (!SR || typeof SR.horizonToYears !== 'function') return null;
  const horizonYears = SR.horizonToYears(horizonLabel);
  const lev = Number(r?.delta);
  if (!Number.isFinite(horizonYears) || horizonYears <= 0 || !Number.isFinite(lev)) return null;
  const forecastVol = forecastVolForScenario(r, chartVolLookbackRange);
  const sigma = Number(forecastVol?.sigma);
  if (!Number.isFinite(sigma) || sigma <= 0) return null;
  if (isYieldBoostIncomeStrategy(r)) {
    const modeled = yieldBoostExpectedNetAnnualScenario(r, chartVolLookbackRange, horizonYears);
    if (!modeled) return null;
    const navR = Number(modeled.navReturn);
    const dist = Number(modeled.distributionsPaid);
    if (Number.isFinite(navR) && Number.isFinite(dist)) return navR + dist;
    return null;
  }
  if (typeof SR.estimateEtfReturn !== 'function') return null;
  const res = SR.estimateEtfReturn({
    leverage: lev,
    underlyingReturn: 0,
    sigmaAnnual: sigma,
    horizonYears,
    annualCarryDrag: 0,
    minReturn: -0.9999,
  });
  if (!res.ok) return null;
  const divAdd = dividendCashAdditiveForHorizon(r, chartVolLookbackRange, horizonYears);
  if (!Number.isFinite(divAdd) || divAdd === 0) return res.value;
  const combined = Number(res.value) + divAdd;
  return Number.isFinite(combined) ? combined : res.value;
}

// Convenience wrapper: headline 3M return used by the main-table column.
function computeScenarioEtf3mFlatUnd(r, chartVolLookbackRange) {
  return computeExpectedEtfReturnFlatUnd(r, chartVolLookbackRange, '3M');
}

const STATS_VOL_LADDER_LABELS = { '1M': '1M', '3M': '3M', '6M': '6M', 'YTD': 'YTD', '12M': '1Y', 'ALL': 'ALL' };

/** Window length (years) for `dividend_adjustment` ETF yield keys. */
const DIV_YIELD_WINDOW_YEARS = { '1M': 1 / 12, '3M': 3 / 12, '6M': 6 / 12, 'YTD': 6 / 12, '12M': 1, 'ALL': 1 };

/**
 * Cash dividend contribution to long total return over `horizonYears`:
 * annualizes ETF dividend yield from the chart-lookback window, scales by
 * horizon. Skipped for income-style rows (they use `longTotalReturn`).
 */
function dividendCashAdditiveForHorizon(r, chartVolLookbackRange, horizonYears) {
  if (isYieldBoostIncomeStrategy(r)) return 0;
  const raw = chartVolLookbackRange != null && String(chartVolLookbackRange).trim() !== ''
    ? String(chartVolLookbackRange)
    : '6M';
  const vk = VOL_TF_KEY_BY_RANGE[raw] || '6M';
  const yw = Number(r?.dividend_adjustment?.[vk]?.etf_dividend_yield);
  const winY = DIV_YIELD_WINDOW_YEARS[vk] ?? 0.5;
  if (!Number.isFinite(yw) || yw <= 0 || !Number.isFinite(horizonYears) || horizonYears <= 0 || !(winY > 0)) return 0;
  return (yw / winY) * horizonYears;
}

const fmtSigmaMultiple = (m) => {
  if (!Number.isFinite(Number(m))) return '—';
  const v = Number(m);
  const sign = v > 0 ? '+' : '';
  if (Math.abs(v) < 1e-12) return '0σ';

  if (Math.abs(Math.abs(v) - 1) < 1e-9) return `${sign}${v < 0 ? '-' : ''}1σ`.replace('+-', '-');
  if (Math.abs(Math.abs(v) - (1 / 3)) < 1e-9) return `${v < 0 ? '-' : '+'}1/3σ`;
  return `${sign}${v.toFixed(2)}σ`;
};
const parseThresholdInput = (raw) => {

const quantileSorted = (arr, q) => {
  if (!arr?.length) return null;
  const qq = clampNum(Number(q) || 0, 0, 1);
  const idx = (arr.length - 1) * qq;
  const lo = Math.floor(idx);
  const hi = Math.ceil(idx);
  if (lo === hi) return arr[lo];
  const w = idx - lo;
  return arr[lo] * (1 - w) + arr[hi] * w;
};
function MonteCarloPlot({ result, mode = 'short' }) {
  if (!result?.ok) return null;
  const maxPoints = 180;
  const totalPts = result.settings.steps + 1;
  const stride = Math.max(1, Math.ceil(totalPts / maxPoints));
  const pickIdx = [];
  for (let i = 0; i < totalPts; i += stride) pickIdx.push(i);
  if (pickIdx[pickIdx.length - 1] !== totalPts - 1) pickIdx.push(totalPts - 1);

  const carryAnnual = Number.isFinite(Number(result?.settings?.annualCarryDrag))
    ? Number(result.settings.annualCarryDrag)
    : 0;
  const horizonYears = Number.isFinite(Number(result?.settings?.horizonYears))
    ? Number(result.settings.horizonYears)
    : 0;
  const steps = Math.max(1, Number(result?.settings?.steps) || 1);
  const carryAtIdx = (idxOriginal) => carryAnnual * ((idxOriginal / steps) * horizonYears);
  const toRet = (w, idxOriginal = 0) => {
    const etfRet = Number.isFinite(w) ? (w - 1) : 0;
    if (mode === 'short') return -etfRet - carryAtIdx(idxOriginal);
    return etfRet;
  };
  const allSeries = result.paths.map(p => pickIdx.map(i => toRet(p[i], i)));
  const sampleStride = Math.max(1, Math.floor(allSeries.length / 50));
  const series = allSeries.filter((_, i) => i % sampleStride === 0).slice(0, 50);
  const mean = pickIdx.map(i => toRet(result.overlays.mean[i], i));
  const median = pickIdx.map(i => toRet(result.overlays.p50[i], i));
  const p05 = pickIdx.map(i => toRet(result.overlays.p05[i], i));
  const p95 = pickIdx.map(i => toRet(result.overlays.p95[i], i));
  const meanCenter = mean.reduce((a, b) => a + b, 0) / Math.max(1, mean.length);
  const spreadSeries = p95.map((hi, i) => Math.abs(hi - p05[i])).filter(Number.isFinite);
  const spreadP75 = spreadSeries.length
    ? quantileSorted([...spreadSeries].sort((a, b) => a - b), 0.75)
    : NaN;
  const meanMaxDev = mean.reduce((m, v) => Math.max(m, Math.abs(v - meanCenter)), 0);
  const halfRange = Math.max(
    0.2,
    Number.isFinite(spreadP75) ? spreadP75 * 1.7 : 0,
    Number.isFinite(meanMaxDev) ? meanMaxDev * 1.35 : 0,
  );
  let yMin = meanCenter - halfRange;
  let yMax = meanCenter + halfRange;
  if (!Number.isFinite(yMin) || !Number.isFinite(yMax) || yMin === yMax) {
    yMin = -1;
    yMax = 1;
  }

  const W = 900;
  const H = 260;
  const L = 60;
  const R = 8;
  const T = 8;
  const B = 22;
  const PW = W - L - R;
  const PH = H - T - B;
  const clipId = `mc-clip-${mode}-${result.settings.pathCount}-${result.settings.steps}`;
  const linThresh = Math.max(0.02, halfRange / 12);
  const symlog = (v) => Math.sign(v) * Math.log1p(Math.abs(v) / linThresh);
  const symlogInv = (sv) => Math.sign(sv) * linThresh * (Math.exp(Math.abs(sv)) - 1);
  const yMinS = symlog(yMin);
  const yMaxS = symlog(yMax);
  const x = (i) => L + (i / (pickIdx.length - 1)) * PW;
  const y = (v) => {
    const s = symlog(v);
    return T + (1 - ((s - yMinS) / Math.max(1e-12, (yMaxS - yMinS)))) * PH;
  };
  const linePath = (vals) => vals.map((v, i) => `${i === 0 ? 'M' : 'L'} ${x(i).toFixed(2)} ${y(v).toFixed(2)}`).join(' ');
  const bandPath = `M ${x(0)} ${y(p95[0])} ${p95.map((v, i) => `L ${x(i)} ${y(v)}`).join(' ')} ${[...p05].reverse().map((v, i) => `L ${x(p05.length - 1 - i)} ${y(v)}`).join(' ')} Z`;
  const tickCount = 6;
  const yTicks = Array.from({ length: tickCount }, (_, i) => {
    const q = i / Math.max(1, tickCount - 1);
    const sv = yMaxS - q * (yMaxS - yMinS);
    return symlogInv(sv);
  });

  return (
    <div className="mc-plot">
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
        <defs>
          <clipPath id={clipId}>
            <rect x={L} y={T} width={PW} height={PH} />
          </clipPath>
        </defs>
        <rect x={L} y={T} width={PW} height={PH} fill="rgba(11,19,34,0.2)" stroke="rgba(56,72,96,0.5)" />
        {yTicks.map((tick, i) => (
          <g key={i}>
            <line x1={L} y1={y(tick)} x2={W - R} y2={y(tick)} stroke="rgba(56,72,96,0.35)" strokeWidth="1" />
            <text x={L - 6} y={y(tick) + 3} textAnchor="end" fontSize="10" fill="#7f8ea8" fontFamily="JetBrains Mono">
              {fmt(tick)}
            </text>
          </g>
        ))}
        <text x="12" y={T + 10} fontSize="10" fill="#7f8ea8" fontFamily="JetBrains Mono">
          {mode === 'short' ? 'Short return (log scale)' : 'ETF return (log scale)'}
        </text>
        <g clipPath={`url(#${clipId})`}>
          <path d={bandPath} fill="rgba(59,130,246,0.14)" stroke="none" />
          {series.map((s, i) => (
            <path key={i} d={linePath(s)} fill="none" stroke="rgba(148,163,184,0.24)" strokeWidth="1" />
          ))}
          <path d={linePath(median)} fill="none" stroke="rgba(139,92,246,0.95)" strokeWidth="2.2" />
          <path d={linePath(mean)} fill="none" stroke="rgba(6,182,212,0.95)" strokeWidth="2.2" />
        </g>
      </svg>
    </div>
  );
}

function SimpleSeriesPlot({
  series,
  valueKey,
  color,
  label,
  formatValue,
  zeroLabel = '0',
  overlayValueKey,
  overlayColor,
  overlayLabel,
  referenceValue,
  referenceLabel,
  includeZero = true,
  /** When true, null/blank primary values stay missing (do not coerce via Number(null) → 0). */
  strictNullPrimary = false,
}) {
  if (!Array.isArray(series) || !series.length) {
    return <div className="scenario-warning">No data available.</div>;
  }
  const readPrimary = (p) => {
    const raw = p?.[valueKey];
    if (strictNullPrimary) {
      if (raw == null) return null;
      if (typeof raw === 'string' && !raw.trim()) return null;
    }
    return toFiniteNum(raw);
  };
  const primaryVals = series.map(readPrimary).filter(v => v != null);
  const overlayVals = overlayValueKey
    ? series.map(p => toFiniteNum(p?.[overlayValueKey])).filter(v => v != null)
    : [];
  if (!primaryVals.length && !overlayVals.length) {
    return (
      <div className="scenario-warning">
        {strictNullPrimary
          ? 'No daily volume in this window (missing rows show N/A in the table).'
          : 'No finite values available.'}
      </div>
    );
  }

  const W = 980;
  const H = 300;
  const L = 74;
  const R = 12;
  const T = 12;
  const B = 38;
  const PW = W - L - R;
  const PH = H - T - B;

  const allVals = [...primaryVals, ...overlayVals];
  if (Number.isFinite(Number(referenceValue))) allVals.push(Number(referenceValue));
  const yMinRaw = Math.min(...allVals);
  const yMaxRaw = Math.max(...allVals);
  const baseMin = includeZero ? Math.min(yMinRaw, 0) : yMinRaw;
  const baseMax = includeZero ? Math.max(yMaxRaw, 0) : yMaxRaw;
  const pad = (baseMax - baseMin || Math.max(1, Math.abs(baseMax) * 0.1)) * 0.1;
  const yMin = baseMin - pad;
  const yMax = baseMax + pad;
  const x = (i) => L + (i / Math.max(1, series.length - 1)) * PW;
  const y = (v) => T + (1 - ((v - yMin) / Math.max(1e-12, yMax - yMin))) * PH;

  /** Per-index series; skip non-finite points and start a new stroke after gaps (no diagonal across missing days). */
  const buildPath = (vals) => {
    let out = '';
    let penUp = true;
    for (let i = 0; i < vals.length; i += 1) {
      const v = vals[i];
      if (!Number.isFinite(v)) {
        penUp = true;
        continue;
      }
      if (penUp) {
        out += (out ? ' ' : '') + `M ${x(i).toFixed(2)} ${y(v).toFixed(2)}`;
        penUp = false;
      } else {
        out += ` L ${x(i).toFixed(2)} ${y(v).toFixed(2)}`;
      }
    }
    return out;
  };

  const lineVals = series.map(readPrimary);
  const linePath = buildPath(lineVals);
  const overlayLineVals = overlayValueKey ? series.map(p => toFiniteNum(p?.[overlayValueKey])) : [];
  const overlayPath = overlayValueKey ? buildPath(overlayLineVals) : '';

  const findLatestIdx = (vals) => {
    for (let i = vals.length - 1; i >= 0; i -= 1) {
      if (vals[i] != null && Number.isFinite(vals[i])) return i;
    }
    return -1;
  };
  const latestIdx = findLatestIdx(lineVals);
  const latestVal = latestIdx >= 0 ? lineVals[latestIdx] : NaN;
  const latestLabel = Number.isFinite(latestVal)
    ? `Current: ${formatValue ? formatValue(latestVal) : String(latestVal)}`
    : '';
  const latestLabelY = Number.isFinite(latestVal)
    ? clampNum(y(latestVal) - 7, T + 11, H - B - 4)
    : 0;

  const overlayLatestIdx = overlayValueKey ? findLatestIdx(overlayLineVals) : -1;
  const overlayLatestVal = overlayLatestIdx >= 0 ? overlayLineVals[overlayLatestIdx] : NaN;
  const overlayLatestLabel = Number.isFinite(overlayLatestVal)
    ? `${overlayLabel ? `${overlayLabel}: ` : ''}${formatValue ? formatValue(overlayLatestVal) : String(overlayLatestVal)}`
    : '';

  const ticks = [0, 0.25, 0.5, 0.75, 1].map(q => yMin + (yMax - yMin) * q).reverse();
  const yZero = y(0);
  const refOk = Number.isFinite(Number(referenceValue));
  const yRef = refOk ? y(Number(referenceValue)) : null;
  const dateForIdx = (idx) => {
    const raw = series[idx]?.date;
    if (!raw) return '';
    const d = new Date(`${raw}T00:00:00Z`);
    if (Number.isNaN(d.getTime())) return String(raw);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' });
  };
  const xTickIdx = [0, Math.floor((series.length - 1) / 2), Math.max(0, series.length - 1)];
  const xTickIdxUnique = Array.from(new Set(xTickIdx));

  const primaryColor = color || "rgba(6,182,212,0.95)";
  const ovColor = overlayColor || "rgba(234,179,8,0.95)";

  return (
    <div className="mc-plot" style={{ height: 300, marginBottom: 0 }}>
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet">
        <rect x={L} y={T} width={PW} height={PH} fill="rgba(11,19,34,0.2)" stroke="rgba(56,72,96,0.5)" />
        {ticks.map((tick, i) => (
          <g key={i}>
            <line x1={L} y1={y(tick)} x2={W - R} y2={y(tick)} stroke="rgba(56,72,96,0.35)" strokeWidth="1" />
            <text x={L - 8} y={y(tick) + 4} textAnchor="end" fontSize="11" fill="#9db0d2" fontFamily="DM Sans">
              {formatValue ? formatValue(tick) : String(tick)}
            </text>
          </g>
        ))}
        {includeZero && yZero >= T && yZero <= H - B && (
          <>
            <line
              x1={L}
              y1={yZero}
              x2={W - R}
              y2={yZero}
              stroke="rgba(255,255,255,0.45)"
              strokeWidth="1.3"
              strokeDasharray="6 5"
            />
            <text x={W - R - 4} y={yZero - 5} textAnchor="end" fontSize="11" fill="rgba(255,255,255,0.72)" fontFamily="DM Sans">
              {zeroLabel}
            </text>
          </>
        )}
        {refOk && yRef >= T && yRef <= H - B && (
          <>
            <line x1={L} y1={yRef} x2={W - R} y2={yRef} stroke="rgba(255,255,255,0.38)" strokeWidth="1.15" strokeDasharray="3 4" />
            <text x={W - R - 4} y={yRef - 5} textAnchor="end" fontSize="11" fill="rgba(255,255,255,0.68)" fontFamily="DM Sans">
              {referenceLabel || (formatValue ? formatValue(Number(referenceValue)) : String(referenceValue))}
            </text>
          </>
        )}
        {overlayPath && (
          <path d={overlayPath} fill="none" stroke={ovColor} strokeWidth="1.6" strokeDasharray="5 4" />
        )}
        <path d={linePath} fill="none" stroke={primaryColor} strokeWidth="2" />
        {Number.isFinite(latestVal) && (
          <>
            <circle cx={x(latestIdx)} cy={y(latestVal)} r="3.2" fill={primaryColor} />
            <text
              x={W - R - 6}
              y={latestLabelY}
              textAnchor="end"
              fontSize="11"
              fill="#d8e4f8"
              fontFamily="DM Sans"
            >
              {latestLabel}
            </text>
          </>
        )}
        {Number.isFinite(overlayLatestVal) && (
          <>
            <circle cx={x(overlayLatestIdx)} cy={y(overlayLatestVal)} r="2.8" fill={ovColor} />
            <text
              x={W - R - 6}
              y={clampNum(y(overlayLatestVal) + 14, T + 22, H - B - 4)}
              textAnchor="end"
              fontSize="11"
              fill={ovColor}
              fontFamily="DM Sans"
            >
              {overlayLatestLabel}
            </text>
          </>
        )}
        <text x="14" y={T + 14} fontSize="12" fill="#c9d7ef" fontFamily="DM Sans">{label}</text>
        {overlayPath && overlayLabel && (
          <g>
            <line x1={L + 14} y1={T + 30} x2={L + 34} y2={T + 30} stroke={ovColor} strokeWidth="1.6" strokeDasharray="5 4" />
            <text x={L + 40} y={T + 34} fontSize="11" fill={ovColor} fontFamily="DM Sans">{overlayLabel}</text>
          </g>
        )}
        {xTickIdxUnique.map((idx, i) => (
          <g key={`x-${i}`}>
            <line x1={x(idx)} y1={H - B + 1} x2={x(idx)} y2={H - B + 6} stroke="rgba(120,138,168,0.7)" strokeWidth="1" />
            <text x={x(idx)} y={H - 8} textAnchor="middle" fontSize="10" fill="#93a7c8" fontFamily="DM Sans">
              {dateForIdx(idx)}
            </text>
          </g>
        ))}
      </svg>
    </div>
  );
}

function fmtPxRange(start, end) {
  const a = Number(start);
  const b = Number(end);
  if (!Number.isFinite(a) || !Number.isFinite(b)) return '—';
  return `${fmtUsd(a)} → ${fmtUsd(b)}`;
}

/** TR data-quality badge for Decay / Backtest (split-aware coverage from price_basis.js). */
function TrCoverageBadge({ coverage, etfLabel }) {
  if (!coverage || !Number.isFinite(Number(coverage.trJointDays))) return null;
  const q = String(coverage.quality || 'good');
  const pct = (x) => (Number.isFinite(Number(x)) ? `${Math.round(Number(x) * 100)}%` : '—');
  const splitLabel = coverage.splitMode === 'discrete_split'
    ? `split ${coverage.splitMult || '?'}× @ ${coverage.splitBoundary || '?'}`
    : 'Yahoo continuous (no close jump)';
  const etfBasisLabels = {
    yahoo_adj: 'Yahoo adj close',
    yahoo_adj_mapped: 'Yahoo adj (pre-split mapped)',
    nav_tr: 'NAV TR fallback',
    close_scaled: 'Close scaled',
    split_adjusted: 'Split-adjusted',
    mixed: 'Mixed basis',
  };
  const etfBasis = etfBasisLabels[coverage.primaryEtfBasis] || coverage.primaryEtfBasis || '—';
  return (
    <div className={cls('tr-coverage-badge', q === 'degraded' && 'degraded', q === 'poor' && 'poor')}>
      <span className="tcb-title">TR coverage ({etfLabel || 'ETF'})</span>
      <span className="tcb-item">{coverage.trJointDays} joint days</span>
      <span className="tcb-item">ETF adj {pct(coverage.etfAdjCoveragePct)}</span>
      <span className="tcb-item">Und adj {pct(coverage.undAdjCoveragePct)}</span>
