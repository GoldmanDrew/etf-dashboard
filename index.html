                      </div>
                    </div>
                    <div className="news-group-count">{g.items.length} article{g.items.length === 1 ? '' : 's'} {exp ? 'v' : '>'}</div>
                  </div>
                  {exp && (
                    <div className="news-group-links">
                      {g.items.map(it => (
                        <a
                          key={it.id}
                          className="news-group-link"
                          href={it.url || '#'}
                          target="_blank"
                          rel="noopener noreferrer"
                          onClick={e => { if (!it.url) e.preventDefault(); }}
                        >
                          <span>{it.title || '(no title)'}</span>
                          <span>{fmtRelativeTime(it.published_utc)}</span>
                        </a>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        ) : (
          <div className="news-feed">
            {filteredItems.map(it => (
              <NewsCard
                key={it.id}
                item={it}
                bucketOf={bucketOf}
                onNavigate={onNavigateToChart}
                eventsById={eventsById}
              />
            ))}
          </div>
        )
      )}
    </div>
  );
}

// ── Top-level Flow page ──────────────────────────────
function FlowPage({ payload, intradayPayload = null, intradayError = null, bucketOf, onNavigateToChart }) {
  const [mode, setMode] = useState(() => (intradayPayload?.byUnderlying ? 'intraday' : 'eod'));
  // If intraday data lands after first render, jump to it once.
  useEffect(() => {
    if (mode === 'eod' && intradayPayload?.byUnderlying && Object.keys(intradayPayload.byUnderlying).length > 0) {
      // Only auto-switch on the very first time we see a non-empty intraday payload.
      // Subsequent user toggles win.
    }
  }, [intradayPayload]);  // eslint-disable-line react-hooks/exhaustive-deps

  const eodRows = useMemo(() => {
    const map = payload?.byUnderlying || {};
    return Object.keys(map).map((und) => ({ underlying: und, ...map[und] }));
  }, [payload]);
  const intradayRows = useMemo(() => {
    const map = intradayPayload?.byUnderlying || {};
    return Object.keys(map).map((und) => ({ underlying: und, ...map[und] }));
  }, [intradayPayload]);

  const allRows = mode === 'intraday' ? intradayRows : eodRows;
  const latestDate = mode === 'intraday'
    ? (intradayPayload?.asOf || null)
    : (payload?.latestDate || null);
  const buildTime = mode === 'intraday'
    ? (intradayPayload?.buildTime || null)
    : (payload?.buildTime || null);
  const flowStaleSummary = payload?.flowStaleSummary || null;
  const method = mode === 'intraday'
    ? (intradayPayload?.method || 'L × (L − 1) × prior-close AUM × return so far')
    : (payload?.method || null);

  const [search, setSearch] = useState('');
  const [sortKey, setSortKey] = useState('abs_net_moc');
  const [sortDesc, setSortDesc] = useState(true);
  const [direction, setDirection] = useState('all');
  const [hideMissingAdv, setHideMissingAdv] = useState(false);
  const [hideStaleAggregates, setHideStaleAggregates] = useState(true);
  const [hideSingleFund, setHideSingleFund] = useState(false);
  const [minFunds, setMinFunds] = useState(0);

  // Read the "net dollars" field for the current mode.
  const netDollarsOf = useCallback((row) => (
    mode === 'intraday'
      ? Number(row?.estimated_net_close_rebalance_dollars)
      : Number(row?.net_moc_dollars)
  ), [mode]);
  const remainingDollarsOf = useCallback((row) => (
    mode === 'intraday'
      ? (Number.isFinite(Number(row?.remaining_close_rebalance_dollars))
          ? Number(row.remaining_close_rebalance_dollars)
          : Number(row?.estimated_net_close_rebalance_dollars))
      : Number(row?.net_moc_dollars)
  ), [mode]);
  const fundsOf = useCallback((row) => (
    mode === 'intraday' ? Number(row?.n_funds_priced || 0) : Number(row?.n_funds || 0)
  ), [mode]);

  const sortValue = useCallback((row, key) => {
    const net = netDollarsOf(row);
    const v = (
      key === 'abs_net_moc' ? Math.abs(net) :
      key === 'abs_remaining' ? Math.abs(remainingDollarsOf(row)) :
      key === 'abs_pct_adv' ? Math.abs(Number(
        mode === 'intraday' ? row.estimated_close_rebalance_pct_adv_20d : row.net_moc_pct_adv_20d,
      )) :
      key === 'abs_pct_aum' ? Math.abs(Number(
        mode === 'intraday' ? row.estimated_close_rebalance_pct_aum : row.net_moc_pct_letf_aum,
      )) :
      key === 'abs_z60' ? Math.abs(Number(row.net_moc_z_60d)) :
      key === 'underlying' ? row.underlying :
      key === 'n_funds' ? fundsOf(row) :
      key === 'return' ? Number(mode === 'intraday' ? row.return_d1_so_far : row.underlying_return_d1) :
      key === 'abs_volume_so_far' ? Math.abs(Number(row.volume_so_far_pct_adv)) :
      row[key]
    );
    if (typeof v === 'string') return v;
    const n = Number(v);
    return Number.isFinite(n) ? n : null;
  }, [mode, netDollarsOf, remainingDollarsOf, fundsOf]);

  const filtered = useMemo(() => {
    const q = (search || '').trim().toUpperCase();
    let out = allRows.filter((row) => {
      if (q && !String(row.underlying || '').toUpperCase().includes(q)) {
        const inContrib = (row.top_contributors || []).some(
          (c) => String(c?.ticker || '').toUpperCase().includes(q),
        );
        if (!inContrib) return false;
      }
      const net = netDollarsOf(row);
      if (direction === 'buy' && !(net > 0)) return false;
      if (direction === 'sell' && !(net < 0)) return false;
      if (hideMissingAdv && !(Number.isFinite(Number(row.underlying_dollar_adv_20d)) && Number(row.underlying_dollar_adv_20d) > 0)) return false;
      if (mode === 'eod' && hideStaleAggregates && row.is_latest_global === false) return false;
      if (hideSingleFund && fundsOf(row) < 2) return false;
      if (fundsOf(row) < Number(minFunds || 0)) return false;
      return true;
    });
    out = [...out].sort((a, b) => {
      const av = sortValue(a, sortKey);
      const bv = sortValue(b, sortKey);
      const an = av == null ? (sortDesc ? -Infinity : Infinity) : av;
      const bn = bv == null ? (sortDesc ? -Infinity : Infinity) : bv;
      if (typeof an === 'string' || typeof bn === 'string') {
        const sa = String(an); const sb = String(bn);
        return sortDesc ? sb.localeCompare(sa) : sa.localeCompare(sb);
      }
      return sortDesc ? bn - an : an - bn;
    });
    return out;
  }, [allRows, search, direction, hideMissingAdv, hideStaleAggregates, hideSingleFund, minFunds, sortKey, sortDesc, sortValue]);

  const headlineRows = useMemo(() => {
    if (mode === 'intraday') {
      return allRows.filter((row) => row.spot_stale !== true);
    }
    return allRows.filter((row) => row.is_latest_global !== false);
  }, [allRows, mode]);

  const headline = useMemo(() => {
    const netOf = (r) => netDollarsOf(r);
    const grossOf = (r) => Number(
      mode === 'intraday' ? r?.estimated_gross_close_rebalance_dollars : r?.gross_moc_dollars,
    );
    const sortedByAbs = [...headlineRows].sort(
      (a, b) => Math.abs(netOf(b) || 0) - Math.abs(netOf(a) || 0),
    );
    const buys = headlineRows.filter((r) => netOf(r) > 0).sort((a, b) => netOf(b) - netOf(a));
    const sells = headlineRows.filter((r) => netOf(r) < 0).sort((a, b) => netOf(a) - netOf(b));
    const grossMoc = headlineRows.reduce(
      (sum, r) => sum + (Number.isFinite(grossOf(r)) ? grossOf(r) : 0),
      0,
    );
    const latestEodCount = mode === 'eod'
      ? allRows.filter((r) => r.is_latest_global !== false).length
      : headlineRows.length;
    return {
      total: allRows.length,
      headlineCount: headlineRows.length,
      latestEodCount,
      topByAbs: sortedByAbs[0] || null,
      topBuy: buys[0] || null,
      topSell: sells[0] || null,
      grossMoc,
    };
  }, [allRows, headlineRows, mode, netDollarsOf]);

  const handleSort = useCallback((key) => {
    if (sortKey === key) setSortDesc((d) => !d);
    else { setSortKey(key); setSortDesc(true); }
  }, [sortKey]);

  const sortIndicator = useCallback((key) => (sortKey === key ? (sortDesc ? ' ▼' : ' ▲') : ''), [sortKey, sortDesc]);

  if (!allRows.length) {
    const otherMode = mode === 'intraday' ? 'eod' : 'intraday';
    const otherCount = otherMode === 'intraday' ? intradayRows.length : eodRows.length;
    return (
      <div className="news-content">
        <h2 className="news-title">LETF rebalance flow — by underlying</h2>
        <div className="news-chip-row" style={{ marginTop: 8 }}>
          <div className={cls('news-chip', mode === 'eod' && 'active')} onClick={() => setMode('eod')}>▦ EOD ({eodRows.length})</div>
          <div className={cls('news-chip', mode === 'intraday' && 'active')} onClick={() => setMode('intraday')}>⌁ Intraday (live · {intradayRows.length})</div>
        </div>
        <div className="news-empty" style={{ marginTop: 10 }}>
          <div className="news-empty-icon">◉</div>
          <div className="news-empty-title">
            {mode === 'intraday' ? 'No intraday snapshot loaded yet' : 'EOD flow data not available'}
          </div>
          <div>
            {mode === 'intraday'
              ? <>The <code>market-hours.yml</code> workflow refreshes intraday flow during US RTH via <code>ci_tick.py</code> (~every 15 min when stale). {intradayError ? <><br/><span className="val-negative">{intradayError}</span></> : null}</>
              : <>Run <code>python scripts/build_letf_rebalance_flows.py</code> to build the EOD aggregates.</>}
            {otherCount > 0 ? <> <a href="#" onClick={(e) => { e.preventDefault(); setMode(otherMode); }}>Switch to {otherMode === 'intraday' ? 'Intraday (live)' : 'EOD'} ({otherCount})</a>.</> : null}
          </div>
        </div>
      </div>
    );
  }

  const advFieldName = mode === 'intraday' ? 'estimated_close_rebalance_pct_adv_20d' : 'net_moc_pct_adv_20d';
  const aumFieldName = mode === 'intraday' ? 'estimated_close_rebalance_pct_aum' : 'net_moc_pct_letf_aum';
  const returnFieldName = mode === 'intraday' ? 'return_d1_so_far' : 'underlying_return_d1';

  return (
    <div className="news-content">
      <h2 className="news-title">LETF rebalance flow — by underlying</h2>
      <div className="news-subtitle">
        Mechanical issuer hedge into the close: <code>{method || 'L × (L − 1) × prior-close AUM × underlying return'}</code>.
        {mode === 'intraday'
          ? <> Snapshot {latestDate ? fmtTime(latestDate) : '—'}{intradayPayload?.minutesToClose != null ? ` · ${intradayPayload.minutesToClose}m to close` : ''}{buildTime ? ` · built ${fmtTime(buildTime)}` : ''}.</>
          : <> Latest aggregate {latestDate || '—'}{buildTime ? ` · built ${fmtTime(buildTime)}` : ''}{mode === 'eod' ? <> · {fmtNum(headline.latestEodCount)}/{fmtNum(headline.total)} on latest session</> : null}
            {mode === 'eod' && flowStaleSummary ? (
              <> · {Number(flowStaleSummary.underlyings_actionable_stale || 0) > 0
                ? <span className="val-negative">{fmtNum(flowStaleSummary.underlyings_actionable_stale)} actionable stale</span>
                : (Number(flowStaleSummary.underlyings_stale || 0) > 0
                  ? <span className="val-warning">{fmtNum(flowStaleSummary.underlyings_stale)} T+1 lag</span>
                  : 'all current')}
              </>
            ) : null}.</>}
        {mode === 'intraday' && intradayError ? <> · <span className="val-negative">{intradayError}</span></> : null}
        {mode === 'intraday' && intradayPayload?.spotSources ? (
          <> · spots: polygon {fmtNum(intradayPayload.spotSources.polygon_snapshot)} · cache {fmtNum(intradayPayload.spotSources.options_cache)} · yf {fmtNum(intradayPayload.spotSources.yfinance_fast_info)}</>
        ) : null}
        {mode === 'intraday' && Number.isFinite(Number(intradayPayload?.nFundsPricedNav)) ? (
          <>
            {' '}· funds priced spot {fmtNum(intradayPayload.nFundsPricedSpot)} / nav {fmtNum(intradayPayload.nFundsPricedNav)} / blend {fmtNum(intradayPayload.nFundsPricedBlend)}
            {intradayPayload.navForecastBuildTime ? <> · NAV forecast {fmtTime(intradayPayload.navForecastBuildTime)}</> : null}
            {intradayPayload.blendOverridesCount > 0 ? <> · {fmtNum(intradayPayload.blendOverridesCount)} per-ticker calibrations</> : null}
          </>
        ) : null}
      </div>

      <div className="news-chip-row" style={{ marginTop: 8 }}>
        <div
          className={cls('news-chip', mode === 'eod' && 'active')}
          onClick={() => setMode('eod')}
          title="Yesterday's realised close-rebalance (issuer NAV/AUM × underlying close)."
        >
          ▦ EOD ({eodRows.length})
        </div>
        <div
          className={cls('news-chip', mode === 'intraday' && 'active')}
          onClick={() => setMode('intraday')}
          title="Live estimate of today's close-rebalance using intraday underlying moves."
        >
          ⌁ Intraday (live · {intradayRows.length})
        </div>
      </div>

      <div className="chart-stats" style={{ marginTop: 6 }}>
        <div className="chart-stat">
          <div className="cs-label">{mode === 'intraday' ? 'Underlyings priced' : 'Underlyings tracked'}</div>
          <div className="cs-value">{fmtNum(headline.total)}</div>
          <div className="cs-sub">
            {mode === 'intraday'
              ? <>Σ |gross est.| {fmtCompactSignedMoney(headline.grossMoc)} · {fmtNum(headline.headlineCount)} fresh</>
              : <>Σ gross MOC {fmtCompactSignedMoney(headline.grossMoc)} · headlines use latest session</>}
          </div>
        </div>
        <div className="chart-stat">
          <div className="cs-label">Top buy pressure</div>
          <div className={cls('cs-value', flowValClass(netDollarsOf(headline.topBuy)))}>
            {fmtSignedMoney(netDollarsOf(headline.topBuy))}
          </div>
          <div className="cs-sub">
            {headline.topBuy?.underlying || '—'}
            {Number.isFinite(Number(headline.topBuy?.[advFieldName]))
              ? <> · {fmtPctDecimal(headline.topBuy[advFieldName], 2)} of {mode === 'intraday' ? '20d median $ ADV' : '20d $ ADV'}</>
              : null}
          </div>
        </div>
        <div className="chart-stat">
          <div className="cs-label">Top sell pressure</div>
          <div className={cls('cs-value', flowValClass(netDollarsOf(headline.topSell)))}>
            {fmtSignedMoney(netDollarsOf(headline.topSell))}
          </div>
          <div className="cs-sub">
            {headline.topSell?.underlying || '—'}
            {Number.isFinite(Number(headline.topSell?.[advFieldName]))
              ? <> · {fmtPctDecimal(headline.topSell[advFieldName], 2)} of {mode === 'intraday' ? '20d median $ ADV' : '20d $ ADV'}</>
              : null}
          </div>
        </div>
        <div className="chart-stat">
          <div className="cs-label">Largest |net|</div>
          <div className={cls('cs-value', flowValClass(netDollarsOf(headline.topByAbs)))}>
            {fmtSignedMoney(netDollarsOf(headline.topByAbs))}
          </div>
          <div className="cs-sub">
            {headline.topByAbs?.underlying || '—'}
            {fundsOf(headline.topByAbs) > 0 ? <> · {fmtNum(fundsOf(headline.topByAbs))} fund(s)</> : null}
          </div>
        </div>
      </div>

      <div className="news-filters" style={{ marginTop: 12 }}>
        <input
          type="text"
          className="news-search"
          placeholder="Filter by underlying or contributor (e.g. SPY, NVDA, MSTR)…"
          value={search}
          onChange={(e) => setSearch(e.target.value)}
          style={{ minWidth: 280 }}
        />
        <div className="news-chip-row">
          {[
            { key: 'all', label: `All (${allRows.length})` },
            { key: 'buy', label: 'Buy' },
            { key: 'sell', label: 'Sell' },
          ].map((opt) => (
            <div
              key={opt.key}
              className={cls('news-chip', direction === opt.key && 'active')}
              onClick={() => setDirection(opt.key)}
            >
              {opt.label}
            </div>
          ))}
        </div>
        <label className="news-toggle" onClick={() => setHideMissingAdv((v) => !v)}>
          {hideMissingAdv ? '[x]' : '[ ]'} Hide rows without $ ADV
        </label>
        <label className="news-toggle" onClick={() => setHideStaleAggregates((v) => !v)}>
          {hideStaleAggregates ? '[x]' : '[ ]'} Latest build only
        </label>
        <label className="news-toggle" onClick={() => setHideSingleFund((v) => !v)}>
          {hideSingleFund ? '[x]' : '[ ]'} Hide single-fund underlyings
        </label>
      </div>

      <div className="news-feed-title" style={{ marginTop: 14 }}>
        {filtered.length} of {allRows.length} underlyings
      </div>

      <div className="scenario-table-wrap" style={{ marginTop: 6, maxHeight: '70vh', overflow: 'auto' }}>
        <table className="scenario-table">
          <thead>
            <tr>
              <th onClick={() => handleSort('underlying')} style={{ cursor: 'pointer' }}>Underlying{sortIndicator('underlying')}</th>
              <th>{mode === 'intraday' ? 'As of' : 'Date'}</th>
              <th onClick={() => handleSort('abs_net_moc')} style={{ cursor: 'pointer' }} title={mode === 'intraday' ? 'Estimated close net rebalance' : 'Realised net MOC'}>
                {mode === 'intraday' ? 'Est. close $' : 'Net MOC $'}{sortIndicator('abs_net_moc')}
              </th>
              {mode === 'intraday' ? (
                <th onClick={() => handleSort('abs_remaining')} style={{ cursor: 'pointer' }} title="Estimated remaining-to-close = (1 − today_volume/20d_ADV) × est. close $">
                  Remaining $ {sortIndicator('abs_remaining')}
                </th>
              ) : null}
              <th onClick={() => handleSort('abs_pct_aum')} style={{ cursor: 'pointer' }}>% LETF AUM{sortIndicator('abs_pct_aum')}</th>
              <th onClick={() => handleSort('abs_pct_adv')} style={{ cursor: 'pointer' }}>
                {mode === 'intraday' ? '% 20d median $ ADV' : '% 20d $ ADV'}{sortIndicator('abs_pct_adv')}
              </th>
              {mode === 'intraday' ? (
                <th onClick={() => handleSort('abs_volume_so_far')} style={{ cursor: 'pointer' }} title="Today's cumulative share volume × spot, as % of 20d median dollar ADV">
                  Today vol / ADV{sortIndicator('abs_volume_so_far')}
                </th>
              ) : null}
              <th onClick={() => handleSort('return')} style={{ cursor: 'pointer' }}>
                {mode === 'intraday' ? 'Und ret so far' : 'Und ret'}{sortIndicator('return')}
              </th>
              <th onClick={() => handleSort('n_funds')} style={{ cursor: 'pointer' }}># Funds{sortIndicator('n_funds')}</th>
              {mode === 'eod' ? (
                <>
                  <th onClick={() => handleSort('net_moc_5d_dollars')} style={{ cursor: 'pointer' }}>5d net{sortIndicator('net_moc_5d_dollars')}</th>
                  <th onClick={() => handleSort('net_moc_20d_dollars')} style={{ cursor: 'pointer' }}>20d net{sortIndicator('net_moc_20d_dollars')}</th>
                  <th onClick={() => handleSort('abs_z60')} style={{ cursor: 'pointer' }}>z60{sortIndicator('abs_z60')}</th>
                </>
              ) : null}
              <th>Top contributor</th>
            </tr>
          </thead>
          <tbody>
            {filtered.slice(0, 500).map((row) => {
              const stale = row.is_latest_global === false || (mode === 'intraday' && row.spot_stale === true);
              const staleReason = row.aggregate_stale_reason
                ? (VrpUi.flowStaleReasonLabel ? VrpUi.flowStaleReasonLabel(row.aggregate_stale_reason) : row.aggregate_stale_reason)
                : null;
              const top = (row.top_contributors || [])[0] || null;
              const topDollars = mode === 'intraday' ? top?.estimated_close_rebalance_dollars : top?.rebalance_signed_dollars;
              const dateLabel = mode === 'intraday'
                ? (row.as_of ? fmtTime(row.as_of) : '—')
                : (row.date || '—');
              const netVal = netDollarsOf(row);
              const remainingVal = remainingDollarsOf(row);
              return (
                <tr key={row.underlying} style={stale ? { opacity: 0.7 } : undefined}>
                  <td>
                    <strong>{row.underlying}</strong>
                    {stale && staleReason ? (
                      <span className="cs-sub" style={{ marginLeft: 6 }} title={row.aggregate_stale_reason || ''}>· {staleReason}</span>
                    ) : (stale ? <span className="cs-sub" style={{ marginLeft: 6 }}>· stale</span> : null)}
                  </td>
                  <td>{dateLabel}</td>
                  <td
                    className={flowValClass(netVal)}
                    title={
                      mode === 'intraday'
                        ? (
                            'Blended ' + fmtSignedMoney(netVal)
                            + (Number.isFinite(Number(row.estimated_net_close_rebalance_dollars_spot))
                                ? ' · spot ' + fmtSignedMoney(row.estimated_net_close_rebalance_dollars_spot)
                                : '')
                            + (Number.isFinite(Number(row.estimated_net_close_rebalance_dollars_nav))
                                ? ' · nav ' + fmtSignedMoney(row.estimated_net_close_rebalance_dollars_nav)
                                : '')
                            + (Number.isFinite(Number(row.mean_blend_weight_nav)) && row.mean_blend_weight_nav > 0
                                ? ' · w_nav≈' + Number(row.mean_blend_weight_nav).toFixed(2)
                                : '')
                          )
                        : fmtSignedMoney(netVal)
                    }
                  >
                    {fmtCompactSignedMoney(netVal)}
                  </td>
                  {mode === 'intraday' ? (
                    <td className={flowValClass(remainingVal)} title={fmtSignedMoney(remainingVal)}>
                      {fmtCompactSignedMoney(remainingVal)}
                    </td>
                  ) : null}
                  <td className={flowValClass(row[aumFieldName])}>
                    {fmtPctDecimal(row[aumFieldName], 2)}
                  </td>
                  <td className={flowValClass(row[advFieldName])}>
                    {fmtPctDecimal(row[advFieldName], 2)}
                  </td>
                  {mode === 'intraday' ? (
                    <td className={flowValClass(row.volume_so_far_pct_adv)}>
                      {fmtPctDecimal(row.volume_so_far_pct_adv, 1)}
                    </td>
                  ) : null}
                  <td className={flowValClass(row[returnFieldName])}>
                    {fmtPctDecimal(row[returnFieldName], 2)}
                  </td>
                  <td>{fmtNum(fundsOf(row))}</td>
                  {mode === 'eod' ? (
                    <>
                      <td className={flowValClass(row.net_moc_5d_dollars)}>{fmtCompactSignedMoney(row.net_moc_5d_dollars)}</td>
                      <td className={flowValClass(row.net_moc_20d_dollars)}>{fmtCompactSignedMoney(row.net_moc_20d_dollars)}</td>
                      <td className={flowValClass(row.net_moc_z_60d)}>
                        {Number.isFinite(Number(row.net_moc_z_60d)) ? Number(row.net_moc_z_60d).toFixed(2) : '—'}
                      </td>
                    </>
                  ) : null}
                  <td>
                    {top ? (
                      <a
                        href={`#/chart/${encodeURIComponent(top.ticker)}/flow`}
                        onClick={(e) => {
                          e.preventDefault();
                          if (typeof onNavigateToChart === 'function') {
                            window.location.hash = `/chart/${encodeURIComponent(top.ticker)}/flow`;
                          }
                        }}
                      >
                        {top.ticker}
                      </a>
                    ) : '—'}
                    {topDollars != null
                      ? <> · <span className={flowValClass(topDollars)}>{fmtCompactSignedMoney(topDollars)}</span></>
                      : null}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      {filtered.length > 500 ? (
        <div className="news-empty" style={{ marginTop: 8, padding: '12px' }}>
          Showing first 500 rows · refine the search or sort to narrow.
        </div>
      ) : null}
    </div>
  );
}

// ── Main App ────────────────────────────────
function App({ authUser = null, onLogout = null, authEnabled = false } = {}) {
  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(true);
  const [activeTab, setActiveTab] = useState('all');
  const [search, setSearch] = useState('');
  const [sortKey, setSortKey] = useState('net_edge_p50_annual');
  const [sortDesc, setSortDesc] = useState(true);
  const [expandedSym, setExpandedSym] = useState(null);
  const [showInfo, setShowInfo] = useState(false);
  const [showNews, setShowNews] = useState(false);
  const [showFlow, setShowFlow] = useState(false);
  const [showYbEdge, setShowYbEdge] = useState(false);
  const [eventCalendar, setEventCalendar] = useState(null);
  const [letfFlowsCache, setLetfFlowsCache] = useState(LETF_REBALANCE_FLOWS_CACHE);
  const [letfIntradayCache, setLetfIntradayCache] = useState(LETF_INTRADAY_FLOWS_CACHE);
  const [letfIntradayError, setLetfIntradayError] = useState(null);
  const [chartRecord, setChartRecord] = useState(null);
  /** When opening a chart from the hash, optionally land on Backtest, Flow, or Trade Lab (`#/chart/SYM/trade`). */
  const [chartDefaultPanel, setChartDefaultPanel] = useState('chart');
  /** Persisted chart timeframe (TIMEFRAMES[].range); drives TradingView embed and realized-vol diagnostics. Scenarios/default Exp. ETF return use forecast_vol_underlying_annual. */
  const [chartVolLookbackRange, setChartVolLookbackRange] = useState(TIMEFRAMES[2].range);
  const [corporateActions, setCorporateActions] = useState(null);
  const [etfNews, setEtfNews] = useState(null);
  const [newsError, setNewsError] = useState(null);
  const [metricsCacheTick, setMetricsCacheTick] = useState(0);
  const [borrowHistoryMap, setBorrowHistoryMap] = useState(() => BORROW_HISTORY_CACHE || {});
  // P0a: load vrp_health alongside dashboard_data so the topbar freshness pill
  // can show the worst-of clock (build_time, options refresh, holdings_as_of,
  // worst per-row sleeve/underlying quote age) rather than just build_time.
  const [vrpHealth, setVrpHealth] = useState(null);
  const [freshnessSummary, setFreshnessSummary] = useState(null);
  const [vrpFieldDict, setVrpFieldDict] = useState(null);

  useEffect(() => {
    let cancelled = false;
    const refetchHealth = () => {
      const cacheBust = `?t=${Math.floor(Date.now() / 60000)}`;
      fetch(`${VRP_HEALTH_URL}${cacheBust}`, { cache: 'no-store' })
        .then((r) => (r.ok ? r.json() : null))
        .then((p) => { if (!cancelled && p) setVrpHealth(p); })
        .catch(() => { /* best-effort */ });
      fetch(`${FRESHNESS_SUMMARY_URL}${cacheBust}`, { cache: 'no-store' })
        .then((r) => (r.ok ? r.json() : null))
        .then((p) => { if (!cancelled && p) setFreshnessSummary(p); })
        .catch(() => { /* best-effort */ });
    };
    refetchHealth();
    const id = setInterval(refetchHealth, 5 * 60 * 1000);
    const onVis = () => { if (document.visibilityState === 'visible') refetchHealth(); };
    document.addEventListener('visibilitychange', onVis);
    return () => {
      cancelled = true;
      clearInterval(id);
      document.removeEventListener('visibilitychange', onVis);
    };
  }, []);

  useEffect(() => {
    let cancelled = false;
    const cacheBust = `?t=${Math.floor(Date.now() / 3600000)}`;
    fetch(`${VRP_FIELD_DICT_URL}${cacheBust}`, { cache: 'no-store' })
      .then((r) => (r.ok ? r.json() : null))
      .then((p) => { if (!cancelled && p) setVrpFieldDict(p); })
      .catch(() => { /* tooltips fall back to empty string */ });
    return () => { cancelled = true; };
  }, []);

  useEffect(() => {
    let cancelled = false;
    Promise.all([
      loadEtfMetricsCache().catch(() => null),
      loadVolShapeHistoryCache().catch(() => null),
      loadBorrowHistoryCache().catch(() => null),
      loadLetfRebalanceFlowsCache().catch(() => null),
      loadLetfIntradayFlowsCache({ force: true }).catch((err) => {
        setLetfIntradayError(err?.message || 'intraday flow data unavailable');
        return null;
      }),
    ]).then(() => {
      if (cancelled) return;
      setMetricsCacheTick((n) => n + 1);
      if (BORROW_HISTORY_CACHE) setBorrowHistoryMap(BORROW_HISTORY_CACHE);
      if (LETF_REBALANCE_FLOWS_CACHE) setLetfFlowsCache(LETF_REBALANCE_FLOWS_CACHE);
      if (LETF_INTRADAY_FLOWS_CACHE) setLetfIntradayCache(LETF_INTRADAY_FLOWS_CACHE);
    });
    return () => { cancelled = true; };
  }, []);

  useEffect(() => {
    let cancelled = false;
    let loadGen = 0;
    let visTimer = null;
    const load = () => {
      const myGen = ++loadGen;
      const cacheBust = `?v=${Date.now()}`;
      fetch(`${DATA_URL}${cacheBust}`, { cache: 'no-store' })
        .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
        .then(d => {
          if (!cancelled && myGen === loadGen) {
            setData(d);
            setLoading(false);
          }
        })
        .catch(e => {
          if (!cancelled && myGen === loadGen) {
            setError(e.message);
            setLoading(false);
          }
        });
    };
    load();
    const onVis = () => {
      if (document.visibilityState !== 'visible' || cancelled) return;
      if (visTimer) clearTimeout(visTimer);
      visTimer = setTimeout(() => { if (!cancelled) load(); }, 400);
    };
    document.addEventListener('visibilitychange', onVis);
    return () => {
      cancelled = true;
      if (visTimer) clearTimeout(visTimer);
      document.removeEventListener('visibilitychange', onVis);
    };
  }, []);

  // Corporate actions + news: refetch whenever the News tab opens so we never keep an
  // empty first-load stuck in memory after GitHub Actions commits new JSON.  No
  // module-level cache — each open uses a fresh cache-bust (GitHub Pages can be
  // sticky on static assets otherwise).
  useEffect(() => {
    if (!showNews) return undefined;
    let cancelled = false;
    setNewsError(null);
    const cacheBust = `?t=${Date.now()}`;
    const fetchJson = async (url) => {
      const res = await fetch(`${url}${cacheBust}`, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status} for ${url}`);
      return res.json();
    };
    (async () => {
      try {
        const [ca, nw] = await Promise.all([
          fetchJson(CORPORATE_ACTIONS_URL),
          fetchJson(ETF_NEWS_URL),
        ]);
        if (cancelled) return;
        setCorporateActions(ca);
        setEtfNews(nw);
      } catch (e) {
        if (!cancelled) setNewsError(e?.message || 'News data unavailable');
      }
    })();
    return () => { cancelled = true; };
  }, [showNews]);

  // Poll the intraday LETF flow snapshot while it's likely visible. Throttled
  // to 90 s -- the source workflow rebuilds every 5 min, but multiple builds
  // can race during the close burst, so 90 s catches them quickly without
  // hammering Pages.
  useEffect(() => {
    const shouldPoll = showFlow || !!chartRecord;
    if (!shouldPoll) return undefined;
    let cancelled = false;
    const tick = () => {
      loadLetfIntradayFlowsCache({ force: true })
        .then(() => {
          if (!cancelled && LETF_INTRADAY_FLOWS_CACHE) {
            setLetfIntradayCache({ ...LETF_INTRADAY_FLOWS_CACHE });
            setLetfIntradayError(null);
          }
        })
        .catch((err) => {
          if (!cancelled) setLetfIntradayError(err?.message || 'intraday flow data unavailable');
        });
    };
    tick();
    const handle = setInterval(tick, 90_000);
    const onVis = () => { if (document.visibilityState === 'visible') tick(); };
    document.addEventListener('visibilitychange', onVis);
    return () => {
      cancelled = true;
      clearInterval(handle);
      document.removeEventListener('visibilitychange', onVis);
    };
  }, [showFlow, chartRecord]);

  // Hash-based routing for chart + news pages.
  useEffect(() => {
    const handleHash = () => {
      const hash = window.location.hash;
      const chartMatch = /^#\/chart\/([^/]+)(?:\/(backtest|flow|trade|vrp|decay))?$/i.exec(hash);
      if (chartMatch && data) {
        const sym = decodeURIComponent(chartMatch[1]).toUpperCase();
        const rec = (data.records || []).find(r => r.symbol === sym);
        if (rec) {
          setChartRecord(rec);
          setShowInfo(false);
          setShowNews(false);
          setShowFlow(false);
          setShowYbEdge(false);
          const panel = String(chartMatch[2] || '').toLowerCase();
          setChartDefaultPanel(
            panel === 'backtest' ? 'backtest'
              : panel === 'flow' ? 'flow'
                : panel === 'trade' ? 'trade'
                  : panel === 'vrp' ? 'vrp'
                    : panel === 'decay' ? 'decay'
                      : 'chart',
          );
          return;
        }
      }
      if (hash === '#/news') {
        setChartRecord(null);
        setShowInfo(false);
        setShowNews(true);
        setShowFlow(false);
        setShowYbEdge(false);
        return;
      }
      if (hash === '#/flow') {
        setChartRecord(null);
        setShowInfo(false);
        setShowNews(false);
        setShowFlow(true);
        setShowYbEdge(false);
        return;
      }
      if (hash === '#/yb-edge') {
        setChartRecord(null);
        setShowInfo(false);
        setShowNews(false);
        setShowFlow(false);
        setShowYbEdge(true);
        return;
      }
      if (hash === '#/backtest') {
        window.location.replace(`${window.location.pathname}${window.location.search}#`);
        return;
      }
      setChartRecord(null);
      setShowNews(false);
      setShowFlow(false);
      setShowYbEdge(false);
      setChartDefaultPanel('chart');
    };
    handleHash();
    window.addEventListener('hashchange', handleHash);
    return () => window.removeEventListener('hashchange', handleHash);
  }, [data]);

  const navigateToChart = useCallback((recordOrSymbol) => {
    const sym = typeof recordOrSymbol === 'string'
      ? recordOrSymbol
      : (recordOrSymbol?.symbol || '');
    if (!sym) return;
    window.location.hash = `/chart/${encodeURIComponent(String(sym).toUpperCase())}`;
  }, []);

  const navigateToNews = useCallback(() => {
    window.location.hash = '/news';
  }, []);

  const navigateToFlow = useCallback(() => {
    window.location.hash = '/flow';
  }, []);

  const navigateToYbEdge = useCallback(() => {
    window.location.hash = '/yb-edge';
  }, []);

  // Lazy-load the combined event calendar once when the YB Edge page is first
  // opened; the file is small (~6 KB after seed fallback) so refreshing it on
  // every page open is unnecessary.
  useEffect(() => {
    if (!showYbEdge || eventCalendar) return;
    const cacheBust = `?t=${Math.floor(Date.now() / 60000)}`;
    fetch(`data/event_calendar_combined.json${cacheBust}`, { cache: 'no-store' })
      .then((r) => (r.ok ? r.json() : null))
      .then((p) => { if (p) setEventCalendar(p); })
      .catch(() => { /* best-effort; YB edge page still works without */ });
  }, [showYbEdge, eventCalendar]);

  const navigateBack = useCallback(() => {
    window.location.hash = '';
  }, []);

  // Stable lookup: symbol -> bucket, for coloring ticker chips in the News tab.
  const bucketOf = useCallback((sym) => {
    if (!sym || !data?.records) return null;
    const hit = data.records.find(r => r.symbol === sym.toUpperCase());
    return hit?.bucket || null;
  }, [data]);

  const chartVolTfLabel = useMemo(
    () => (TIMEFRAMES.find(t => t.range === chartVolLookbackRange) || TIMEFRAMES[2]).label,
    [chartVolLookbackRange],
  );

  const records = data?.records || [];
  const summary = data?.summary || {};

  const bucketMap = {
    all: null,
    bucket_1: 'bucket_1_high_beta',
    bucket_2: 'bucket_2_low_beta',
    bucket_3: 'bucket_3_inverse',
  };

  const filtered = useMemo(() => {
    let d = [...records];
    const bf = bucketMap[activeTab];
    if (bf) d = d.filter(r => r.bucket === bf);
    if (search) {
      const s = search.toUpperCase();
      d = d.filter(r => r.symbol.includes(s) || r.underlying.includes(s));
    }
    d.sort((a, b) => {
      let av = sortKey === SCENARIO_ETF_3M_FLAT_SORT_KEY
        ? computeScenarioEtf3mFlatUnd(a, chartVolLookbackRange)
        : sortKey === 'expected_pair_pnl_p50_annual' || sortKey === 'expected_gross_decay_p50_annual' || sortKey === 'expected_gross_decay_annual'
        ? expectedDecayHeadlineValue(a, chartVolLookbackRange)
        : sortKey === 'vol_underlying_annual'
        ? volHeadlineValue(a, 'underlying', chartVolLookbackRange)
        : sortKey === 'vol_etf_annual'
        ? volHeadlineValue(a, 'etf', chartVolLookbackRange)
        : a[sortKey];
      let bv = sortKey === SCENARIO_ETF_3M_FLAT_SORT_KEY
        ? computeScenarioEtf3mFlatUnd(b, chartVolLookbackRange)
        : sortKey === 'expected_pair_pnl_p50_annual' || sortKey === 'expected_gross_decay_p50_annual' || sortKey === 'expected_gross_decay_annual'
        ? expectedDecayHeadlineValue(b, chartVolLookbackRange)
        : sortKey === 'vol_underlying_annual'
        ? volHeadlineValue(b, 'underlying', chartVolLookbackRange)
        : sortKey === 'vol_etf_annual'
        ? volHeadlineValue(b, 'etf', chartVolLookbackRange)
        : b[sortKey];
      if (av == null) av = sortDesc ? -Infinity : Infinity;
      if (bv == null) bv = sortDesc ? -Infinity : Infinity;
      if (typeof av === 'string') return sortDesc ? bv.localeCompare(av) : av.localeCompare(bv);
      if (typeof av === 'boolean') { av = av ? 1 : 0; bv = bv ? 1 : 0; }
      return sortDesc ? bv - av : av - bv;
    });
    return d;
  }, [records, activeTab, search, sortKey, sortDesc, chartVolLookbackRange]);

  const tabCounts = useMemo(() => {
    const c = { all: records.length, bucket_1: 0, bucket_2: 0, bucket_3: 0 };
    records.forEach(r => {
      if (r.bucket === 'bucket_1_high_beta') c.bucket_1++;
      if (r.bucket === 'bucket_2_low_beta') c.bucket_2++;
      if (r.bucket === 'bucket_3_inverse') c.bucket_3++;
    });
    return c;
  }, [records]);

  const handleSort = key => {
    if (sortKey === key) setSortDesc(d => !d);
    else { setSortKey(key); setSortDesc(true); }
  };

  if (loading) return <div className="app"><div className="loading"><div className="spinner"/>Loading dashboard data…</div></div>;
  if (error) return <div className="app"><div className="error-banner">Failed to load data: {error}. Make sure <code>data/dashboard_data.json</code> exists. Run <code>python scripts/build_data.py</code> to generate it.</div></div>;

  // schema_v=4 introduced the weekly-rebalanced compound MC forward edge,
  // sigma-regime triplet, and 5x5 pair_scenario_grid. Older builds will
  // still render but the σ-regime column and Scenarios heatmap will fall
  // back to single-cell summaries. Warn the operator.
  const schemaV = Number(data?.schema_v);
  const schemaTooOld = Number.isFinite(schemaV) && schemaV < 4;

  return (
    <div className="app">
      {schemaTooOld && (
        <div
          className="error-banner"
          style={{
            background: 'rgba(255, 165, 0, 0.12)',
            color: 'var(--text-warning, #f59e0b)',
            borderBottom: '1px solid rgba(245,158,11,0.25)',
            padding: '6px 12px',
            fontSize: 12,
          }}
          title="schema_v < 4: pair_pnl on legacy axis, no σ-regime, no scenario heatmap"
        >
          Data file is from an older build (schema_v={schemaV}); some columns may be on the legacy axis.
          Rerun <code>python scripts/build_data.py</code> for the weekly-rebalanced compound forward edge + Scenarios heatmap.
        </div>
      )}
      {/* ── Topbar ──────── */}
      <div className="topbar">
        <div className="topbar-left">
          <div className="topbar-logo" onClick={() => { navigateBack(); setShowInfo(false); }}>ETF BORROW DASH</div>
          <div className="topbar-meta">
            <span className={cls('dot', data.ibkr_ftp_success ? 'dot-green' : 'dot-amber')} />
            {data.ibkr_ftp_success ? 'IBKR Live' : 'CSV Data'}
            <VrpFreshnessBar mode="fleet" data={data} vrpHealth={vrpHealth} freshnessSummary={freshnessSummary} />
            <span style={{ margin: '0 4px' }}>·</span>
            <span title={data.build_time ? `UTC: ${data.build_time}` : ''}>Built {fmtTime(data.build_time)}</span>
            {data.last_commit && <>
              <span style={{ margin: '0 4px' }}>·</span>
              Screener: <a href={`https://github.com/${data.source_repo}/blob/${data.source_branch}/${data.source_path || 'data/etf_screened_today.csv'}`} target="_blank">{data.last_commit.sha}</a>
            </>}
          </div>
        </div>
        <div className="topbar-right">
          {authEnabled && authUser && (
            <>
              <span className="topbar-user" title={authUser}>{authUser}</span>
              <button type="button" className="topbar-btn" onClick={() => { onLogout && onLogout(); }}>
                Log out
              </button>
            </>
          )}
          <button
            className={cls('topbar-btn', showYbEdge && !chartRecord && 'active')}
            onClick={() => { if (showYbEdge) navigateBack(); else navigateToYbEdge(); }}
            title="YieldBOOST σ-space edge ranking + earnings overlay"
          >
            ◆ YB Edge
          </button>
          <button
            className={cls('topbar-btn', showFlow && !chartRecord && 'active')}
            onClick={() => { if (showFlow) navigateBack(); else navigateToFlow(); }}
            title="LETF rebalance flow ranked by underlying"
          >
            ⌁ Flow
          </button>
          <button
            className={cls('topbar-btn', showNews && !chartRecord && 'active')}
            onClick={() => { if (showNews) navigateBack(); else navigateToNews(); }}
          >
            ▦ News
          </button>
          <button className={cls('topbar-btn', showInfo && !chartRecord && !showNews && !showFlow && !showYbEdge && 'active')} onClick={() => { navigateBack(); setShowInfo(s => !s); }}>
            ◉ Info
          </button>
        </div>
      </div>

      {/* ── Chart Page ──────── */}
      {chartRecord ? (
        <ChartPage
          key={chartRecord.symbol}
          record={chartRecord}
          allRecords={records}
          onNavigateToChart={navigateToChart}
          onBack={navigateBack}
          chartVolLookbackRange={chartVolLookbackRange}
          setChartVolLookbackRange={setChartVolLookbackRange}
          defaultPanel={chartDefaultPanel}
          dashboardBuildTime={data.build_time}
          intradayFlows={letfIntradayCache}
          intradayFlowsError={letfIntradayError}
          vrpFieldDict={vrpFieldDict}
        />
      ) : showYbEdge ? (
        <YbEdgePage
          onNavigateToChart={navigateToChart}
          onBack={navigateBack}
          eventCalendar={eventCalendar}
          vrpFieldDict={vrpFieldDict}
        />
      ) : showFlow ? (
        <FlowPage
          payload={letfFlowsCache}
          intradayPayload={letfIntradayCache}
          intradayError={letfIntradayError}
          bucketOf={bucketOf}
          onNavigateToChart={navigateToChart}
        />
      ) : showNews ? (
        <NewsPage
          eventsPayload={corporateActions}
          newsPayload={etfNews}
          loadError={newsError}
          bucketOf={bucketOf}
          onNavigateToChart={navigateToChart}
        />
      ) : showInfo ? (
        <InfoPage data={data} />
      ) : (
        <>
          {/* ── Summary ──────── */}
          <div className="summary-strip">
            <SummaryCard label="Total Symbols" value={fmtNum(summary.total_symbols)} />
            <SummaryCard
              label="Top realized net (gross − avg borrow)"
              value={summary.top_realized_net_vs_avg_borrow?.[0] ? fmt(summary.top_realized_net_vs_avg_borrow[0].realized_net_vs_avg_borrow) : '—'}
              sub={summary.top_realized_net_vs_avg_borrow?.[0]?.symbol || ''}
              color="var(--positive)"
            />
            <SummaryCard
              label="Top net edge (p50)"
              value={summary.top_net_edge?.[0] ? fmt(summary.top_net_edge[0].net_edge_p50_annual) : '—'}
              sub={summary.top_net_edge?.[0]?.symbol || ''}
              color="var(--positive)"
            />
            <SummaryCard label="IBKR FTP" value={data.ibkr_ftp_success ? `${data.ibkr_symbols_fetched}` : 'Offline'}
              sub={data.ibkr_ftp_success ? 'symbols live' : 'using CSV'}
              color={data.ibkr_ftp_success ? 'var(--positive)' : 'var(--warning)'}
            />
            <div className="summary-card">
              <div className="label">Top 5 realized net (gross − hist. borrow)</div>
              <ul className="highlight-list">
                {(summary.top_realized_net_vs_avg_borrow || []).map(s => (
                  <li key={s.symbol}>
                    <span className="sym">{s.symbol}</span>
                    <span className="val-positive">{fmt(s.realized_net_vs_avg_borrow)}</span>
                  </li>
                ))}
              </ul>
            </div>
            <div className="summary-card">
              <div className="label">Top 5 net edge (p50)</div>
              <ul className="highlight-list">
                {(summary.top_net_edge || []).map(s => (
                  <li key={s.symbol}>
                    <span className="sym">{s.symbol}</span>
                    <span className="val-positive">{fmt(s.net_edge_p50_annual)}</span>
                  </li>
                ))}
              </ul>
            </div>
          </div>

          <ExpectedDecayCalculator />

          {/* ── Tabs ──────────── */}
          <div className="tab-bar">
            {[
              { key: 'all', label: 'All ETFs' },
              { key: 'bucket_1', label: 'Bucket 1 — High β' },
              { key: 'bucket_2', label: 'Bucket 2 — Low β' },
              { key: 'bucket_3', label: 'Bucket 3 — Inverse' },
            ].map(t => (
              <div key={t.key} className={cls('tab', activeTab === t.key && 'active')}
                onClick={() => setActiveTab(t.key)}>
                {t.label}<span className="count">{tabCounts[t.key]}</span>
              </div>
            ))}
          </div>

          {/* ── Controls ──────── */}
          <div className="controls-bar">
            <div className="search-wrapper">
              <span className="search-icon">⌕</span>
              <input className="search-box" placeholder="Search symbol or underlying…"
                value={search} onChange={e => setSearch(e.target.value)} />
            </div>
            <span style={{ fontSize: 12, color: 'var(--text-muted)', fontFamily: "'JetBrains Mono', monospace" }}>
              {filtered.length} results
            </span>
          </div>

          <p style={{ padding: '0 24px 6px', margin: 0, fontSize: 11, color: 'var(--text-muted)', lineHeight: 1.45, maxWidth: 1100 }}>
            <strong style={{ color: 'var(--text-secondary)' }}>Short lens (annual, + better for a β-hedged short):</strong>{' '}
            <strong>Gross (realized)</strong> — trailing hedge drag (β·r<sub>U</sub> − r<sub>ETF</sub>), ×252.{' '}
            <strong>Exp. edge (fwd)</strong> — forward structural gross decay before borrow (log/yr). YieldBOOST = screener put-spread MC (Net edge anchor). LETF/inverse/vol-ETP = vol-drag. Weekly pair MC is a YB diagnostic (hover).{' '}
            <strong>Net edge</strong> — bootstrap of past gross + borrow, level-shifted to Exp. edge fwd via inverse-variance blend; dot = p50, whisker = p5–p95. Details below.
          </p>
          <p style={{ padding: '0 24px 8px', margin: 0, fontSize: 11, color: 'var(--text-muted)', lineHeight: 1.45, maxWidth: 1100 }}>
            <strong style={{ color: 'var(--text-secondary)' }}>Long lens (3M, different sign):</strong>{' '}
            <strong>Exp. ETF return</strong> — long <strong>total return</strong> if the underlying is flat, <strong>borrow excluded</strong>; income names add <strong>cash payouts</strong> on top of the NAV path (+ is good for longs, bad for naked shorts). Same forecast σ as Scenarios. Hover for 1M/6M. Passive low-β (non-income): <strong>—</strong>.{' '}
            <strong>Vol Und / Vol ETF</strong> — best-estimate σ (Vol Und = forecast blend, same as Scenarios; Vol ETF = 6M robust EWMA). Hover for realized ladder.
            {data?.uncertainty_footnote && (
              <span> {data.uncertainty_footnote}</span>
            )}
          </p>

          <details className="decay-methodology">
            <summary>Decay math — compact reference for the main columns</summary>
            <div className="dm-body">
              <div className="dm-block">
                <div className="dm-title">Sign convention &amp; column map</div>
                <p style={{ margin: '0 0 8px', lineHeight: 1.5 }}>
                  Edge columns are <em>short-favorable positive</em> (+ = good for a β-hedged short).
                  <br /><br />
                  <strong>Gross (realized)</strong>: trailing β·r<sub>U</sub> − r<sub>ETF</sub> × 252 (always shown when available).
                  <br /><br />
                  <strong>Exp. edge (fwd)</strong>: forward structural gross decay before borrow (log/yr). YieldBOOST = screener put-spread MC (same anchor as Net edge). LETF/inverse/vol-ETP = vol-drag identity. Weekly pair MC is a separate YB diagnostic.
                  <br /><br />
                  <strong>Net edge</strong>: inverse-variance Bayesian blend of Exp. edge (fwd) p50 and the realized bootstrap, minus borrow.
                  <br /><br />
                  <strong>Exp. ETF return (3M)</strong>: long total return at flat underlying (NAV + cash for income), borrow excluded. Long-favorable sign; different horizon and object than Exp. edge (fwd).
                </p>
              </div>
              <div className="dm-block">
                <div className="dm-title">Volatility — which σ feeds what</div>
                <p style={{ margin: '0 0 8px', lineHeight: 1.5 }}>
                  <strong>HARQ-Log (LETF / inverse)</strong> forecasts a <em>distribution</em> of integrated variance from daily <em>RV</em> + quarticity, then maps to decay quantiles (see <code>ls-algo/decay_distribution.py</code>).
                  <br /><br />
                  <strong>Itô fallback / CSV point</strong> uses one σ:{' '}
                  <code className="dm-formula">σ = √( mean(r²<sub>U,t</sub>) × 252 )</code> on underlying log returns.
                  <br /><br />
                  <strong>YieldBOOST</strong>: headline Exp. edge (fwd) = screener put-spread structural gross (<code>yieldboost_put_spread</code> / <code>_point</code>). Weekly compound pair MC (<code>expected_pair_pnl_weekly_mc_*</code>) is diagnostic-only.
                  <br /><br />
                  <strong>Scenarios + Exp. ETF return</strong> share <code>forecast_vol_underlying_annual</code>, a <strong>variance blend</strong>:{' '}
                  <code className="dm-formula">σ²_forecast = ½·σ²_model + ½·σ²_robust6M EWMA</code>
                  (model σ from forward decay; EWMA leg can be event-clipped). <strong>Vol Und</strong> in the grid uses this same forecast blend. <strong>Vol ETF</strong> uses 6M robust EWMA on ETF returns (no forward model leg). Realized ladders remain on the Stats tab.
                </p>
              </div>
              <div className="dm-block">
                <div className="dm-title">Net edge fan (visual)</div>
                <p style={{ margin: '0 0 8px', lineHeight: 1.5 }}>
                  <strong>Whisker</strong> slate = p5–p95 · <strong>Box</strong> cyan = p25–p75 · <strong>Dot</strong> blue = p50.
                  Flow: block-bootstrap daily hedge drag → annual realized gross draws (μ_R, σ_R) → inverse-variance blend with forward Exp. edge (fwd) p50 (μ_F, σ_F from p10/p90 band): posterior = w_F·μ_F + (1−w_F)·μ_R → shift realized draws so mean = posterior → subtract borrow resamples → net quantiles. YieldBOOST anchor is put-spread structural gross from the screener; weekly pair MC is diagnostic-only. Row JSON: <code>gross_blend_method</code>, <code>gross_blend_weight_forward</code>, <code>gross_sigma_*_annual</code>, <code>expected_pair_pnl_weekly_mc_*</code>. Histogram in <code>net_edge_hist_json</code>.
                </p>
              </div>
              <div className="dm-block">
                <div className="dm-title">Gross (realized) — <code>gross_decay_annual</code></div>
                <p style={{ margin: '0 0 8px', lineHeight: 1.5 }}>
                  With r<sub>L</sub>, r<sub>U</sub> daily log returns (ETF, underlying):{' '}
                  <code className="dm-formula">d<sub>t</sub> = β·r<sub>U,t</sub> − r<sub>L,t</sub></code>,{' '}
                  <code className="dm-formula">gross_decay_annual = mean(d_t) × 252</code>.
                  Same for every product: realized hedge drag on the log/yr axis — not the YieldBOOST gross put-spread NAV band.
                </p>
              </div>
              <div className="dm-block">
                <div className="dm-title">Exp. edge (fwd) — forward pair-trade P&L median (+ band)</div>
                <p style={{ margin: '0 0 8px', lineHeight: 1.5 }}>
                  Median 1Y forward pair-trade P&L: short ETF + β-long underlying. Short-favorable positive; log/yr axis (<code>expected_pair_pnl_p50_annual</code>).
                  <br /><br />
                  <strong>LETF / inverse</strong>: no cash leg → equals gross vol-drag. Mirrors <code>expected_gross_decay_p50_annual</code> (HARQ-Log or Itô fallback). Pre-borrow.
                  <br /><br />
                  <strong>Vol ETPs</strong>: Itô core + roll/tracking from screener. Pre-borrow.
                  <br /><br />
                  <strong>YieldBOOST</strong>: screener put-spread structural gross (<code>expected_gross_decay_p50_annual</code> → <code>expected_pair_pnl_p50_annual</code>), before borrow. Weekly compound pair MC (<code>expected_pair_pnl_weekly_mc_p50_annual</code>) includes distributions + borrow — diagnostic only, not the headline cell.
                  <br /><br />
                  This is the <strong>anchor</strong> for the Net edge inverse-variance blend. Passive low-β (non-income): hidden by policy.
                </p>
              </div>
              <div className="dm-block">
                <div className="dm-title">Exp. ETF return (3M) — long TR, flat spot, no borrow</div>
                <p style={{ margin: '0 0 8px', lineHeight: 1.5 }}>
                  Horizon <strong>3M</strong>, underlying shock <strong>0</strong>, σ = <code>forecast_vol_underlying_annual</code> (Scenarios match). Cash dates: Scenarios tab.
                  <br /><br />
                  <strong>LETF / inverse / vol-ETP</strong>: vol drag with <em>L</em> = β:{' '}
                  <code className="dm-formula">dragLog = ½·L·(L−1)·σ²·T</code>,{' '}
                  <code className="dm-formula">r<sub>ETF</sub> ≈ e<sup>−dragLog</sup> − 1</code> + dividend accrual when <code>dividend_adjustment</code> exists.
                  <br /><br />
                  <strong>Income</strong>: long TR = <strong>−NAV decay + cash</strong> (Scenarios closed form; borrow omitted). Different object from Exp. edge (fwd).
                  <br /><br />
                  Hover cell for 1M/6M. Non-income passive Bucket 2: <strong>—</strong>.
                </p>
              </div>
              <div className="dm-block">
                <div className="dm-title">Net (gross−borrow) — expanded row</div>
                <p style={{ margin: '0 0 8px', lineHeight: 1.5 }}>
                  <code className="dm-formula">net_decay ≈ gross_decay_annual − borrow_current</code>
                  — one-line realized bookkeeping; not the bootstrap median.
                </p>
              </div>
              <div className="dm-block">
                <div className="dm-title">Net edge — bootstrap band</div>
                <p style={{ margin: '0 0 8px', lineHeight: 1.5 }}>
                  Resample gross + borrow, blend with forward p50 → p5…p95. Copula / ρ grid = stress choices in the bootstrap, not a full joint tail model.
                </p>
              </div>
            </div>
          </details>

          {/* ── Table ─────────── */}
          <div className="table-container">
            <table className="etf-table">
              <thead>
                <tr>
                  <th style={{ width: 30 }}></th>
                  {COLS.map(col => (
                    <th key={col.key} style={{ width: col.w }}
                      className={sortKey === col.key ? 'sorted' : ''}
                      onClick={() => handleSort(col.key)}
                      title={[col.sublabel ? `${col.label} — ${col.sublabel}` : col.label, col.hint].filter(Boolean).join('. ')}
                    >
                      <div className={col.sublabel ? 'th-stack' : ''}>
                        <span className="th-main">{col.label}</span>
                        {col.sublabel ? <span className="th-sub">{col.sublabel}</span> : null}
                      </div>
                      {sortKey === col.key && <span className="sort-arrow">{sortDesc ? '▼' : '▲'}</span>}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map(r => {
                  const expanded = expandedSym === r.symbol;
                  const expEtf3m = computeExpectedEtfReturnFlatUnd(r, chartVolLookbackRange, '3M');
                  const expEtf1m = computeExpectedEtfReturnFlatUnd(r, chartVolLookbackRange, '1M');
                  const expEtf6m = computeExpectedEtfReturnFlatUnd(r, chartVolLookbackRange, '6M');
                  return (
                    <React.Fragment key={r.symbol}>
                      <tr onClick={() => setExpandedSym(expanded ? null : r.symbol)}>
                        <td style={{ textAlign: 'center', fontSize: 10, color: 'var(--text-muted)' }}>
                          {expanded ? '▾' : '▸'}
                        </td>
                        <td>
                          <span className="sym-cell" onClick={e => { e.stopPropagation(); navigateToChart(r); }}>
                            {r.symbol}
                            {r.strategy_blacklisted ? (
                              <span className="badge badge-stale" style={{ marginLeft: 6, fontSize: 9, verticalAlign: 'middle' }} title="On strategy blacklist — listed for dashboards only; not sized in trade plan / rebalancer.">BL</span>
                            ) : null}
                          </span>
                        </td>
                        <td className="underlying-cell" title={isYieldBoostFoF(r) ? fofUnderlyingTooltip(r) : undefined}>
                          {isYieldBoostFoF(r) ? fofUnderlyingDisplayLabel(r) : r.underlying}
                        </td>
                        <td>{r.delta?.toFixed(2) ?? '—'}</td>
                        <td className={borrowCls(getBorrowRate(r))} title={borrowSourceHint(borrowDisplay(r, borrowHistoryMap?.[r.symbol], { dashboardBuildTime: data.build_time }))}>
                          {fmt(getBorrowRate(r))} {borrowBadge(getBorrowRate(r))}
                        </td>
                        <td>{fmtNum(r.shares_available)}</td>
                        <td title="Realized trailing hedge drag (ls-algo screener)">{fmt(r.gross_decay_annual)}</td>
                        <td title={decayDistTooltip(r, chartVolLookbackRange)}>
                          {renderExpectedDecayCell(r, chartVolLookbackRange)}
                        </td>
                        <td style={{ verticalAlign: 'middle' }}>
                          {isPassiveLowBetaRow(r) ? (
                            <span title={PASSIVE_LOW_BETA_POLICY_TOOLTIP} style={{ color: 'var(--text-muted)' }}>
                              —
                            </span>
                          ) : (
                            <NetEdgeMergedCell r={r} />
                          )}
                        </td>
                        <td
                          className={scenarioValueCls(r, expEtf3m)}
                          title={
                            isPassiveLowBetaRow(r)
                              ? PASSIVE_LOW_BETA_POLICY_TOOLTIP
                              : suppressScenarioForRow(r)
                                ? 'Hidden for passive low-β (non-income): scenario not meaningful at β≈1.'
                                : (() => {
                                    const lines = [];
                                    if (isYieldBoostIncomeStrategy(r)) {
                                      lines.push('Long total return, no borrow (cash + NAV path).');
                                      lines.push('= −NAV decay + cash from weekly 95/88 model (0% shock row in Scenarios).');
                                      lines.push(`σ (forecast): ${fmt(forecastVolForScenario(r, chartVolLookbackRange).sigma)} (${r?.forecast_vol_source || 'forecast_vol'}).`);
                                    } else {
                                      lines.push('Long total return, no borrow: Itô vol path + small dividend accrual when data exist.');
                                      lines.push(`σ (forecast): ${fmt(forecastVolForScenario(r, chartVolLookbackRange).sigma)}.`);
                                      lines.push('Ex-dates: Scenarios tab.');
                                    }
                                    if (r?.forecast_vol_event_adjusted) lines.push('EWMA leg clipped a large one-day move.');
                                    lines.push('');
                                    lines.push('Other horizons:');
                                    lines.push(`  1M: ${expEtf1m != null && Number.isFinite(expEtf1m) ? fmt(expEtf1m) : '—'}`);
                                    lines.push(`  3M: ${expEtf3m != null && Number.isFinite(expEtf3m) ? fmt(expEtf3m) : '—'}  (table headline)`);
                                    lines.push(`  6M: ${expEtf6m != null && Number.isFinite(expEtf6m) ? fmt(expEtf6m) : '—'}`);
                                    return lines.join('\n');
                                  })()
                          }
                        >
                          {expEtf3m != null && Number.isFinite(expEtf3m) ? fmt(expEtf3m) : '—'}
                        </td>
                        <td title={volHeadlineTooltip(r, "underlying", chartVolLookbackRange)}>{fmt(volHeadlineValue(r, 'underlying', chartVolLookbackRange))}</td>
                        <td title={volHeadlineTooltip(r, "etf", chartVolLookbackRange)}>{fmt(volHeadlineValue(r, 'etf', chartVolLookbackRange))}</td>
                      </tr>
                      {expanded && <DetailRow r={r} chartVolLookbackRange={chartVolLookbackRange} dashboardBuildTime={data.build_time} metricsCacheTick={metricsCacheTick} borrowHistoryMap={borrowHistoryMap} />}
                    </React.Fragment>
                  );
                })}
                {filtered.length === 0 && (
                  <tr>
                    <td colSpan={COLS.length + 1} style={{
                      textAlign: 'center', padding: 40, color: 'var(--text-muted)', fontSize: 14,
                    }}>
                      No matching ETFs found.
                    </td>
                  </tr>
                )}
              </tbody>
            </table>
          </div>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<DashboardRoot />);
</script>
</body>
</html>
