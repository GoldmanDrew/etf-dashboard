<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ETF Borrow Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='85'>⚡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0e17;
    --bg-secondary: #111827;
    --bg-card: #151d2e;
    --bg-card-hover: #1a2438;
    --bg-input: #0d1424;
    --border: #1e2d46;
    --border-active: #3b82f6;
    --text-primary: #e8ecf4;
    --text-secondary: #8896ae;
    --text-muted: #566580;
    --accent-blue: #3b82f6;
    --accent-green: #10b981;
    --accent-red: #ef4444;
    --accent-amber: #f59e0b;
    --accent-purple: #8b5cf6;
    --accent-cyan: #06b6d4;
    --positive: #10b981;
    --negative: #ef4444;
    --warning: #f59e0b;
    --stale: #6b7280;
    --ne-whisker: rgba(148, 163, 184, 0.95);
    --ne-iqr-fill: rgba(6, 182, 212, 0.22);
    --ne-iqr-stroke: rgba(6, 182, 212, 0.65);
    --ne-p50: #60a5fa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg-primary); color: var(--text-primary);
    line-height: 1.5; min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  #root { min-height: 100vh; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-primary); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .app { display: flex; flex-direction: column; min-height: 100vh; }

  /* ── Topbar ──────────────── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px; background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar-logo {
    font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 16px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px; cursor: pointer;
  }
  .topbar-meta {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .topbar-meta a { color: var(--accent-purple); text-decoration: none; }
  .topbar-meta a:hover { text-decoration: underline; }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .dot-green { background: var(--accent-green); }
  .dot-amber { background: var(--accent-amber); }
  .fresh-badge {
    display: inline-flex; align-items: center;
    padding: 1px 7px; border-radius: 999px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.3px;
    border: 1px solid transparent;
  }
  .fresh-good { color: var(--positive); background: rgba(16,185,129,0.12); border-color: rgba(16,185,129,0.35); }
  .fresh-warn { color: var(--warning); background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.35); }
  .fresh-bad { color: var(--negative); background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.35); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .topbar-btn {
    padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border); background: var(--bg-card);
    color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .topbar-btn:hover { border-color: var(--accent-blue); color: var(--text-primary); }
  .topbar-btn.active { background: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }
  .topbar-user {
    font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace;
    max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ── Investor login (optional; see data/investors.json) ── */
  .login-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px; background: var(--bg-primary);
  }
  .login-card {
    width: 100%; max-width: 340px; background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px 26px 26px; box-shadow: 0 20px 50px rgba(0,0,0,0.35);
  }
  .login-field { margin-bottom: 14px; }
  .login-field label {
    display: block; font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 5px;
  }
  .login-field input {
    width: 100%; padding: 10px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg-input); color: var(--text-primary); font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }
  .login-field input:focus {
    outline: none; border-color: var(--accent-blue);
  }
  .login-btn {
    width: 100%; margin-top: 8px; padding: 11px; border-radius: 6px; border: none;
    background: var(--accent-blue); color: #fff; font-weight: 700; font-size: 13px;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
  .login-btn:disabled { opacity: 0.55; cursor: not-allowed; }
  .login-error {
    margin-top: 14px; font-size: 12px; color: var(--accent-red);
  }

  /* ── Summary ─────────────── */
  .summary-strip {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(195px, 1fr));
    gap: 10px; padding: 14px 24px;
    background: var(--bg-secondary); border-bottom: 1px solid var(--border);
  }
  .summary-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px; transition: border-color 0.15s;
  }
  .summary-card:hover { border-color: var(--border-active); }
  .summary-card .label {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.6px; color: var(--text-muted); margin-bottom: 5px;
  }
  .summary-card .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px; font-weight: 700;
  }
  .summary-card .sub {
    font-size: 11px; color: var(--text-muted); margin-top: 3px;
    font-family: 'JetBrains Mono', monospace;
  }
  .highlight-list { list-style: none; padding: 0; }
  .highlight-list li {
    display: flex; justify-content: space-between; align-items: center;
    padding: 3px 0; font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .highlight-list .sym { font-weight: 600; color: var(--text-primary); }

  /* ── Tabs ─────────────────── */
  .tab-bar { display: flex; align-items: center; gap: 4px; padding: 12px 24px 0; }
  .tab {
    padding: 10px 18px; border-radius: 8px 8px 0 0;
    font-size: 13px; font-weight: 600; color: var(--text-muted);
    cursor: pointer; border: 1px solid transparent; border-bottom: none;
    transition: all 0.15s; background: transparent;
    font-family: 'DM Sans', sans-serif;
  }
  .tab:hover { color: var(--text-secondary); background: var(--bg-card); }
  .tab.active { color: var(--text-primary); background: var(--bg-card); border-color: var(--border); }
  .tab .count {
    display: inline-block; margin-left: 6px; padding: 1px 7px;
    border-radius: 10px; font-size: 11px; font-weight: 600;
    background: var(--bg-primary); color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .tab.active .count { background: var(--accent-blue); color: #fff; }

  /* ── Controls ────────────── */
  .controls-bar {
    display: flex; align-items: center; gap: 12px; padding: 12px 24px;
    background: var(--bg-card); border: 1px solid var(--border); border-top: none;
  }
  .search-wrapper { position: relative; flex: 1; max-width: 360px; }
  .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); font-size: 13px; pointer-events: none;
  }
  .search-box {
    width: 100%; padding: 8px 14px 8px 36px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg-input);
    color: var(--text-primary); font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    outline: none; transition: border-color 0.15s;
  }
  .search-box:focus { border-color: var(--accent-blue); }
  .toggle-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-secondary); cursor: pointer; user-select: none;
  }
  .toggle-label input[type="checkbox"] { accent-color: var(--accent-blue); width: 14px; height: 14px; }

  /* ── Table ────────────────── */
  .table-container { padding: 0 24px 24px; overflow-x: auto; }
  .etf-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
    background: var(--bg-card); border: 1px solid var(--border); border-top: none;
    table-layout: fixed;
  }
  .etf-table thead th {
    position: sticky; top: 0; z-index: 10; background: var(--bg-secondary);
    padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted);
    border-bottom: 1px solid var(--border); cursor: pointer; user-select: none;
    white-space: nowrap; transition: color 0.15s;
  }
  .etf-table thead th:hover { color: var(--text-primary); }
  .etf-table thead th.sorted { color: var(--accent-blue); }
  .etf-table thead th .sort-arrow { margin-left: 4px; font-size: 10px; }
  .etf-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: pointer; }
  .etf-table tbody tr:hover { background: var(--bg-card-hover); }
  .etf-table tbody td {
    padding: 9px 12px; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    vertical-align: middle;
  }
  .sym-cell {
    font-weight: 700; color: var(--accent-cyan); font-size: 13px;
    text-decoration: underline; text-decoration-color: rgba(6,182,212,0.3);
    text-underline-offset: 2px; cursor: pointer; transition: color 0.15s;
  }
  .sym-cell:hover { color: var(--accent-blue); text-decoration-color: var(--accent-blue); }
  .underlying-cell { color: var(--text-secondary); }

  /* ── Value Colors ────────── */
  .val-positive { color: var(--positive); }
  .val-negative { color: var(--negative); }
  .val-warning { color: var(--warning); }
  .val-muted { color: var(--text-muted); }

  .badge {
    display: inline-block; padding: 2px 7px; border-radius: 4px;
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .badge-good { background: rgba(16,185,129,0.12); color: var(--positive); }
  .badge-bad { background: rgba(239,68,68,0.12); color: var(--negative); }
  .badge-warn { background: rgba(245,158,11,0.12); color: var(--warning); }
  .badge-stale { background: rgba(107,114,128,0.12); color: var(--stale); }
  .badge-ftp { background: rgba(6,182,212,0.12); color: var(--accent-cyan); }

  /* ── Detail Expand ───────── */
  .detail-row td {
    padding: 16px 24px; background: var(--bg-primary);
    border-bottom: 2px solid var(--border);
  }
  .detail-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(175px, 1fr)); gap: 12px;
  }
  .detail-item {
    min-width: 0;
  }
  .detail-item-hint {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 4px;
    line-height: 1.35;
    overflow-wrap: break-word;
    word-break: break-word;
    max-width: 100%;
  }
  .detail-item .dlabel {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-muted); margin-bottom: 2px;
  }
  .detail-item .dval { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; }

  .detail-visuals {
    display: flex; flex-direction: column; gap: 14px;
    margin-top: 10px; padding-top: 14px; border-top: 1px solid var(--border);
  }

  /* Net edge visual grammar (table fan + expand charts — same colors) */
  .net-edge-merged {
    display: flex; flex-direction: column; align-items: stretch; gap: 5px; min-width: 0;
    max-width: 132px;
  }
  .net-edge-merged-p50 {
    font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; line-height: 1.15;
  }
  .net-edge-merged-fan { align-self: center; }
  .etf-table th .th-stack {
    display: flex; flex-direction: column; align-items: flex-start; gap: 1px; line-height: 1.15;
  }
  .etf-table th .th-main { font-weight: 600; }
  .etf-table th .th-sub {
    font-size: 9px; font-weight: 500; color: var(--text-muted); text-transform: none; letter-spacing: 0;
    font-family: 'JetBrains Mono', monospace;
  }
  .edge-facts-strip {
    display: flex; flex-wrap: wrap; gap: 8px 12px; margin-bottom: 2px;
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
  }
  .edge-fact {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 8px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg-primary); color: var(--text-muted);
  }
  .edge-fact.on { border-color: rgba(16,185,129,0.45); color: var(--positive); background: rgba(16,185,129,0.08); }
  .edge-fact.off { opacity: 0.65; }
  .edge-fact.neutral { border-color: rgba(100,120,160,0.35); color: var(--text-secondary); }
  .neq-table-wrap { max-width: 420px; }
  .neq-table {
    width: 100%; border-collapse: collapse; font-size: 10px; font-family: 'JetBrains Mono', monospace;
    margin-top: 6px; color: var(--text-secondary);
  }
  .neq-table th, .neq-table td { padding: 4px 8px; text-align: right; border-bottom: 1px solid var(--border); }
  .neq-table th { text-align: left; color: var(--text-muted); font-weight: 600; }
  @media (max-width: 900px) {
    .net-edge-merged { max-width: 100%; }
    .net-edge-merged-p50 { font-size: 12px; }
  }
  .dv-block { max-width: 720px; }
  .dv-title {
    font-size: 11px; font-weight: 700; color: var(--text-secondary);
    margin-bottom: 6px; letter-spacing: 0.3px;
  }
  .gross-dumbbell-stack {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .gross-dumbbell-rail {
    min-width: 0;
  }
  .gross-dumbbell-rail-title {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.45px;
    margin-bottom: 2px;
  }
  .gross-dumbbell {
    position: relative; height: 32px; margin: 6px 0 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-muted);
  }
  .gross-dumbbell.gross-dumbbell--rail {
    height: 26px;
    margin: 2px 0 14px;
  }
  .gross-dumbbell-track {
    position: absolute; left: 0; right: 0; top: 50%; height: 4px; margin-top: -2px;
    background: rgba(100,120,160,0.25); border-radius: 3px;
  }
  .gross-dumbbell-axis {
    position: absolute; left: 0; right: 0; top: 100%;
    margin-top: 3px;
    display: flex; justify-content: space-between;
  }
  .gross-dumbbell-tick {
    position: absolute; top: 2px; width: 3px; height: 20px; margin-left: -1.5px; border-radius: 2px;
  }
  .gross-dumbbell-tick.realized { background: var(--accent-blue); }
  .gross-dumbbell-tick.expected { background: var(--accent-purple); }
  .gross-dumbbell-tick.blended { background: #94a3b8; }
  .gross-dumbbell-tick.net { background: var(--positive); width: 4px; margin-left: -2px; }
  .gross-dumbbell-tick.net-realized { background: var(--positive); width: 4px; margin-left: -2px; }
  .gross-dumbbell-tick.net-spot { background: var(--accent-cyan); width: 3px; margin-left: -1.5px; opacity: 0.95; }
  .gross-dumbbell-mark--diamond {
    position: absolute; top: 50%; width: 8px; height: 8px; margin-left: -4px; margin-top: -6px;
    transform: rotate(45deg); border-radius: 1px; background: var(--ne-p50);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.35); z-index: 2;
  }
  .gross-dumbbell-mark--diamond.net-edge { background: var(--ne-p50); }
  .gross-dumbbell-legends {
    display: flex; flex-direction: column; gap: 10px; margin-top: 4px;
  }
  .gross-dumbbell-legend-group-label {
    font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-muted); margin-bottom: 3px;
  }
  .gross-dumbbell-legend {
    display: flex; flex-wrap: wrap; gap: 10px 14px; font-size: 10px; color: var(--text-muted);
  }
  .gross-dumbbell-legend span { display: inline-flex; align-items: center; gap: 5px; }
  .gross-dumbbell-legend i {
    display: inline-block; width: 8px; height: 8px; border-radius: 2px;
  }
  .gross-dumbbell-legend i.gross-legend-diamond {
    width: 7px; height: 7px; border-radius: 1px; transform: rotate(45deg);
    background: var(--ne-p50);
  }
  .net-edge-viz { margin-top: 4px; }
  .net-edge-box-svg { width: 100%; max-width: 420px; height: 44px; display: block; }
  .net-edge-mini-hist {
    display: flex; align-items: flex-end; gap: 1px; height: 40px; margin-top: 8px;
    max-width: 420px;
  }
  .net-edge-mini-hist .bar {
    flex: 1; min-width: 2px; background: rgba(59,130,246,0.55); border-radius: 1px 1px 0 0;
    cursor: help;
  }

  /* ── Info Page ────────────── */
  .info-page { padding: 24px; max-width: 860px; }
  .info-row {
    display: flex; justify-content: space-between; padding: 10px 0;
    border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .info-key { color: var(--text-muted); }
  .info-val { font-family: 'JetBrains Mono', monospace; color: var(--text-primary); }
  .info-section {
    margin-top: 24px; margin-bottom: 10px; font-size: 15px; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }

  /* ── Expected Decay Calculator ── */
  .calc-card {
    margin: 10px 24px 0;
    padding: 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-card);
  }
  .calc-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .calc-helper {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .calc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
  }
  .calc-field label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .calc-field input, .calc-field select {
    width: 100%;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-input);
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .calc-field input:focus, .calc-field select:focus {
    border-color: var(--accent-blue);
    outline: none;
  }
  .calc-error {
    margin-top: 8px;
    font-size: 11px;
    color: var(--accent-red);
  }
  .calc-out-grid {
    margin-top: 12px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 8px;
  }
  .calc-out {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-primary);
    padding: 8px 10px;
  }
  .calc-out .k {
    color: var(--text-muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .calc-out .v {
    font-family: 'JetBrains Mono', monospace;
    margin-top: 2px;
    font-size: 14px;
    font-weight: 700;
  }
  .calc-formula {
    margin-top: 10px;
    font-size: 11px;
    color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace;
  }
  .calc-example {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── Loading / Error ─────── */
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 400px; color: var(--text-muted); font-size: 14px;
  }
  .spinner {
    width: 24px; height: 24px; border: 2px solid var(--border);
    border-top-color: var(--accent-blue); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-right: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-banner {
    margin: 24px; padding: 16px 20px; border-radius: 8px;
    background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
    color: var(--accent-red); font-size: 14px;
  }

  .decay-methodology {
    margin: 0 24px 12px; max-width: 1100px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg-card); font-size: 11px; color: var(--text-muted);
    line-height: 1.5;
  }
  .decay-methodology > summary {
    padding: 8px 12px; cursor: pointer; font-weight: 600;
    color: var(--text-secondary); list-style-position: outside;
    font-family: 'DM Sans', sans-serif;
  }
  .decay-methodology[open] > summary { border-bottom: 1px solid var(--border); }
  .decay-methodology .dm-body { padding: 10px 12px 12px; }
  .decay-methodology .dm-block {
    margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
  }
  .decay-methodology .dm-block:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .decay-methodology .dm-title {
    font-weight: 700; color: var(--text-primary); margin-bottom: 4px;
    font-family: 'DM Sans', sans-serif; font-size: 12px;
  }
  .decay-methodology code.dm-formula {
    display: block; margin-top: 4px; padding: 8px 10px;
    background: var(--bg-primary); border-radius: 6px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--text-secondary); white-space: pre-wrap; word-break: break-word;
  }

  /* ── Chart Page ─────────── */
  .chart-page {
    padding: 0 24px 12px; flex: 1; display: flex; flex-direction: column;
    height: calc(100vh - 50px); /* viewport minus topbar */
    min-height: 0;
  }

  .chart-header {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 0 8px; flex-wrap: wrap; flex-shrink: 0;
  }
  .chart-view-switch {
    display: flex;
    gap: 3px;
    background: var(--bg-primary);
    border-radius: 6px;
    padding: 3px;
    border: 1px solid var(--border);
  }
  .chart-view-btn {
    padding: 5px 10px;
    border-radius: 4px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
  }
  .chart-view-btn:hover { color: var(--text-primary); background: var(--bg-card); }
  .chart-view-btn.active { background: var(--accent-purple); color: #fff; }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border); background: var(--bg-card);
    color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .back-btn:hover { border-color: var(--accent-blue); color: var(--text-primary); }
  .back-btn svg { width: 14px; height: 14px; }

  .chart-title {
    font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700;
    display: flex; align-items: baseline; gap: 10px;
  }
  .chart-title .etf-sym {
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .chart-title .vs { color: var(--text-muted); font-size: 14px; font-weight: 400; }
  .chart-title .und-sym { color: var(--accent-amber); }

  .chart-bucket-badge {
    padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 600;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.3px;
  }
  .chart-bucket-badge.b1 { background: rgba(59,130,246,0.12); color: var(--accent-blue); }
  .chart-bucket-badge.b2 { background: rgba(139,92,246,0.12); color: var(--accent-purple); }
  .chart-bucket-badge.b3 { background: rgba(245,158,11,0.12); color: var(--accent-amber); }

  .chart-container {
    border-radius: 10px; overflow: hidden;
    border: 1px solid var(--border); background: var(--bg-card);
    flex: 1; min-height: 0; position: relative;
  }
  .chart-container iframe {
    border: none; display: block;
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  }
  .chart-loading {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: var(--bg-card); color: var(--text-muted); font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
  }

  .chart-stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 6px; margin-top: 8px; flex-shrink: 0;
  }
  .chart-stat {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 10px; transition: border-color 0.15s;
  }
  .chart-stat:hover { border-color: var(--border-active); }
  .chart-stat .cs-label {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 3px;
  }
  .chart-stat .cs-value {
    font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700;
  }
  .chart-stat .cs-sub {
    font-size: 10px; color: var(--text-muted); margin-top: 2px;
    font-family: 'JetBrains Mono', monospace;
  }

  .chart-note {
    margin-top: 6px; padding: 6px 12px; border-radius: 6px;
    background: var(--bg-card); border: 1px solid var(--border);
    font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace;
    flex-shrink: 0;
  }
  .metrics-panel {
    margin-top: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg-card);
    padding: 14px;
  }
  .metrics-panel-head {
    margin-bottom: 10px;
  }
  .metrics-panel .scenario-title {
    margin-bottom: 4px;
  }
  .metrics-stack {
    display: grid;
    gap: 18px;
  }
  .metrics-stack .simple-series-card {
    margin-top: 0;
    padding: 14px;
  }
  .metrics-stack .simple-series-svg {
    margin-top: 8px;
  }
  .metrics-panel .scenario-table-wrap {
    margin-top: 16px;
  }
  .metrics-panel .scenario-table td,
  .metrics-panel .scenario-table th {
    padding-top: 8px;
    padding-bottom: 8px;
  }
  .chart-section {
    display: flex;
    flex-direction: column;
    min-height: 0;
    flex: 1;
  }

  .scenario-card {
    margin-top: 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-card);
    padding: 10px;
    flex-shrink: 0;
  }
  .scenario-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .scenario-title {
    font-size: 13px;
    font-weight: 700;
  }
  .scenario-sub {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .scenario-table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .scenario-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--bg-primary);
  }
  .scenario-table th, .scenario-table td {
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 6px 8px;
    text-align: right;
    white-space: nowrap;
  }
  .scenario-table th:first-child, .scenario-table td:first-child {
    text-align: left;
    position: sticky;
    left: 0;
    background: var(--bg-secondary);
    z-index: 2;
  }
  .scenario-table th {
    background: var(--bg-secondary);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    font-size: 10px;
  }
  .scenario-formula {
    margin-top: 6px;
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .scenario-warning {
    font-size: 11px;
    color: var(--warning);
    font-family: 'JetBrains Mono', monospace;
  }
  .mc-card {
    margin-top: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-primary);
    padding: 10px;
  }
  .mc-controls {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 8px;
    margin-bottom: 8px;
  }
  .mc-field label {
    display: block;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 4px;
    letter-spacing: 0.4px;
  }
  .mc-field input, .mc-field select {
    width: 100%;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-primary);
    padding: 6px 8px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .mc-plot {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #0b1322;
    height: 300px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .mc-plot svg { width: 100%; height: 100%; display: block; }
  .mc-stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 6px;
  }
  .mc-stat {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-card);
    padding: 7px 8px;
  }
  .mc-stat .k {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .mc-stat .v {
    margin-top: 2px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }
  .mc-list {
    margin-top: 8px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-secondary);
  }
  .mc-list div { margin-top: 2px; }
  .borrow-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
    margin-top: 2px;
  }
  .borrow-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg-card);
    padding: 14px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.01);
  }
  .borrow-meta {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    margin: 4px 0 10px;
    line-height: 1.45;
  }
  .trade-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .trade-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-primary);
    padding: 10px;
  }
  .trade-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    gap: 8px;
    flex-wrap: wrap;
  }
  .trade-rows { display: grid; gap: 6px; }
  .trade-row {
    display: grid;
    grid-template-columns: 1.1fr 0.8fr 0.8fr 0.8fr 0.8fr auto;
    gap: 6px;
    align-items: center;
  }
  .trade-row.option { grid-template-columns: 1fr 0.8fr 0.8fr 1fr 0.9fr 0.9fr 0.9fr auto; }
  .trade-row input, .trade-row select, .trade-actions button, .trade-card button {
    padding: 6px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-primary);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .trade-actions { display: flex; gap: 6px; }
  .trade-note {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 6px;
  }
  .trade-metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 8px;
    margin-top: 8px;
  }
  .trade-metric {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px;
    background: var(--bg-card);
  }
  .trade-metric .k { color: var(--text-muted); font-size: 10px; text-transform: uppercase; }
  .trade-metric .v { color: var(--text-primary); font-size: 14px; font-weight: 700; margin-top: 2px; }
  .trade-warning {
    color: var(--warning);
    font-size: 11px;
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }
  .ttx-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }
  .ttx-table th, .ttx-table td {
    border-bottom: 1px solid var(--border);
    padding: 6px 8px;
    text-align: right;
  }
  .ttx-table th:first-child, .ttx-table td:first-child { text-align: left; }

  .tf-group {
    display: flex; gap: 3px; margin-left: auto;
    background: var(--bg-primary); border-radius: 6px; padding: 3px;
    border: 1px solid var(--border);
  }
  .tf-btn {
    padding: 5px 12px; border-radius: 4px; font-size: 11px; font-weight: 600;
    border: none; background: transparent;
    color: var(--text-muted); cursor: pointer; transition: all 0.15s;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.3px;
  }
  .tf-btn:hover { color: var(--text-primary); background: var(--bg-card); }
  .tf-active { background: var(--accent-blue) !important; color: #fff !important; }

  @media (max-width: 768px) {
    .summary-strip { grid-template-columns: repeat(2, 1fr); }
    .topbar { padding: 10px 12px; flex-wrap: wrap; gap: 8px; }
    .tab-bar, .controls-bar, .table-container { padding-left: 12px; padding-right: 12px; }
    .chart-page { padding: 0 12px 16px; }
    .chart-container { min-height: 50vh; }
    .chart-stats { grid-template-columns: repeat(2, 1fr); }
    .chart-title { font-size: 17px; }
    .chart-header { gap: 10px; }
    .tf-group { margin-left: 0; width: 100%; justify-content: center; }
    .tf-btn { padding: 5px 8px; font-size: 10px; }
    .trade-grid { grid-template-columns: 1fr; }
    .trade-row, .trade-row.option { grid-template-columns: 1fr; }
  }

  /* ── News Tab ────────────────────────────── */
  .news-page { padding: 18px 24px 40px; }
  .news-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
    padding-bottom: 14px; margin-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .news-title {
    font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 22px;
    letter-spacing: -0.4px; color: var(--text-primary);
    display: flex; align-items: center; gap: 10px;
  }
  .news-title-accent {
    display: inline-block; width: 6px; height: 22px; border-radius: 3px;
    background: linear-gradient(180deg, var(--accent-blue), var(--accent-purple));
  }
  .news-subtitle {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-muted); margin-top: 4px;
  }
  .news-meta {
    display: flex; align-items: center; gap: 14px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-muted);
  }
  .news-meta b { color: var(--text-secondary); font-weight: 600; }

  /* Toolbar: chips + search + time-window + sort */
  .news-toolbar {
    display: flex; align-items: center; flex-wrap: wrap;
    gap: 10px 14px; margin-bottom: 18px;
    padding: 12px 14px; border-radius: 10px;
    background: var(--bg-card); border: 1px solid var(--border);
  }
  .news-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .news-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 11px; border-radius: 999px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600;
    letter-spacing: 0.2px;
    color: var(--text-secondary);
    background: var(--bg-input);
    border: 1px solid var(--border);
    cursor: pointer; transition: all 0.12s ease;
    user-select: none;
  }
  .news-chip:hover { color: var(--text-primary); border-color: var(--border-active); }
  .news-chip.active {
    color: #fff;
    background: var(--accent-blue);
    border-color: var(--accent-blue);
    box-shadow: 0 0 0 1px rgba(59,130,246,0.25);
  }
  .news-chip .count {
    font-size: 10px; opacity: 0.7;
    padding: 0 5px; border-radius: 999px;
    background: rgba(255,255,255,0.08);
  }
  .news-chip.active .count { background: rgba(255,255,255,0.22); opacity: 1; }

  .news-toolbar-divider {
    width: 1px; height: 24px; background: var(--border); margin: 0 2px;
  }
  .news-toolbar-label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;
  }
  .news-select, .news-search {
    background: var(--bg-input); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px; color: var(--text-primary);
    font-family: 'DM Sans', sans-serif; font-size: 12px;
    outline: none; transition: border-color 0.12s ease;
  }
  .news-select:focus, .news-search:focus { border-color: var(--border-active); }
  .news-search { min-width: 220px; }
  .news-toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

  /* Pinned structured events strip */
  .pinned-section { margin-bottom: 26px; }
  .pinned-section-title {
    display: flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 10px;
  }
  .pinned-section-title::before {
    content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent-amber); box-shadow: 0 0 8px rgba(245,158,11,0.6);
  }
  .pinned-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }
  .pinned-card {
    position: relative;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 14px 14px 18px;
    cursor: pointer; transition: all 0.15s ease;
    overflow: hidden;
  }
  .pinned-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: var(--cat-accent, var(--accent-blue));
  }
  .pinned-card:hover {
    border-color: var(--cat-accent, var(--accent-blue));
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  }
  .pinned-card-top {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; margin-bottom: 8px;
  }
  .pinned-card-tickers { display: flex; flex-wrap: wrap; gap: 5px; }
  .ticker-chip {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700;
    color: var(--accent-cyan); background: rgba(6,182,212,0.08);
    border: 1px solid rgba(6,182,212,0.25);
    cursor: pointer; transition: all 0.12s ease;
    letter-spacing: 0.4px;
  }
  .ticker-chip:hover { background: rgba(6,182,212,0.18); color: #fff; }
  .pinned-card-headline {
    font-size: 14px; font-weight: 600; line-height: 1.4;
    color: var(--text-primary); margin-bottom: 6px;
  }
  .pinned-card-summary {
    font-size: 12px; color: var(--text-secondary); line-height: 1.5;
    margin-bottom: 10px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .pinned-card-foot {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; flex-wrap: wrap;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--text-muted);
  }
  .pinned-card-foot .ratio {
    color: var(--cat-accent, var(--accent-blue));
    font-weight: 700; letter-spacing: 0.4px;
  }
  .pinned-card-foot .pinned-card-announced {
    opacity: 0.75; font-size: 10px;
  }
  .pinned-card-badges { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  /* Pending (announced but not executed) rows: dashed left accent + subtle
     dim so they're visually distinct from Polygon-confirmed (executed) rows. */
  .pinned-card-pending::before {
    background: repeating-linear-gradient(
      to bottom,
      var(--cat-accent, var(--accent-amber)) 0 6px,
      transparent 6px 10px
    );
  }
  .pinned-card-pending .pinned-card-headline { color: var(--text-secondary); }
  .ticker-chain-arrow {
    display: inline-flex; align-items: center;
    color: var(--text-muted); font-size: 12px; font-weight: 700;
    padding: 0 2px; letter-spacing: -0.5px;
  }

  /* Category badges and accent colors (CSS var overrides) */
  .cat-badge {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 999px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700;
    letter-spacing: 0.5px; text-transform: uppercase;
    color: var(--cat-accent, var(--accent-blue));
    background: var(--cat-bg, rgba(59,130,246,0.12));
    border: 1px solid var(--cat-border, rgba(59,130,246,0.35));
  }
  .cat-delisting    { --cat-accent: var(--accent-red);    --cat-bg: rgba(239,68,68,0.12);  --cat-border: rgba(239,68,68,0.35); }
  .cat-reverse_split{ --cat-accent: var(--accent-amber);  --cat-bg: rgba(245,158,11,0.12); --cat-border: rgba(245,158,11,0.35); }
  .cat-forward_split{ --cat-accent: var(--accent-green);  --cat-bg: rgba(16,185,129,0.12); --cat-border: rgba(16,185,129,0.35); }

<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
