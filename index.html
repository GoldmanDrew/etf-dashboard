<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ETF Borrow Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='85'>⚡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0e17;
    --bg-secondary: #111827;
    --bg-card: #151d2e;
    --bg-card-hover: #1a2438;
    --bg-input: #0d1424;
    --border: #1e2d46;
    --border-active: #3b82f6;
    --text-primary: #e8ecf4;
    --text-secondary: #8896ae;
    --text-muted: #566580;
    --accent-blue: #3b82f6;
    --accent-green: #10b981;
    --accent-red: #ef4444;
    --accent-amber: #f59e0b;
    --accent-purple: #8b5cf6;
    --accent-cyan: #06b6d4;
    --positive: #10b981;
    --negative: #ef4444;
    --warning: #f59e0b;
    --stale: #6b7280;
    --ne-whisker: rgba(148, 163, 184, 0.95);
    --ne-iqr-fill: rgba(6, 182, 212, 0.22);
    --ne-iqr-stroke: rgba(6, 182, 212, 0.65);
    --ne-p50: #60a5fa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg-primary); color: var(--text-primary);
    line-height: 1.5; min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  #root { min-height: 100vh; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-primary); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .app { display: flex; flex-direction: column; min-height: 100vh; }

  /* ── Topbar ──────────────── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px; background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar-logo {
    font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 16px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px; cursor: pointer;
  }
  .topbar-meta {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .topbar-meta a { color: var(--accent-purple); text-decoration: none; }
  .topbar-meta a:hover { text-decoration: underline; }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .dot-green { background: var(--accent-green); }
  .dot-amber { background: var(--accent-amber); }
  .fresh-badge {
    display: inline-flex; align-items: center;
    padding: 1px 7px; border-radius: 999px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.3px;
    border: 1px solid transparent;
  }
  .fresh-good { color: var(--positive); background: rgba(16,185,129,0.12); border-color: rgba(16,185,129,0.35); }
  .fresh-warn { color: var(--warning); background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.35); }
  .fresh-bad { color: var(--negative); background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.35); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .topbar-btn {
    padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border); background: var(--bg-card);
    color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .topbar-btn:hover { border-color: var(--accent-blue); color: var(--text-primary); }
  .topbar-btn.active { background: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }
  .topbar-user {
    font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace;
    max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ── Investor login (optional; see data/investors.json) ── */
  .login-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px; background: var(--bg-primary);
  }
  .login-card {
    width: 100%; max-width: 340px; background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px 26px 26px; box-shadow: 0 20px 50px rgba(0,0,0,0.35);
  }
  .login-field { margin-bottom: 14px; }
  .login-field label {
    display: block; font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 5px;
  }
  .login-field input {
    width: 100%; padding: 10px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg-input); color: var(--text-primary); font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }
  .login-field input:focus {
    outline: none; border-color: var(--accent-blue);
  }
  .login-btn {
    width: 100%; margin-top: 8px; padding: 11px; border-radius: 6px; border: none;
    background: var(--accent-blue); color: #fff; font-weight: 700; font-size: 13px;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
  .login-btn:disabled { opacity: 0.55; cursor: not-allowed; }
  .login-error {
    margin-top: 14px; font-size: 12px; color: var(--accent-red);
  }

  /* ── Summary ─────────────── */
  .summary-strip {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(195px, 1fr));
    gap: 10px; padding: 14px 24px;
    background: var(--bg-secondary); border-bottom: 1px solid var(--border);
  }
  .summary-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px; transition: border-color 0.15s;
  }
  .summary-card:hover { border-color: var(--border-active); }
  .summary-card .label {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.6px; color: var(--text-muted); margin-bottom: 5px;
  }
  .summary-card .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px; font-weight: 700;
  }
  .summary-card .sub {
    font-size: 11px; color: var(--text-muted); margin-top: 3px;
    font-family: 'JetBrains Mono', monospace;
  }
  .highlight-list { list-style: none; padding: 0; }
  .highlight-list li {
    display: flex; justify-content: space-between; align-items: center;
    padding: 3px 0; font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .highlight-list .sym { font-weight: 600; color: var(--text-primary); }

  /* ── Tabs ─────────────────── */
  .tab-bar { display: flex; align-items: center; gap: 4px; padding: 12px 24px 0; }
  .tab {
    padding: 10px 18px; border-radius: 8px 8px 0 0;
    font-size: 13px; font-weight: 600; color: var(--text-muted);
    cursor: pointer; border: 1px solid transparent; border-bottom: none;
    transition: all 0.15s; background: transparent;
    font-family: 'DM Sans', sans-serif;
  }
  .tab:hover { color: var(--text-secondary); background: var(--bg-card); }
  .tab.active { color: var(--text-primary); background: var(--bg-card); border-color: var(--border); }
  .tab .count {
    display: inline-block; margin-left: 6px; padding: 1px 7px;
    border-radius: 10px; font-size: 11px; font-weight: 600;
    background: var(--bg-primary); color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .tab.active .count { background: var(--accent-blue); color: #fff; }

  /* ── Controls ────────────── */
  .controls-bar {
    display: flex; align-items: center; gap: 12px; padding: 12px 24px;
    background: var(--bg-card); border: 1px solid var(--border); border-top: none;
  }
  .search-wrapper { position: relative; flex: 1; max-width: 360px; }
  .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); font-size: 13px; pointer-events: none;
  }
  .search-box {
    width: 100%; padding: 8px 14px 8px 36px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg-input);
    color: var(--text-primary); font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    outline: none; transition: border-color 0.15s;
  }
  .search-box:focus { border-color: var(--accent-blue); }
  .toggle-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-secondary); cursor: pointer; user-select: none;
  }
  .toggle-label input[type="checkbox"] { accent-color: var(--accent-blue); width: 14px; height: 14px; }

  /* ── Table ────────────────── */
  .table-container { padding: 0 24px 24px; overflow-x: auto; }
  .etf-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
    background: var(--bg-card); border: 1px solid var(--border); border-top: none;
    table-layout: fixed;
  }
  .etf-table thead th {
    position: sticky; top: 0; z-index: 10; background: var(--bg-secondary);
    padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted);
    border-bottom: 1px solid var(--border); cursor: pointer; user-select: none;
    white-space: nowrap; transition: color 0.15s;
  }
  .etf-table thead th:hover { color: var(--text-primary); }
  .etf-table thead th.sorted { color: var(--accent-blue); }
  .etf-table thead th .sort-arrow { margin-left: 4px; font-size: 10px; }
  .etf-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: pointer; }
  .etf-table tbody tr:hover { background: var(--bg-card-hover); }
  .etf-table tbody td {
    padding: 9px 12px; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    vertical-align: middle;
  }
  .sym-cell {
    font-weight: 700; color: var(--accent-cyan); font-size: 13px;
    text-decoration: underline; text-decoration-color: rgba(6,182,212,0.3);
    text-underline-offset: 2px; cursor: pointer; transition: color 0.15s;
  }
  .sym-cell:hover { color: var(--accent-blue); text-decoration-color: var(--accent-blue); }
  .underlying-cell { color: var(--text-secondary); }

  /* ── Value Colors ────────── */
  .val-positive { color: var(--positive); }
  .val-negative { color: var(--negative); }
  .val-warning { color: var(--warning); }
  .val-muted { color: var(--text-muted); }

  .badge {
    display: inline-block; padding: 2px 7px; border-radius: 4px;
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .badge-good { background: rgba(16,185,129,0.12); color: var(--positive); }
  .badge-bad { background: rgba(239,68,68,0.12); color: var(--negative); }
  .badge-warn { background: rgba(245,158,11,0.12); color: var(--warning); }
  .badge-stale { background: rgba(107,114,128,0.12); color: var(--stale); }
  .badge-ftp { background: rgba(6,182,212,0.12); color: var(--accent-cyan); }

  /* ── Detail Expand ───────── */
  .detail-row td {
    padding: 16px 24px; background: var(--bg-primary);
    border-bottom: 2px solid var(--border);
  }
  .detail-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(175px, 1fr)); gap: 12px;
  }
  .detail-item {
    min-width: 0;
  }
  .detail-item-hint {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 4px;
    line-height: 1.35;
    overflow-wrap: break-word;
    word-break: break-word;
    max-width: 100%;
  }
  .detail-item .dlabel {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-muted); margin-bottom: 2px;
  }
  .detail-item .dval { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; }

  .detail-visuals {
    display: flex; flex-direction: column; gap: 14px;
    margin-top: 10px; padding-top: 14px; border-top: 1px solid var(--border);
  }

  /* Net edge visual grammar (table fan + expand charts — same colors) */
  .net-edge-merged {
    display: flex; flex-direction: column; align-items: stretch; gap: 5px; min-width: 0;
    max-width: 132px;
  }
  .net-edge-merged-p50 {
    font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; line-height: 1.15;
  }
  .net-edge-merged-fan { align-self: center; }
  .etf-table th .th-stack {
    display: flex; flex-direction: column; align-items: flex-start; gap: 1px; line-height: 1.15;
  }
  .etf-table th .th-main { font-weight: 600; }
  .etf-table th .th-sub {
    font-size: 9px; font-weight: 500; color: var(--text-muted); text-transform: none; letter-spacing: 0;
    font-family: 'JetBrains Mono', monospace;
  }
  .edge-facts-strip {
    display: flex; flex-wrap: wrap; gap: 8px 12px; margin-bottom: 2px;
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
  }
  .edge-fact {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 8px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg-primary); color: var(--text-muted);
  }
  .edge-fact.on { border-color: rgba(16,185,129,0.45); color: var(--positive); background: rgba(16,185,129,0.08); }
  .edge-fact.off { opacity: 0.65; }
  .edge-fact.neutral { border-color: rgba(100,120,160,0.35); color: var(--text-secondary); }
  .neq-table-wrap { max-width: 420px; }
  .neq-table {
    width: 100%; border-collapse: collapse; font-size: 10px; font-family: 'JetBrains Mono', monospace;
    margin-top: 6px; color: var(--text-secondary);
  }
  .neq-table th, .neq-table td { padding: 4px 8px; text-align: right; border-bottom: 1px solid var(--border); }
  .neq-table th { text-align: left; color: var(--text-muted); font-weight: 600; }
  @media (max-width: 900px) {
    .net-edge-merged { max-width: 100%; }
    .net-edge-merged-p50 { font-size: 12px; }
  }
  .dv-block { max-width: 720px; }
  .dv-title {
    font-size: 11px; font-weight: 700; color: var(--text-secondary);
    margin-bottom: 6px; letter-spacing: 0.3px;
  }
  .gross-dumbbell-stack {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .gross-dumbbell-rail {
    min-width: 0;
  }
  .gross-dumbbell-rail-title {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.45px;
    margin-bottom: 2px;
  }
  .gross-dumbbell {
    position: relative; height: 32px; margin: 6px 0 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-muted);
  }
  .gross-dumbbell.gross-dumbbell--rail {
    height: 26px;
    margin: 2px 0 14px;
  }
  .gross-dumbbell-track {
    position: absolute; left: 0; right: 0; top: 50%; height: 4px; margin-top: -2px;
    background: rgba(100,120,160,0.25); border-radius: 3px;
  }
  .gross-dumbbell-axis {
    position: absolute; left: 0; right: 0; top: 100%;
    margin-top: 3px;
    display: flex; justify-content: space-between;
  }
  .gross-dumbbell-tick {
    position: absolute; top: 2px; width: 3px; height: 20px; margin-left: -1.5px; border-radius: 2px;
  }
  .gross-dumbbell-tick.realized { background: var(--accent-blue); }
  .gross-dumbbell-tick.expected { background: var(--accent-purple); }
  .gross-dumbbell-tick.blended { background: #94a3b8; }
  .gross-dumbbell-tick.net { background: var(--positive); width: 4px; margin-left: -2px; }
  .gross-dumbbell-tick.net-realized { background: var(--positive); width: 4px; margin-left: -2px; }
  .gross-dumbbell-tick.net-spot { background: var(--accent-cyan); width: 3px; margin-left: -1.5px; opacity: 0.95; }
  .gross-dumbbell-mark--diamond {
    position: absolute; top: 50%; width: 8px; height: 8px; margin-left: -4px; margin-top: -6px;
    transform: rotate(45deg); border-radius: 1px; background: var(--ne-p50);
    box-shadow: 0 0 0 1px rgba(0,0,0,0.35); z-index: 2;
  }
  .gross-dumbbell-mark--diamond.net-edge { background: var(--ne-p50); }
  .gross-dumbbell-legends {
    display: flex; flex-direction: column; gap: 10px; margin-top: 4px;
  }
  .gross-dumbbell-legend-group-label {
    font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-muted); margin-bottom: 3px;
  }
  .gross-dumbbell-legend {
    display: flex; flex-wrap: wrap; gap: 10px 14px; font-size: 10px; color: var(--text-muted);
  }
  .gross-dumbbell-legend span { display: inline-flex; align-items: center; gap: 5px; }
  .gross-dumbbell-legend i {
    display: inline-block; width: 8px; height: 8px; border-radius: 2px;
  }
  .gross-dumbbell-legend i.gross-legend-diamond {
    width: 7px; height: 7px; border-radius: 1px; transform: rotate(45deg);
    background: var(--ne-p50);
  }
  .net-edge-viz { margin-top: 4px; }
  .net-edge-box-svg { width: 100%; max-width: 420px; height: 44px; display: block; }
  .net-edge-mini-hist {
    display: flex; align-items: flex-end; gap: 1px; height: 40px; margin-top: 8px;
    max-width: 420px;
  }
  .net-edge-mini-hist .bar {
    flex: 1; min-width: 2px; background: rgba(59,130,246,0.55); border-radius: 1px 1px 0 0;
    cursor: help;
  }

  /* ── Info Page ────────────── */
  .info-page { padding: 24px; max-width: 860px; }
  .info-row {
    display: flex; justify-content: space-between; padding: 10px 0;
    border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .info-key { color: var(--text-muted); }
  .info-val { font-family: 'JetBrains Mono', monospace; color: var(--text-primary); }
  .info-section {
    margin-top: 24px; margin-bottom: 10px; font-size: 15px; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }

  /* ── Expected Decay Calculator ── */
  .calc-card {
    margin: 10px 24px 0;
    padding: 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-card);
  }
  .calc-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .calc-helper {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .calc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
  }
  .calc-field label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .calc-field input, .calc-field select {
    width: 100%;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-input);
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .calc-field input:focus, .calc-field select:focus {
    border-color: var(--accent-blue);
    outline: none;
  }
  .calc-error {
    margin-top: 8px;
    font-size: 11px;
    color: var(--accent-red);
  }
  .calc-out-grid {
    margin-top: 12px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 8px;
  }
  .calc-out {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-primary);
    padding: 8px 10px;
  }
  .calc-out .k {
    color: var(--text-muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .calc-out .v {
    font-family: 'JetBrains Mono', monospace;
    margin-top: 2px;
    font-size: 14px;
    font-weight: 700;
  }
  .calc-formula {
    margin-top: 10px;
    font-size: 11px;
    color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace;
  }
  .calc-example {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── Loading / Error ─────── */
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 400px; color: var(--text-muted); font-size: 14px;
  }
  .spinner {
    width: 24px; height: 24px; border: 2px solid var(--border);
    border-top-color: var(--accent-blue); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-right: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-banner {
    margin: 24px; padding: 16px 20px; border-radius: 8px;
    background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
    color: var(--accent-red); font-size: 14px;
  }

  .decay-methodology {
    margin: 0 24px 12px; max-width: 1100px;

  /* ── Chart Page ─────────── */

    padding: 12px 0 8px; flex-wrap: wrap; flex-shrink: 0;

    gap: 3px;

    border-radius: 6px;
    padding: 3px;
    border: 1px solid var(--border);
  }
  .chart-view-btn {
    padding: 5px 10px;
    border-radius: 4px;
    border: none;
    background: transparent;

    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;

  .chart-view-btn.active { background: var(--accent-purple); color: #fff; }
  .back-btn {
    display: flex; align-items: center; gap: 6px;

    font-family: 'DM Sans', sans-serif;
  }
  .back-btn:hover { border-color: var(--accent-blue); color: var(--text-primary); }
  .back-btn svg { width: 14px; height: 14px; }

  .chart-title {
    font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700;
    display: flex; align-items: baseline; gap: 10px;
  }
  .chart-title .etf-sym {
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .chart-title .vs { color: var(--text-muted); font-size: 14px; font-weight: 400; }
  .chart-title .und-sym { color: var(--accent-amber); }

  .chart-bucket-badge {
    padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 600;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.3px;
  }
  .chart-bucket-badge.b1 { background: rgba(59,130,246,0.12); color: var(--accent-blue); }
  .chart-bucket-badge.b2 { background: rgba(139,92,246,0.12); color: var(--accent-purple); }
  .chart-bucket-badge.b3 { background: rgba(245,158,11,0.12); color: var(--accent-amber); }

  .chart-container {
    border-radius: 10px; overflow: hidden;
    border: 1px solid var(--border); background: var(--bg-card);
    flex: 1; min-height: 0; position: relative;
  }
  .chart-container iframe {
    border: none; display: block;
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  }
  .chart-loading {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: var(--bg-card); color: var(--text-muted); font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
  }

  .chart-stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 6px; margin-top: 8px; flex-shrink: 0;
  }
  .chart-stat {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 10px; transition: border-color 0.15s;
  }
  .chart-stat:hover { border-color: var(--border-active); }
  .chart-stat .cs-label {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 3px;
  }
  .chart-stat .cs-value {
    font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700;
  }
  .chart-stat .cs-sub {
    font-size: 10px; color: var(--text-muted); margin-top: 2px;
    font-family: 'JetBrains Mono', monospace;
  }

  .chart-note {
    margin-top: 6px; padding: 6px 12px; border-radius: 6px;
    background: var(--bg-card); border: 1px solid var(--border);
    font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace;
    flex-shrink: 0;
  }
  .metrics-panel {
    margin-top: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg-card);
    padding: 14px;
  }
  .metrics-panel-head {
    margin-bottom: 10px;
  }
  .metrics-panel .scenario-title {
    margin-bottom: 4px;
  }
  .metrics-stack {
    display: grid;
    gap: 18px;
  }
  .metrics-stack .simple-series-card {
    margin-top: 0;
    padding: 14px;
  }
  .metrics-stack .simple-series-svg {
    margin-top: 8px;
  }
  .metrics-panel .scenario-table-wrap {
    margin-top: 16px;
  }
  /* ETF metrics daily grid: fixed layout so long underlying labels do not steal width */
  .metrics-panel .scenario-table {
    table-layout: fixed;
  }
  .metrics-panel .scenario-table th:nth-child(1),
  .metrics-panel .scenario-table td:nth-child(1) { width: 9%; min-width: 5.5rem; }
  .metrics-panel .scenario-table th:nth-child(2),
  .metrics-panel .scenario-table td:nth-child(2) { width: 8%; }
  .metrics-panel .scenario-table th:nth-child(3),
  .metrics-panel .scenario-table td:nth-child(3) { width: 8%; }
  .metrics-panel .scenario-table th:nth-child(4),
  .metrics-panel .scenario-table td:nth-child(4) { width: 7%; }
  .metrics-panel .scenario-table th:nth-child(5),
  .metrics-panel .scenario-table td:nth-child(5) { width: 9%; }
  .metrics-panel .scenario-table th:nth-child(6),
  .metrics-panel .scenario-table td:nth-child(6) { width: 11%; }
  .metrics-panel .scenario-table th:nth-child(6) {
    white-space: normal;
    line-height: 1.25;
    hyphens: auto;
  }
  .metrics-panel .scenario-table th:nth-child(7),
  .metrics-panel .scenario-table td:nth-child(7) { width: 14%; }
  .metrics-panel .scenario-table th:nth-child(8),
  .metrics-panel .scenario-table td:nth-child(8) { width: 12%; }
  .metrics-panel .scenario-table th:nth-child(9),
  .metrics-panel .scenario-table td:nth-child(9) { width: 8%; min-width: 3.25rem; }
  .metrics-panel .scenario-table td,
  .metrics-panel .scenario-table th {
    padding-top: 8px;
    padding-bottom: 8px;
  }
  .chart-section {
    display: flex;
    flex-direction: column;
    min-height: 0;
    flex: 1;
  }

  .scenario-card {
    margin-top: 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-card);
    padding: 10px;
    flex-shrink: 0;
  }
  .scenario-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .scenario-title {
    font-size: 13px;
    font-weight: 700;
  }
  .scenario-sub {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .scenario-table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .scenario-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--bg-primary);
  }
  .scenario-table th, .scenario-table td {
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 6px 8px;
    text-align: right;
    white-space: nowrap;
  }
  .scenario-table th:first-child, .scenario-table td:first-child {
    text-align: left;
    position: sticky;
    left: 0;
    background: var(--bg-secondary);
    z-index: 2;
  }
  .scenario-table th {
    background: var(--bg-secondary);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    font-size: 10px;
  }
  .scenario-table tr.stats-vol-active td {
    background: rgba(59, 130, 246, 0.08);
  }
  .scenario-table tr.stats-vol-active td:first-child {
    background: rgba(59, 130, 246, 0.14);
  }
  .scenario-formula {
    margin-top: 6px;
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .scenario-warning {
    font-size: 11px;
    color: var(--warning);
    font-family: 'JetBrains Mono', monospace;
  }
  .mc-card {
    margin-top: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-primary);
    padding: 10px;
  }
  .mc-controls {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 8px;
    margin-bottom: 8px;
  }
  .mc-field label {
    display: block;
    font-size: 10px;

    text-transform: uppercase;
    margin-bottom: 4px;
    letter-spacing: 0.4px;
  }
  .mc-field input, .mc-field select {
    width: 100%;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-primary);
    padding: 6px 8px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .mc-plot {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #0b1322;
    height: 300px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .mc-plot svg { width: 100%; height: 100%; display: block; }
  .mc-stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 6px;
  }
  .mc-stat {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-card);
    padding: 7px 8px;
  }
  .mc-stat .k {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .mc-stat .v {
    margin-top: 2px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }
  .mc-list {
    margin-top: 8px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-secondary);
  }
  .mc-list div { margin-top: 2px; }
  .borrow-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
    margin-top: 2px;
  }
  .borrow-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg-card);
    padding: 14px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.01);
  }
  .borrow-meta {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    margin: 4px 0 10px;
    line-height: 1.45;
  }
  .trade-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;

  }
  .trade-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-primary);
    padding: 10px;
  }
  .backtest-page { padding: 0 24px 24px; }
  .backtest-controls {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px; align-items: end; margin: 12px 0;
  }
  .backtest-control label {
    display: block; margin-bottom: 4px; font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted);
  }
  .backtest-control input, .backtest-control select, .backtest-control button {
    width: 100%; padding: 8px 10px; border-radius: 7px;
    border: 1px solid var(--border); background: var(--bg-card);
    color: var(--text-primary); font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }
  .backtest-chart-legend {
    display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0 0;
    font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace;
  }
  .backtest-legend-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  .trade-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    gap: 8px;
    flex-wrap: wrap;
  }
  .trade-rows { display: grid; gap: 6px; }
  .trade-row {
    display: grid;
    grid-template-columns: 1.1fr 0.8fr 0.8fr 0.8fr 0.8fr auto;
    gap: 6px;
    align-items: center;
  }
  .trade-row.option { grid-template-columns: 1fr 0.8fr 0.8fr 1fr 0.9fr 0.9fr 0.9fr auto; }
  .trade-row input, .trade-row select, .trade-actions button, .trade-card button {
    padding: 6px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-primary);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .trade-actions { display: flex; gap: 6px; }
  .trade-note {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 6px;
  }
  .trade-metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 8px;
    margin-top: 8px;
  }
  .trade-metric {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px;
    background: var(--bg-card);
  }
  .trade-metric .k { color: var(--text-muted); font-size: 10px; text-transform: uppercase; }
  .trade-metric .v { color: var(--text-primary); font-size: 14px; font-weight: 700; margin-top: 2px; }
  .trade-warning {
    color: var(--warning);
    font-size: 11px;
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }
  .ttx-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }
  .ttx-table th, .ttx-table td {
    border-bottom: 1px solid var(--border);

  .ttx-table th:first-child, .ttx-table td:first-child { text-align: left; }

  .tf-group {

    padding: 5px 12px; border-radius: 4px; font-size: 11px; font-weight: 600;

  .tf-btn:hover { color: var(--text-primary); background: var(--bg-card); }

    .trade-grid { grid-template-columns: 1fr; }

  /* ── News Tab ────────────────────────────── */
  .news-page { padding: 18px 24px 40px; }
  .news-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
    padding-bottom: 14px; margin-bottom: 18px;
    border-bottom: 1px solid var(--border);

  .news-title {
    font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 22px;

  }
  .news-title-accent {

  .news-subtitle {

  .news-meta {

    color: var(--text-muted);
  }
  .news-meta b { color: var(--text-secondary); font-weight: 600; }

  .news-toolbar {
    display: flex; align-items: center; flex-wrap: wrap;
    gap: 10px 14px; margin-bottom: 18px;
    padding: 12px 14px; border-radius: 10px;

  .news-toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

  /* Pinned structured events strip */
  .pinned-section { margin-bottom: 26px; }
  .pinned-section-title {
    display: flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 10px;
  }
  .pinned-section-title::before {
    content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent-amber); box-shadow: 0 0 8px rgba(245,158,11,0.6);
  }
  .pinned-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }
  .pinned-card {
    position: relative;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 14px 14px 18px;
    cursor: pointer; transition: all 0.15s ease;
    overflow: hidden;

  .pinned-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: var(--cat-accent, var(--accent-blue));
  }
  .pinned-card:hover {

    box-shadow: 0 6px 20px rgba(0,0,0,0.25);

  .ticker-chip {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700;
    color: var(--accent-cyan); background: rgba(6,182,212,0.08);
    border: 1px solid rgba(6,182,212,0.25);
    cursor: pointer; transition: all 0.12s ease;

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

const DATA_URL = "data/dashboard_data.json";
const INVESTORS_URL = "data/investors.json";
const AUTH_STORAGE_KEY = "etf_dash_session_v1";
const AUTH_SESSION_MS = 7 * 86400000;
const BORROW_HISTORY_URL = "data/borrow_history.json";
const BORROW_SPIKE_RISK_URL = "data/borrow_spike_risk.json";
const OPTIONS_CACHE_URL = "data/options_cache.json";
const ETF_METRICS_DAILY_URL = "data/etf_metrics_daily.json";
const LETF_REBALANCE_FLOWS_DAILY_URL = "data/letf_rebalance_flows_daily.json";
const LETF_REBALANCE_FLOWS_LATEST_URL = "data/letf_rebalance_flows_latest.json";
const LETF_INTRADAY_FLOWS_URL = "data/letf_rebalance_flows_intraday_latest.json";
const LETF_INTRADAY_METRICS_URL = "data/letf_intraday_flow_metrics.json";
const VOL_SHAPE_HISTORY_URL = "data/vol_shape_history.json";
/** @type {{ symbols: Record<string, { series: object[], vcrMedian: number|null, window: number }>, buildTime: string|null }|null} */
let VOL_SHAPE_HISTORY_CACHE = null;
const ETF_DISTRIBUTIONS_URL = "data/etf_distributions.json";
const CORPORATE_ACTIONS_URL = "data/corporate_actions.json";
const ETF_NEWS_URL = "data/etf_news.json";
// NAV forecast pipeline (delta_v1) — see data/nav_forecasts/README.md.
const NAV_FORECAST_LATEST_URL = "data/nav_forecasts/_latest.json";
const NAV_FORECAST_METRICS_URL = "data/nav_forecasts/_metrics_daily.json";
const NAV_FORECAST_HISTORY_URL = "data/nav_forecasts/_history_panel.json";
let BORROW_HISTORY_CACHE = null;
let BORROW_HISTORY_BUILD_TIME = null;
let BORROW_SPIKE_RISK_CACHE = null;
/** @type {{ bySymbol: Record<string, object[]>, buildTime: string|null }|null} */
let ETF_METRICS_CACHE = null;
/** @type {{ byTicker: Record<string, object[]>, byUnderlying: Record<string, object>, latestDate: string|null, buildTime: string|null, method: string|null }|null} */
let LETF_REBALANCE_FLOWS_CACHE = null;
/** @type {{ byFund: Record<string, object>, byUnderlying: Record<string, object>, asOf: string|null, buildTime: string|null, minutesToClose: number|null, todayHistory: object[], biasMetrics: object|null }|null} */
let LETF_INTRADAY_FLOWS_CACHE = null;
let ETF_DISTRIBUTIONS_CACHE = null;
let NAV_FORECAST_LATEST_CACHE = null;
let NAV_FORECAST_METRICS_CACHE = null;
let NAV_FORECAST_HISTORY_CACHE = null;

// ── Formatters ──────────────────────────────
const fmt = v => v == null ? '—' : (v * 100).toFixed(2) + '%';
const fmtNum = v => v == null ? '—' : Number(v).toLocaleString();
/** Whole-share counts (ETF shares outstanding, etc.): integer separators only — avoids 87,333.079 misread as 87,333,079. */
const fmtSharesCount = v => (
  v == null || !Number.isFinite(Number(v)) ? '—' : Math.round(Number(v)).toLocaleString('en-US')
);
/** Yahoo daily volume on Stats tab: null/blank is absent data, not zero (avoid Number(null) → 0). */
const fmtSharesTradedStat = (raw) => {
  if (raw == null) return 'N/A';
  if (typeof raw === 'string' && !raw.trim()) return 'N/A';
  const n = typeof raw === 'string' ? Number(raw.trim().replace(/,/g, '')) : Number(raw);
  if (!Number.isFinite(n) || n < 0) return 'N/A';
  return Math.round(n).toLocaleString('en-US');
};
const fmtUsd = v => (v == null || !Number.isFinite(Number(v))) ? '—' : `$${Number(v).toFixed(2)}`;
const fmtMoney = v => (v == null || !Number.isFinite(Number(v))) ? '—' : `$${Math.round(Number(v)).toLocaleString()}`;
const fmtTime = iso => {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true });
};
const fmtRatio = v => (v == null || !Number.isFinite(Number(v))) ? '—' : Number(v).toFixed(2);
const VOL_SHAPE_LABELS = {
  boiling_trend: 'Boiling trend',
  jumpy_trend: 'Jumpy trend',
  choppy_volatile: 'Choppy volatile',
  volatile_mixed: 'Volatile mixed',
  quiet_trend: 'Quiet trend',
  quiet_chop: 'Quiet chop',
  quiet_mixed: 'Quiet mixed',
};
function volShapeLabel(v) {
  const key = String(v || '').trim();
  return VOL_SHAPE_LABELS[key] || (key ? key.replace(/_/g, ' ') : '—');
}
function volShapeCls(v) {
  const key = String(v || '').trim();
  if (key === 'boiling_trend') return 'val-positive';
  if (key === 'jumpy_trend' || key === 'choppy_volatile' || key === 'volatile_mixed') return 'val-warning';
  return 'val-muted';
}
// Window the dashboard treats as primary for trend/VCR. 60d matches
// risk_dashboard/beta_loader.DEFAULT_WINDOW_DAYS so the same clock drives
// betas and shape diagnostics.
const VOL_SHAPE_PRIMARY_WINDOW = 60;
function volShapeFields(r, w = VOL_SHAPE_PRIMARY_WINDOW) {
  if (!r) return {};
  return {
    label: r[`und_vol_shape_${w}d`],
    tr: r[`und_trend_ratio_${w}d`],
    vcr: r[`und_vcr_${w}d`],
    ret: r[`und_return_${w}d`],
    rvDaily: r[`und_rv_${w}d_daily_annual`],
    rvWeekly: r[`und_rv_${w}d_weekly_annual`],
    rvPctile: r[`und_rv_${w}d_pctile`],
    absRetPctile: r[`und_abs_return_${w}d_pctile`],
    vcrPctile: r[`und_vcr_${w}d_pctile`],
    vcrMedian: r[`und_vcr_${w}d_median`],
    trPctile: r[`und_trend_ratio_${w}d_pctile`],
  };
}
/** Joint ETF + underlying price days (same gate as pair backtest / vol-shape charts). */
function jointMetricsRowsForVolShape(rawRows) {
  const hasBoth = (row) => {
    const pl = Number(row?.close_price) || Number(row?.nav);
    const ps = Number(row?.underlying_adj_close);
    const ds = String(row?.date || '').trim();
    return Boolean(ds) && Number.isFinite(pl) && pl > 0 && Number.isFinite(ps) && ps > 0;
  };
  return (Array.isArray(rawRows) ? rawRows : [])
    .filter(hasBoth)
    .sort((a, b) => String(a?.date || '').localeCompare(String(b?.date || '')));
}

function volShapeHistoryFromMetricsRows(rawRows, window = VOL_SHAPE_PRIMARY_WINDOW) {
  return buildUnderlyingVolShapeHistory(jointMetricsRowsForVolShape(rawRows), window);
}

async function loadVolShapeHistoryCache() {
  if (VOL_SHAPE_HISTORY_CACHE?.symbols) return VOL_SHAPE_HISTORY_CACHE;
  const cacheBust = `?t=${Math.floor(Date.now() / 60000)}`;
  const res = await fetch(`${VOL_SHAPE_HISTORY_URL}${cacheBust}`, { cache: 'no-store' });
  if (!res.ok) throw new Error(`vol shape history HTTP ${res.status}`);
  const payload = await res.json();
  const symbols = payload?.symbols && typeof payload.symbols === 'object' ? payload.symbols : {};
  VOL_SHAPE_HISTORY_CACHE = {
    symbols,
    buildTime: payload?.build_time || null,
  };
  return VOL_SHAPE_HISTORY_CACHE;
}

async function loadBorrowHistoryCache() {
  if (BORROW_HISTORY_CACHE) return BORROW_HISTORY_CACHE;
  const cacheBust = `?t=${Math.floor(Date.now() / 60000)}`;
  const res = await fetch(`${BORROW_HISTORY_URL}${cacheBust}`, { cache: 'no-store' });
  if (!res.ok) throw new Error(`borrow history HTTP ${res.status}`);
  const payload = await res.json();
  const symbols = payload?.symbols && typeof payload.symbols === 'object' ? payload.symbols : {};
  BORROW_HISTORY_CACHE = symbols;
  BORROW_HISTORY_BUILD_TIME = payload?.meta?.build_time || null;
  return BORROW_HISTORY_CACHE;
}

/** Prefer CI-built history JSON; fall back to client recompute from metrics rows. */
function volShapeHistoryForSymbol(sym, metricsRows, window = VOL_SHAPE_PRIMARY_WINDOW) {
  const key = String(sym || '').toUpperCase();
  const pre = VOL_SHAPE_HISTORY_CACHE?.symbols?.[key];
  if (pre?.series?.length) return pre;
  return volShapeHistoryFromMetricsRows(metricsRows, window);
}

function volShapeLatestFromHistory(volShapeHistory) {
  const series = volShapeHistory?.series;
  if (!Array.isArray(series) || !series.length) return null;
  const last = series[series.length - 1];
  const tr = Number(last?.trend_ratio);
  const vcr = Number(last?.vcr);
  if (!Number.isFinite(tr) && !Number.isFinite(vcr)) return null;
  return {
    tr: Number.isFinite(tr) ? tr : null,
    vcr: Number.isFinite(vcr) ? vcr : null,
    date: String(last?.date || '').trim() || null,
    rvDaily: Number(last?.rv_daily),
    rvWeekly: Number(last?.rv_weekly),
  };
}

/**
 * Prefer dashboard fields built from etf_metrics_daily (Tier 2), else client metrics history
 * (matches charts), else ls-algo screener CSV.
 */
function volShapeDisplay(r, opts = {}) {
  const w = opts.w ?? VOL_SHAPE_PRIMARY_WINDOW;
  const screener = volShapeFields(r, w);
  if (r?.und_vol_shape_source === 'etf_metrics_daily') {
    return {
      w,
      label: screener.label,
      tr: screener.tr,
      vcr: screener.vcr,
      source: 'etf_metrics_daily',
      asOfDate: r.und_vol_shape_metrics_asof || null,
      screenerTr: screener.tr,
      screenerVcr: screener.vcr,
      screenerDiffers: false,
      metricsBuildTime: opts.metricsBuildTime || null,
      dashboardBuildTime: opts.dashboardBuildTime || null,
      ret: screener.ret,
      rvDaily: screener.rvDaily,
      rvWeekly: screener.rvWeekly,
      rvPctile: screener.rvPctile,
      absRetPctile: screener.absRetPctile,
      vcrPctile: screener.vcrPctile,
      vcrMedian: screener.vcrMedian,
      trPctile: screener.trPctile,
    };
  }
  const histLast = volShapeLatestFromHistory(opts.volShapeHistory);
  const useMetrics = histLast != null && Number.isFinite(Number(histLast.tr));
  const tr = useMetrics ? histLast.tr : screener.tr;
  const vcr = useMetrics ? histLast.vcr : screener.vcr;
  const trGap = Number.isFinite(Number(screener.tr)) && Number.isFinite(Number(tr))
    && Math.abs(Number(screener.tr) - Number(tr)) > 0.05;
  const vcrGap = Number.isFinite(Number(screener.vcr)) && Number.isFinite(Number(vcr))
    && Math.abs(Number(screener.vcr) - Number(vcr)) > 0.015;
  return {
    w,
    label: screener.label,
    tr,
    vcr,
    source: useMetrics ? 'metrics' : 'screener',
    asOfDate: useMetrics ? histLast.date : null,
    screenerTr: screener.tr,
    screenerVcr: screener.vcr,
    screenerDiffers: useMetrics && (trGap || vcrGap),
    metricsBuildTime: opts.metricsBuildTime || null,
    dashboardBuildTime: opts.dashboardBuildTime || null,
    ret: screener.ret,
    rvDaily: useMetrics && Number.isFinite(histLast.rvDaily) ? histLast.rvDaily : screener.rvDaily,
    rvWeekly: useMetrics && Number.isFinite(histLast.rvWeekly) ? histLast.rvWeekly : screener.rvWeekly,
    rvPctile: screener.rvPctile,
    absRetPctile: screener.absRetPctile,
    vcrPctile: screener.vcrPctile,
    vcrMedian: screener.vcrMedian,
    trPctile: screener.trPctile,
  };
}

function fmtVolShapeTrVcr(tr, vcr) {
  const trs = fmtRatio(tr);
  const vcrS = Number.isFinite(Number(vcr)) ? fmt(Number(vcr)) : '—';
  return `TR ${trs} · VCR ${vcrS}`;
}

const VOL_SHAPE_CLOCK_STALE_MS = 6 * 60 * 60 * 1000;

function volShapeClocksDiffer(dashboardBuildTime, metricsBuildTime) {
  const d = dashboardBuildTime ? new Date(dashboardBuildTime).getTime() : NaN;
  const m = metricsBuildTime ? new Date(metricsBuildTime).getTime() : NaN;
  if (!Number.isFinite(d) || !Number.isFinite(m)) return false;
  return Math.abs(d - m) > VOL_SHAPE_CLOCK_STALE_MS;

 * 404 (file may not exist yet pre-first-reconciliation).

async function loadLetfIntradayFlowsCache({ force = true } = {}) {
  if (!force && LETF_INTRADAY_FLOWS_CACHE?.buildTime) return LETF_INTRADAY_FLOWS_CACHE;
  const cacheBust = `?t=${Math.floor(Date.now() / 30000)}`; // 30 s buckets
  const [latestRes, metricsRes] = await Promise.all([
    fetch(`${LETF_INTRADAY_FLOWS_URL}${cacheBust}`, { cache: 'no-store' }),
    fetch(`${LETF_INTRADAY_METRICS_URL}${cacheBust}`, { cache: 'no-store' }).catch(() => null),
  ]);

    throw new Error(`letf intraday flows HTTP ${latestRes.status}`);

  const latest = await latestRes.json();

  if (metricsRes && metricsRes.ok) {
    try { biasMetrics = await metricsRes.json(); } catch { biasMetrics = null; }
  }
  LETF_INTRADAY_FLOWS_CACHE = {
    byFund: latest?.by_fund || {},
    byUnderlying: latest?.by_underlying || {},

  };
  return LETF_INTRADAY_FLOWS_CACHE;
}

const fmtSignedMoney = (v) => {
  if (v == null || !Number.isFinite(Number(v))) return '—';
  const n = Number(v);
  const sign = n > 0 ? '+' : n < 0 ? '−' : '';
  return `${sign}$${Math.abs(Math.round(n)).toLocaleString()}`;
};
/** Compact "$30M" / "−$3.4B" style for axis ticks and tight columns. */
const fmtCompactSignedMoney = (v, digits = 1) => {
  if (v == null || !Number.isFinite(Number(v))) return '—';
  const n = Number(v);
  const a = Math.abs(n);
  const sign = n > 0 ? '+' : n < 0 ? '−' : '';
  if (a >= 1e12) return `${sign}$${(a / 1e12).toFixed(digits)}T`;
  if (a >= 1e9) return `${sign}$${(a / 1e9).toFixed(digits)}B`;
  if (a >= 1e6) return `${sign}$${(a / 1e6).toFixed(digits)}M`;
  if (a >= 1e3) return `${sign}$${(a / 1e3).toFixed(digits)}K`;
  return `${sign}$${a.toFixed(0)}`;
};
const fmtCompactMoney = (v, digits = 1) => {
  if (v == null || !Number.isFinite(Number(v))) return '—';
  return fmtCompactSignedMoney(Math.abs(Number(v)), digits).replace(/^[+−]/, '');
};

);

/** Pair backtest SVG x-axis: include day + year and avoid duplicate tick strings. */
function formatBacktestAxisDate(raw) {
  if (raw == null || raw === '') return '';
  const d = new Date(`${String(raw).trim()}T00:00:00Z`);
  return Number.isNaN(d.getTime()) ? String(raw) : d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function pickDistinctBacktestDateTickIndices(dateStrings) {
  const n = dateStrings.length;
  if (n < 2) return n === 1 ? [0] : [];
  const lab = (i) => formatBacktestAxisDate(dateStrings[i]);
  const cand = [0, Math.round(0.25 * (n - 1)), Math.round(0.5 * (n - 1)), Math.round(0.75 * (n - 1)), n - 1];
  const ordered = [...new Set(cand)].sort((a, b) => a - b);
  const out = [];
  const seen = new Set();
  for (const i of ordered) {
    const force = i === 0 || i === n - 1;
    const s = lab(i);
    if (force || !seen.has(s)) {
      out.push(i);
      seen.add(s);
    }
  }
  return [...new Set(out)].sort((a, b) => a - b);
}
const cls = (...c) => c.filter(Boolean).join(' ');
const toFiniteNum = (v) => {
  if (typeof v === 'string') {
    const s = v.trim().replace(/,/g, '').replace(/%$/, '');
    if (!s) return null;
    const n = Number(s);
    return Number.isFinite(n) ? n : null;
  }
  const n = Number(v);
  return Number.isFinite(n) ? n : null;
};
const normalizeOptionIv = (v) => {
  const n = toFiniteNum(v);
  if (n == null || n <= 0) return null;
  if (n > 5) return n / 100;
  return n;
};
const optionMidFromContract = (c) => {
  if (!c) return null;
  const bid = toFiniteNum(c.bid);
  const ask = toFiniteNum(c.ask);
  if (bid != null && ask != null && bid >= 0 && ask >= bid) return 0.5 * (bid + ask);
  const fallbacks = [c.mid, c.mark, c.last, c.close];
  for (const v of fallbacks) {
    const n = toFiniteNum(v);
    if (n != null && n > 0) return n;
  }
  if (bid != null && bid > 0) return bid;
  if (ask != null && ask > 0) return ask;
  return null;
};
/** Canonical short_favorable_positive: negative = borrow fee (cost to short); positive = rebate / short-favorable. */
const getBorrowRate = r => (r?.borrow_current ?? r?.borrow_net_annual ?? null);
/** Match scripts/build_data.py:_borrow_history_point_for_avg — exclude ~0% fee when no positive locates. */
const borrowHistoryPointForAvg = (pt) => {
  const b = Number(pt?.borrow_current);
  if (!Number.isFinite(b)) return false;
  const eps = 1e-9;
  if (Math.abs(b) > eps) return true;
  const shRaw = pt?.shares_available;
  if (shRaw == null || (typeof shRaw === 'number' && Number.isNaN(shRaw))) return false;
  const sstr = String(shRaw).trim();
  if (!sstr || /^nan$/i.test(sstr)) return false;
  const si = Number(sstr);
  if (!Number.isFinite(si)) return false;
  return Math.trunc(si) > 0;
};
/** Default max β-adj imbalance (percentage points) for pair backtest tolerance control. */
function defaultNetGrossTolerancePct(record) {
  const b = String(record?.bucket || '').trim();
  const pc = String(record?.product_class || '').trim().toLowerCase();
  if (b === 'bucket_3_inverse' || pc === 'inverse') return 10;

const getFreshness = (data) => {
  const built = data?.build_time ? new Date(data.build_time) : null;
  if (!built || Number.isNaN(built.getTime())) {
    return { label: 'Freshness: Unknown', className: 'fresh-warn' };
  }
  const ageMin = Math.max(0, Math.round((Date.now() - built.getTime()) / 60000));
  const target = Number(data?.borrow_refresh_interval_minutes) > 0
    ? Number(data.borrow_refresh_interval_minutes)
    : 30;
  const warnAt = Math.max(target + 10, 45);
  const staleAt = Math.max(target * 2 + 10, 90);
  const ftpOk = Boolean(data?.ibkr_ftp_success);
  if (ageMin >= staleAt) return { label: `Stale (${ageMin}m old)`, className: 'fresh-bad' };
  if (!ftpOk || ageMin >= warnAt) return { label: `Degraded (${ageMin}m old)`, className: 'fresh-warn' };
  return { label: `Fresh (${ageMin}m old)`, className: 'fresh-good' };
};

function timingSafeEqualBytes(a, b) {
  if (!(a instanceof Uint8Array) || !(b instanceof Uint8Array) || a.length !== b.length) return false;
  let x = 0;
  for (let i = 0; i < a.length; i++) x |= a[i] ^ b[i];
  return x === 0;
}

async function verifyInvestorPassword(userId, password, users) {
  const uid = userId.trim().toLowerCase();
  const u = users.find(x => String(x.id || '').toLowerCase() === uid);
  if (!u || !u.salt_b64 || !u.hash_b64) return false;
  const iterations = Number(u.iterations) > 0 ? Number(u.iterations) : 250000;
  let salt;
  let expected;
  try {
    salt = Uint8Array.from(atob(String(u.salt_b64)), c => c.charCodeAt(0));
    expected = Uint8Array.from(atob(String(u.hash_b64)), c => c.charCodeAt(0));
  } catch {
    return false;
  }
  if (expected.length !== 32) return false;
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw',
    enc.encode(password),
    'PBKDF2',
    false,
    ['deriveBits'],
  );
  const bits = await crypto.subtle.deriveBits(
    { name: 'PBKDF2', salt, iterations, hash: 'SHA-256' },
    keyMaterial,
    256,
  );
  const out = new Uint8Array(bits);
  return timingSafeEqualBytes(out, expected);
}

function LoginScreen({ users, onSuccess }) {
  const [userId, setUserId] = useState('');
  const [password, setPassword] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const submit = async (e) => {
    e.preventDefault();
    setErr('');
    if (!userId.trim()) {
      setErr('Login id is required.');
      return;
    }
    setBusy(true);
    try {
      const ok = await verifyInvestorPassword(userId, password, users);
      if (!ok) {
        setErr('Invalid login id or password.');
        return;
      }
      const row = users.find(x => String(x.id || '').toLowerCase() === userId.trim().toLowerCase());
      onSuccess(String(row.id).toLowerCase());
    } catch {
      setErr('Sign in failed. Try another browser or use HTTPS.');
    } finally {
      setBusy(false);
    }
  };
  return (
    <div className="login-wrap">
      <div className="login-card">
        <form onSubmit={submit}>
          <div className="login-field">
            <label htmlFor="inv-user">Login id</label>
            <input
              id="inv-user"
              autoComplete="username"
              value={userId}
              onChange={e => setUserId(e.target.value)}
            />
          </div>
          <div className="login-field">
            <label htmlFor="inv-pass">Password</label>
            <input
              id="inv-pass"
              type="password"
              autoComplete="current-password"
              value={password}
              onChange={e => setPassword(e.target.value)}
            />
          </div>
          <button type="submit" className="login-btn" disabled={busy}>
            {busy ? 'Signing in…' : 'Sign in'}
          </button>
        </form>
        {err ? <div className="login-error">{err}</div> : null}
      </div>
    </div>
  );
}

      let list = [];
      try {
        const res = await fetch(INVESTORS_URL + bust, { cache: 'no-store' });
        if (res.ok) {
          const doc = await res.json();
          if (Array.isArray(doc.users)) list = doc.users.filter(u => u && u.id && u.salt_b64 && u.hash_b64);
        }
      } catch {
        list = [];
      }
      if (cancelled) return;
      setUsers(list);
      if (!list.length) {
        setSessionUid(null);
        setGate('open');
        return;
      }
      const ids = new Set(list.map(u => String(u.id).toLowerCase()));
      const existing = readAuthSession(ids);
      if (existing) {
        setSessionUid(existing);
        setGate('open');
      } else {
        setGate('locked');
      }
    })();
    return () => { cancelled = true; };
  }, []);

  if (gate === 'loading') {
    return (
      <div className="app">
        <div className="loading"><div className="spinner"/>Loading…</div>
      </div>
    );
  }
  if (gate === 'locked') {
    return (
      <LoginScreen
        users={users}
        onSuccess={(uid) => {
          writeAuthSession(uid);
          setSessionUid(uid);
          setGate('open');
        }}
      />
    );
  }
  const authEnabled = users.length > 0;
  return (
    <App
      authUser={sessionUid}
      authEnabled={authEnabled}
      onLogout={authEnabled ? () => {
        clearAuthSession();
        setSessionUid(null);
        setGate('locked');
      } : null}
    />
  );
}

const borrowCls = v => {
  if (v == null) return 'val-muted';
  if (v > 0.15) return 'val-negative';
  if (v > 0.08) return 'val-warning';
  return 'val-positive';
};
const spreadCls = v => {

  if (v > 0.05) return 'val-positive';
  if (v > 0) return 'val-warning';
  return 'val-negative';
};
/** More negative modeled ETF return → better for a structural short (Scenarios-style). */
const scenShortFavCls = v => {

  if (v <= -0.03) return 'val-positive';

// Sort key for the headline expected-ETF-return column.
// Convention: scenario_etf_<horizon>_0und_<sigma_source>.
//   horizon       = 3M (chosen over 1M for stability — CV scales as 1/√T,
//                   so 3M is ~42% less noisy in relative terms; structural
//                   decay accumulates ~3× while noise only grows √3×).
//   underlying    = 0% (flat) — same as Scenarios tab "0×" shock column.
//   sigma_source  = shared forecast σ (50/50 model-implied variance +
//                   robust 6M EWMA variance when both exist).
const SCENARIO_ETF_3M_FLAT_SORT_KEY = 'scenario_etf_3m_0und_forecast_sigma';

// Both YieldBOOST and LETF/inverse/vol-ETP rows now show a long-perspective
// expected ETF return, so the coloring is unified: more-negative = better for

function expectedDecayDisplayValue(r) {
  const expected = Number(r?.expected_gross_decay_annual);
  if (!isVolatilityEtp(r)) return Number.isFinite(expected) ? expected : null;
  const adjusted = Number(r?.expected_gross_decay_adjusted_annual);
  if (Number.isFinite(adjusted)) return adjusted;

  const base = Number.isFinite(simple) ? simple : expected;
  const adj = Number(r?.expected_decay_adjustment_annual);
  if (Number.isFinite(base) && Number.isFinite(adj)) return base + adj;
  const gross = Number(r?.gross_decay_annual);
  if (Number.isFinite(gross) && Number.isFinite(base)) return gross;

}

// Distributional forecast surfaced from ls-algo/decay_distribution.py.
// Returns null when the screener row didn't carry the new fields, so
// callers can fall back to expectedDecayDisplayValue() seamlessly.
function expectedDecayDistribution(r) {
  const p10 = Number(r?.expected_gross_decay_p10_annual);
  const p50 = Number(r?.expected_gross_decay_p50_annual);
  const p90 = Number(r?.expected_gross_decay_p90_annual);
  if (!Number.isFinite(p10) || !Number.isFinite(p50) || !Number.isFinite(p90)) {
    return null;
  }
  const mean = Number(r?.expected_gross_decay_mean_annual);
  const sigma = Number(r?.expected_logIV_sigma_annual);
  const mu = Number(r?.expected_logIV_mu_annual);
  const nObs = Number(r?.expected_gross_decay_dist_n_obs);
  const horizon = Number(r?.expected_gross_decay_dist_horizon_days);
  return {
    p10,
    p50,
    p90,
    mean: Number.isFinite(mean) ? mean : null,
    sigma: Number.isFinite(sigma) ? sigma : null,
    mu: Number.isFinite(mu) ? mu : null,
    model: r?.expected_gross_decay_dist_model || null,
    nObs: Number.isFinite(nObs) ? nObs : null,
    horizon: Number.isFinite(horizon) ? horizon : null,
  };
}

// Annualized intrinsic NAV decay for YieldBOOST income-style products.
// Income ETFs sell weekly 95/88 SPX-style put-spreads; the put-spread
// premium decays the NAV before any distributions are paid out. We
// reuse the same put-spread NAV decay model that powers the Scenarios
// tab so the headline expected-decay column, the Scenarios heatmap,
// and the 1M ETF flat-underlying scenario all agree.
const YB_DEFAULT_EXPENSE_RATIO_ANNUAL = 0.0099;
function yieldBoostUnderlyingSigmaAnnual(r) {
  const v = Number(r?.vol_underlying_annual);
  if (Number.isFinite(v) && v > 0) return v;
  const ewma6m = Number(r?.realized_vol?.['6M']?.underlying_ewma);
  if (Number.isFinite(ewma6m) && ewma6m > 0) return ewma6m;
  const real6m = Number(r?.realized_vol?.['6M']?.underlying);
  if (Number.isFinite(real6m) && real6m > 0) return real6m;
  return null;
}
function yieldBoostIntrinsicAnnualDecay(r) {
  if (!isYieldBoostIncomeStrategy(r)) return null;
  const sigma = yieldBoostUnderlyingSigmaAnnual(r);
  if (!Number.isFinite(sigma) || sigma <= 0) return null;
  const horizonYears = 1.0;
  const weeklyLoss = expectedPutSpreadLossWeekly({
    underlyingReturn: 0, sigmaAnnual: sigma, horizonYears,
  });
  if (weeklyLoss == null || !Number.isFinite(weeklyLoss)) return null;
  const expenseAnnual = YB_DEFAULT_EXPENSE_RATIO_ANNUAL;
  const weeklyExpense = expenseAnnual / 52;
  const weeks = 52;
  const q = Math.max(0.0001, Math.min(1.5, 1 - weeklyLoss - weeklyExpense));
  const navEndRatio = Math.pow(q, weeks);
  return 1 - navEndRatio;
}

// Passive low-β policy: Itô identity (β² − β)/2·σ² ≈ 0 around β ≈ 1,
// so any "expected decay" we report is at best noise. We therefore
// suppress the headline expected-decay/Net edge/Scenario cells for
// these rows on the dashboard and rely on the realized gross drag
// column for the falsifiable measure. See ls-algo daily_screener
// Step 5d ("passive_low_beta policy") and screener_v2_fields
// _expected_decay_available.
function isPassiveLowBetaRow(r) {
  if (r?.product_class === 'passive_low_delta' || r?.product_class === 'passive_low_beta') return true;
  if (r?.expected_decay_available === false && r?.bucket === 'bucket_2_low_beta') {
    return true;
  }
  if (r?.bucket === 'bucket_2_low_beta' && !isYieldBoostIncomeStrategy(r)) {
    return true;
  }
  return false;
}
function expectedDecayAvailableForRow(r) {
  if (r?.expected_decay_available === false) return false;
  if (isPassiveLowBetaRow(r)) return false;
  return true;
}
const PASSIVE_LOW_BETA_POLICY_TOOLTIP =
  'β ≈ 1: vol-drag ≈ 0 in the Itô identity ½·β·(β−1)·σ², so expected decay is hidden by design. Use Gross (realized) instead.';

// Single number used for sorting and the headline cell value.
// Routing (unified across product classes — see decay_distribution.py):
//   - passive_low_beta / expected_decay_available=false → null (renders '—').
//   - Distributional p50 is available for every product class with a
//     non-trivial expected component (LETF, inverse, vol-ETP, YB);
//     YB ships through the put-spread Monte-Carlo (model name
//     'yieldboost_put_spread' / 'yieldboost_put_spread_point'), so the
//     same `dist.p50` field carries the put-spread NAV-decay forecast
//     and matches the Net edge anchor.
//   - YB client-side intrinsic is only a fallback when the server row
//     didn't ship the distribution (very short underlying history,
//     pipeline rerun mid-day, etc.).
//   - Else legacy model-aware point estimate (Itô / vol-ETP adjusted).
function expectedDecayHeadlineValue(r) {
  if (!expectedDecayAvailableForRow(r)) return null;
  const dist = expectedDecayDistribution(r);
  if (dist) return dist.p50;
  if (isYieldBoostIncomeStrategy(r)) {
    const yb = yieldBoostIntrinsicAnnualDecay(r);
    if (yb != null) return yb;
  }
  return expectedDecayDisplayValue(r);
}

const DECAY_DIST_MODEL_LABELS = {
  harq_log_anchored: 'HARQ-Log',
  empirical_lognormal: 'empirical lognormal',
  simple_ito_fallback: 'Itô fallback',
  no_drag_beta: 'no drag (β∈{0,1})',
  yieldboost_put_spread: 'YB put-spread MC',
  yieldboost_put_spread_point: 'YB put-spread (σ-trailing)',
};

const isYieldBoostPutSpreadDistModel = m =>
  m === 'yieldboost_put_spread' || m === 'yieldboost_put_spread_point';

function decayDistTooltip(r) {
  if (!expectedDecayAvailableForRow(r)) {
    return PASSIVE_LOW_BETA_POLICY_TOOLTIP;

        : 'σ drawn from HARQ-Log law → weekly 95/88 put on 2× sleeve, 52× compounded, net of expense (same engine as Scenarios).',
      `p50 (median):  ${fmt(dist.p50)}`,

  if (isYieldBoostIncomeStrategy(r) && !dist) {
    const yb = yieldBoostIntrinsicAnnualDecay(r);
    const sigma = yieldBoostUnderlyingSigmaAnnual(r);
    const lines = [
      'YieldBOOST — NAV loss from option sleeve only (cash payouts separate).',
      'Server band unavailable — client 95/88 weekly put model, one σ.',
      `52× compound net of ${(YB_DEFAULT_EXPENSE_RATIO_ANNUAL * 100).toFixed(2)}% expense.`,
    ];

    if (Number.isFinite(sigma) && sigma > 0) {
      lines.push(`σ_underlying (annual): ${fmt(sigma)}`);

  }
  if (!dist) {
    return isVolatilityEtp(r)
      ? 'Vol ETP: Itô decay + roll/tracking (Itô alone understates VIX futures names).'
      : 'Itô single-σ decay (no HARQ band on file).';
  }
  const modelLabel = DECAY_DIST_MODEL_LABELS[dist.model] || dist.model || '—';
  const horizon = dist.horizon
    ? `${Math.round(dist.horizon)}d`
    : '252d';
  const threshold = dist.horizon
    ? Math.ceil(2.5 * Number(dist.horizon))
    : 630;
  const nObsRounded = dist.nObs != null ? Math.round(dist.nObs) : null;
  let fallbackReason = null;
  if (dist.model === 'simple_ito_fallback') {
    if (nObsRounded == null || nObsRounded <= 0) {
      fallbackReason = 'Fallback: no usable underlying history.';
    } else if (nObsRounded < threshold) {
      fallbackReason =
        `Fallback: short history (n=${nObsRounded} < ${threshold} for ${horizon}).`;
    } else {
      fallbackReason = `Fallback: empirical moments missing (n=${nObsRounded}).`;
    }
  }
  const lines = [
    'Forward (ls-algo screener export, before borrow).',
    `Decay band (${horizon}, before borrow)`,
    `${modelLabel}` + (nObsRounded != null ? ` · n=${nObsRounded}` : ''),
    `p50: ${fmt(dist.p50)}`,
    `p10 / p90: ${fmt(dist.p10)} / ${fmt(dist.p90)}`,
  ];
  if (fallbackReason) lines.push(fallbackReason);
  if (dist.mean != null) lines.push(`LN mean: ${fmt(dist.mean)}`);
  if (dist.sigma != null) lines.push(`σ(log IV): ${dist.sigma.toFixed(3)}`);
  const simple = Number(r?.expected_gross_decay_simple_ito_annual);
  if (Number.isFinite(simple)) lines.push(`Itô point: ${fmt(simple)}`);
  if (isVolatilityEtp(r)) {
    lines.push('volatility ETP — Itô alone understates VIX-futures decay');
  }
  return lines.join('\n');
}

function expectedDecayDisplayLabel(r) {
  if (!expectedDecayAvailableForRow(r)) return 'Exp. (N/A)';
  if (expectedDecayDistribution(r)) return 'Exp. (median)';
  if (isYieldBoostIncomeStrategy(r)) return 'Exp. (intrinsic)';
  return isVolatilityEtp(r) ? 'Exp. (vol-adj)' : 'Exp. (Itô)';
}

/**
 * Annual cash distribution yield for income-style scenario math.
 * Prefer trailing/recent from the distributions build; when those are
 * absent (e.g. borrow-only refresh), fall back to annualized ETF cash
 * yield from `dividend_adjustment` for the chart lookback window — same
 * window logic as the non-income dividend add-on.
 */
function incomeAnnualYieldForScenario(r, chartVolLookbackRange) {
  const trailing = Number(r?.income_yield_trailing_annual);
  if (Number.isFinite(trailing) && trailing > 0) return trailing;
  const recent = Number(r?.income_yield_recent_annual);
  if (Number.isFinite(recent) && recent > 0) return recent;
  if (!isYieldBoostIncomeStrategy(r)) return null;
  const raw = chartVolLookbackRange != null && String(chartVolLookbackRange).trim() !== ''
    ? String(chartVolLookbackRange)
    : '6M';
  const vk = VOL_TF_KEY_BY_RANGE[raw] || '6M';
  const yw = Number(r?.dividend_adjustment?.[vk]?.etf_dividend_yield);
  const winY = DIV_YIELD_WINDOW_YEARS[vk] ?? 0.5;
  if (!Number.isFinite(yw) || yw <= 0 || !(winY > 0)) return null;
  return yw / winY;
}

function normalCdf(x) {
  const z = Number(x);
  if (!Number.isFinite(z)) return z < 0 ? 0 : 1;
  const sign = z < 0 ? -1 : 1;
  const a = Math.abs(z) / Math.SQRT2;
  const p = 0.3275911;
  const t = 1 / (1 + p * a);
  const y = 1 - (((((1.061405429 * t - 1.453152027) * t) + 1.421413741) * t - 0.284496736) * t + 0.254829592) * t * Math.exp(-a * a);
  return 0.5 * (1 + sign * y);
}

function expectedPutSpreadLossWeekly({ underlyingReturn, sigmaAnnual, horizonYears }) {
  const u = Number(underlyingReturn);
  const sigma = Number(sigmaAnnual);
  const t = Number(horizonYears);
  if (!Number.isFinite(u) || u <= -0.9999 || !Number.isFinite(sigma) || sigma <= 0 || !Number.isFinite(t) || t <= 0) {
    return null;
  }
  const tau = 1 / 52;
  const muAnnual = Math.log1p(u) / t;
  const m = (2 * muAnnual - 2 * sigma * sigma) * tau;
  const s = 2 * sigma * Math.sqrt(tau);
  if (!Number.isFinite(m) || !Number.isFinite(s) || s <= 0) return null;

  const spreadPut = (k) => {
    const alpha = (Math.log(k) - m) / s;
    const beta = alpha - s;
    const forward = Math.exp(m + 0.5 * s * s);
    return k * normalCdf(alpha) - forward * normalCdf(beta);
  };
  const shortStrike = 0.95;
  const longStrike = 0.88;
  const loss = spreadPut(shortStrike) - spreadPut(longStrike);
  return Number.isFinite(loss) ? Math.max(0, Math.min(shortStrike - longStrike, loss)) : null;
}

function estimateIncomeStyleScenarioReturn({ underlyingReturn, sigmaAnnual, annualIncomeYield, annualBorrowCost, horizonYears, expenseRatioAnnual = 0.0099 }) {
  if (annualIncomeYield == null) return null;
  const dAnnual = Number(annualIncomeYield);
  const borrowAnnual = Number(annualBorrowCost);
  const t = Number(horizonYears);
  if (!Number.isFinite(dAnnual) || dAnnual < 0 || !Number.isFinite(t) || t <= 0) return null;
  const weeklySpreadLoss = expectedPutSpreadLossWeekly({ underlyingReturn, sigmaAnnual, horizonYears });
  if (weeklySpreadLoss == null) return null;
  const weeks = Math.max(1, Math.round(t * 52));
  const weeklyExpense = Math.max(0, Number(expenseRatioAnnual) || 0) / 52;
  const weeklyDistribution = dAnnual / 52;
  const q = clampNum(1 - weeklySpreadLoss - weeklyExpense, 0.0001, 1.5);
  const navEndRatio = Math.pow(q, weeks);
  const navDecay = 1 - navEndRatio;
  const geomSum = Math.abs(1 - q) < 1e-9 ? weeks : (1 - Math.pow(q, weeks)) / (1 - q);
  const distributionsPaid = weeklyDistribution * geomSum;
  const borrowCost = Number.isFinite(borrowAnnual) && borrowAnnual > 0 ? borrowAnnual * t : 0;
  const netShortPnl = navDecay - distributionsPaid - borrowCost;
  return {
    weeklySpreadLoss,
    navDecay,
    navReturn: -navDecay,
    distributionsPaid,
    borrowCost,
    netShortPnl,
    longTotalReturn: -navDecay + distributionsPaid,
  };
}

/**
 * Vol block for the **chart lookback** (`chartVolLookbackRange` = TIMEFRAMES[].range), same key as ChartPage `volPoint`.
 * Used for diagnostics and as a backward-compatible fallback when the data
 * build has not shipped forecast_vol_underlying_annual.
 */
function realizedVolPointForScenarioColumn(r, chartVolLookbackRange) {
  const raw = chartVolLookbackRange != null && String(chartVolLookbackRange).trim() !== ''
    ? String(chartVolLookbackRange)
    : '6M';
  const volWindowKey = VOL_TF_KEY_BY_RANGE[raw] || '6M';
  return r?.realized_vol?.[volWindowKey] || null;
}

function forecastVolForScenario(r, chartVolLookbackRange) {
  const forecast = Number(r?.forecast_vol_underlying_annual);
  if (Number.isFinite(forecast) && forecast > 0) {
    return {
      sigma: forecast,
      source: r?.forecast_vol_source || 'forecast_vol',
      model: Number.isFinite(Number(r?.forecast_vol_model_annual)) ? Number(r.forecast_vol_model_annual) : null,
      robustEwma: Number.isFinite(Number(r?.forecast_vol_robust_ewma_annual)) ? Number(r.forecast_vol_robust_ewma_annual) : null,
      rawEwma: Number.isFinite(Number(r?.forecast_vol_raw_ewma_annual)) ? Number(r.forecast_vol_raw_ewma_annual) : null,
      realized: Number.isFinite(Number(r?.forecast_vol_realized_annual)) ? Number(r.forecast_vol_realized_annual) : null,
      eventAdjusted: !!r?.forecast_vol_event_adjusted,
      note: r?.forecast_vol_note || null,
      isFallback: false,
    };
  }
  const vp = realizedVolPointForScenarioColumn(r, chartVolLookbackRange);
  const fallback = Number(vp?.underlying_ewma) || Number(vp?.underlying);
  return {
    sigma: Number.isFinite(fallback) && fallback > 0 ? fallback : null,
    source: 'chart_ewma_fallback',
    model: null,
    robustEwma: Number.isFinite(Number(vp?.underlying_robust_ewma)) ? Number(vp.underlying_robust_ewma) : null,
    rawEwma: Number.isFinite(Number(vp?.underlying_ewma)) ? Number(vp.underlying_ewma) : null,
    realized: Number.isFinite(Number(vp?.underlying)) ? Number(vp.underlying) : null,
    eventAdjusted: !!vp?.underlying_robust_event_flag,
    note: 'Fallback: forecast_vol_underlying_annual missing, using chart-lookback EWMA/realized volatility.',
    isFallback: true,
  };
}

/**
 * Expected ETF return over a flat-underlying horizon, from a **long
 * holder's perspective** (this is the headline of the "Exp. ETF return"
 * column in the main grid).
 *
 *   - LETF / inverse / vol-ETP rows  →  `ScenarioReturns.estimateEtfReturn`
 *     with the shared forecast σ from the data builder (50/50 model-implied
 *     variance + robust 6M EWMA variance when both exist).
 *   - YieldBOOST income rows         →  `estimateIncomeStyleScenarioReturn`
 *     **`navReturn + distributionsPaid`** (= `longTotalReturn`): NAV erosion
 *     from weekly 95/88 put-spread + expense, **plus** modeled cash
 *     distributions (trailing/recent yields from the distributions build, or
 *     annualized `dividend_adjustment` cash yield when those are missing).
 *     Still **excludes borrow** (borrow in Net edge). Pair-trade / short
 *     economics use `netShortPnl` in the Scenarios income table.
 *   - Passive low-β / non-income Bucket 2 → `null` (suppressed by policy).
 *
 * Horizon is **3M** by default (caller passes `'3M'` for the headline cell
 * and `'1M'` for the secondary tooltip number). 3M chosen over 1M because
 * CV of the forecast scales as 1/√T (~42% less noisy in relative terms
 * than 1M) and structural decay is more visible at 3M.
 *
 * `chartVolLookbackRange` is only a backward-compatible fallback when older
 * data does not ship forecast_vol_underlying_annual.
 */
function computeExpectedEtfReturnFlatUnd(r, chartVolLookbackRange, horizonLabel = '3M') {
  if (suppressScenarioForRow(r)) return null;
  const SR = typeof window !== 'undefined' ? window.ScenarioReturns : null;
  if (!SR || typeof SR.horizonToYears !== 'function') return null;
  const horizonYears = SR.horizonToYears(horizonLabel);
  const lev = Number(r?.delta);
  if (!Number.isFinite(horizonYears) || horizonYears <= 0 || !Number.isFinite(lev)) return null;
  const forecastVol = forecastVolForScenario(r, chartVolLookbackRange);
  const sigma = Number(forecastVol?.sigma);
  if (!Number.isFinite(sigma) || sigma <= 0) return null;
  if (isYieldBoostIncomeStrategy(r)) {
    const modeled = estimateIncomeStyleScenarioReturn({
      underlyingReturn: 0,
      sigmaAnnual: sigma,
      annualIncomeYield: incomeAnnualYieldForScenario(r, chartVolLookbackRange),
      annualBorrowCost: Number(getBorrowRate(r)),
      horizonYears,
    });
    // Long holder: NAV decay from put-spread + expense, **plus** cash
    // distributions over the horizon (navReturn + distributionsPaid — same
    // as income Scenarios `longTotalReturn`). Borrow stays out of this cell.
    if (!modeled) return null;
    const navR = Number(modeled.navReturn);
    const dist = Number(modeled.distributionsPaid);
    if (Number.isFinite(navR) && Number.isFinite(dist)) return navR + dist;
    return null;
  }
  if (typeof SR.estimateEtfReturn !== 'function') return null;
  const res = SR.estimateEtfReturn({
    leverage: lev,
    underlyingReturn: 0,
    sigmaAnnual: sigma,
    horizonYears,
    annualCarryDrag: 0,
    minReturn: -0.9999,
  });
  if (!res.ok) return null;
  const divAdd = dividendCashAdditiveForHorizon(r, chartVolLookbackRange, horizonYears);
  if (!Number.isFinite(divAdd) || divAdd === 0) return res.value;
  const combined = Number(res.value) + divAdd;
  return Number.isFinite(combined) ? combined : res.value;
}

/** Window length (years) for `dividend_adjustment` ETF yield keys. */

/**
 * Cash dividend contribution to long total return over `horizonYears`:
 * annualizes ETF dividend yield from the chart-lookback window, scales by
 * horizon. Skipped for income-style rows (they use `longTotalReturn`).
 */
function dividendCashAdditiveForHorizon(r, chartVolLookbackRange, horizonYears) {
  if (isYieldBoostIncomeStrategy(r)) return 0;
  const raw = chartVolLookbackRange != null && String(chartVolLookbackRange).trim() !== ''
    ? String(chartVolLookbackRange)
    : '6M';
  const vk = VOL_TF_KEY_BY_RANGE[raw] || '6M';
  const yw = Number(r?.dividend_adjustment?.[vk]?.etf_dividend_yield);
  const winY = DIV_YIELD_WINDOW_YEARS[vk] ?? 0.5;
  if (!Number.isFinite(yw) || yw <= 0 || !Number.isFinite(horizonYears) || horizonYears <= 0 || !(winY > 0)) return 0;
  return (yw / winY) * horizonYears;
}

  if (Math.abs(Math.abs(v) - (1 / 3)) < 1e-9) return `${v < 0 ? '-' : '+'}1/3σ`;
  return `${sign}${v.toFixed(2)}σ`;
};
