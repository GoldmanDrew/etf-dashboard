<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ETF Borrow Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='85'>⚡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0e17;
    --bg-secondary: #111827;
    --bg-card: #151d2e;
    --bg-card-hover: #1a2438;
    --bg-input: #0d1424;
    --border: #1e2d46;
    --border-active: #3b82f6;
    --text-primary: #e8ecf4;
    --text-secondary: #8896ae;
    --text-muted: #566580;
    --accent-blue: #3b82f6;
    --accent-green: #10b981;
    --accent-red: #ef4444;
    --accent-amber: #f59e0b;
    --accent-purple: #8b5cf6;
    --accent-cyan: #06b6d4;
    --positive: #10b981;
    --negative: #ef4444;
    --warning: #f59e0b;
    --stale: #6b7280;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    background: var(--bg-primary); color: var(--text-primary);
    line-height: 1.5; min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  #root { min-height: 100vh; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-primary); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .app { display: flex; flex-direction: column; min-height: 100vh; }

  /* ── Topbar ──────────────── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px; background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar-logo {
    font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 16px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px; cursor: pointer;
  }
  .topbar-meta {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .topbar-meta a { color: var(--accent-purple); text-decoration: none; }
  .topbar-meta a:hover { text-decoration: underline; }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .dot-green { background: var(--accent-green); }
  .dot-amber { background: var(--accent-amber); }
  .fresh-badge {
    display: inline-flex; align-items: center;
    padding: 1px 7px; border-radius: 999px;
    font-size: 10px; font-weight: 700; letter-spacing: 0.3px;
    border: 1px solid transparent;
  }
  .fresh-good { color: var(--positive); background: rgba(16,185,129,0.12); border-color: rgba(16,185,129,0.35); }
  .fresh-warn { color: var(--warning); background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.35); }
  .fresh-bad { color: var(--negative); background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.35); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .topbar-btn {
    padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border); background: var(--bg-card);
    color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .topbar-btn:hover { border-color: var(--accent-blue); color: var(--text-primary); }
  .topbar-btn.active { background: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }
  .topbar-user {
    font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace;
    max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ── Investor login (optional; see data/investors.json) ── */
  .login-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px; background: var(--bg-primary);
  }
  .login-card {
    width: 100%; max-width: 340px; background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 12px; padding: 28px 26px 26px; box-shadow: 0 20px 50px rgba(0,0,0,0.35);
  }
  .login-field { margin-bottom: 14px; }
  .login-field label {
    display: block; font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 5px;
  }
  .login-field input {
    width: 100%; padding: 10px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg-input); color: var(--text-primary); font-size: 14px;
    font-family: 'JetBrains Mono', monospace;
  }
  .login-field input:focus {
    outline: none; border-color: var(--accent-blue);
  }
  .login-btn {
    width: 100%; margin-top: 8px; padding: 11px; border-radius: 6px; border: none;
    background: var(--accent-blue); color: #fff; font-weight: 700; font-size: 13px;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
  .login-btn:disabled { opacity: 0.55; cursor: not-allowed; }
  .login-error {
    margin-top: 14px; font-size: 12px; color: var(--accent-red);
  }

  /* ── Summary ─────────────── */
  .summary-strip {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(195px, 1fr));
    gap: 10px; padding: 14px 24px;
    background: var(--bg-secondary); border-bottom: 1px solid var(--border);
  }
  .summary-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px; transition: border-color 0.15s;
  }
  .summary-card:hover { border-color: var(--border-active); }
  .summary-card .label {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.6px; color: var(--text-muted); margin-bottom: 5px;
  }
  .summary-card .value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px; font-weight: 700;
  }
  .summary-card .sub {
    font-size: 11px; color: var(--text-muted); margin-top: 3px;
    font-family: 'JetBrains Mono', monospace;
  }
  .highlight-list { list-style: none; padding: 0; }
  .highlight-list li {
    display: flex; justify-content: space-between; align-items: center;
    padding: 3px 0; font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .highlight-list .sym { font-weight: 600; color: var(--text-primary); }

  /* ── Tabs ─────────────────── */
  .tab-bar { display: flex; align-items: center; gap: 4px; padding: 12px 24px 0; }
  .tab {
    padding: 10px 18px; border-radius: 8px 8px 0 0;
    font-size: 13px; font-weight: 600; color: var(--text-muted);
    cursor: pointer; border: 1px solid transparent; border-bottom: none;
    transition: all 0.15s; background: transparent;
    font-family: 'DM Sans', sans-serif;
  }
  .tab:hover { color: var(--text-secondary); background: var(--bg-card); }
  .tab.active { color: var(--text-primary); background: var(--bg-card); border-color: var(--border); }
  .tab .count {
    display: inline-block; margin-left: 6px; padding: 1px 7px;
    border-radius: 10px; font-size: 11px; font-weight: 600;
    background: var(--bg-primary); color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .tab.active .count { background: var(--accent-blue); color: #fff; }

  /* ── Controls ────────────── */
  .controls-bar {
    display: flex; align-items: center; gap: 12px; padding: 12px 24px;
    background: var(--bg-card); border: 1px solid var(--border); border-top: none;
  }
  .search-wrapper { position: relative; flex: 1; max-width: 360px; }
  .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); font-size: 13px; pointer-events: none;
  }
  .search-box {
    width: 100%; padding: 8px 14px 8px 36px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--bg-input);
    color: var(--text-primary); font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    outline: none; transition: border-color 0.15s;
  }
  .search-box:focus { border-color: var(--accent-blue); }
  .toggle-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-secondary); cursor: pointer; user-select: none;
  }
  .toggle-label input[type="checkbox"] { accent-color: var(--accent-blue); width: 14px; height: 14px; }

  /* ── Table ────────────────── */
  .table-container { padding: 0 24px 24px; overflow-x: auto; }
  .etf-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
    background: var(--bg-card); border: 1px solid var(--border); border-top: none;
    table-layout: fixed;
  }
  .etf-table thead th {
    position: sticky; top: 0; z-index: 10; background: var(--bg-secondary);
    padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted);
    border-bottom: 1px solid var(--border); cursor: pointer; user-select: none;
    white-space: nowrap; transition: color 0.15s;
  }
  .etf-table thead th:hover { color: var(--text-primary); }
  .etf-table thead th.sorted { color: var(--accent-blue); }
  .etf-table thead th .sort-arrow { margin-left: 4px; font-size: 10px; }
  .etf-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: pointer; }
  .etf-table tbody tr:hover { background: var(--bg-card-hover); }
  .etf-table tbody td {
    padding: 9px 12px; font-family: 'JetBrains Mono', monospace;
    font-size: 12px; white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    vertical-align: middle;
  }
  .sym-cell {
    font-weight: 700; color: var(--accent-cyan); font-size: 13px;
    text-decoration: underline; text-decoration-color: rgba(6,182,212,0.3);
    text-underline-offset: 2px; cursor: pointer; transition: color 0.15s;
  }
  .sym-cell:hover { color: var(--accent-blue); text-decoration-color: var(--accent-blue); }
  .underlying-cell { color: var(--text-secondary); }

  /* ── Value Colors ────────── */
  .val-positive { color: var(--positive); }
  .val-negative { color: var(--negative); }
  .val-warning { color: var(--warning); }
  .val-muted { color: var(--text-muted); }

  .badge {
    display: inline-block; padding: 2px 7px; border-radius: 4px;
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .badge-good { background: rgba(16,185,129,0.12); color: var(--positive); }
  .badge-bad { background: rgba(239,68,68,0.12); color: var(--negative); }
  .badge-warn { background: rgba(245,158,11,0.12); color: var(--warning); }
  .badge-stale { background: rgba(107,114,128,0.12); color: var(--stale); }
  .badge-ftp { background: rgba(6,182,212,0.12); color: var(--accent-cyan); }

  /* ── Detail Expand ───────── */
  .detail-row td {
    padding: 16px 24px; background: var(--bg-primary);
    border-bottom: 2px solid var(--border);
  }
  .detail-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(175px, 1fr)); gap: 12px;
  }
  .detail-item .dlabel {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-muted); margin-bottom: 2px;
  }
  .detail-item .dval { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; }

  /* ── Info Page ────────────── */
  .info-page { padding: 24px; max-width: 860px; }
  .info-row {
    display: flex; justify-content: space-between; padding: 10px 0;
    border-bottom: 1px solid var(--border); font-size: 13px;
  }
  .info-key { color: var(--text-muted); }
  .info-val { font-family: 'JetBrains Mono', monospace; color: var(--text-primary); }
  .info-section {
    margin-top: 24px; margin-bottom: 10px; font-size: 15px; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }

  /* ── Expected Decay Calculator ── */
  .calc-card {
    margin: 10px 24px 0;
    padding: 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-card);
  }
  .calc-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .calc-helper {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .calc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
  }
  .calc-field label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .calc-field input, .calc-field select {
    width: 100%;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-input);
    color: var(--text-primary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .calc-field input:focus, .calc-field select:focus {
    border-color: var(--accent-blue);
    outline: none;
  }
  .calc-error {
    margin-top: 8px;
    font-size: 11px;
    color: var(--accent-red);
  }
  .calc-out-grid {
    margin-top: 12px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 8px;
  }
  .calc-out {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-primary);
    padding: 8px 10px;
  }
  .calc-out .k {
    color: var(--text-muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .calc-out .v {
    font-family: 'JetBrains Mono', monospace;
    margin-top: 2px;
    font-size: 14px;
    font-weight: 700;
  }
  .calc-formula {
    margin-top: 10px;
    font-size: 11px;
    color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace;
  }
  .calc-example {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── Loading / Error ─────── */
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 400px; color: var(--text-muted); font-size: 14px;
  }
  .spinner {
    width: 24px; height: 24px; border: 2px solid var(--border);
    border-top-color: var(--accent-blue); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-right: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-banner {
    margin: 24px; padding: 16px 20px; border-radius: 8px;
    background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
    color: var(--accent-red); font-size: 14px;
  }

  /* ── Chart Page ─────────── */
  .chart-page {
    padding: 0 24px 12px; flex: 1; display: flex; flex-direction: column;
    height: calc(100vh - 50px); /* viewport minus topbar */
    min-height: 0;
  }

  .chart-header {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 0 8px; flex-wrap: wrap; flex-shrink: 0;
  }
  .chart-view-switch {
    display: flex;
    gap: 3px;
    background: var(--bg-primary);
    border-radius: 6px;
    padding: 3px;
    border: 1px solid var(--border);
  }
  .chart-view-btn {
    padding: 5px 10px;
    border-radius: 4px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
  }
  .chart-view-btn:hover { color: var(--text-primary); background: var(--bg-card); }
  .chart-view-btn.active { background: var(--accent-purple); color: #fff; }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
    border: 1px solid var(--border); background: var(--bg-card);
    color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .back-btn:hover { border-color: var(--accent-blue); color: var(--text-primary); }
  .back-btn svg { width: 14px; height: 14px; }

  .chart-title {
    font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700;
    display: flex; align-items: baseline; gap: 10px;
  }
  .chart-title .etf-sym {
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .chart-title .vs { color: var(--text-muted); font-size: 14px; font-weight: 400; }
  .chart-title .und-sym { color: var(--accent-amber); }

  .chart-bucket-badge {
    padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 600;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.3px;
  }
  .chart-bucket-badge.b1 { background: rgba(59,130,246,0.12); color: var(--accent-blue); }
  .chart-bucket-badge.b2 { background: rgba(139,92,246,0.12); color: var(--accent-purple); }
  .chart-bucket-badge.b3 { background: rgba(245,158,11,0.12); color: var(--accent-amber); }

  .chart-container {
    border-radius: 10px; overflow: hidden;
    border: 1px solid var(--border); background: var(--bg-card);
    flex: 1; min-height: 0; position: relative;
  }
  .chart-container iframe {
    border: none; display: block;
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  }
  .chart-loading {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    background: var(--bg-card); color: var(--text-muted); font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
  }

  .chart-stats {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 6px; margin-top: 8px; flex-shrink: 0;
  }
  .chart-stat {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 10px; transition: border-color 0.15s;
  }
  .chart-stat:hover { border-color: var(--border-active); }
  .chart-stat .cs-label {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 3px;
  }
  .chart-stat .cs-value {
    font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700;
  }
  .chart-stat .cs-sub {
    font-size: 10px; color: var(--text-muted); margin-top: 2px;
    font-family: 'JetBrains Mono', monospace;
  }

  .chart-note {
    margin-top: 6px; padding: 6px 12px; border-radius: 6px;
    background: var(--bg-card); border: 1px solid var(--border);
    font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace;
    flex-shrink: 0;
  }
  .metrics-panel {
    margin-top: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg-card);
    padding: 14px;
  }
  .metrics-panel-head {
    margin-bottom: 10px;
  }
  .metrics-panel .scenario-title {
    margin-bottom: 4px;
  }
  .metrics-stack {
    display: grid;
    gap: 18px;
  }
  .metrics-stack .simple-series-card {
    margin-top: 0;
    padding: 14px;
  }
  .metrics-stack .simple-series-svg {
    margin-top: 8px;
  }
  .metrics-panel .scenario-table-wrap {
    margin-top: 16px;
  }
  .metrics-panel .scenario-table td,
  .metrics-panel .scenario-table th {
    padding-top: 8px;
    padding-bottom: 8px;
  }
  .chart-section {
    display: flex;
    flex-direction: column;
    min-height: 0;
    flex: 1;
  }

  .scenario-card {
    margin-top: 8px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-card);
    padding: 10px;
    flex-shrink: 0;
  }
  .scenario-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .scenario-title {
    font-size: 13px;
    font-weight: 700;
  }
  .scenario-sub {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .scenario-table-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 6px;
  }
  .scenario-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--bg-primary);
  }
  .scenario-table th, .scenario-table td {
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    padding: 6px 8px;
    text-align: right;
    white-space: nowrap;
  }
  .scenario-table th:first-child, .scenario-table td:first-child {
    text-align: left;
    position: sticky;
    left: 0;
    background: var(--bg-secondary);
    z-index: 2;
  }
  .scenario-table th {
    background: var(--bg-secondary);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    font-size: 10px;
  }
  .scenario-formula {
    margin-top: 6px;
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .scenario-warning {
    font-size: 11px;
    color: var(--warning);
    font-family: 'JetBrains Mono', monospace;
  }
  .mc-card {
    margin-top: 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-primary);
    padding: 10px;
  }
  .mc-controls {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 8px;
    margin-bottom: 8px;
  }
  .mc-field label {
    display: block;
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 4px;
    letter-spacing: 0.4px;
  }
  .mc-field input, .mc-field select {
    width: 100%;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-primary);
    padding: 6px 8px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .mc-plot {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: #0b1322;
    height: 300px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .mc-plot svg { width: 100%; height: 100%; display: block; }
  .mc-stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
    gap: 6px;
  }
  .mc-stat {
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-card);
    padding: 7px 8px;
  }
  .mc-stat .k {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .mc-stat .v {
    margin-top: 2px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }
  .mc-list {
    margin-top: 8px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-secondary);
  }
  .mc-list div { margin-top: 2px; }
  .borrow-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
    margin-top: 2px;
  }
  .borrow-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg-card);
    padding: 14px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.01);
  }
  .borrow-meta {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    margin: 4px 0 10px;
    line-height: 1.45;
  }
  .trade-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .trade-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg-primary);
    padding: 10px;
  }
  .trade-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    gap: 8px;
    flex-wrap: wrap;
  }
  .trade-rows { display: grid; gap: 6px; }
  .trade-row {
    display: grid;
    grid-template-columns: 1.1fr 0.8fr 0.8fr 0.8fr 0.8fr auto;
    gap: 6px;
    align-items: center;
  }
  .trade-row.option { grid-template-columns: 1fr 0.8fr 0.8fr 1fr 0.9fr 0.9fr 0.9fr auto; }
  .trade-row input, .trade-row select, .trade-actions button, .trade-card button {
    padding: 6px 8px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-primary);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
  }
  .trade-actions { display: flex; gap: 6px; }
  .trade-note {
    font-size: 10px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 6px;
  }
  .trade-metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 8px;
    margin-top: 8px;
  }
  .trade-metric {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px;
    background: var(--bg-card);
  }
  .trade-metric .k { color: var(--text-muted); font-size: 10px; text-transform: uppercase; }
  .trade-metric .v { color: var(--text-primary); font-size: 14px; font-weight: 700; margin-top: 2px; }
  .trade-warning {
    color: var(--warning);
    font-size: 11px;
    margin-top: 6px;
    font-family: 'JetBrains Mono', monospace;
  }
  .ttx-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }
  .ttx-table th, .ttx-table td {
    border-bottom: 1px solid var(--border);
    padding: 6px 8px;
    text-align: right;
  }
  .ttx-table th:first-child, .ttx-table td:first-child { text-align: left; }

  .tf-group {
    display: flex; gap: 3px; margin-left: auto;
    background: var(--bg-primary); border-radius: 6px; padding: 3px;
    border: 1px solid var(--border);
  }
  .tf-btn {
    padding: 5px 12px; border-radius: 4px; font-size: 11px; font-weight: 600;
    border: none; background: transparent;
    color: var(--text-muted); cursor: pointer; transition: all 0.15s;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.3px;
  }
  .tf-btn:hover { color: var(--text-primary); background: var(--bg-card); }
  .tf-active { background: var(--accent-blue) !important; color: #fff !important; }

  @media (max-width: 768px) {
    .summary-strip { grid-template-columns: repeat(2, 1fr); }
    .topbar { padding: 10px 12px; flex-wrap: wrap; gap: 8px; }
    .tab-bar, .controls-bar, .table-container { padding-left: 12px; padding-right: 12px; }
    .chart-page { padding: 0 12px 16px; }
    .chart-container { min-height: 50vh; }
    .chart-stats { grid-template-columns: repeat(2, 1fr); }
    .chart-title { font-size: 17px; }
    .chart-header { gap: 10px; }
    .tf-group { margin-left: 0; width: 100%; justify-content: center; }
    .tf-btn { padding: 5px 8px; font-size: 10px; }
    .trade-grid { grid-template-columns: 1fr; }
    .trade-row, .trade-row.option { grid-template-columns: 1fr; }
  }

  /* ── News Tab ────────────────────────────── */
  .news-page { padding: 18px 24px 40px; }
  .news-header {
    display: flex; align-items: flex-end; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
    padding-bottom: 14px; margin-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .news-title {
    font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 22px;
    letter-spacing: -0.4px; color: var(--text-primary);
    display: flex; align-items: center; gap: 10px;
  }
  .news-title-accent {
    display: inline-block; width: 6px; height: 22px; border-radius: 3px;
    background: linear-gradient(180deg, var(--accent-blue), var(--accent-purple));
  }
  .news-subtitle {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-muted); margin-top: 4px;
  }
  .news-meta {
    display: flex; align-items: center; gap: 14px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-muted);
  }
  .news-meta b { color: var(--text-secondary); font-weight: 600; }

  /* Toolbar: chips + search + time-window + sort */
  .news-toolbar {
    display: flex; align-items: center; flex-wrap: wrap;
    gap: 10px 14px; margin-bottom: 18px;
    padding: 12px 14px; border-radius: 10px;
    background: var(--bg-card); border: 1px solid var(--border);
  }
  .news-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .news-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 11px; border-radius: 999px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600;
    letter-spacing: 0.2px;
    color: var(--text-secondary);
    background: var(--bg-input);
    border: 1px solid var(--border);
    cursor: pointer; transition: all 0.12s ease;
    user-select: none;
  }
  .news-chip:hover { color: var(--text-primary); border-color: var(--border-active); }
  .news-chip.active {
    color: #fff;
    background: var(--accent-blue);
    border-color: var(--accent-blue);
    box-shadow: 0 0 0 1px rgba(59,130,246,0.25);
  }
  .news-chip .count {
    font-size: 10px; opacity: 0.7;
    padding: 0 5px; border-radius: 999px;
    background: rgba(255,255,255,0.08);
  }
  .news-chip.active .count { background: rgba(255,255,255,0.22); opacity: 1; }

  .news-toolbar-divider {
    width: 1px; height: 24px; background: var(--border); margin: 0 2px;
  }
  .news-toolbar-label {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;
  }
  .news-select, .news-search {
    background: var(--bg-input); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px; color: var(--text-primary);
    font-family: 'DM Sans', sans-serif; font-size: 12px;
    outline: none; transition: border-color 0.12s ease;
  }
  .news-select:focus, .news-search:focus { border-color: var(--border-active); }
  .news-search { min-width: 220px; }
  .news-toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

  /* Pinned structured events strip */
  .pinned-section { margin-bottom: 26px; }
  .pinned-section-title {
    display: flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 10px;
  }
  .pinned-section-title::before {
    content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent-amber); box-shadow: 0 0 8px rgba(245,158,11,0.6);
  }
  .pinned-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 12px;
  }
  .pinned-card {
    position: relative;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 14px 14px 18px;
    cursor: pointer; transition: all 0.15s ease;
    overflow: hidden;
  }
  .pinned-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: var(--cat-accent, var(--accent-blue));
  }
  .pinned-card:hover {
    border-color: var(--cat-accent, var(--accent-blue));
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
  }
  .pinned-card-top {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; margin-bottom: 8px;
  }
  .pinned-card-tickers { display: flex; flex-wrap: wrap; gap: 5px; }
  .ticker-chip {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700;
    color: var(--accent-cyan); background: rgba(6,182,212,0.08);
    border: 1px solid rgba(6,182,212,0.25);
    cursor: pointer; transition: all 0.12s ease;
    letter-spacing: 0.4px;
  }
  .ticker-chip:hover { background: rgba(6,182,212,0.18); color: #fff; }
  .pinned-card-headline {
    font-size: 14px; font-weight: 600; line-height: 1.4;
    color: var(--text-primary); margin-bottom: 6px;
  }
  .pinned-card-summary {
    font-size: 12px; color: var(--text-secondary); line-height: 1.5;
    margin-bottom: 10px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .pinned-card-foot {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; flex-wrap: wrap;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--text-muted);
  }
  .pinned-card-foot .ratio {
    color: var(--cat-accent, var(--accent-blue));
    font-weight: 700; letter-spacing: 0.4px;
  }
  .pinned-card-foot .pinned-card-announced {
    opacity: 0.75; font-size: 10px;
  }
  .pinned-card-badges { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  /* Pending (announced but not executed) rows: dashed left accent + subtle
     dim so they're visually distinct from Polygon-confirmed (executed) rows. */
  .pinned-card-pending::before {
    background: repeating-linear-gradient(
      to bottom,
      var(--cat-accent, var(--accent-amber)) 0 6px,
      transparent 6px 10px
    );
  }
  .pinned-card-pending .pinned-card-headline { color: var(--text-secondary); }
  .ticker-chain-arrow {
    display: inline-flex; align-items: center;
    color: var(--text-muted); font-size: 12px; font-weight: 700;
    padding: 0 2px; letter-spacing: -0.5px;
  }

  /* Category badges and accent colors (CSS var overrides) */
  .cat-badge {
    display: inline-flex; align-items: center;
    padding: 2px 8px; border-radius: 999px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700;
    letter-spacing: 0.5px; text-transform: uppercase;
    color: var(--cat-accent, var(--accent-blue));
    background: var(--cat-bg, rgba(59,130,246,0.12));
    border: 1px solid var(--cat-border, rgba(59,130,246,0.35));
  }
  .cat-delisting    { --cat-accent: var(--accent-red);    --cat-bg: rgba(239,68,68,0.12);  --cat-border: rgba(239,68,68,0.35); }
  .cat-reverse_split{ --cat-accent: var(--accent-amber);  --cat-bg: rgba(245,158,11,0.12); --cat-border: rgba(245,158,11,0.35); }
  .cat-forward_split{ --cat-accent: var(--accent-green);  --cat-bg: rgba(16,185,129,0.12); --cat-border: rgba(16,185,129,0.35); }
  .cat-symbol_change{ --cat-accent: var(--accent-purple); --cat-bg: rgba(139,92,246,0.12); --cat-border: rgba(139,92,246,0.35); }
  .cat-merger       { --cat-accent: var(--accent-cyan);   --cat-bg: rgba(6,182,212,0.12);  --cat-border: rgba(6,182,212,0.35); }
  .cat-other        { --cat-accent: var(--text-secondary);--cat-bg: rgba(136,150,174,0.12);--cat-border: rgba(136,150,174,0.35); }
  /* "Announced" pill for Phase 5 press-release-derived events (status=pending).
     Deliberately neutral/amber so it doesn't collide with the category accent. */
  .cat-pending      { --cat-accent: var(--accent-amber);  --cat-bg: rgba(245,158,11,0.10); --cat-border: rgba(245,158,11,0.45); }

  /* News feed: headlines */
  .news-feed-title {
    display: flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 10px;
  }
  .news-feed-title::before {
    content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent-blue); box-shadow: 0 0 8px rgba(59,130,246,0.6);
  }
  .news-feed { display: flex; flex-direction: column; gap: 10px; }
  .news-card {
    position: relative;
    display: grid; grid-template-columns: minmax(0, 1fr) auto;
    gap: 14px; align-items: flex-start;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; padding: 13px 14px 13px 18px;
    transition: all 0.15s ease;
    overflow: hidden;
  }
  .news-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: var(--cat-accent, var(--accent-blue));
    opacity: 0.85;
  }
  .news-card:hover {
    border-color: var(--cat-accent, var(--accent-blue));
    background: var(--bg-card-hover);
  }
  .news-card-body { min-width: 0; }
  .news-card-meta {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--text-muted); margin-bottom: 6px;
  }
  .news-card-meta .publisher { color: var(--text-secondary); font-weight: 600; }
  .news-card-meta .dot-sep { opacity: 0.5; }
  .tier-badge {
    padding: 1px 6px; border-radius: 999px; border: 1px solid var(--border);
    font-size: 10px; letter-spacing: 0.3px; text-transform: uppercase;
    color: var(--text-secondary); background: rgba(136,150,174,0.08);
    font-family: 'JetBrains Mono', monospace;
  }
  .tier-badge.tier-explicit {
    color: var(--accent-green); border-color: rgba(16,185,129,0.45); background: rgba(16,185,129,0.10);
  }
  .tier-badge.tier-high {
    color: var(--accent-blue); border-color: rgba(59,130,246,0.45); background: rgba(59,130,246,0.10);
  }
  .tier-badge.tier-inferred {
    color: var(--accent-amber); border-color: rgba(245,158,11,0.45); background: rgba(245,158,11,0.10);
  }
  .news-card-title {
    font-size: 14px; font-weight: 600; line-height: 1.4;
    color: var(--text-primary); margin-bottom: 6px;
    text-decoration: none;
  }
  .news-card-title:hover { color: var(--accent-blue); text-decoration: underline; }
  .news-card-summary {
    font-size: 12px; color: var(--text-secondary); line-height: 1.5;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    margin-bottom: 8px;
  }
  .news-card-foot {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .news-card-linked {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 7px; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 600;
    color: var(--accent-amber); background: rgba(245,158,11,0.10);
    border: 1px solid rgba(245,158,11,0.3);
  }
  .news-card-image {
    flex-shrink: 0; width: 120px; height: 80px;
    border-radius: 6px; object-fit: cover; background: var(--bg-input);
    border: 1px solid var(--border);
  }
  .news-toggles {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    margin-top: 10px;
  }
  .news-toggle {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 9px; border-radius: 999px; border: 1px solid var(--border);
    font-size: 11px; color: var(--text-secondary); cursor: pointer;
    user-select: none; font-family: 'JetBrains Mono', monospace;
    background: var(--bg-card);
  }
  .news-toggle.active {
    border-color: var(--accent-blue); color: var(--text-primary);
    background: rgba(59,130,246,0.12);
  }
  .news-group-list { display: flex; flex-direction: column; gap: 10px; }
  .news-group {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden;
  }
  .news-group-head {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 12px 14px 12px 16px; cursor: pointer;
  }
  .news-group-main { min-width: 0; }
  .news-group-title {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px;
  }
  .news-group-meta {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted);
    display: flex; align-items: center; gap: 7px; flex-wrap: wrap;
  }
  .news-group-count {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-secondary);
    border: 1px solid var(--border); border-radius: 999px; padding: 2px 8px;
  }
  .news-group-links {
    border-top: 1px solid var(--border);
    padding: 10px 12px; display: flex; flex-direction: column; gap: 8px;
    background: rgba(255,255,255,0.01);
  }
  .news-group-link {
    font-size: 12px; color: var(--text-secondary); text-decoration: none;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .news-group-link:hover { color: var(--text-primary); text-decoration: underline; }

  /* Empty / loading states */
  .news-empty {
    padding: 60px 20px; text-align: center;
    color: var(--text-muted); font-size: 13px;
    background: var(--bg-card); border: 1px dashed var(--border);
    border-radius: 10px;
  }
  .news-empty-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.6; }
  .news-empty-title { font-size: 15px; color: var(--text-secondary); margin-bottom: 6px; }
  .news-error-banner {
    padding: 10px 14px; margin-bottom: 14px;
    background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.3);
    color: var(--accent-red); border-radius: 8px;
    font-size: 12px; font-family: 'JetBrains Mono', monospace;
  }

  @media (max-width: 768px) {
    .news-page { padding: 14px 12px 32px; }
    .news-card { grid-template-columns: 1fr; }
    .news-card-image { width: 100%; height: 140px; order: -1; }
    .news-toolbar-right { margin-left: 0; width: 100%; }
    .news-search { min-width: 0; width: 100%; }
  }
</style>

function timingSafeEqualBytes(a, b) {
  if (!(a instanceof Uint8Array) || !(b instanceof Uint8Array) || a.length !== b.length) return false;
  let x = 0;
  for (let i = 0; i < a.length; i++) x |= a[i] ^ b[i];
  return x === 0;
}

function readAuthSession(validUserIds) {
  try {
    const raw = sessionStorage.getItem(AUTH_STORAGE_KEY);
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (!s || typeof s.uid !== 'string' || typeof s.exp !== 'number') return null;
    if (Date.now() > s.exp) {
      sessionStorage.removeItem(AUTH_STORAGE_KEY);
      return null;
    }
    const uid = s.uid.toLowerCase();
    if (!validUserIds.has(uid)) {
      sessionStorage.removeItem(AUTH_STORAGE_KEY);
      return null;
    }
    return uid;
  } catch {
    return null;
  }
}

function writeAuthSession(uid) {
  sessionStorage.setItem(
    AUTH_STORAGE_KEY,
    JSON.stringify({ uid: uid.toLowerCase(), exp: Date.now() + AUTH_SESSION_MS }),
  );
}

function clearAuthSession() {
  sessionStorage.removeItem(AUTH_STORAGE_KEY);
}

async function verifyInvestorPassword(userId, password, users) {
  const uid = userId.trim().toLowerCase();
  const u = users.find(x => String(x.id || '').toLowerCase() === uid);
  if (!u || !u.salt_b64 || !u.hash_b64) return false;
  const iterations = Number(u.iterations) > 0 ? Number(u.iterations) : 250000;
  let salt;
  let expected;
  try {
    salt = Uint8Array.from(atob(String(u.salt_b64)), c => c.charCodeAt(0));
    expected = Uint8Array.from(atob(String(u.hash_b64)), c => c.charCodeAt(0));
  } catch {
    return false;
  }
  if (expected.length !== 32) return false;
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw',
    enc.encode(password),
    'PBKDF2',
    false,
    ['deriveBits'],
  );
  const bits = await crypto.subtle.deriveBits(
    { name: 'PBKDF2', salt, iterations, hash: 'SHA-256' },
    keyMaterial,
    256,
  );
  const out = new Uint8Array(bits);
  return timingSafeEqualBytes(out, expected);
}

function LoginScreen({ users, onSuccess }) {
  const [userId, setUserId] = useState('');
  const [password, setPassword] = useState('');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const submit = async (e) => {
    e.preventDefault();
    setErr('');
    if (!userId.trim()) {
      setErr('Login id is required.');
      return;
    }
    setBusy(true);
    try {
      const ok = await verifyInvestorPassword(userId, password, users);
      if (!ok) {
        setErr('Invalid login id or password.');
        return;
      }
      const row = users.find(x => String(x.id || '').toLowerCase() === userId.trim().toLowerCase());
      onSuccess(String(row.id).toLowerCase());
    } catch {
      setErr('Sign in failed. Try another browser or use HTTPS.');
    } finally {
      setBusy(false);
    }
  };
  return (
    <div className="login-wrap">
      <div className="login-card">
        <form onSubmit={submit}>
          <div className="login-field">
            <label htmlFor="inv-user">Login id</label>
            <input
              id="inv-user"
              autoComplete="username"
              value={userId}
              onChange={e => setUserId(e.target.value)}
            />
          </div>
          <div className="login-field">
            <label htmlFor="inv-pass">Password</label>
            <input
              id="inv-pass"
              type="password"
              autoComplete="current-password"
              value={password}
              onChange={e => setPassword(e.target.value)}
            />
          </div>
          <button type="submit" className="login-btn" disabled={busy}>
            {busy ? 'Signing in…' : 'Sign in'}
          </button>
        </form>
        {err ? <div className="login-error">{err}</div> : null}
      </div>
    </div>
  );
}

function DashboardRoot() {
  const [gate, setGate] = useState('loading');
  const [users, setUsers] = useState([]);
  const [sessionUid, setSessionUid] = useState(null);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      const bust = `?t=${Date.now()}`;
      let list = [];
      try {
        const res = await fetch(INVESTORS_URL + bust, { cache: 'no-store' });
        if (res.ok) {
          const doc = await res.json();
          if (Array.isArray(doc.users)) list = doc.users.filter(u => u && u.id && u.salt_b64 && u.hash_b64);
        }
      } catch {
        list = [];
      }
      if (cancelled) return;
      setUsers(list);
      if (!list.length) {
        setSessionUid(null);
        setGate('open');
        return;
      }
      const ids = new Set(list.map(u => String(u.id).toLowerCase()));
      const existing = readAuthSession(ids);
      if (existing) {
        setSessionUid(existing);
        setGate('open');
      } else {
        setGate('locked');
      }
    })();
    return () => { cancelled = true; };
  }, []);

  if (gate === 'loading') {
    return (
      <div className="app">
        <div className="loading"><div className="spinner"/>Loading…</div>
      </div>
    );
  }
  if (gate === 'locked') {
    return (
      <LoginScreen
        users={users}
        onSuccess={(uid) => {
          writeAuthSession(uid);
          setSessionUid(uid);
          setGate('open');
        }}
      />
    );
  }
  const authEnabled = users.length > 0;
  return (
    <App
      authUser={sessionUid}
      authEnabled={authEnabled}
      onLogout={authEnabled ? () => {
        clearAuthSession();
        setSessionUid(null);
        setGate('locked');
      } : null}
    />
  );
}

const quantileSorted = (arr, q) => {
  if (!arr?.length) return null;
  const qq = clampNum(Number(q) || 0, 0, 1);
  const idx = (arr.length - 1) * qq;
  const lo = Math.floor(idx);
  const hi = Math.ceil(idx);
  if (lo === hi) return arr[lo];
  const w = idx - lo;
  return arr[lo] * (1 - w) + arr[hi] * w;
};
function MonteCarloPlot({ result, mode = 'short' }) {
  if (!result?.ok) return null;
  const maxPoints = 180;
  const totalPts = result.settings.steps + 1;
  const stride = Math.max(1, Math.ceil(totalPts / maxPoints));
  const pickIdx = [];
  for (let i = 0; i < totalPts; i += stride) pickIdx.push(i);
  if (pickIdx[pickIdx.length - 1] !== totalPts - 1) pickIdx.push(totalPts - 1);

  const carryAnnual = Number.isFinite(Number(result?.settings?.annualCarryDrag))
    ? Number(result.settings.annualCarryDrag)
    : 0;
  const horizonYears = Number.isFinite(Number(result?.settings?.horizonYears))
    ? Number(result.settings.horizonYears)
    : 0;
  const steps = Math.max(1, Number(result?.settings?.steps) || 1);
  const carryAtIdx = (idxOriginal) => carryAnnual * ((idxOriginal / steps) * horizonYears);
  const toRet = (w, idxOriginal = 0) => {
    const etfRet = Number.isFinite(w) ? (w - 1) : 0;
    if (mode === 'short') return -etfRet - carryAtIdx(idxOriginal);
    return etfRet;
  };
  const allSeries = result.paths.map(p => pickIdx.map(i => toRet(p[i], i)));
  const sampleStride = Math.max(1, Math.floor(allSeries.length / 50));
  const series = allSeries.filter((_, i) => i % sampleStride === 0).slice(0, 50);
  const mean = pickIdx.map(i => toRet(result.overlays.mean[i], i));
  const median = pickIdx.map(i => toRet(result.overlays.p50[i], i));
  const p05 = pickIdx.map(i => toRet(result.overlays.p05[i], i));
  const p95 = pickIdx.map(i => toRet(result.overlays.p95[i], i));
  const meanCenter = mean.reduce((a, b) => a + b, 0) / Math.max(1, mean.length);
  const spreadSeries = p95.map((hi, i) => Math.abs(hi - p05[i])).filter(Number.isFinite);
  const spreadP75 = spreadSeries.length
    ? quantileSorted([...spreadSeries].sort((a, b) => a - b), 0.75)
    : NaN;
  const meanMaxDev = mean.reduce((m, v) => Math.max(m, Math.abs(v - meanCenter)), 0);
  const halfRange = Math.max(
    0.2,
    Number.isFinite(spreadP75) ? spreadP75 * 1.7 : 0,
    Number.isFinite(meanMaxDev) ? meanMaxDev * 1.35 : 0,
  );
  let yMin = meanCenter - halfRange;
  let yMax = meanCenter + halfRange;
  if (!Number.isFinite(yMin) || !Number.isFinite(yMax) || yMin === yMax) {
    yMin = -1;
    yMax = 1;
  }

  const W = 900;
  const H = 260;
  const L = 60;
  const R = 8;
  const T = 8;
  const B = 22;
  const PW = W - L - R;
  const PH = H - T - B;
  const clipId = `mc-clip-${mode}-${result.settings.pathCount}-${result.settings.steps}`;
  const linThresh = Math.max(0.02, halfRange / 12);
  const symlog = (v) => Math.sign(v) * Math.log1p(Math.abs(v) / linThresh);
  const symlogInv = (sv) => Math.sign(sv) * linThresh * (Math.exp(Math.abs(sv)) - 1);
  const yMinS = symlog(yMin);
  const yMaxS = symlog(yMax);
  const x = (i) => L + (i / (pickIdx.length - 1)) * PW;
  const y = (v) => {
    const s = symlog(v);
    return T + (1 - ((s - yMinS) / Math.max(1e-12, (yMaxS - yMinS)))) * PH;
  };
  const linePath = (vals) => vals.map((v, i) => `${i === 0 ? 'M' : 'L'} ${x(i).toFixed(2)} ${y(v).toFixed(2)}`).join(' ');
  const bandPath = `M ${x(0)} ${y(p95[0])} ${p95.map((v, i) => `L ${x(i)} ${y(v)}`).join(' ')} ${[...p05].reverse().map((v, i) => `L ${x(p05.length - 1 - i)} ${y(v)}`).join(' ')} Z`;
  const tickCount = 6;
  const yTicks = Array.from({ length: tickCount }, (_, i) => {
    const q = i / Math.max(1, tickCount - 1);
    const sv = yMaxS - q * (yMaxS - yMinS);
    return symlogInv(sv);
  });

  return (
    <div className="mc-plot">
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
        <defs>
          <clipPath id={clipId}>
            <rect x={L} y={T} width={PW} height={PH} />
          </clipPath>
        </defs>
        <rect x={L} y={T} width={PW} height={PH} fill="rgba(11,19,34,0.2)" stroke="rgba(56,72,96,0.5)" />
        {yTicks.map((tick, i) => (
          <g key={i}>
            <line x1={L} y1={y(tick)} x2={W - R} y2={y(tick)} stroke="rgba(56,72,96,0.35)" strokeWidth="1" />
            <text x={L - 6} y={y(tick) + 3} textAnchor="end" fontSize="10" fill="#7f8ea8" fontFamily="JetBrains Mono">
              {fmt(tick)}
            </text>
          </g>
        ))}
        <text x="12" y={T + 10} fontSize="10" fill="#7f8ea8" fontFamily="JetBrains Mono">
          {mode === 'short' ? 'Short return (log scale)' : 'ETF return (log scale)'}
        </text>
        <g clipPath={`url(#${clipId})`}>
          <path d={bandPath} fill="rgba(59,130,246,0.14)" stroke="none" />
          {series.map((s, i) => (
            <path key={i} d={linePath(s)} fill="none" stroke="rgba(148,163,184,0.24)" strokeWidth="1" />
          ))}
          <path d={linePath(median)} fill="none" stroke="rgba(139,92,246,0.95)" strokeWidth="2.2" />
          <path d={linePath(mean)} fill="none" stroke="rgba(6,182,212,0.95)" strokeWidth="2.2" />
        </g>
      </svg>
    </div>
  );
}

function SimpleSeriesPlot({
  series,
  valueKey,
  color,
  label,
  formatValue,
  zeroLabel = '0',
  overlayValueKey,
  overlayColor,
  overlayLabel,
}) {
  if (!Array.isArray(series) || !series.length) {
    return <div className="scenario-warning">No data available.</div>;
  }
  const primaryVals = series.map(p => Number(p?.[valueKey])).filter(Number.isFinite);
  const overlayVals = overlayValueKey
    ? series.map(p => Number(p?.[overlayValueKey])).filter(Number.isFinite)
    : [];
  if (!primaryVals.length && !overlayVals.length) {
    return <div className="scenario-warning">No finite values available.</div>;
  }

  const W = 980;
  const H = 300;
  const L = 74;
  const R = 12;
  const T = 12;
  const B = 38;
  const PW = W - L - R;
  const PH = H - T - B;

  const allVals = [...primaryVals, ...overlayVals];
  const yMinRaw = Math.min(...allVals);
  const yMaxRaw = Math.max(...allVals);
  // Always include zero in axis range so the zero-reference line is explicit.
  const baseMin = Math.min(yMinRaw, 0);
  const baseMax = Math.max(yMaxRaw, 0);
  const pad = (baseMax - baseMin || Math.max(1, Math.abs(baseMax) * 0.1)) * 0.1;
  const yMin = baseMin - pad;
  const yMax = baseMax + pad;
  const x = (i) => L + (i / Math.max(1, series.length - 1)) * PW;
  const y = (v) => T + (1 - ((v - yMin) / Math.max(1e-12, yMax - yMin))) * PH;

  const buildPath = (vals) => vals
    .map((v, i) => (Number.isFinite(v) ? `${i === 0 ? 'M' : 'L'} ${x(i).toFixed(2)} ${y(v).toFixed(2)}` : ''))
    .filter(Boolean)
    .join(' ');

  const lineVals = series.map(p => Number(p?.[valueKey]));
  const linePath = buildPath(lineVals);
  const overlayLineVals = overlayValueKey ? series.map(p => Number(p?.[overlayValueKey])) : [];
  const overlayPath = overlayValueKey ? buildPath(overlayLineVals) : '';

  const findLatestIdx = (vals) => {
    for (let i = vals.length - 1; i >= 0; i -= 1) {
      if (Number.isFinite(vals[i])) return i;
    }
    return -1;
  };
  const latestIdx = findLatestIdx(lineVals);
  const latestVal = latestIdx >= 0 ? lineVals[latestIdx] : NaN;
  const latestLabel = Number.isFinite(latestVal)
    ? `Current: ${formatValue ? formatValue(latestVal) : String(latestVal)}`
    : '';
  const latestLabelY = Number.isFinite(latestVal)
    ? clampNum(y(latestVal) - 7, T + 11, H - B - 4)
    : 0;

  const overlayLatestIdx = overlayValueKey ? findLatestIdx(overlayLineVals) : -1;
  const overlayLatestVal = overlayLatestIdx >= 0 ? overlayLineVals[overlayLatestIdx] : NaN;
  const overlayLatestLabel = Number.isFinite(overlayLatestVal)
    ? `${overlayLabel ? `${overlayLabel}: ` : ''}${formatValue ? formatValue(overlayLatestVal) : String(overlayLatestVal)}`
    : '';

  const ticks = [0, 0.25, 0.5, 0.75, 1].map(q => yMin + (yMax - yMin) * q).reverse();
  const yZero = y(0);
  const dateForIdx = (idx) => {
    const raw = series[idx]?.date;
    if (!raw) return '';
    const d = new Date(`${raw}T00:00:00Z`);
    if (Number.isNaN(d.getTime())) return String(raw);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' });
  };
  const xTickIdx = [0, Math.floor((series.length - 1) / 2), Math.max(0, series.length - 1)];
  const xTickIdxUnique = Array.from(new Set(xTickIdx));

  const primaryColor = color || "rgba(6,182,212,0.95)";
  const ovColor = overlayColor || "rgba(234,179,8,0.95)";

  return (
    <div className="mc-plot" style={{ height: 300, marginBottom: 0 }}>
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet">
        <rect x={L} y={T} width={PW} height={PH} fill="rgba(11,19,34,0.2)" stroke="rgba(56,72,96,0.5)" />
        {ticks.map((tick, i) => (
          <g key={i}>
            <line x1={L} y1={y(tick)} x2={W - R} y2={y(tick)} stroke="rgba(56,72,96,0.35)" strokeWidth="1" />
            <text x={L - 8} y={y(tick) + 4} textAnchor="end" fontSize="11" fill="#9db0d2" fontFamily="DM Sans">
              {formatValue ? formatValue(tick) : String(tick)}
            </text>
          </g>
        ))}
        <line
          x1={L}
          y1={yZero}
          x2={W - R}

function ExpectedDecayCalculator() {
  const [beta, setBeta] = useState('2');
  const [sigmaAnnual, setSigmaAnnual] = useState('130');
  const [periodValue, setPeriodValue] = useState('1');
  const [periodUnit, setPeriodUnit] = useState('months');

  const result = useMemo(() => {
    const fn = window.computeExpectedDecay;
    if (typeof fn !== 'function') {
      return { ok: false, error: 'Calculator utility unavailable.' };
    }
    return fn({ beta, sigmaAnnual, periodValue, periodUnit });
  }, [beta, sigmaAnnual, periodValue, periodUnit]);

  return (
    <div className="calc-card">
      <div className="calc-title">Expected Decay Calculator</div>
      <div className="calc-helper">
        This is theoretical gross decay from volatility drag; not a forecast of realized returns.
      </div>

      <div className="calc-grid">
        <div className="calc-field">
          <label>Beta</label>
          <input value={beta} onChange={e => setBeta(e.target.value)} placeholder="-2, 1.5, 2" />
        </div>
        <div className="calc-field">
          <label>Annualized Volatility (%)</label>
          <input value={sigmaAnnual} onChange={e => setSigmaAnnual(e.target.value)} placeholder="130 or 1.3" />
        </div>
        <div className="calc-field">
          <label>Time Period Value</label>
          <input type="number" min="0" step="any" value={periodValue} onChange={e => setPeriodValue(e.target.value)} />
        </div>
        <div className="calc-field">
          <label>Time Unit</label>
          <select value={periodUnit} onChange={e => setPeriodUnit(e.target.value)}>
            <option value="days">Days</option>
            <option value="weeks">Weeks</option>
            <option value="months">Months</option>
            <option value="years">Years</option>
          </select>
        </div>
      </div>

      {!result.ok ? (
        <div className="calc-error">{result.error || 'Invalid input(s).'}</div>
      ) : (
        <>
          <div className="calc-out-grid">
            <div className="calc-out">
              <div className="k">Period Expected Decay (%)</div>
              <div className="v">{(result.periodExpectedDecay * 100).toFixed(2)}%</div>
            </div>
            <div className="calc-out">
              <div className="k">Period Expected Decay (decimal)</div>
              <div className="v">{result.periodExpectedDecay.toFixed(6)}</div>
            </div>
            <div className="calc-out">
              <div className="k">Annual Expected Decay (%)</div>
              <div className="v">{(result.annualExpectedDecay * 100).toFixed(2)}%</div>
            </div>
          </div>

          <div className="calc-formula">
            expected_decay(T) = 0.5 × |beta| × |beta − 1| × sigma_annual² × T_years
          </div>
          <div className="calc-formula">
            0.5 × |{Number(result.beta).toFixed(4)}| × |{(Number(result.beta) - 1).toFixed(4)}| × {Number(result.sigmaAnnual).toFixed(4)}² × {Number(result.periodYears).toFixed(6)}
          </div>
          <div className="calc-example">
            Example: beta=2, sigma=130%, T=1 month → {(0.5 * Math.abs(2) * Math.abs(1) * (1.3 ** 2) / 12 * 100).toFixed(2)}%
          </div>
        </>
      )}
    </div>
  );
}
