const quantileSorted = (arr, q) => {
  if (!arr?.length) return null;
  const qq = clampNum(Number(q) || 0, 0, 1);
  const idx = (arr.length - 1) * qq;
  const lo = Math.floor(idx);
  const hi = Math.ceil(idx);
  if (lo === hi) return arr[lo];
  const w = idx - lo;
  return arr[lo] * (1 - w) + arr[hi] * w;
};
function MonteCarloPlot({ result, mode = 'short' }) {
  if (!result?.ok) return null;
  const maxPoints = 180;
  const totalPts = result.settings.steps + 1;
  const stride = Math.max(1, Math.ceil(totalPts / maxPoints));
  const pickIdx = [];
  for (let i = 0; i < totalPts; i += stride) pickIdx.push(i);
  if (pickIdx[pickIdx.length - 1] !== totalPts - 1) pickIdx.push(totalPts - 1);

  const carryAnnual = Number.isFinite(Number(result?.settings?.annualCarryDrag))
    ? Number(result.settings.annualCarryDrag)
    : 0;
  const horizonYears = Number.isFinite(Number(result?.settings?.horizonYears))
    ? Number(result.settings.horizonYears)
    : 0;
  const steps = Math.max(1, Number(result?.settings?.steps) || 1);
  const carryAtIdx = (idxOriginal) => carryAnnual * ((idxOriginal / steps) * horizonYears);
  const toRet = (w, idxOriginal = 0) => {
    const etfRet = Number.isFinite(w) ? (w - 1) : 0;
    if (mode === 'short') return -etfRet - carryAtIdx(idxOriginal);
    return etfRet;
  };
  const allSeries = result.paths.map(p => pickIdx.map(i => toRet(p[i], i)));
  const sampleStride = Math.max(1, Math.floor(allSeries.length / 50));
  const series = allSeries.filter((_, i) => i % sampleStride === 0).slice(0, 50);
  const mean = pickIdx.map(i => toRet(result.overlays.mean[i], i));
  const median = pickIdx.map(i => toRet(result.overlays.p50[i], i));
  const p05 = pickIdx.map(i => toRet(result.overlays.p05[i], i));
  const p95 = pickIdx.map(i => toRet(result.overlays.p95[i], i));
  const meanCenter = mean.reduce((a, b) => a + b, 0) / Math.max(1, mean.length);
  const spreadSeries = p95.map((hi, i) => Math.abs(hi - p05[i])).filter(Number.isFinite);
  const spreadP75 = spreadSeries.length
    ? quantileSorted([...spreadSeries].sort((a, b) => a - b), 0.75)
    : NaN;
  const meanMaxDev = mean.reduce((m, v) => Math.max(m, Math.abs(v - meanCenter)), 0);
  const halfRange = Math.max(
    0.2,
    Number.isFinite(spreadP75) ? spreadP75 * 1.7 : 0,
    Number.isFinite(meanMaxDev) ? meanMaxDev * 1.35 : 0,
  );
  let yMin = meanCenter - halfRange;
  let yMax = meanCenter + halfRange;
  if (!Number.isFinite(yMin) || !Number.isFinite(yMax) || yMin === yMax) {
    yMin = -1;
    yMax = 1;
  }

  const W = 900;
  const H = 260;
  const L = 60;
  const R = 8;
  const T = 8;
  const B = 22;
  const PW = W - L - R;
  const PH = H - T - B;
  const clipId = `mc-clip-${mode}-${result.settings.pathCount}-${result.settings.steps}`;
  const linThresh = Math.max(0.02, halfRange / 12);
  const symlog = (v) => Math.sign(v) * Math.log1p(Math.abs(v) / linThresh);
  const symlogInv = (sv) => Math.sign(sv) * linThresh * (Math.exp(Math.abs(sv)) - 1);
  const yMinS = symlog(yMin);
  const yMaxS = symlog(yMax);
  const x = (i) => L + (i / (pickIdx.length - 1)) * PW;
  const y = (v) => {
    const s = symlog(v);
    return T + (1 - ((s - yMinS) / Math.max(1e-12, (yMaxS - yMinS)))) * PH;
  };
  const linePath = (vals) => vals.map((v, i) => `${i === 0 ? 'M' : 'L'} ${x(i).toFixed(2)} ${y(v).toFixed(2)}`).join(' ');
  const bandPath = `M ${x(0)} ${y(p95[0])} ${p95.map((v, i) => `L ${x(i)} ${y(v)}`).join(' ')} ${[...p05].reverse().map((v, i) => `L ${x(p05.length - 1 - i)} ${y(v)}`).join(' ')} Z`;
  const tickCount = 6;
  const yTicks = Array.from({ length: tickCount }, (_, i) => {
    const q = i / Math.max(1, tickCount - 1);
    const sv = yMaxS - q * (yMaxS - yMinS);
    return symlogInv(sv);
  });

  return (
    <div className="mc-plot">
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
        <defs>
          <clipPath id={clipId}>
            <rect x={L} y={T} width={PW} height={PH} />
          </clipPath>
        </defs>
        <rect x={L} y={T} width={PW} height={PH} fill="rgba(11,19,34,0.2)" stroke="rgba(56,72,96,0.5)" />
        {yTicks.map((tick, i) => (
          <g key={i}>
            <line x1={L} y1={y(tick)} x2={W - R} y2={y(tick)} stroke="rgba(56,72,96,0.35)" strokeWidth="1" />
            <text x={L - 6} y={y(tick) + 3} textAnchor="end" fontSize="10" fill="#7f8ea8" fontFamily="JetBrains Mono">
              {fmt(tick)}
            </text>
          </g>
        ))}
        <text x="12" y={T + 10} fontSize="10" fill="#7f8ea8" fontFamily="JetBrains Mono">
          {mode === 'short' ? 'Short return (log scale)' : 'ETF return (log scale)'}
        </text>
        <g clipPath={`url(#${clipId})`}>
          <path d={bandPath} fill="rgba(59,130,246,0.14)" stroke="none" />
          {series.map((s, i) => (
            <path key={i} d={linePath(s)} fill="none" stroke="rgba(148,163,184,0.24)" strokeWidth="1" />
          ))}
          <path d={linePath(median)} fill="none" stroke="rgba(139,92,246,0.95)" strokeWidth="2.2" />
          <path d={linePath(mean)} fill="none" stroke="rgba(6,182,212,0.95)" strokeWidth="2.2" />
        </g>
      </svg>
    </div>
  );
}

function SimpleSeriesPlot({
  series,
  valueKey,
  color,
  label,
  formatValue,
  zeroLabel = '0',
  overlayValueKey,
  overlayColor,
  overlayLabel,
  referenceValue,
  referenceLabel,
  includeZero = true,
  /** When true, null/blank primary values stay missing (do not coerce via Number(null) → 0). */
  strictNullPrimary = false,
}) {
  if (!Array.isArray(series) || !series.length) {
    return <div className="scenario-warning">No data available.</div>;
  }
  const readPrimary = (p) => {
    const raw = p?.[valueKey];
    if (strictNullPrimary) {
      if (raw == null) return null;
      if (typeof raw === 'string' && !raw.trim()) return null;
    }
    return toFiniteNum(raw);
  };
  const primaryVals = series.map(readPrimary).filter(v => v != null);
  const overlayVals = overlayValueKey
    ? series.map(p => toFiniteNum(p?.[overlayValueKey])).filter(v => v != null)
    : [];
  if (!primaryVals.length && !overlayVals.length) {
    return (
      <div className="scenario-warning">
        {strictNullPrimary
          ? 'No daily volume in this window (missing rows show N/A in the table).'
          : 'No finite values available.'}
      </div>
    );
  }

  const W = 980;
  const H = 300;
  const L = 74;
  const R = 12;
  const T = 12;
  const B = 38;
  const PW = W - L - R;
  const PH = H - T - B;

  const allVals = [...primaryVals, ...overlayVals];
  if (Number.isFinite(Number(referenceValue))) allVals.push(Number(referenceValue));
  const yMinRaw = Math.min(...allVals);
  const yMaxRaw = Math.max(...allVals);
  const baseMin = includeZero ? Math.min(yMinRaw, 0) : yMinRaw;
  const baseMax = includeZero ? Math.max(yMaxRaw, 0) : yMaxRaw;
  const pad = (baseMax - baseMin || Math.max(1, Math.abs(baseMax) * 0.1)) * 0.1;
  const yMin = baseMin - pad;
  const yMax = baseMax + pad;
  const x = (i) => L + (i / Math.max(1, series.length - 1)) * PW;
  const y = (v) => T + (1 - ((v - yMin) / Math.max(1e-12, yMax - yMin))) * PH;

  /** Per-index series; skip non-finite points and start a new stroke after gaps (no diagonal across missing days). */
  const buildPath = (vals) => {
    let out = '';
    let penUp = true;
    for (let i = 0; i < vals.length; i += 1) {
      const v = vals[i];
      if (!Number.isFinite(v)) {
        penUp = true;
        continue;
      }
      if (penUp) {
        out += (out ? ' ' : '') + `M ${x(i).toFixed(2)} ${y(v).toFixed(2)}`;
        penUp = false;
      } else {
        out += ` L ${x(i).toFixed(2)} ${y(v).toFixed(2)}`;
      }
    }
    return out;
  };

  const lineVals = series.map(readPrimary);
  const linePath = buildPath(lineVals);
  const overlayLineVals = overlayValueKey ? series.map(p => toFiniteNum(p?.[overlayValueKey])) : [];
  const overlayPath = overlayValueKey ? buildPath(overlayLineVals) : '';

  const findLatestIdx = (vals) => {
    for (let i = vals.length - 1; i >= 0; i -= 1) {
      if (vals[i] != null && Number.isFinite(vals[i])) return i;
    }
    return -1;
  };
  const latestIdx = findLatestIdx(lineVals);
  const latestVal = latestIdx >= 0 ? lineVals[latestIdx] : NaN;
  const latestLabel = Number.isFinite(latestVal)
    ? `Current: ${formatValue ? formatValue(latestVal) : String(latestVal)}`
    : '';
  const latestLabelY = Number.isFinite(latestVal)
    ? clampNum(y(latestVal) - 7, T + 11, H - B - 4)
    : 0;

  const overlayLatestIdx = overlayValueKey ? findLatestIdx(overlayLineVals) : -1;
  const overlayLatestVal = overlayLatestIdx >= 0 ? overlayLineVals[overlayLatestIdx] : NaN;
  const overlayLatestLabel = Number.isFinite(overlayLatestVal)
    ? `${overlayLabel ? `${overlayLabel}: ` : ''}${formatValue ? formatValue(overlayLatestVal) : String(overlayLatestVal)}`
    : '';

  const ticks = [0, 0.25, 0.5, 0.75, 1].map(q => yMin + (yMax - yMin) * q).reverse();
  const yZero = y(0);
  const refOk = Number.isFinite(Number(referenceValue));
  const yRef = refOk ? y(Number(referenceValue)) : null;
  const dateForIdx = (idx) => {
    const raw = series[idx]?.date;
    if (!raw) return '';
    const d = new Date(`${raw}T00:00:00Z`);
    if (Number.isNaN(d.getTime())) return String(raw);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' });
  };
  const xTickIdx = [0, Math.floor((series.length - 1) / 2), Math.max(0, series.length - 1)];
  const xTickIdxUnique = Array.from(new Set(xTickIdx));

  const primaryColor = color || "rgba(6,182,212,0.95)";
  const ovColor = overlayColor || "rgba(234,179,8,0.95)";

  return (
    <div className="mc-plot" style={{ height: 300, marginBottom: 0 }}>
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet">
        <rect x={L} y={T} width={PW} height={PH} fill="rgba(11,19,34,0.2)" stroke="rgba(56,72,96,0.5)" />
        {ticks.map((tick, i) => (
          <g key={i}>
            <line x1={L} y1={y(tick)} x2={W - R} y2={y(tick)} stroke="rgba(56,72,96,0.35)" strokeWidth="1" />
            <text x={L - 8} y={y(tick) + 4} textAnchor="end" fontSize="11" fill="#9db0d2" fontFamily="DM Sans">
              {formatValue ? formatValue(tick) : String(tick)}
            </text>
          </g>
        ))}
        {includeZero && yZero >= T && yZero <= H - B && (
          <>
            <line
              x1={L}
              y1={yZero}
              x2={W - R}
              y2={yZero}
              stroke="rgba(255,255,255,0.45)"
              strokeWidth="1.3"
              strokeDasharray="6 5"
            />
            <text x={W - R - 4} y={yZero - 5} textAnchor="end" fontSize="11" fill="rgba(255,255,255,0.72)" fontFamily="DM Sans">
              {zeroLabel}
            </text>
          </>
        )}
        {refOk && yRef >= T && yRef <= H - B && (
          <>
            <line x1={L} y1={yRef} x2={W - R} y2={yRef} stroke="rgba(255,255,255,0.38)" strokeWidth="1.15" strokeDasharray="3 4" />
            <text x={W - R - 4} y={yRef - 5} textAnchor="end" fontSize="11" fill="rgba(255,255,255,0.68)" fontFamily="DM Sans">
              {referenceLabel || (formatValue ? formatValue(Number(referenceValue)) : String(referenceValue))}
            </text>
          </>
        )}
        {overlayPath && (
          <path d={overlayPath} fill="none" stroke={ovColor} strokeWidth="1.6" strokeDasharray="5 4" />
        )}
        <path d={linePath} fill="none" stroke={primaryColor} strokeWidth="2" />
        {Number.isFinite(latestVal) && (
          <>
            <circle cx={x(latestIdx)} cy={y(latestVal)} r="3.2" fill={primaryColor} />
            <text
              x={W - R - 6}
              y={latestLabelY}
              textAnchor="end"
              fontSize="11"
              fill="#d8e4f8"
              fontFamily="DM Sans"
            >
              {latestLabel}
            </text>
          </>
        )}
        {Number.isFinite(overlayLatestVal) && (
          <>
            <circle cx={x(overlayLatestIdx)} cy={y(overlayLatestVal)} r="2.8" fill={ovColor} />
            <text
              x={W - R - 6}
              y={clampNum(y(overlayLatestVal) + 14, T + 22, H - B - 4)}
              textAnchor="end"
              fontSize="11"
              fill={ovColor}
              fontFamily="DM Sans"
            >
              {overlayLatestLabel}
            </text>
          </>
        )}
        <text x="14" y={T + 14} fontSize="12" fill="#c9d7ef" fontFamily="DM Sans">{label}</text>
        {overlayPath && overlayLabel && (
          <g>
            <line x1={L + 14} y1={T + 30} x2={L + 34} y2={T + 30} stroke={ovColor} strokeWidth="1.6" strokeDasharray="5 4" />
            <text x={L + 40} y={T + 34} fontSize="11" fill={ovColor} fontFamily="DM Sans">{overlayLabel}</text>
          </g>
        )}
        {xTickIdxUnique.map((idx, i) => (
          <g key={`x-${i}`}>
            <line x1={x(idx)} y1={H - B + 1} x2={x(idx)} y2={H - B + 6} stroke="rgba(120,138,168,0.7)" strokeWidth="1" />
            <text x={x(idx)} y={H - 8} textAnchor="middle" fontSize="10" fill="#93a7c8" fontFamily="DM Sans">
              {dateForIdx(idx)}
            </text>
          </g>
        ))}
      </svg>
    </div>
  );
}

function ExpectedDecayCalculator() {
  const [hedgeDelta, setHedgeDelta] = useState('2');
  const [sigmaAnnual, setSigmaAnnual] = useState('130');
  const [periodValue, setPeriodValue] = useState('1');
  const [periodUnit, setPeriodUnit] = useState('months');

  const result = useMemo(() => {
    const fn = window.computeExpectedDecay;
    if (typeof fn !== 'function') {
      return { ok: false, error: 'Calculator utility unavailable.' };
    }
    return fn({ delta: hedgeDelta, sigmaAnnual, periodValue, periodUnit });
  }, [hedgeDelta, sigmaAnnual, periodValue, periodUnit]);

  return (
    <div className="calc-card">
      <div className="calc-title">Expected Decay Calculator</div>
      <div className="calc-helper">
        This is theoretical gross decay from volatility drag; not a forecast of realized returns.
        Scenario drag uses <code>dragLog = ½·δ·(δ−1)·σ²·T</code> (this widget shows <code>½·|δ|·|δ−1|·σ²·T</code> for quick magnitude checks).
      </div>

      <div className="calc-grid">
        <div className="calc-field">
          <label>Delta</label>
          <input value={hedgeDelta} onChange={e => setHedgeDelta(e.target.value)} placeholder="-2, 1.5, 2" />
        </div>
        <div className="calc-field">
          <label>Annualized Volatility (%)</label>
          <input value={sigmaAnnual} onChange={e => setSigmaAnnual(e.target.value)} placeholder="130 or 1.3" />
        </div>
        <div className="calc-field">
          <label>Time Period Value</label>
          <input type="number" min="0" step="any" value={periodValue} onChange={e => setPeriodValue(e.target.value)} />
        </div>
        <div className="calc-field">
          <label>Time Unit</label>
          <select value={periodUnit} onChange={e => setPeriodUnit(e.target.value)}>
            <option value="days">Days</option>
            <option value="weeks">Weeks</option>
            <option value="months">Months</option>
            <option value="years">Years</option>
          </select>
        </div>
      </div>

      {!result.ok ? (
        <div className="calc-error">{result.error || 'Invalid input(s).'}</div>
      ) : (
        <>
          <div className="calc-out-grid">
            <div className="calc-out">
              <div className="k">Period decay (%)</div>
              <div className="v">{(result.periodExpectedDecay * 100).toFixed(2)}%</div>
            </div>
            <div className="calc-out">
              <div className="k">Period decay (dec.)</div>
              <div className="v">{result.periodExpectedDecay.toFixed(6)}</div>
            </div>
            <div className="calc-out">
              <div className="k">Annualized decay (%)</div>
              <div className="v">{(result.annualExpectedDecay * 100).toFixed(2)}%</div>
            </div>
          </div>

          <div className="calc-formula">
            expected_decay(T) = 0.5 × |delta| × |delta − 1| × sigma_annual² × T_years
          </div>
          <div className="calc-formula">
            0.5 × |{Number(result.delta).toFixed(4)}| × |{(Number(result.delta) - 1).toFixed(4)}| × {Number(result.sigmaAnnual).toFixed(4)}² × {Number(result.periodYears).toFixed(6)}
          </div>
          <div className="calc-example">
            Example: delta=2, sigma=130%, T=1 month → {(0.5 * Math.abs(2) * Math.abs(1) * (1.3 ** 2) / 12 * 100).toFixed(2)}%
          </div>
        </>
      )}
    </div>
  );
}

// ── Gross vs net comparison (detail strip): two rails, independent scales ──
function GrossDecayComparisonStrip({ r }) {
  const gR = Number(r.gross_decay_annual);
  const gHead = expectedDecayHeadlineValue(r);
  const gE = gHead != null && Number.isFinite(Number(gHead)) ? Number(gHead) : NaN;

  const bAvg = Number(r?.borrow_avg_annual);
  const netVsAvg = Number.isFinite(gR) && Number.isFinite(bAvg) ? gR - bAvg : NaN;
  const netSpot = Number(r.net_decay);
  const netP50 = Number(r.net_edge_p50_annual);

  const grossPts = [];
  if (Number.isFinite(gR)) grossPts.push({ key: 'gr', v: gR, kind: 'bar', cls: 'realized', legShort: 'Realized gross' });
  if (Number.isFinite(gE)) {
    grossPts.push({
      key: 'ge',
      v: gE,
      kind: 'bar',
      cls: 'expected',
      legShort: `${expectedDecayDisplayLabel(r)} · gross`,
    });
  }

  const netPts = [];
  if (Number.isFinite(netP50)) {
    netPts.push({
      key: 'n50',
      v: netP50,
      kind: 'diamond',
      cls: 'net-edge',
      legShort: 'Net edge (p50, bootstrap)',
    });
  }
  if (Number.isFinite(netVsAvg)) {
    netPts.push({
      key: 'nr',
      v: netVsAvg,
      kind: 'bar',
      cls: 'net-realized',
      legShort: 'Realized net decay (gross − hist. avg borrow)',
    });
  }
  if (Number.isFinite(netSpot)) {
    const sameAsAvg = Number.isFinite(netVsAvg) && Math.abs(netSpot - netVsAvg) < 1e-5;
    if (!sameAsAvg) {
      netPts.push({
        key: 'ns',
        v: netSpot,
        kind: 'bar',
        cls: 'net-spot',
        legShort: 'Net (gross − spot borrow)',
      });
    }
  }

  if (grossPts.length === 0 && netPts.length === 0) return null;

  const fmtPct1 = (x) => `${(x * 100).toFixed(1)}%`;

  function SingleRail({ title, pts }) {
    const vals = pts.map(p => p.v);
    let lo = Math.min(...vals);
    let hi = Math.max(...vals);
    if (!(hi > lo)) {
      lo -= 0.015;
      hi += 0.015;
    }
    const pos = (v) => ((v - lo) / (hi - lo)) * 100;
    return (
      <div className="gross-dumbbell-rail">
        <div className="gross-dumbbell-rail-title">{title}</div>
        <div className="gross-dumbbell gross-dumbbell--rail" aria-hidden="true">
          <div className="gross-dumbbell-track" />
          {pts.map((p) =>
            p.kind === 'diamond' ? (
              <div
                key={p.key}
                className={`gross-dumbbell-mark--diamond ${p.cls}`}
                style={{ left: `${pos(p.v)}%` }}
                title={`${p.legShort}: ${(p.v * 100).toFixed(2)}%`}
              />
            ) : (
              <div
                key={p.key}
                className={`gross-dumbbell-tick ${p.cls}`}
                style={{ left: `${pos(p.v)}%` }}
                title={`${p.legShort}: ${(p.v * 100).toFixed(2)}%`}
              />
            ),
          )}
          <div className="gross-dumbbell-axis">
            <span>{fmtPct1(lo)}</span>
            <span>{fmtPct1(hi)}</span>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="dv-block">
      <div className="dv-title">Annual rates — gross vs net (separate scales)</div>
      <div className="gross-dumbbell-stack">
        {grossPts.length > 0 ? <SingleRail title="Gross (before borrow)" pts={grossPts} /> : null}
        {netPts.length > 0 ? <SingleRail title="Net (after borrow)" pts={netPts} /> : null}
      </div>
      <div className="gross-dumbbell-legends">
        {grossPts.length > 0 ? (
          <div className="gross-dumbbell-legend-group">
            <div className="gross-dumbbell-legend-group-label">Gross</div>
            <div className="gross-dumbbell-legend">
              {grossPts.map((p) => (
                <span key={`g-${p.key}`}>
                  <i style={{ background: p.cls === 'realized' ? 'var(--accent-blue)' : 'var(--accent-purple)' }} />
                  {p.legShort}
                </span>
              ))}
            </div>
          </div>
        ) : null}
        {netPts.length > 0 ? (
          <div className="gross-dumbbell-legend-group">
            <div className="gross-dumbbell-legend-group-label">Net</div>
            <div className="gross-dumbbell-legend">
              {netPts.map((p) => (
                <span key={`n-${p.key}`}>
                  {p.kind === 'diamond' ? (
                    <i className="gross-legend-diamond" aria-hidden="true" />
                  ) : (
                    <i style={{ background: p.cls === 'net-realized' ? 'var(--positive)' : 'var(--accent-cyan)' }} />
                  )}
                  {p.legShort}
                </span>
              ))}
            </div>
          </div>
        ) : null}
      </div>
    </div>
  );
}

function NetEdgeBootstrapViz({ r }) {
  const p5 = Number(r.net_edge_p05_annual);
  const p25 = Number(r.net_edge_p25_annual);
  const p50 = Number(r.net_edge_p50_annual);
  const p75 = Number(r.net_edge_p75_annual);
  const p95 = Number(r.net_edge_p95_annual);
  const hasBox = [p5, p25, p50, p75, p95].every(Number.isFinite);
  let hist = null;
  if (r.net_edge_hist_json && typeof r.net_edge_hist_json === 'string') {
    try { hist = JSON.parse(r.net_edge_hist_json); } catch (e) { hist = null; }
  }
  if (!hasBox && !(hist && Array.isArray(hist.c) && hist.e && hist.e.length > 1)) return null;
  let lo = hasBox ? p5 : NaN;
  let hi = hasBox ? p95 : NaN;
  if (!Number.isFinite(lo) || !Number.isFinite(hi)) {
    if (hist && Array.isArray(hist.e) && hist.e.length > 1) {
      lo = Number(hist.e[0]);
      hi = Number(hist.e[hist.e.length - 1]);
    } else {
      lo = 0;
      hi = 1;
    }
  }
  const span = hi > lo ? hi - lo : 1e-6;
  const x = (v) => 10 + ((v - lo) / span) * 180;
  let bars = null;
  if (hist && Array.isArray(hist.c) && hist.c.length) {
    const mx = Math.max(...hist.c.map(Number), 1);
    const edges = Array.isArray(hist.e) ? hist.e : [];
    bars = (
      <div className="net-edge-mini-hist" aria-label="Bootstrap net edge (annual) histogram">
        {hist.c.map((c, i) => {
          const eLo = edges[i] != null ? Number(edges[i]) : NaN;
          const eHi = edges[i + 1] != null ? Number(edges[i + 1]) : NaN;
          const barTitle = Number.isFinite(eLo) && Number.isFinite(eHi)
            ? `${fmt(eLo)} – ${fmt(eHi)} (bin range, annual net edge)`
            : 'Bin range unavailable';
          return (
            <div key={i} className="bar" title={barTitle} style={{ height: `${(Number(c) / mx) * 100}%` }} />
          );
        })}
      </div>
    );
  }
  return (
    <div className="dv-block net-edge-viz">
      <div className="dv-title">Net edge — resampled distribution</div>
      {hasBox ? (
        <svg className="net-edge-box-svg" viewBox="0 0 200 44" preserveAspectRatio="none">
          <title>Net edge fan — same layout as table (hover table cell for numbers).</title>
          <line x1={x(p5)} y1={22} x2={x(p95)} y2={22} stroke="var(--ne-whisker)" strokeWidth="1.75" />
          <rect
            x={x(p25)} y={14} width={Math.max(x(p75) - x(p25), 1)} height={16}
            fill="var(--ne-iqr-fill)" stroke="var(--ne-iqr-stroke)" strokeWidth="1"
          />
          <line x1={x(p50)} y1={10} x2={x(p50)} y2={34} stroke="var(--ne-p50)" strokeWidth="2.25" />
        </svg>
      ) : null}
      {bars}
    </div>
  );
}

/** Shared net-edge fan: whisker (p5–p95) + IQR box + p50 dot — same colors in table and charts. */
function NetEdgeFanGlyph({ r, w = 58, h = 18, vbW = 58 }) {
  const p5 = Number(r.net_edge_p05_annual);
  const p25 = Number(r.net_edge_p25_annual);
  const p50 = Number(r.net_edge_p50_annual);
  const p75 = Number(r.net_edge_p75_annual);
  const p95 = Number(r.net_edge_p95_annual);
  const hasWhisk = Number.isFinite(p5) && Number.isFinite(p95) && Number.isFinite(p50);
  if (!hasWhisk) return null;
  const hasIqr = Number.isFinite(p25) && Number.isFinite(p75);
  const lo = p5;
  const hi = p95;
  const span = hi > lo ? hi - lo : 1e-8;
  const W = 52;
  const x = v => ((v - lo) / span) * W + 3;
  const ymid = 10;
  const tip = [
    `p5 ${fmt(p5)}`,
    hasIqr ? `p25 ${fmt(p25)}` : null,
    `p50 ${fmt(p50)}`,
    hasIqr ? `p75 ${fmt(p75)}` : null,
    `p95 ${fmt(p95)}`,
  ].filter(Boolean).join(' · ');
  return (
    <span title={tip} onClick={e => e.stopPropagation()}>
      <svg width={w} height={h} viewBox={`0 0 ${vbW} 18`} style={{ display: 'block' }} aria-hidden="true">
        <line x1={x(p5)} y1={ymid} x2={x(p95)} y2={ymid} stroke="var(--ne-whisker)" strokeWidth="2" strokeLinecap="round" />
        {hasIqr ? (
          <rect
            x={x(p25)} y={3} width={Math.max(x(p75) - x(p25), 1)} height={14} rx="1"
            fill="var(--ne-iqr-fill)" stroke="var(--ne-iqr-stroke)" strokeWidth="1"
          />
        ) : null}
        <circle cx={x(p50)} cy={ymid} r={hasIqr ? 2.2 : 3} fill="var(--ne-p50)" />
      </svg>
    </span>
  );
}

function NetEdgeMergedCell({ r }) {
  const p50 = r.net_edge_p50_annual;
  const anchorSource = r.gross_anchor_source;
  const anchorShift = Number(r.gross_anchor_shift_annual);
  const anchorTarget = Number(r.gross_anchor_target_annual);
  const baseTip = 'Net edge (annual): number = median; strip = uncertainty (hover glyph for p5–p95).';
  const anchorTipParts = [];
  if (Number.isFinite(anchorTarget)) {
    anchorTipParts.push(`anchor-shifted to expected p50 ${fmt(anchorTarget)}`);
  }
  if (Number.isFinite(anchorShift) && Math.abs(anchorShift) > 1e-6) {
    anchorTipParts.push(`shift ${anchorShift >= 0 ? '+' : ''}${fmt(anchorShift)}`);
  }
  if (anchorSource && anchorSource !== 'realized_only_passive_low_delta' && anchorSource !== 'realized_only_passive_low_beta') {
    anchorTipParts.push(`source: ${anchorSource}`);
  } else if (anchorSource === 'realized_only_passive_low_delta' || anchorSource === 'realized_only_passive_low_beta') {
    anchorTipParts.push('passive low-β: realized-only by policy');
  }
  const tip = anchorTipParts.length
    ? `${baseTip}\n${anchorTipParts.join(' · ')}`
    : baseTip;
  const hasFan = Number.isFinite(Number(r.net_edge_p05_annual)) && Number.isFinite(Number(r.net_edge_p95_annual)) && Number.isFinite(Number(p50));
  return (
    <div className="net-edge-merged" title={tip} onClick={e => e.stopPropagation()}>
      <div className={cls('net-edge-merged-p50', spreadCls(p50))}>{p50 != null ? fmt(p50) : '—'}</div>
      <div className="net-edge-merged-fan">
        {hasFan ? <NetEdgeFanGlyph r={r} w={62} h={20} vbW={58} /> : <span style={{ fontSize: 10, color: 'var(--text-muted)' }}>—</span>}
      </div>
    </div>
  );
}

/** ETF metrics: fix shares when AUM/NAV implies a consistent count but shares are off by ~10²+ (feed glitches). */
function repairEtfMetricsShareOutliers(rows) {
  if (!Array.isArray(rows) || rows.length === 0) return rows;
  const RATIO_MAX = 80;
  return rows.map((row) => {
    const nav = Number(row?.nav);
    const aum = Number(row?.aum);
    const sh = Number(row?.shares_outstanding);
    const implied = (Number.isFinite(nav) && nav > 0 && Number.isFinite(aum) && aum > 0)
      ? aum / nav
      : null;
    if (implied == null || !Number.isFinite(implied) || implied <= 0 || !Number.isFinite(sh) || sh <= 0) {
      return row;
    }
    const r = Math.max(sh / implied, implied / sh);
    if (r <= RATIO_MAX) return row;
    const base = String(row?.status || 'ok').trim();
    const tag = '· repaired (shares ← AUM/NAV)';
    return {
      ...row,
      shares_outstanding: implied,
      status: base.includes('repaired') ? base : `${base} ${tag}`.trim(),
    };
  });
}

function buildTotalReturnMetricsSeries(rawRows, distributions) {
  const okRaw = Array.isArray(rawRows) ? rawRows.filter((x) => String(x?.status || '').toLowerCase() === 'ok') : [];
  const ok = repairEtfMetricsShareOutliers(okRaw).sort((a, b) => String(a?.date || '').localeCompare(String(b?.date || '')));
  if (!ok.length) return [];
  const dists = (Array.isArray(distributions) ? distributions : [])
    .map((d) => ({ ex_date: String(d?.ex_date || ''), amount: Number(d?.amount) }))
    .filter((d) => d.ex_date && Number.isFinite(d.amount) && d.amount > 0)
    .sort((a, b) => a.ex_date.localeCompare(b.ex_date));
  const seriesStart = String(ok[0]?.date || '');
  let reinvFactor = 1;
  let dIdx = 0;
  while (dIdx < dists.length && String(dists[dIdx].ex_date) <= seriesStart) dIdx += 1;
  return ok.map((row) => {
    const dateStr = String(row?.date || '');
    const nav = Number(row?.nav);
    if (dateStr && Number.isFinite(nav) && nav > 0) {
      while (dIdx < dists.length && String(dists[dIdx].ex_date) <= dateStr) {
        const amt = Number(dists[dIdx].amount);
        if (Number.isFinite(amt) && amt > 0) reinvFactor *= (nav + amt) / nav;
        dIdx += 1;
      }
    }
    const tr = Number.isFinite(nav) && nav > 0 ? nav * reinvFactor : null;
    return { ...row, nav_total_return: tr, tr_reinvestment_factor: reinvFactor };
  });
}

/**
 * Rolling underlying vol-shape history. Mirrors
 * `_underlying_vol_shape` in ls-algo/screener_v2_fields.py — annualizes
 * weekly RV from the 5-day chunk size (not the window), so the trend
 * ratio is window-independent (iid ≈ 1, perfect drift ≈ sqrt(5)).
 */
function buildUnderlyingVolShapeHistory(rows, window = VOL_SHAPE_PRIMARY_WINDOW) {
  if (!Number.isInteger(window) || window <= 0 || window % 5 !== 0) {
    return { series: [], vcrMedian: null, window };
  }
  const clean = (Array.isArray(rows) ? rows : [])
    .map((row) => ({
      date: String(row?.date || '').trim(),
      px: Number(row?.underlying_adj_close),
    }))
    .filter((row) => row.date && Number.isFinite(row.px) && row.px > 0)
    .sort((a, b) => a.date.localeCompare(b.date));
  if (clean.length < window + 1) return { series: [], vcrMedian: null, window };

  const rets = [];
  for (let i = 1; i < clean.length; i += 1) {
    const r = Math.log(clean[i].px / clean[i - 1].px);
    if (Number.isFinite(r)) rets.push({ date: clean[i].date, r });
  }

  const out = [];
  for (let end = window; end <= rets.length; end += 1) {
    const tail = rets.slice(end - window, end).map(x => x.r);
    const sumSq = tail.reduce((a, r) => a + r * r, 0);
    if (!Number.isFinite(sumSq) || sumSq <= 0) continue;
    const rvDaily = Math.sqrt((sumSq / window) * 252);
    const weekly = [];
    for (let j = 0; j < window; j += 5) {
      weekly.push(tail.slice(j, j + 5).reduce((a, r) => a + r, 0));
    }
    const meanWeeklySq = weekly.reduce((a, r) => a + r * r, 0) / weekly.length;
    const rvWeekly = Math.sqrt(meanWeeklySq * (252 / 5));
    const trendRatio = rvDaily > 0 ? rvWeekly / rvDaily : null;
    const vcr = Math.max(...tail.map(r => r * r)) / sumSq;
    out.push({
      date: rets[end - 1].date,
      rv_daily: rvDaily,
      rv_weekly: rvWeekly,
      trend_ratio: trendRatio,
      vcr,
    });
  }

  const vcrVals = out.map(x => Number(x.vcr)).filter(Number.isFinite).sort((a, b) => a - b);
  const mid = Math.floor(vcrVals.length / 2);
  const vcrMedian = vcrVals.length ? (vcrVals.length % 2 ? vcrVals[mid] : 0.5 * (vcrVals[mid - 1] + vcrVals[mid])) : null;
  return {
    series: out.map(row => ({ ...row, vcr_median: vcrMedian })),
    vcrMedian,
    window,
  };
}
function medianSharesTraded(rows, lookback = 60) {
  const slice = (Array.isArray(rows) ? rows : []).slice(Math.max(0, (rows || []).length - lookback));
  const vals = slice
    .map((r) => {
      const raw = r?.shares_traded;
      if (raw == null) return null;
      if (typeof raw === 'string' && !raw.trim()) return null;
      const n = typeof raw === 'string' ? Number(raw.trim().replace(/,/g, '')) : Number(raw);
      return Number.isFinite(n) && n > 0 ? n : null;
    })
    .filter((v) => v != null)
    .sort((a, b) => a - b);
  if (!vals.length) return null;
  const mid = Math.floor(vals.length / 2);
  return vals.length % 2 ? vals[mid] : 0.5 * (vals[mid - 1] + vals[mid]);
}

function LetfRebalanceFlowChart({ series, title, showReturnOverlay = true }) {
  const points = (Array.isArray(series) ? series : []).filter((r) => Number.isFinite(Number(r?.rebalance_signed_dollars)));
  if (!points.length) {
    return <div className="scenario-warning">No included rebalance-flow history for this fund yet.</div>;
  }
  const W = 920;
  const H = 240;
  const padL = 76;
  const padR = 56;
  const padT = 16;
  const padB = 38;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const vals = points.map((p) => Number(p.rebalance_signed_dollars));
  const maxAbs = Math.max(...vals.map((v) => Math.abs(v)), 1);
  const yScaleMax = maxAbs * 1.05;
  const y0 = padT + innerH / 2;
  const barW = Math.max(2, Math.min(18, innerW / points.length - 2));
  const step = innerW / points.length;
  const tickEvery = Math.max(1, Math.ceil(points.length / 6));

  // Optional underlying return overlay (right axis): map underlying_return_d1 to a thin line.
  const retsRaw = points.map((p) => Number(p?.underlying_return_d1));
  const haveOverlay = showReturnOverlay && retsRaw.some((r) => Number.isFinite(r));
  const finiteRets = retsRaw.filter((r) => Number.isFinite(r));
  const retMaxAbs = haveOverlay ? Math.max(...finiteRets.map((r) => Math.abs(r)), 0.005) : 0;
  const retScaleMax = haveOverlay ? Math.max(retMaxAbs * 1.1, 0.005) : 0;

  // Y-axis grid + tick labels at +max, +max/2, 0, -max/2, -max.
  const yTickFractions = [1, 0.5, 0, -0.5, -1];

  return (
    <div className="trade-card" style={{ marginTop: 12 }}>
      <div className="scenario-title">{title || 'Fund rebalance flow history'}</div>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} role="img" aria-label="Fund rebalance flow history">
        {yTickFractions.map((frac) => {
          const y = y0 - frac * (innerH / 2 - 4);
          const dollars = frac * yScaleMax;
          return (
            <g key={`grid-${frac}`}>
              <line
                x1={padL}
                x2={W - padR}
                y1={y}
                y2={y}
                stroke={frac === 0 ? 'rgba(139,156,187,0.55)' : 'rgba(139,156,187,0.18)'}
                strokeDasharray={frac === 0 ? '' : '3 3'}
              />
              <text
                x={padL - 8}
                y={y + 3}
                textAnchor="end"
                fontSize="10"
                fill="#8b9cbb"
                fontFamily="DM Sans"
              >
                {frac === 0 ? '$0' : fmtCompactSignedMoney(dollars, 1)}
              </text>
            </g>
          );
        })}

        {points.map((p, i) => {
          const v = Number(p.rebalance_signed_dollars);
          const h = (Math.abs(v) / yScaleMax) * (innerH / 2 - 4);
          const x = padL + i * step + (step - barW) / 2;
          const y = v >= 0 ? y0 - h : y0;
          const excluded = p?.included_in_aggregate === false;
          const fill = excluded
            ? 'rgba(139,156,187,0.45)'
            : v >= 0
              ? 'rgba(16,185,129,0.85)'
              : 'rgba(239,68,68,0.85)';
          return (
            <rect
              key={`${p.date}-${i}`}
              x={x}
              y={y}
              width={barW}
              height={Math.max(h, v === 0 ? 0 : 1)}
              fill={fill}
            >
              <title>{`${p.date}: ${fmtSignedMoney(v)}${excluded ? ` · excluded (${p.quality_flag || 'flagged'})` : ''}`}</title>
            </rect>
          );
        })}

        {haveOverlay && (() => {
          const segs = [];
          let cur = [];
          points.forEach((p, i) => {
            const r = Number(p?.underlying_return_d1);
            if (!Number.isFinite(r)) {
              if (cur.length) { segs.push(cur); cur = []; }
              return;
            }
            const x = padL + i * step + step / 2;
            const y = y0 - (r / retScaleMax) * (innerH / 2 - 4);
            cur.push({ x, y });
          });
          if (cur.length) segs.push(cur);
          return (
            <g>
              {segs.map((seg, idx) => (
                <polyline
                  key={`und-line-${idx}`}
                  fill="none"
                  stroke="rgba(96,165,250,0.85)"
                  strokeWidth="1.4"
                  strokeLinejoin="round"
                  strokeLinecap="round"
                  points={seg.map((pt) => `${pt.x.toFixed(2)},${pt.y.toFixed(2)}`).join(' ')}
                />
              ))}
              {/* Right-side axis ticks for underlying return */}
              {[1, 0.5, 0, -0.5, -1].map((frac) => {
                const y = y0 - frac * (innerH / 2 - 4);
                return (
                  <text
                    key={`und-axis-${frac}`}
                    x={W - padR + 6}
                    y={y + 3}
                    textAnchor="start"
                    fontSize="10"
                    fill="rgba(96,165,250,0.85)"
                    fontFamily="DM Sans"
                  >
                    {frac === 0 ? '0%' : `${(frac * retScaleMax * 100).toFixed(retScaleMax >= 0.05 ? 0 : 1)}%`}
                  </text>
                );
              })}
            </g>
          );
        })()}

        {points.map((p, i) => (
          (i === 0 || i === points.length - 1 || i % tickEvery === 0) ? (
            <text
              key={`lbl-${p.date}-${i}`}
              x={padL + i * step + step / 2}
              y={H - 10}
              textAnchor="middle"
              fontSize="11"
              fill="#8b9cbb"
              fontFamily="DM Sans"
            >
              {formatBacktestAxisDate(p.date)}
            </text>
          ) : null
        ))}
      </svg>
      <div className="backtest-chart-legend">
        <span><span className="backtest-legend-dot" style={{ background: 'rgba(16,185,129,0.85)' }} />Buy into close</span>
        <span><span className="backtest-legend-dot" style={{ background: 'rgba(239,68,68,0.85)' }} />Sell into close</span>
        <span><span className="backtest-legend-dot" style={{ background: 'rgba(139,156,187,0.45)' }} />Excluded (stale / overlay / non-leveraged)</span>
        {haveOverlay && (
          <span><span className="backtest-legend-dot" style={{ background: 'rgba(96,165,250,0.85)' }} />Underlying return (right axis)</span>
        )}
      </div>
    </div>
  );
}

/**
 * Plots today's per-build estimated net close-rebalance for one underlying as
 * a function of minutes-to-close, with a horizontal reference line for the
 * realised T-1 close (proxy for "where this might land"). Empty state when
 * fewer than two snapshots are available -- meaningful only mid-day onward.
 */
function LetfIntradayConvergenceChart({ series, underlying, latestRealized, latestRealizedDate }) {
  const points = (Array.isArray(series) ? series : []).filter(
    (p) => Number.isFinite(p.net) && Number.isFinite(p.minutes_to_close),
  );
  if (points.length < 2) {
    return (
      <div className="trade-card" style={{ marginTop: 12 }}>
        <div className="scenario-title">{underlying} — intraday convergence</div>
        <div className="scenario-warning">
          Need ≥ 2 intraday snapshots to plot convergence. {points.length === 1
            ? `Have 1 so far at ${points[0].minutes_to_close ?? '—'}m to close.`
            : 'Awaiting today’s first refresh.'}
        </div>
      </div>
    );
  }
  // Sort by descending minutes_to_close so the x-axis reads "open → close".
  const sorted = [...points].sort((a, b) => Number(b.minutes_to_close) - Number(a.minutes_to_close));
  const W = 920, H = 200;
  const padL = 76, padR = 28, padT = 16, padB = 36;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const xs = sorted.map((p) => Number(p.minutes_to_close));
  const ys = sorted.map((p) => Number(p.net));
  const refY = Number(latestRealized);
  const allYs = [...ys];
  if (Number.isFinite(refY)) allYs.push(refY);
  const yMaxAbs = Math.max(...allYs.map((v) => Math.abs(v)), 1);
  const xMin = Math.max(...xs);
  const xMax = Math.min(...xs);
  const xRange = Math.max(1, xMin - xMax);
  const xPos = (m) => padL + ((xMin - m) / xRange) * innerW;
  const yPos = (v) => padT + innerH / 2 - (v / (yMaxAbs * 1.05)) * (innerH / 2 - 4);
  const polyPoints = sorted.map((p) => `${xPos(p.minutes_to_close).toFixed(2)},${yPos(p.net).toFixed(2)}`).join(' ');
  const yTicks = [1, 0.5, 0, -0.5, -1];
  const xTicks = [xMin, Math.round((xMin + xMax) / 2), xMax].filter((v, i, a) => a.indexOf(v) === i);
  return (
    <div className="trade-card" style={{ marginTop: 12 }}>
      <div className="scenario-title">{underlying} — intraday convergence (today)</div>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} role="img" aria-label="Intraday convergence">
        {yTicks.map((frac) => {
          const y = padT + innerH / 2 - frac * (innerH / 2 - 4);
          const dollars = frac * yMaxAbs * 1.05;
          return (
            <g key={`gy-${frac}`}>
              <line x1={padL} x2={W - padR} y1={y} y2={y} stroke={frac === 0 ? 'rgba(139,156,187,0.55)' : 'rgba(139,156,187,0.18)'} strokeDasharray={frac === 0 ? '' : '3 3'} />
              <text x={padL - 8} y={y + 3} textAnchor="end" fontSize="10" fill="#8b9cbb" fontFamily="DM Sans">
                {frac === 0 ? '$0' : fmtCompactSignedMoney(dollars, 1)}
              </text>
            </g>
          );
        })}
        {Number.isFinite(refY) && (
          <g>
            <line
              x1={padL}
              x2={W - padR}
              y1={yPos(refY)}
              y2={yPos(refY)}
              stroke="rgba(96,165,250,0.85)"
              strokeDasharray="4 4"
            />
            <text x={W - padR + 4} y={yPos(refY) + 3} textAnchor="start" fontSize="10" fill="rgba(96,165,250,0.85)" fontFamily="DM Sans">
              prior close ({latestRealizedDate || '—'}): {fmtCompactSignedMoney(refY)}
            </text>
          </g>
        )}
        <polyline
          fill="none"
          stroke="rgba(245,158,11,0.95)"
          strokeWidth="1.6"
          strokeLinejoin="round"
          strokeLinecap="round"
          points={polyPoints}
        />
        {sorted.map((p, i) => (
          <circle key={`pt-${i}`} cx={xPos(p.minutes_to_close)} cy={yPos(p.net)} r={2.4} fill="rgba(245,158,11,0.95)">
            <title>{`${p.as_of || ''} (${p.minutes_to_close}m to close): ${fmtSignedMoney(p.net)}`}</title>
          </circle>
        ))}
        {xTicks.map((m) => (
          <text key={`gx-${m}`} x={xPos(m)} y={H - 10} textAnchor="middle" fontSize="11" fill="#8b9cbb" fontFamily="DM Sans">
            {m}m to close
          </text>
        ))}
      </svg>
      <div className="backtest-chart-legend">
        <span><span className="backtest-legend-dot" style={{ background: 'rgba(245,158,11,0.95)' }} />Today’s estimate trajectory</span>
        {Number.isFinite(refY) && (
          <span><span className="backtest-legend-dot" style={{ background: 'rgba(96,165,250,0.85)' }} />Prior-close realised</span>
        )}
      </div>
    </div>
  );
}

  const symbolChoices = useMemo(() => Array.from(new Set([undSym, etfSym])), [undSym, etfSym]);
  const optionsForSymbol = useCallback((sym) => {
    const rows = optionsCache?.symbols?.[sym]?.options;
    return Array.isArray(rows) ? rows : [];
  }, [optionsCache]);
  const expiriesForSymbol = useCallback((sym) => {
    const rows = optionsForSymbol(sym);
    return Array.from(new Set(rows.map((x) => x.expiration_date).filter(Boolean))).sort();
  }, [optionsForSymbol]);
  const strikesForSymbolExpiryType = useCallback((sym, exp, type) => {
    const rows = optionsForSymbol(sym).filter((x) => x.expiration_date === exp && String(x.contract_type || '').toLowerCase() === String(type || '').toLowerCase());
    return Array.from(new Set(rows.map((x) => Number(x.strike_price)).filter(Number.isFinite))).sort((a, b) => a - b);
  }, [optionsForSymbol]);
  const findContract = useCallback((sym, exp, type, strike) => {
    return optionsForSymbol(sym).find((x) => x.expiration_date === exp
      && String(x.contract_type || '').toLowerCase() === String(type || '').toLowerCase()
      && Math.abs(Number(x.strike_price) - Number(strike)) < 1e-9) || null;
  }, [optionsForSymbol]);
  const tradeExposure = useMemo(() => {
    let grossLongEq = 0;
    let grossShortEq = 0;
    for (const leg of tradeBaseLegs) {
      const qty = Math.max(0, Number(leg?.quantity));
      const entry = Number(leg?.entry);
      if (!Number.isFinite(qty) || !Number.isFinite(entry) || qty <= 0 || entry <= 0) continue;
      const notional = qty * entry;
      if (String(leg?.side || '').toLowerCase() === 'short') grossShortEq += notional;
      else grossLongEq += notional;
    }
    let optionStrikeNotional = 0;
    let optionPremiumLong = 0;
    let optionPremiumShort = 0;
    let optionContracts = 0;
    for (const leg of tradeOptionLegs) {
      const contracts = Math.max(0, Number(leg?.contracts));
      const strike = Number(leg?.strike);
      if (!Number.isFinite(contracts) || contracts <= 0) continue;
      optionContracts += contracts;
      if (Number.isFinite(strike) && strike > 0) optionStrikeNotional += contracts * 100 * strike;
      const c = findContract(leg.symbol, leg.expiry, leg.type, leg.strike);
      const premium = resolveLegPremium(leg, c);
      const premNotional = contracts * 100 * Math.max(0, Number(premium) || 0);
      if (String(leg?.side || '').toLowerCase() === 'sell') optionPremiumShort += premNotional;
      else optionPremiumLong += premNotional;
    }
    return {
      grossLongEq,
      grossShortEq,
      grossEq: grossLongEq + grossShortEq,
      netEq: grossLongEq - grossShortEq,
      optionContracts,
      optionStrikeNotional,
      optionPremiumLong,
      optionPremiumShort,
      optionPremiumNet: optionPremiumLong - optionPremiumShort,
    };
  }, [tradeBaseLegs, tradeOptionLegs, findContract, resolveLegPremium]);

  const tradeScenarioGrid = useMemo(() => {
    if (typeof tradeFns.buildTradeScenarioGrid !== 'function') return { ok: false, error: 'Trade Lab utility unavailable.' };
    if (!scenarioGrid?.ok) return { ok: false, error: 'Scenario inputs unavailable.' };
    const optionLegs = tradeOptionLegs.map((leg) => {
      const c = findContract(leg.symbol, leg.expiry, leg.type, leg.strike);
      return {
        ...leg,
        premium: resolveLegPremium(leg, c),
        iv: resolveLegIv(leg, c),
      };
    });
    const tradeSigmaAnnual = tradeUseScenarioAssumptions ? scenarioSigmaBest : (Number.isFinite(Number(realizedUnd)) ? Number(realizedUnd) : scenarioSigmaBest);
    const tradeHYears = tradeUseScenarioAssumptions ? horizonYears : 1;
    const tradeLev = tradeUseScenarioAssumptions ? scenarioLeverage : (Number.isFinite(Number(r.delta)) ? Number(r.delta) : scenarioLeverage);
    return tradeFns.buildTradeScenarioGrid({
      baseLegs: tradeBaseLegs,
      optionLegs,
      underlyingSymbol: undSym,
      etfSymbol: etfSym,
      spotUnderlying: tradeSpotUnderlying,
      spotEtf: tradeSpotEtf,
      leverage: tradeLev,
      horizonYears: tradeHYears,
      baseVolAnnual: tradeSigmaAnnual,
      shockRows: scenarioGrid.rows.map((x) => ({ sigmaMultiple: x.sigmaMultiple, underlyingReturn: x.underlyingReturn })),
      volColumns: scenarioGrid.volColumns.map((x) => ({ sigmaAnnual: x.sigmaAnnual })),
      ttxDays: tradeTtxDays,
      rate: Number(tradeRatePct) / 100,
      annualBorrowBySymbol: tradeBorrowBySymbol,
      defaultBorrowAnnual: annualCarryDrag,
      shortProceedsRateAnnual: Number(tradeShortProceedsPct) / 100,
    });
  }, [tradeFns, scenarioGrid, tradeOptionLegs, tradeBaseLegs, findContract, resolveLegIv, resolveLegPremium, undSym, etfSym, tradeSpotUnderlying, tradeSpotEtf, scenarioLeverage, horizonYears, scenarioSigmaBest, tradeTtxDays, tradeRatePct, tradeUseScenarioAssumptions, realizedUnd, r.delta, tradeBorrowBySymbol, annualCarryDrag, tradeShortProceedsPct]);

  const tradeMonteCarlo = useMemo(() => {
    if (typeof tradeFns.evaluateTradeMonteCarlo !== 'function') return { ok: false, error: 'Trade Lab utility unavailable.' };
    if (!monteCarloResult?.ok) return { ok: false, error: 'Monte Carlo unavailable.' };
    if (typeof scenarioFns.simulateMonteCarloPaths !== 'function') return { ok: false, error: 'Monte Carlo engine unavailable.' };
    const tradeSigmaAnnual = tradeUseScenarioAssumptions ? scenarioSigmaBest : (Number.isFinite(Number(realizedUnd)) ? Number(realizedUnd) : scenarioSigmaBest);
    const tradeHYears = tradeUseScenarioAssumptions ? horizonYears : 1;
    const underlyingMc = scenarioFns.simulateMonteCarloPaths({
      pathCount: Number(mcPathCount),
      sigmaAnnual: tradeSigmaAnnual,
      leverage: 1,
      horizonYears: tradeHYears,
      annualCarryDrag: 0,
      seed: Number(mcSeed),
      ruinThreshold: -0.99,
      upsideThresholds: [0.25],
    });
    if (!underlyingMc.ok) return { ok: false, error: underlyingMc.error || 'Underlying MC unavailable.' };
    const optionLegs = tradeOptionLegs.map((leg) => {
      const c = findContract(leg.symbol, leg.expiry, leg.type, leg.strike);
      return {
        ...leg,
        premium: resolveLegPremium(leg, c),
        iv: resolveLegIv(leg, c),
      };
    });
    return tradeFns.evaluateTradeMonteCarlo({
      baseLegs: tradeBaseLegs,
      optionLegs,
      underlyingSymbol: undSym,
      etfSymbol: etfSym,
      spotUnderlying: tradeSpotUnderlying,
      spotEtf: tradeSpotEtf,
      ttxDaysStart: tradeTtxDays,
      horizonYears: tradeHYears,
      volAnnual: tradeSigmaAnnual,
      rate: Number(tradeRatePct) / 100,
      annualBorrowBySymbol: tradeBorrowBySymbol,
      defaultBorrowAnnual: annualCarryDrag,
      shortProceedsRateAnnual: Number(tradeShortProceedsPct) / 100,
      etfPaths: monteCarloResult.paths,
      underlyingPaths: underlyingMc.paths,
    });
  }, [tradeFns, monteCarloResult, scenarioFns, mcPathCount, scenarioSigmaBest, horizonYears, mcSeed, tradeOptionLegs, tradeBaseLegs, findContract, resolveLegIv, resolveLegPremium, undSym, etfSym, tradeSpotUnderlying, tradeSpotEtf, tradeTtxDays, tradeRatePct, tradeUseScenarioAssumptions, realizedUnd, tradeBorrowBySymbol, annualCarryDrag, tradeShortProceedsPct]);

  const tradeTtxSeries = useMemo(() => {
    if (typeof tradeFns.buildTtxSensitivity !== 'function') return [];
    if (!scenarioGrid?.ok) return [];
    const optionLegs = tradeOptionLegs.map((leg) => {
      const c = findContract(leg.symbol, leg.expiry, leg.type, leg.strike);
      return {
        ...leg,
        premium: resolveLegPremium(leg, c),
        iv: resolveLegIv(leg, c),
      };
    });
    const tradeSigmaAnnual = tradeUseScenarioAssumptions ? scenarioSigmaBest : (Number.isFinite(Number(realizedUnd)) ? Number(realizedUnd) : scenarioSigmaBest);
    const tradeHYears = tradeUseScenarioAssumptions ? horizonYears : 1;
    const tradeLev = tradeUseScenarioAssumptions ? scenarioLeverage : (Number.isFinite(Number(r.delta)) ? Number(r.delta) : scenarioLeverage);
    return tradeFns.buildTtxSensitivity({
      baseLegs: tradeBaseLegs,

      underlyingSymbol: undSym,
      etfSymbol: etfSym,
      spotUnderlying: tradeSpotUnderlying,

      baseVolAnnual: tradeSigmaAnnual,

  }, [tradeFns, scenarioGrid, tradeOptionLegs, tradeBaseLegs, findContract, resolveLegIv, resolveLegPremium, undSym, etfSym, tradeSpotUnderlying, tradeSpotEtf, scenarioLeverage, horizonYears, scenarioSigmaBest, tradeRatePct, tradeUseScenarioAssumptions, realizedUnd, r.delta, tradeBorrowBySymbol, annualCarryDrag, tradeShortProceedsPct]);

      {activePanel === 'stats' && (

              <div className="cs-label">Delta</div>
              <div className="cs-value">{r.delta?.toFixed(3) ?? '—'}</div>

            </div>
            <div className="chart-stat" title={borrowSourceHint(borrowDisp)}>
              <div className="cs-label">Borrow Rate</div>
              <div className={cls('cs-value', borrowCls(borrowDisp.spot))}>
                {(() => {
                  const spotTxt = borrowDisp.spot != null ? fmt(borrowDisp.spot) : '—';
                  return borrowDisp.avg != null ? `${spotTxt} · ${fmt(borrowDisp.avg)}` : spotTxt;
                })()}
              </div>
              <div className="cs-sub">
                {borrowDisp.avg != null ? 'spot · hist. avg' : 'spot only'}
                {borrowDisp.differs ? ' · tail ≠ grid' : ''}
              </div>
            </div>
            <div className="chart-stat">
              <div className="cs-label">Shares Avail</div>
              <div className="cs-value">{fmtNum(r.shares_available)}</div>
              <div className="cs-sub">{r.borrow_source === 'ibkr_ftp' ? 'IBKR Live' : 'CSV'}</div>
            </div>
            <div className="chart-stat">
              <div className="cs-label">Gross (realiz.)</div>
              <div className="cs-value">{fmt(r.gross_decay_annual)}</div>
              <div className="cs-sub">realized · ls-algo screener</div>
            </div>
            <div className="chart-stat" title={decayDistTooltip(r)}>
              <div className="cs-label">Exp. decay</div>
              <div className="cs-sub" style={{ marginBottom: 2, textTransform: 'none', letterSpacing: 0 }}>forward · median · band</div>
              {(() => {

                  return (
                    <>
                      <div className="cs-value" style={{ color: 'var(--text-muted)' }}>—</div>

                if (dist) {

              {isPassiveLowBetaRow(r) ? (

const fmtCategoryLabel = (cat) => {
  const hit = NEWS_CATEGORIES.find(c => c.key === cat);
  return hit ? hit.label : (cat || 'Other').replace(/_/g, ' ');
};

const fmtRelativeTime = (iso) => {
  if (!iso) return '—';
  const then = new Date(iso).getTime();
  if (!Number.isFinite(then)) return '—';
  const now = Date.now();
  const diffMs = now - then;
  if (diffMs < 0) return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  const min = Math.floor(diffMs / 60000);
  if (min < 1) return 'just now';
  if (min < 60) return `${min}m ago`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}h ago`;
  const day = Math.floor(hr / 24);
  if (day < 14) return `${day}d ago`;
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
};

const fmtEventDate = (iso) => {
  if (!iso) return '—';
  const d = new Date(iso + (iso.length === 10 ? 'T00:00:00Z' : ''));
  if (!Number.isFinite(d.getTime())) return iso;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
};

const corporateEventMs = (ev) => {
  const dateStr = ev?.execution_date || ev?.announcement_date;
  if (!dateStr) return 0;
  const s = String(dateStr);
  const t = new Date(s.length === 10 ? `${s}T00:00:00Z` : s).getTime();
  return Number.isFinite(t) ? t : 0;
};
