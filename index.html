      <span className="tcb-item">{splitLabel}</span>
      {(coverage.warnings || []).map((w, i) => (
        <div key={`tcb-w-${i}`} className="tcb-warn">{w}</div>
      ))}
    </div>
  );
}

/** Grouped bars: period gross vs net (simple return over trailing N sessions). */
function RealizedDecayHorizonsBarChart({ horizons, beta, borrowAnnual, etfLabel, undLabel }) {
  const pts = (Array.isArray(horizons) ? horizons : []).filter(
    (h) => h && Number.isFinite(Number(h.grossSimple)) && Number.isFinite(Number(h.netSimple)),
  );
  if (!pts.length) {
    return <div className="scenario-warning">Need overlapping ETF + underlying daily prices (etf_metrics_daily).</div>;
  }
  const vals = pts.flatMap((p) => [Number(p.grossSimple), Number(p.netSimple)]);
  let lo = Math.min(...vals, 0);
  let hi = Math.max(...vals, 0);
  if (!(hi > lo)) { lo -= 0.01; hi += 0.01; }
  const pad = (hi - lo) * 0.1 || 0.01;
  lo -= pad;
  hi += pad;
  const span = Math.max(1e-9, hi - lo);
  const zeroPct = Math.min(100, Math.max(0, ((0 - lo) / span) * 100));
  const fmtPeriod = (v) => {
    if (!Number.isFinite(Number(v))) return '—';
    const n = Number(v) * 100;
    return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
  };

  function MiniBar({ value, kind, insufficient }) {
    const v = Number(value);
    const valPct = Math.min(100, Math.max(0, ((v - lo) / span) * 100));
    const barBottom = Math.min(zeroPct, valPct);
    const barTop = Math.max(zeroPct, valPct);
    const barH = Math.max(2, barTop - barBottom);
    const signCls = v >= 0 ? 'pos' : 'neg';
    return (
      <div className="decay-horizon-bar-stack--single">
        <div className="decay-horizon-zero" style={{ bottom: `${zeroPct}%` }} />
        <div
          className={cls('decay-horizon-bar', kind, signCls, insufficient && 'insufficient')}
          style={{
            position: 'absolute',
            left: 0,
            right: 0,
            bottom: `${barBottom}%`,
            height: `${barH}%`,
          }}
        />
      </div>
    );
  }

  return (
    <div className="decay-horizons-wrap">
      <div className="decay-horizons-bars" role="img" aria-label="Period gross and net hedge return by horizon">
        {pts.map((p) => {
          const tip = [
            `${p.horizonDays} trading days · ${p.obs} obs`,
            p.startDate && p.endDate ? `${p.startDate} → ${p.endDate}` : null,
            `${etfLabel || 'ETF'}: ${fmtPxRange(p.etfStartPx, p.etfEndPx)}`,
            `${undLabel || 'Und'}: ${fmtPxRange(p.undStartPx, p.undEndPx)}`,
            `Gross: ${fmtPeriod(p.grossSimple)} (${fmtLogYr(p.grossLog)} log)`,
            `Net: ${fmtPeriod(p.netSimple)} (${fmtLogYr(p.netLog)} log, after borrow)`,
            Number.isFinite(Number(borrowAnnual))
              ? `Borrow drag: ${fmt(Number(borrowAnnual) * (p.obs / 252))} over period`
              : null,
            !p.sufficient ? '(partial window — history shorter than horizon)' : null,
          ].filter(Boolean).join('\n');
          return (
            <div key={p.horizonDays} className="decay-horizon-col" title={tip}>
              <div style={{ display: 'flex', gap: 8, fontFamily: 'JetBrains Mono, monospace', fontSize: 10 }}>
                <span style={{ color: Number(p.grossSimple) >= 0 ? 'var(--positive)' : 'var(--negative)' }}>
                  G {fmtPeriod(p.grossSimple)}
                </span>
                <span style={{ color: Number(p.netSimple) >= 0 ? 'var(--positive)' : 'var(--negative)' }}>
                  N {fmtPeriod(p.netSimple)}
                </span>
              </div>
              <div className="decay-horizon-dual-bars">
                <MiniBar value={p.grossSimple} kind="gross" insufficient={!p.sufficient} />
                <MiniBar value={p.netSimple} kind="net" insufficient={!p.sufficient} />
              </div>
              <div className="decay-horizon-label">{p.horizonDays}d</div>
            </div>
          );
        })}
      </div>
      <div className="scenario-sub" style={{ marginTop: 8 }}>
        β = {Number.isFinite(Number(beta)) ? Number(beta).toFixed(3) : '—'} · short-favorable + ·{' '}
        <span style={{ color: 'rgba(59,130,246,0.95)' }}>■</span> gross ·{' '}
        <span style={{ color: 'rgba(6,182,212,0.95)' }}>■</span> net (gross − avg borrow × N/252) ·{' '}
        borrow {Number.isFinite(Number(borrowAnnual)) ? fmt(borrowAnnual) : '—'} avg
      </div>
    </div>
  );
}

function ExpectedDecayCalculator() {
  const [hedgeDelta, setHedgeDelta] = useState('2');
  const [sigmaAnnual, setSigmaAnnual] = useState('130');
  const [periodValue, setPeriodValue] = useState('1');
  const [periodUnit, setPeriodUnit] = useState('months');

  const result = useMemo(() => {
    const fn = window.computeExpectedDecay;
    if (typeof fn !== 'function') {
      return { ok: false, error: 'Calculator utility unavailable.' };
    }
    return fn({ delta: hedgeDelta, sigmaAnnual, periodValue, periodUnit });
  }, [hedgeDelta, sigmaAnnual, periodValue, periodUnit]);

  return (
    <div className="calc-card">
      <div className="calc-title">Expected Decay Calculator</div>
      <div className="calc-helper">
        Theoretical Itô vol-drag only — not a forecast. Do <strong>not</strong> use for YieldBOOST; read <strong>Exp. edge (fwd)</strong> or the Scenarios tab instead.
        Scenario drag uses <code>dragLog = ½·δ·(δ−1)·σ²·T</code> (this widget shows <code>½·|δ|·|δ−1|·σ²·T</code> for magnitude checks).
      </div>

      <div className="calc-grid">
        <div className="calc-field">
          <label>Delta</label>
          <input value={hedgeDelta} onChange={e => setHedgeDelta(e.target.value)} placeholder="-2, 1.5, 2" />
        </div>
        <div className="calc-field">
          <label>Annualized Volatility (%)</label>
          <input value={sigmaAnnual} onChange={e => setSigmaAnnual(e.target.value)} placeholder="130 or 1.3" />
        </div>
        <div className="calc-field">
          <label>Time Period Value</label>
          <input type="number" min="0" step="any" value={periodValue} onChange={e => setPeriodValue(e.target.value)} />
        </div>
        <div className="calc-field">
          <label>Time Unit</label>
          <select value={periodUnit} onChange={e => setPeriodUnit(e.target.value)}>
            <option value="days">Days</option>
            <option value="weeks">Weeks</option>
            <option value="months">Months</option>
            <option value="years">Years</option>
          </select>
        </div>
      </div>

      {!result.ok ? (
        <div className="calc-error">{result.error || 'Invalid input(s).'}</div>
      ) : (
        <>
          <div className="calc-out-grid">
            <div className="calc-out">
              <div className="k">Period decay (%)</div>
              <div className="v">{(result.periodExpectedDecay * 100).toFixed(2)}%</div>
            </div>
            <div className="calc-out">
              <div className="k">Period decay (dec.)</div>
              <div className="v">{result.periodExpectedDecay.toFixed(6)}</div>
            </div>
            <div className="calc-out">
              <div className="k">Annualized decay (%)</div>
              <div className="v">{(result.annualExpectedDecay * 100).toFixed(2)}%</div>
            </div>
          </div>

          <div className="calc-formula">
            expected_decay(T) = 0.5 × |delta| × |delta − 1| × sigma_annual² × T_years
          </div>
          <div className="calc-formula">
            0.5 × |{Number(result.delta).toFixed(4)}| × |{(Number(result.delta) - 1).toFixed(4)}| × {Number(result.sigmaAnnual).toFixed(4)}² × {Number(result.periodYears).toFixed(6)}
          </div>
          <div className="calc-example">
            Example: delta=2, sigma=130%, T=1 month → {(0.5 * Math.abs(2) * Math.abs(1) * (1.3 ** 2) / 12 * 100).toFixed(2)}%
          </div>
        </>
      )}
    </div>
  );
}

// ── Gross vs net comparison (detail strip): two rails, independent scales ──
function GrossDecayComparisonStrip({ r }) {
  const gR = Number(r.gross_decay_annual);
  const gHead = expectedDecayHeadlineValue(r, '6M');
  const gE = gHead != null && Number.isFinite(Number(gHead)) ? Number(gHead) : NaN;

  const bAvg = Number(r?.borrow_avg_annual);
  const netVsAvg = Number.isFinite(gR) && Number.isFinite(bAvg) ? gR - bAvg : NaN;
  const netSpot = Number(r.net_decay);
  const netP50 = Number(r.net_edge_p50_annual);

  const grossPts = [];
  if (Number.isFinite(gR)) grossPts.push({ key: 'gr', v: gR, kind: 'bar', cls: 'realized', legShort: 'Realized gross' });
  if (Number.isFinite(gE)) {
    grossPts.push({
      key: 'ge',
      v: gE,
      kind: 'bar',
      cls: 'expected',
      legShort: isYieldBoostIncomeStrategy(r)
        ? `${expectedDecayDisplayLabel(r)} · gross`
        : `${expectedDecayDisplayLabel(r)} · gross`,
    });
  }

  const netPts = [];
  if (Number.isFinite(netP50)) {
    netPts.push({
      key: 'n50',
      v: netP50,
      kind: 'diamond',
      cls: 'net-edge',
      legShort: 'Net edge (p50, bootstrap)',
    });
  }
  if (Number.isFinite(netVsAvg)) {
    netPts.push({
      key: 'nr',
      v: netVsAvg,
      kind: 'bar',
      cls: 'net-realized',
      legShort: 'Realized net decay (gross − hist. avg borrow)',
    });
  }
  if (Number.isFinite(netSpot)) {
    const sameAsAvg = Number.isFinite(netVsAvg) && Math.abs(netSpot - netVsAvg) < 1e-5;
    if (!sameAsAvg) {
      netPts.push({
        key: 'ns',
        v: netSpot,
        kind: 'bar',
        cls: 'net-spot',
        legShort: 'Net (gross − spot borrow)',
      });
    }
  }

  if (grossPts.length === 0 && netPts.length === 0) return null;

  const fmtLogAxis = (x) => `${fmtLogYr(x)} log/yr`;

  function SingleRail({ title, pts }) {
    const vals = pts.map(p => p.v);
    let lo = Math.min(...vals);
    let hi = Math.max(...vals);
    if (!(hi > lo)) {
      lo -= 0.015;
      hi += 0.015;
    }
    const pos = (v) => ((v - lo) / (hi - lo)) * 100;
    return (
      <div className="gross-dumbbell-rail">
        <div className="gross-dumbbell-rail-title">{title}</div>
        <div className="gross-dumbbell gross-dumbbell--rail" aria-hidden="true">
          <div className="gross-dumbbell-track" />
          {pts.map((p) =>
            p.kind === 'diamond' ? (
              <div
                key={p.key}
                className={`gross-dumbbell-mark--diamond ${p.cls}`}
                style={{ left: `${pos(p.v)}%` }}
                title={`${p.legShort}: ${fmtLogAxis(p.v)}`}
              />
            ) : (
              <div
                key={p.key}
                className={`gross-dumbbell-tick ${p.cls}`}
                style={{ left: `${pos(p.v)}%` }}
                title={`${p.legShort}: ${fmtLogAxis(p.v)}`}
              />
            ),
          )}
          <div className="gross-dumbbell-axis">
            <span>{fmtLogAxis(lo)}</span>
            <span>{fmtLogAxis(hi)}</span>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="dv-block">
      <div className="dv-title">Annual rates — gross vs net (separate scales)</div>
      <div className="gross-dumbbell-stack">
        {grossPts.length > 0 ? <SingleRail title="Gross (before borrow)" pts={grossPts} /> : null}
        {netPts.length > 0 ? <SingleRail title="Net (after borrow)" pts={netPts} /> : null}
      </div>
      <div className="gross-dumbbell-legends">
        {grossPts.length > 0 ? (
          <div className="gross-dumbbell-legend-group">
            <div className="gross-dumbbell-legend-group-label">Gross</div>
            <div className="gross-dumbbell-legend">
              {grossPts.map((p) => (
                <span key={`g-${p.key}`}>
                  <i style={{ background: p.cls === 'realized' ? 'var(--accent-blue)' : 'var(--accent-purple)' }} />
                  {p.legShort}
                </span>
              ))}
            </div>
          </div>
        ) : null}
        {netPts.length > 0 ? (
          <div className="gross-dumbbell-legend-group">
            <div className="gross-dumbbell-legend-group-label">Net</div>
            <div className="gross-dumbbell-legend">
              {netPts.map((p) => (
                <span key={`n-${p.key}`}>
                  {p.kind === 'diamond' ? (
                    <i className="gross-legend-diamond" aria-hidden="true" />
                  ) : (
                    <i style={{ background: p.cls === 'net-realized' ? 'var(--positive)' : 'var(--accent-cyan)' }} />
                  )}
                  {p.legShort}
                </span>
              ))}
            </div>
          </div>
        ) : null}
      </div>
    </div>
  );
}

function NetEdgeBootstrapViz({ r }) {
  const p5 = Number(r.net_edge_p05_annual);
  const p25 = Number(r.net_edge_p25_annual);
  const p50 = Number(r.net_edge_p50_annual);
  const p75 = Number(r.net_edge_p75_annual);
  const p95 = Number(r.net_edge_p95_annual);
  const hasBox = [p5, p25, p50, p75, p95].every(Number.isFinite);
  let hist = null;
  if (r.net_edge_hist_json && typeof r.net_edge_hist_json === 'string') {
    try { hist = JSON.parse(r.net_edge_hist_json); } catch (e) { hist = null; }
  }
  if (!hasBox && !(hist && Array.isArray(hist.c) && hist.e && hist.e.length > 1)) return null;
  let lo = hasBox ? p5 : NaN;
  let hi = hasBox ? p95 : NaN;
  if (!Number.isFinite(lo) || !Number.isFinite(hi)) {
    if (hist && Array.isArray(hist.e) && hist.e.length > 1) {
      lo = Number(hist.e[0]);
      hi = Number(hist.e[hist.e.length - 1]);
    } else {
      lo = 0;
      hi = 1;
    }
  }
  const span = hi > lo ? hi - lo : 1e-6;
  const x = (v) => 10 + ((v - lo) / span) * 180;
  let bars = null;
  if (hist && Array.isArray(hist.c) && hist.c.length) {
    const mx = Math.max(...hist.c.map(Number), 1);
    const edges = Array.isArray(hist.e) ? hist.e : [];
    bars = (
      <div className="net-edge-mini-hist" aria-label="Bootstrap net edge (annual) histogram">
        {hist.c.map((c, i) => {
          const eLo = edges[i] != null ? Number(edges[i]) : NaN;
          const eHi = edges[i + 1] != null ? Number(edges[i + 1]) : NaN;
          const barTitle = Number.isFinite(eLo) && Number.isFinite(eHi)
            ? `${fmt(eLo)} – ${fmt(eHi)} (bin range, annual net edge)`
            : 'Bin range unavailable';
          return (
            <div key={i} className="bar" title={barTitle} style={{ height: `${(Number(c) / mx) * 100}%` }} />
          );
        })}
      </div>
    );
  }
  return (
    <div className="dv-block net-edge-viz">
      <div className="dv-title">Net edge — resampled distribution</div>
      {hasBox ? (
        <svg className="net-edge-box-svg" viewBox="0 0 200 44" preserveAspectRatio="none">
          <title>Net edge fan — same layout as table (hover table cell for numbers).</title>
          <line x1={x(p5)} y1={22} x2={x(p95)} y2={22} stroke="var(--ne-whisker)" strokeWidth="1.75" />
          <rect
            x={x(p25)} y={14} width={Math.max(x(p75) - x(p25), 1)} height={16}
            fill="var(--ne-iqr-fill)" stroke="var(--ne-iqr-stroke)" strokeWidth="1"
          />
          <line x1={x(p50)} y1={10} x2={x(p50)} y2={34} stroke="var(--ne-p50)" strokeWidth="2.25" />
        </svg>
      ) : null}
      {bars}
    </div>
  );
}

/** Shared net-edge fan: whisker (p5–p95) + IQR box + p50 dot — same colors in table and charts. */
function NetEdgeFanGlyph({ r, w = 58, h = 18, vbW = 58 }) {
  const p5 = Number(r.net_edge_p05_annual);
  const p25 = Number(r.net_edge_p25_annual);
  const p50 = Number(r.net_edge_p50_annual);
  const p75 = Number(r.net_edge_p75_annual);
  const p95 = Number(r.net_edge_p95_annual);
  const hasWhisk = Number.isFinite(p5) && Number.isFinite(p95) && Number.isFinite(p50);
  if (!hasWhisk) return null;
  const hasIqr = Number.isFinite(p25) && Number.isFinite(p75);
  const lo = p5;
  const hi = p95;
  const span = hi > lo ? hi - lo : 1e-8;
  const W = 52;
  const x = v => ((v - lo) / span) * W + 3;
  const ymid = 10;
  const tip = [
    `p5 ${fmt(p5)}`,
    hasIqr ? `p25 ${fmt(p25)}` : null,
    `p50 ${fmt(p50)}`,
    hasIqr ? `p75 ${fmt(p75)}` : null,
    `p95 ${fmt(p95)}`,
  ].filter(Boolean).join(' · ');
  return (
    <span title={tip} onClick={e => e.stopPropagation()}>
      <svg width={w} height={h} viewBox={`0 0 ${vbW} 18`} style={{ display: 'block' }} aria-hidden="true">
        <line x1={x(p5)} y1={ymid} x2={x(p95)} y2={ymid} stroke="var(--ne-whisker)" strokeWidth="2" strokeLinecap="round" />
        {hasIqr ? (
          <rect
            x={x(p25)} y={3} width={Math.max(x(p75) - x(p25), 1)} height={14} rx="1"
            fill="var(--ne-iqr-fill)" stroke="var(--ne-iqr-stroke)" strokeWidth="1"
          />
        ) : null}
        <circle cx={x(p50)} cy={ymid} r={hasIqr ? 2.2 : 3} fill="var(--ne-p50)" />
      </svg>
    </span>
  );
}

function NetEdgeMergedCell({ r }) {
  const p50 = r.net_edge_p50_annual;
  const anchorSource = r.gross_anchor_source;
  const anchorShift = Number(r.gross_anchor_shift_annual);
  const anchorTarget = Number(r.gross_anchor_target_annual);
  // Inverse-variance blend diagnostics (decision B2). YB re-blend (schema_v=4):
  // pair_blend_* overrides screener gross_blend_* with the pair-MC anchor.
  const isYb = isYieldBoostIncomeStrategy(r);
  const blendMethod = isYb && r?.pair_blend_method
    ? r.pair_blend_method
    : r?.gross_blend_method || null;
  const blendWF = isYb && Number.isFinite(Number(r?.pair_blend_weight_forward))
    ? Number(r.pair_blend_weight_forward)
    : Number(r?.gross_blend_weight_forward);
  const sigmaF = isYb && Number.isFinite(Number(r?.pair_sigma_forward_annual))
    ? Number(r.pair_sigma_forward_annual)
    : Number(r?.gross_sigma_forward_annual);
  const sigmaR = isYb && Number.isFinite(Number(r?.pair_sigma_realized_annual))
    ? Number(r.pair_sigma_realized_annual)
    : Number(r?.gross_sigma_realized_annual);
  const anchorEffective = isYb && Number.isFinite(Number(r?.pair_anchor_target_annual))
    ? Number(r.pair_anchor_target_annual)
    : (Number.isFinite(anchorTarget) ? anchorTarget : null);

  const baseTip = 'Net edge (annual, short-favorable +). Best-estimate of edge after borrow.';
  const tipLines = [baseTip];
  if (blendMethod === 'inverse_variance' && Number.isFinite(blendWF)) {
    tipLines.push(
      `Inverse-variance blend: w_forward=${blendWF.toFixed(2)}, `
      + `w_realized=${(1 - blendWF).toFixed(2)}`
    );
    if (Number.isFinite(sigmaF)) tipLines.push(`sigma_forward = ${fmt(sigmaF)}`);
    if (Number.isFinite(sigmaR)) tipLines.push(`sigma_realized = ${fmt(sigmaR)}`);
  } else if (blendMethod === 'anchor_shift_fallback') {
    tipLines.push('Anchor-shift fallback (no usable forward band; E2 fallback).');
  } else if (blendMethod === 'realized_only') {
    tipLines.push('Realized-only (no forward forecast available).');
  }
  if (isYb && Number.isFinite(anchorEffective)) {
    tipLines.push(`Anchor = Exp. decay p50 (put-spread structural): ${fmtLogYr(anchorEffective)} log/yr`);
    const weeklyMc = expectedPairPnlWeeklyMc(r);
    if (weeklyMc?.p50 != null) {
      tipLines.push(`Weekly pair MC diagnostic p50: ${fmtLogYr(weeklyMc.p50)} log/yr`);
    }
  } else if (Number.isFinite(anchorEffective)) {
    tipLines.push(`Anchor (posterior gross): ${fmtLogYr(anchorEffective)} log/yr`);
  }
  if (Number.isFinite(anchorShift) && Math.abs(anchorShift) > 1e-6) {
    tipLines.push(`Realized-mean shift: ${anchorShift >= 0 ? '+' : ''}${fmt(anchorShift)}`);
  }
  if (anchorSource === 'realized_only_passive_low_delta' || anchorSource === 'realized_only_passive_low_beta') {
    tipLines.push('passive low-beta: realized-only by policy');
  } else if (anchorSource) {
    tipLines.push(`Forward forecast model: ${anchorSource}`);
  }
  const tip = tipLines.join('\n');
  const hasFan = Number.isFinite(Number(r.net_edge_p05_annual)) && Number.isFinite(Number(r.net_edge_p95_annual)) && Number.isFinite(Number(p50));
  return (
    <div className="net-edge-merged" title={tip} onClick={e => e.stopPropagation()}>
      <div className={cls('net-edge-merged-p50', spreadCls(p50))}>{p50 != null ? fmtLogYr(p50) : '—'}</div>
      <div className="net-edge-merged-fan">
        {hasFan ? <NetEdgeFanGlyph r={r} w={62} h={20} vbW={58} /> : <span style={{ fontSize: 10, color: 'var(--text-muted)' }}>—</span>}
      </div>
    </div>
  );
}

// 5x5 grid of structural gross pair P&L (log/yr) for YieldBOOST — put-spread
// closed form anchored to Exp. decay p50 — or Itô analytic for LETF.
const _HEATMAP_MIN = -2.0;
const _HEATMAP_MAX = 2.0;
function _heatmapCellColor(v) {
  if (v == null || !Number.isFinite(v)) return 'rgba(140,140,140,0.18)';
  const clamped = Math.max(_HEATMAP_MIN, Math.min(_HEATMAP_MAX, v));
  if (clamped >= 0) {
    const intensity = Math.min(1, clamped / _HEATMAP_MAX);
    // green: short-favorable positive
    return `rgba(34, 197, 94, ${0.10 + 0.55 * intensity})`;
  }
  const intensity = Math.min(1, -clamped / Math.abs(_HEATMAP_MIN));
  // red: short-unfavorable (long-favorable underlying rally + low vol)
  return `rgba(239, 68, 68, ${0.10 + 0.55 * intensity})`;
}

function PairScenarioHeatmap({ r, forecastSigma }) {
  if (!isYieldBoostIncomeStrategy(r)) return null;
  const grid = r?.pair_scenario_grid || null;
  const pair = expectedPairPnlDistribution(r);
  const weeklyMc = pair?.weeklyMc || expectedPairPnlWeeklyMc(r);
  if (!grid || !Array.isArray(grid.p50_log_grid)) {
    return (
      <div className="scenario-card" style={{ marginTop: 0 }}>
        <div className="scenario-head">
          <div>
            <div className="scenario-title">Forward pair P&L heatmap</div>
            <div className="scenario-sub">
              Not available for this row. Rebuild with <code>scripts/build_data.py</code> (schema_v &ge; 4).
            </div>
          </div>
        </div>
      </div>
    );
  }
  const sigmaMults = grid.sigma_multipliers || [0.5, 0.7, 1.0, 1.3, 1.5];
  const drifts = grid.drifts || [-0.5, -0.25, 0.0, 0.25, 0.5];
  const rows = grid.p50_log_grid;
  const undGrid = grid.und_p50_simple_grid || null;
  const sigma = Number.isFinite(Number(forecastSigma)) ? Number(forecastSigma) : null;
  const beta = Number(r?.delta != null ? r.delta : r?.beta);
  const borrow = Number(r?.borrow_for_net_annual);
  const isLetfAnalytic = grid.basis === 'letf_ito_analytic';
  const isPutSpreadStructural = grid.engine === 'yieldboost_put_spread_structural'
    || grid.basis === 'put_spread_gross_anchor';
  const isYb = isYieldBoostIncomeStrategy(r);
  const gridTitle = isPutSpreadStructural
    ? 'Structural gross pair heatmap (log/yr)'
    : 'Forward pair P&L heatmap (log/yr)';
  return (
    <div className="scenario-card" style={{ marginTop: 0 }}>
      <div className="scenario-head">
        <div>
          <div className="scenario-title">{gridTitle}</div>
          <div className="scenario-sub">
            {isPutSpreadStructural
              ? 'YieldBOOST: put-spread structural gross (center ≈ Exp. decay p50) + β·μ drift leg'
              : isYb ? 'YieldBOOST: weekly-rebalanced compound MC' : 'LETF: Itô analytic'} ·
            {sigma != null ? <> σ <strong>{fmt(sigma)}</strong> ·</> : null}
            {Number.isFinite(beta) ? <> β <strong>{beta.toFixed(2)}</strong> ·</> : null}
            {Number.isFinite(borrow) && !isPutSpreadStructural ? (
              <> borrow <strong>{fmt(borrow)}</strong>/yr{isYb ? ' (in MC cells)' : ' (subtracted in Net edge)'}</>
            ) : null}
          </div>
          <div className="scenario-sub">
            Rows = σ multiplier · Cols = 1Y underlying log drift ·
            {isPutSpreadStructural
              ? ' Gross structural (distributions/borrow in Net edge bridge + income table below).'
              : ' Cells = median forward pair P&L on the same axis as Realized.'}
            {isPutSpreadStructural && weeklyMc?.p50 != null ? (
              <> Weekly pair MC p50 (diagnostic): <strong>{fmtLogYr(weeklyMc.p50)}</strong>.</>
            ) : null}
          </div>
        </div>
      </div>
      <div style={{ overflowX: 'auto' }}>
        <table style={{
          width: '100%',
          borderCollapse: 'collapse',
          fontSize: 12,
          fontVariantNumeric: 'tabular-nums',
        }}>
          <thead>
            <tr>
              <th style={{ textAlign: 'left', padding: '4px 8px', whiteSpace: 'nowrap' }}>σ multiplier ↓ / drift →</th>
              {drifts.map(m => (
                <th key={m} style={{ padding: '4px 8px', textAlign: 'right' }}>{fmtPct(m)}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.map((row, i) => {
              const k = sigmaMults[i];
              return (
                <tr key={k}>
                  <th style={{ textAlign: 'left', padding: '4px 8px', fontWeight: 500, whiteSpace: 'nowrap' }}>
                    {k}× <span style={{ color: 'var(--text-muted)', fontSize: 10 }}>
                      ({sigma != null ? fmt(sigma * k) : '—'})
                    </span>
                  </th>
                  {row.map((v, j) => {
                    const drift = drifts[j];
                    const undSimple = undGrid && undGrid[i] ? undGrid[i][j] : Math.expm1(Number(drift));
                    const simple = logToSimpleAnnual(v);
                    const tip = (
                      `cell: σ × ${k} (= ${sigma != null ? fmt(sigma * k) : '—'}), drift = ${fmtPct(drift)}\n` +
                      `forward pair P&L (median): ${fmtLogYr(v)} log/yr (${fmtPct(simple)} simple)\n` +
                      (isLetfAnalytic
                        ? '(β² − β)/2·(k·σ)² + β·μ analytic'
                        : `MC: n=${grid.n_paths_per_cell} paths, weekly compound`) +
                      (Number.isFinite(undSimple) ? `\nunderlying 1Y simple (median path): ${fmtPct(undSimple)}` : '')
                    );
                    return (
                      <td
                        key={drift}
                        title={tip}

/** ETF metrics: fix shares when AUM/NAV implies a consistent count but shares are off by ~10²+ (feed glitches). */
function repairEtfMetricsShareOutliers(rows) {
  if (!Array.isArray(rows) || rows.length === 0) return rows;
  const RATIO_MAX = 80;
  return rows.map((row) => {
    const nav = Number(row?.nav);
    const aum = Number(row?.aum);
    const sh = Number(row?.shares_outstanding);
    const implied = (Number.isFinite(nav) && nav > 0 && Number.isFinite(aum) && aum > 0)
      ? aum / nav
      : null;
    if (implied == null || !Number.isFinite(implied) || implied <= 0 || !Number.isFinite(sh) || sh <= 0) {
      return row;
    }
    const r = Math.max(sh / implied, implied / sh);
    if (r <= RATIO_MAX) return row;
    const base = String(row?.status || 'ok').trim();
    const tag = '· repaired (shares ← AUM/NAV)';
    return {
      ...row,
      shares_outstanding: implied,
      status: base.includes('repaired') ? base : `${base} ${tag}`.trim(),
    };
  });
}

function buildTotalReturnMetricsSeries(rawRows, distributions) {
  const okRaw = Array.isArray(rawRows) ? rawRows.filter((x) => String(x?.status || '').toLowerCase() === 'ok') : [];
  const ok = repairEtfMetricsShareOutliers(okRaw).sort((a, b) => String(a?.date || '').localeCompare(String(b?.date || '')));
  if (!ok.length) return [];
  const dists = (Array.isArray(distributions) ? distributions : [])
    .map((d) => ({ ex_date: String(d?.ex_date || ''), amount: Number(d?.amount) }))
    .filter((d) => d.ex_date && Number.isFinite(d.amount) && d.amount > 0)
    .sort((a, b) => a.ex_date.localeCompare(b.ex_date));
  const seriesStart = String(ok[0]?.date || '');
  let reinvFactor = 1;
  let dIdx = 0;
  while (dIdx < dists.length && String(dists[dIdx].ex_date) <= seriesStart) dIdx += 1;
  return ok.map((row) => {
    const dateStr = String(row?.date || '');
    const nav = Number(row?.nav);
    const pxBase = Number.isFinite(nav) && nav > 0 ? nav : (Number(row?.close_price) || Number(row?.nav));
    if (dateStr && Number.isFinite(pxBase) && pxBase > 0) {
      while (dIdx < dists.length && String(dists[dIdx].ex_date) <= dateStr) {
        const amt = Number(dists[dIdx].amount);
        if (Number.isFinite(amt) && amt > 0) reinvFactor *= (pxBase + amt) / pxBase;
        dIdx += 1;
      }
    }
    const tr = Number.isFinite(pxBase) && pxBase > 0 ? pxBase * reinvFactor : null;
    return { ...row, nav_total_return: tr, tr_reinvestment_factor: reinvFactor };
  });
}

/**
 * Rolling underlying vol-shape history. Mirrors
 * `_underlying_vol_shape` in ls-algo/screener_v2_fields.py — annualizes
 * weekly RV from the 5-day chunk size (not the window), so the trend
 * ratio is window-independent (iid ≈ 1, perfect drift ≈ sqrt(5)).
 */
function buildUnderlyingVolShapeHistory(rows, window = VOL_SHAPE_PRIMARY_WINDOW) {
  if (!Number.isInteger(window) || window <= 0 || window % 5 !== 0) {
    return { series: [], vcrMedian: null, window };
  }
  const clean = (Array.isArray(rows) ? rows : [])
    .map((row) => ({
      date: String(row?.date || '').trim(),
      px: Number(row?.underlying_adj_close),
    }))
    .filter((row) => row.date && Number.isFinite(row.px) && row.px > 0)
    .sort((a, b) => a.date.localeCompare(b.date));
  if (clean.length < window + 1) return { series: [], vcrMedian: null, window };

  const rets = [];
  for (let i = 1; i < clean.length; i += 1) {
    const r = Math.log(clean[i].px / clean[i - 1].px);
    if (Number.isFinite(r)) rets.push({ date: clean[i].date, r });
  }

  const out = [];
  for (let end = window; end <= rets.length; end += 1) {
    const tail = rets.slice(end - window, end).map(x => x.r);
    const sumSq = tail.reduce((a, r) => a + r * r, 0);
    if (!Number.isFinite(sumSq) || sumSq <= 0) continue;
    const rvDaily = Math.sqrt((sumSq / window) * 252);
    const weekly = [];
    for (let j = 0; j < window; j += 5) {
      weekly.push(tail.slice(j, j + 5).reduce((a, r) => a + r, 0));
    }
    const meanWeeklySq = weekly.reduce((a, r) => a + r * r, 0) / weekly.length;
    const rvWeekly = Math.sqrt(meanWeeklySq * (252 / 5));
    const trendRatio = rvDaily > 0 ? rvWeekly / rvDaily : null;
    const vcr = Math.max(...tail.map(r => r * r)) / sumSq;
    out.push({
      date: rets[end - 1].date,
      rv_daily: rvDaily,
      rv_weekly: rvWeekly,
      trend_ratio: trendRatio,
      vcr,
    });
  }

  const vcrVals = out.map(x => Number(x.vcr)).filter(Number.isFinite).sort((a, b) => a - b);
  const mid = Math.floor(vcrVals.length / 2);
  const vcrMedian = vcrVals.length ? (vcrVals.length % 2 ? vcrVals[mid] : 0.5 * (vcrVals[mid - 1] + vcrVals[mid])) : null;
  return {
    series: out.map(row => ({ ...row, vcr_median: vcrMedian })),
    vcrMedian,
    window,
  };
}
function medianSharesTraded(rows, lookback = 60) {
  const slice = (Array.isArray(rows) ? rows : []).slice(Math.max(0, (rows || []).length - lookback));
  const vals = slice
    .map((r) => {
      const raw = r?.shares_traded;
      if (raw == null) return null;
      if (typeof raw === 'string' && !raw.trim()) return null;
      const n = typeof raw === 'string' ? Number(raw.trim().replace(/,/g, '')) : Number(raw);
      return Number.isFinite(n) && n > 0 ? n : null;
    })
    .filter((v) => v != null)
    .sort((a, b) => a - b);
  if (!vals.length) return null;
  const mid = Math.floor(vals.length / 2);
  return vals.length % 2 ? vals[mid] : 0.5 * (vals[mid - 1] + vals[mid]);
}

    ['borrow', 'Borrow cost', 'rgba(239,68,68,0.95)'],
    ['distributions', 'Distributions (short)', 'rgba(244,114,182,0.95)'],
    ['transactionCosts', 'T-costs', 'rgba(245,158,11,0.95)'],
  ];
  const costPlotKeys = new Set(['borrow', 'transactionCosts', 'distributions']);
  const vals = [];
  series.forEach((r) => keys.forEach(([k]) => {
    const sign = costPlotKeys.has(k) ? -1 : 1;
    const v = Number(r?.[k]);
    if (Number.isFinite(v)) vals.push(sign * v);
  }));
  const minRaw = Math.min(...vals, 0);
  const maxRaw = Math.max(...vals, 0);
  const pad = (maxRaw - minRaw || Math.max(1, Math.abs(maxRaw))) * 0.1;

  const R = 16;
  const T = 14;
  const B = 46;

  const PH = H - T - B;
  const x = (i) => L + (i / Math.max(1, series.length - 1)) * PW;
  const y = (v) => T + (1 - ((v - yMin) / Math.max(1e-12, yMax - yMin))) * PH;
  const pathFor = (k) => series.map((r, i) => {
    const sign = costPlotKeys.has(k) ? -1 : 1;

  }).filter(Boolean).join(' ');
  const ticks = [0, 0.25, 0.5, 0.75, 1].map((q) => yMin + (yMax - yMin) * q).reverse();
  const dateStrs = series.map((r) => r.date);
  const xTicks = pickDistinctBacktestDateTickIndices(dateStrs);
  return (

          <rect x={L} y={T} width={PW} height={PH} fill="rgba(11,19,34,0.16)" stroke="rgba(56,72,96,0.42)" />
          {ticks.map((tick, i) => (

              <line x1={L} y1={y(tick)} x2={W - R} y2={y(tick)} stroke="rgba(56,72,96,0.22)" />

          ))}

        </svg>
      </div>
      <div className="backtest-chart-legend">
        {keys.map(([k, label, color]) => (

        ))}

  );

          {series.map((r, i) => (r.rebalance ? (

        </svg>

}

function LetfRebalanceFlowChart({ series, title, showReturnOverlay = true }) {
  const points = (Array.isArray(series) ? series : []).filter((r) => Number.isFinite(Number(r?.rebalance_signed_dollars)));
  if (!points.length) {
    return <div className="scenario-warning">No included rebalance-flow history for this fund yet.</div>;
  }
  const W = 920;
  const H = 240;
  const padL = 76;
  const padR = 56;
  const padT = 16;
  const padB = 38;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const vals = points.map((p) => Number(p.rebalance_signed_dollars));
  const maxAbs = Math.max(...vals.map((v) => Math.abs(v)), 1);
  const yScaleMax = maxAbs * 1.05;
  const y0 = padT + innerH / 2;
  const barW = Math.max(2, Math.min(18, innerW / points.length - 2));
  const step = innerW / points.length;
  const tickEvery = Math.max(1, Math.ceil(points.length / 6));

  // Optional underlying return overlay (right axis): map underlying_return_d1 to a thin line.
  const retsRaw = points.map((p) => Number(p?.underlying_return_d1));
  const haveOverlay = showReturnOverlay && retsRaw.some((r) => Number.isFinite(r));
  const finiteRets = retsRaw.filter((r) => Number.isFinite(r));
  const retMaxAbs = haveOverlay ? Math.max(...finiteRets.map((r) => Math.abs(r)), 0.005) : 0;
  const retScaleMax = haveOverlay ? Math.max(retMaxAbs * 1.1, 0.005) : 0;

  // Y-axis grid + tick labels at +max, +max/2, 0, -max/2, -max.
  const yTickFractions = [1, 0.5, 0, -0.5, -1];

  return (
    <div className="trade-card" style={{ marginTop: 12 }}>
      <div className="scenario-title">{title || 'Fund rebalance flow history'}</div>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} role="img" aria-label="Fund rebalance flow history">
        {yTickFractions.map((frac) => {
          const y = y0 - frac * (innerH / 2 - 4);
          const dollars = frac * yScaleMax;
          return (
            <g key={`grid-${frac}`}>
              <line
                x1={padL}
                x2={W - padR}
                y1={y}
                y2={y}
                stroke={frac === 0 ? 'rgba(139,156,187,0.55)' : 'rgba(139,156,187,0.18)'}
                strokeDasharray={frac === 0 ? '' : '3 3'}
              />
              <text
                x={padL - 8}
                y={y + 3}
                textAnchor="end"
                fontSize="10"
                fill="#8b9cbb"
                fontFamily="DM Sans"
              >
                {frac === 0 ? '$0' : fmtCompactSignedMoney(dollars, 1)}
              </text>
            </g>
          );
        })}

        {points.map((p, i) => {
          const v = Number(p.rebalance_signed_dollars);
          const h = (Math.abs(v) / yScaleMax) * (innerH / 2 - 4);
          const x = padL + i * step + (step - barW) / 2;
          const y = v >= 0 ? y0 - h : y0;
          const excluded = p?.included_in_aggregate === false;
          const fill = excluded
            ? 'rgba(139,156,187,0.45)'
            : v >= 0
              ? 'rgba(16,185,129,0.85)'
              : 'rgba(239,68,68,0.85)';
          return (
            <rect
              key={`${p.date}-${i}`}
              x={x}
              y={y}
              width={barW}
              height={Math.max(h, v === 0 ? 0 : 1)}
              fill={fill}
            >
              <title>{`${p.date}: ${fmtSignedMoney(v)}${excluded ? ` · excluded (${p.quality_flag || 'flagged'})` : ''}`}</title>
            </rect>
          );
        })}

        {haveOverlay && (() => {
          const segs = [];
          let cur = [];
          points.forEach((p, i) => {
            const r = Number(p?.underlying_return_d1);
            if (!Number.isFinite(r)) {
              if (cur.length) { segs.push(cur); cur = []; }
              return;
            }
            const x = padL + i * step + step / 2;
            const y = y0 - (r / retScaleMax) * (innerH / 2 - 4);
            cur.push({ x, y });
          });
          if (cur.length) segs.push(cur);
          return (
            <g>
              {segs.map((seg, idx) => (
                <polyline
                  key={`und-line-${idx}`}
                  fill="none"
                  stroke="rgba(96,165,250,0.85)"
                  strokeWidth="1.4"
                  strokeLinejoin="round"
                  strokeLinecap="round"
                  points={seg.map((pt) => `${pt.x.toFixed(2)},${pt.y.toFixed(2)}`).join(' ')}
                />
              ))}
              {/* Right-side axis ticks for underlying return */}
              {[1, 0.5, 0, -0.5, -1].map((frac) => {
                const y = y0 - frac * (innerH / 2 - 4);
                return (
                  <text
                    key={`und-axis-${frac}`}
                    x={W - padR + 6}
                    y={y + 3}
                    textAnchor="start"
                    fontSize="10"
                    fill="rgba(96,165,250,0.85)"
                    fontFamily="DM Sans"
                  >
                    {frac === 0 ? '0%' : `${(frac * retScaleMax * 100).toFixed(retScaleMax >= 0.05 ? 0 : 1)}%`}
                  </text>
                );
              })}
            </g>
          );
        })()}

        {points.map((p, i) => (
          (i === 0 || i === points.length - 1 || i % tickEvery === 0) ? (
            <text
              key={`lbl-${p.date}-${i}`}
              x={padL + i * step + step / 2}
              y={H - 10}
              textAnchor="middle"
              fontSize="11"
              fill="#8b9cbb"
              fontFamily="DM Sans"
            >
              {formatBacktestAxisDate(p.date)}
            </text>
          ) : null
        ))}
      </svg>
      <div className="backtest-chart-legend">
        <span><span className="backtest-legend-dot" style={{ background: 'rgba(16,185,129,0.85)' }} />Buy into close</span>
        <span><span className="backtest-legend-dot" style={{ background: 'rgba(239,68,68,0.85)' }} />Sell into close</span>
        <span><span className="backtest-legend-dot" style={{ background: 'rgba(139,156,187,0.45)' }} />Excluded (stale / overlay / non-leveraged)</span>
        {haveOverlay && (
          <span><span className="backtest-legend-dot" style={{ background: 'rgba(96,165,250,0.85)' }} />Underlying return (right axis)</span>
        )}
      </div>
    </div>
  );
}

/**
 * Plots today's per-build estimated net close-rebalance for one underlying as
 * a function of minutes-to-close, with a horizontal reference line for the
 * realised T-1 close (proxy for "where this might land"). Empty state when
 * fewer than two snapshots are available -- meaningful only mid-day onward.
 */
function LetfIntradayConvergenceChart({ series, underlying, latestRealized, latestRealizedDate }) {
  const points = (Array.isArray(series) ? series : []).filter(
    (p) => Number.isFinite(p.net) && Number.isFinite(p.minutes_to_close),
  );
  if (points.length < 2) {
    return (
      <div className="trade-card" style={{ marginTop: 12 }}>
        <div className="scenario-title">{underlying} — intraday convergence</div>
        <div className="scenario-warning">
          Need ≥ 2 intraday snapshots to plot convergence. {points.length === 1
            ? `Have 1 so far at ${points[0].minutes_to_close ?? '—'}m to close.`
            : 'Awaiting today’s first refresh.'}
        </div>
      </div>
    );
  }
  // Sort by descending minutes_to_close so the x-axis reads "open → close".
  const sorted = [...points].sort((a, b) => Number(b.minutes_to_close) - Number(a.minutes_to_close));
  const W = 920, H = 200;
  const padL = 76, padR = 28, padT = 16, padB = 36;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const xs = sorted.map((p) => Number(p.minutes_to_close));
  const ys = sorted.map((p) => Number(p.net));
  const refY = Number(latestRealized);
  // Treat each trajectory (blend / spot / nav) as its own polyline so the
  // user can see the three estimators converge as we approach the close.
  const trajectories = [
    { key: 'blend', color: 'rgba(245,158,11,0.95)', label: 'Blended', valueOf: (p) => Number(p.net) },
    { key: 'spot', color: 'rgba(96,165,250,0.55)', label: 'Spot only', valueOf: (p) => Number(p.net_spot) },
    { key: 'nav', color: 'rgba(34,197,94,0.55)', label: 'NAV-implied', valueOf: (p) => Number(p.net_nav) },
  ];
  const allYs = [...ys];
  for (const t of trajectories) {
    for (const p of sorted) {
      const v = t.valueOf(p);
      if (Number.isFinite(v)) allYs.push(v);
    }
  }
  if (Number.isFinite(refY)) allYs.push(refY);
  const yMaxAbs = Math.max(...allYs.map((v) => Math.abs(v)), 1);
  const xMin = Math.max(...xs);
  const xMax = Math.min(...xs);
  const xRange = Math.max(1, xMin - xMax);
  const xPos = (m) => padL + ((xMin - m) / xRange) * innerW;
  const yPos = (v) => padT + innerH / 2 - (v / (yMaxAbs * 1.05)) * (innerH / 2 - 4);
  const yTicks = [1, 0.5, 0, -0.5, -1];
  const xTicks = [xMin, Math.round((xMin + xMax) / 2), xMax].filter((v, i, a) => a.indexOf(v) === i);
  const visibleTrajectories = trajectories
    .map((t) => {
      const pts = sorted
        .map((p) => ({ p, v: t.valueOf(p) }))
        .filter((row) => Number.isFinite(row.v));
      return { ...t, pts };
    })
    .filter((t) => t.pts.length >= 2);
  return (
    <div className="trade-card" style={{ marginTop: 12 }}>
      <div className="scenario-title">{underlying} — intraday convergence (today)</div>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} role="img" aria-label="Intraday convergence">
        {yTicks.map((frac) => {
          const y = padT + innerH / 2 - frac * (innerH / 2 - 4);
          const dollars = frac * yMaxAbs * 1.05;
          return (
            <g key={`gy-${frac}`}>
              <line x1={padL} x2={W - padR} y1={y} y2={y} stroke={frac === 0 ? 'rgba(139,156,187,0.55)' : 'rgba(139,156,187,0.18)'} strokeDasharray={frac === 0 ? '' : '3 3'} />
              <text x={padL - 8} y={y + 3} textAnchor="end" fontSize="10" fill="#8b9cbb" fontFamily="DM Sans">
                {frac === 0 ? '$0' : fmtCompactSignedMoney(dollars, 1)}
              </text>
            </g>
          );
        })}
        {Number.isFinite(refY) && (
          <g>
            <line
              x1={padL}
              x2={W - padR}
              y1={yPos(refY)}
              y2={yPos(refY)}
              stroke="rgba(96,165,250,0.85)"
              strokeDasharray="4 4"
            />
            <text x={W - padR + 4} y={yPos(refY) + 3} textAnchor="start" fontSize="10" fill="rgba(96,165,250,0.85)" fontFamily="DM Sans">
              prior close ({latestRealizedDate || '—'}): {fmtCompactSignedMoney(refY)}
            </text>
          </g>
        )}
        {visibleTrajectories.map((t) => (
          <g key={`tr-${t.key}`}>
            <polyline
              fill="none"
              stroke={t.color}
              strokeWidth={t.key === 'blend' ? 1.8 : 1.2}
              strokeLinejoin="round"
              strokeLinecap="round"
              strokeDasharray={t.key === 'blend' ? undefined : '3 3'}
              points={t.pts.map(({ p, v }) => `${xPos(p.minutes_to_close).toFixed(2)},${yPos(v).toFixed(2)}`).join(' ')}
            />
            {t.pts.map(({ p, v }, i) => (
              <circle
                key={`pt-${t.key}-${i}`}
                cx={xPos(p.minutes_to_close)}
                cy={yPos(v)}
                r={t.key === 'blend' ? 2.4 : 1.6}
                fill={t.color}
              >
                <title>{`${t.label} · ${p.as_of || ''} (${p.minutes_to_close}m to close): ${fmtSignedMoney(v)}`}</title>
              </circle>
            ))}
          </g>
        ))}
        {xTicks.map((m) => (
          <text key={`gx-${m}`} x={xPos(m)} y={H - 10} textAnchor="middle" fontSize="11" fill="#8b9cbb" fontFamily="DM Sans">
            {m}m to close
          </text>
        ))}
      </svg>
      <div className="backtest-chart-legend">
        {visibleTrajectories.map((t) => (
          <span key={`lg-${t.key}`}>
            <span className="backtest-legend-dot" style={{ background: t.color }} />
            {t.label}
          </span>
        ))}
        {Number.isFinite(refY) && (
          <span><span className="backtest-legend-dot" style={{ background: 'rgba(96,165,250,0.85)' }} />Prior-close realised</span>
        )}
      </div>
    </div>
  );
}

                      ) : null}

      </div>

      <div className="scenario-card">
        <div className="scenario-head">
          <div>
            <div className="scenario-title">Underlying rollup (synthetic pair hedge)</div>

const fmtCategoryLabel = (cat) => {
  const hit = NEWS_CATEGORIES.find(c => c.key === cat);
  return hit ? hit.label : (cat || 'Other').replace(/_/g, ' ');
};

const fmtRelativeTime = (iso) => {
  if (!iso) return '—';
  const then = new Date(iso).getTime();
  if (!Number.isFinite(then)) return '—';
  const now = Date.now();
  const diffMs = now - then;
  if (diffMs < 0) return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  const min = Math.floor(diffMs / 60000);
  if (min < 1) return 'just now';
  if (min < 60) return `${min}m ago`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}h ago`;
  const day = Math.floor(hr / 24);
  if (day < 14) return `${day}d ago`;
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
};

const fmtEventDate = (iso) => {
  if (!iso) return '—';
  const d = new Date(iso + (iso.length === 10 ? 'T00:00:00Z' : ''));
  if (!Number.isFinite(d.getTime())) return iso;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
};

  const s = String(dateStr);

};

// ── YieldBOOST σ-space Edge Ranking page ───────────────────────────────────
//
// Headline analytical view across the entire YB universe. Reads
// `data/vrp_live.json` (33 sleeves × 16 new derived metrics) plus
// `data/event_calendar_combined.json` (Nasdaq → Yahoo → seed → projected
// earnings dates). Renders a single sortable table ranked by σ-space
// edge (iv_full_sleeve − breakeven_σ) with signal classification, weekly
// $-P&L estimate, gamma/theta, and an earnings-in-window badge.
//
// Signal buckets (σ-space):
//   ≥ +30pp  STRONG SELL  (market massively overpaying for the spread)
//   ≥ +10pp  sell         (clean short-vol edge)
//   ≥   0pp  lean sell    (positive edge, small)
//   ≥ -10pp  lean avoid   (slightly negative edge)
//        else AVOID       (market significantly underpaying expected loss --
//                           selling would be a structural carry tax)
function YbEdgePage({ onNavigateToChart, onBack, eventCalendar = null, vrpFieldDict = null }) {
  const [vrpLive, setVrpLive] = useState(null);
  const [vrpHealth, setVrpHealth] = useState(null);
  const [loadError, setLoadError] = useState(null);
  // Default sort: the accurate, relative SHORT-the-ETF edge from the screener
  // (net_edge_p50_annual, edge_sign_convention = short_favorable_positive).
  // This is annualized and comparable across names. The put-spread vol edge
  // (edge_pp_of_max_loss) is a secondary overlay — sortable, but never the
  // default headline, because its units (% of a 1-week spread max-loss) are
  // not comparable across sleeves and it measures the fund's hedge, not the
  // edge of shorting the fund.
  const [sortKey, setSortKey] = useState('net_edge_p50_annual');
  const [sortDesc, setSortDesc] = useState(true);
  // Filters: default to A/B grade only (tradeable today). C is monitor-only;
  // D is display-only and hidden unless the operator opens the full view.
  const [includeGradeC, setIncludeGradeC] = useState(true);
  const [includeGradeD, setIncludeGradeD] = useState(false);
  const [filterEarningsOnly, setFilterEarningsOnly] = useState(false);
  const [shortableOnly, setShortableOnly] = useState(false);
  // Column-group collapse: nothing is removed — tiers ② (carry decomposition)
  // and ③ (vol overlay) collapse to keep the unbiased ranking leading while
  // every field stays one click away.
  const [collapseCarry, setCollapseCarry] = useState(false);
  const [collapseOverlay, setCollapseOverlay] = useState(true);
  const fieldHint = (key) => VrpUi.hintFor(key, vrpFieldDict);

  useEffect(() => {
    let cancelled = false;
    const cacheBust = `?t=${Math.floor(Date.now() / 60000)}`;
    Promise.all([
      fetch(`data/vrp_live.json${cacheBust}`, { cache: 'no-store' })
        .then((r) => (r.ok ? r.json() : null))
        .catch(() => null),
      fetch(`data/vrp_health.json${cacheBust}`, { cache: 'no-store' })
        .then((r) => (r.ok ? r.json() : null))
        .catch(() => null),
    ]).then(([live, health]) => {
      if (cancelled) return;
      if (!live) {
        setLoadError('vrp_live.json unavailable');
      } else {
        setVrpLive(live);
      }
      if (health) setVrpHealth(health);
    });
    return () => { cancelled = true; };
  }, []);

  // Build {underlying → next event} from combined calendar (front-most first).
  const earningsByUnderlying = useMemo(() => {
    const m = {};
    const items = (eventCalendar?.items) || [];
    // Sort by date asc so earliest wins
    const sorted = [...items]
      .filter((it) => String(it.event_type || '').toLowerCase() === 'earnings')
      .sort((a, b) => String(a.event_date).localeCompare(String(b.event_date)));
    for (const it of sorted) {
      const u = String(it.underlying || '').toUpperCase();
      if (!u || m[u]) continue;
      m[u] = {
        eventDate: it.event_date,
        confirmation: it.confirmation || 'unknown',
        historicalMovePctMad: it.historical_move_pct_mad,
        source: it.source,
      };
    }
    return m;
  }, [eventCalendar]);

  const enriched = useMemo(() => {
    const rows = (vrpLive?.rows) || [];
    const today = new Date();
    today.setUTCHours(0, 0, 0, 0);
    return rows.map((r) => {
      const u = String(r.underlying || '').toUpperCase();
      const ev = earningsByUnderlying[u] || null;
      let daysToEarnings = null;
      let eventInHeldWindow = false;
      if (ev?.eventDate) {
        const eDate = new Date(ev.eventDate + 'T00:00:00Z');
        daysToEarnings = Math.round((eDate.getTime() - today.getTime()) / 86400000);
        if (r.expiry) {
          const hDate = new Date(r.expiry + 'T00:00:00Z');
          if (eDate <= hDate && eDate >= today) eventInHeldWindow = true;
        }
      }
      // P0b-2: server-side `days_to_event` (from event_calendar_combined.json)
      // is the source of truth when the local prop doesn't have this underlying.
      // Surface it even when the event falls AFTER the held expiry so the
      // trader can see "next earnings in 60d" instead of a bare em-dash on
      // every 0-DTE row.
      if (daysToEarnings == null && Number.isFinite(Number(r.days_to_event))) {
        daysToEarnings = Number(r.days_to_event);
        eventInHeldWindow = !!r.event_in_held_horizon;
      }
      // Implied event move (if both base & full IV known, sleeve scale).
      // The fraction of variance attributed to the event over the held horizon
      // is the difference of variances; we report the implied 1σ move on the
      // underlying for the event day specifically.
      const ivFull = Number(r.iv_full_proxy);
      const ivBase = Number(r.iv_base_proxy);
      const dte = Math.max(1, Number(r.days_to_exp) || 1);
      let impliedEventMovePct = null;
      if (Number.isFinite(ivFull) && Number.isFinite(ivBase) && ivFull > ivBase) {
        const varFull = ivFull * ivFull * (dte / 252);
        const varBase = ivBase * ivBase * (dte / 252);
        const eventVar = Math.max(0, varFull - varBase);
        const eventSigmaUnderlying = Math.sqrt(eventVar) / 2; // beta=2 inversion
        impliedEventMovePct = eventSigmaUnderlying * 100;
      }
      // Weekly $-P&L estimate per 1 spread structure ($-carry per OCC contract)
      // is now produced server-side as `expected_weekly_carry_usd` from the
      // chosen pricing kernel's fair value (not from Black-Scholes).
      const fr = VrpUi.rowFreshness(r);
      return {
        ...r,
        days_to_earnings: daysToEarnings,
        event_in_held_window: eventInHeldWindow,
        earnings_event_date: ev?.eventDate || null,
        earnings_confirmation: ev?.confirmation || null,
        earnings_historical_move_mad: ev?.historicalMovePctMad ?? null,
        implied_event_move_pct_underlying: impliedEventMovePct,
        _freshness: fr,
        _block_signal: fr.blockSignal,
      };
    });
  }, [vrpLive, earningsByUnderlying]);

  const filtered = useMemo(() => {
    let out = enriched;
    // Grade gating: A/B always shown; C optional (default on); D optional (default off).
    out = out.filter((r) => {
      const g = String(r.data_grade || '').toUpperCase();
      if (g === 'A' || g === 'B') return true;
      if (g === 'C') return includeGradeC;
      return includeGradeD; // 'D' or unknown
    });
    if (filterEarningsOnly) {
      out = out.filter((r) => r.event_in_held_window);
    }
    if (shortableOnly) {
      out = out.filter((r) => r.short_directly_shortable !== false);
    }
    return out;
  }, [enriched, includeGradeC, includeGradeD, filterEarningsOnly, shortableOnly]);

  // Resolve derived (non-numeric-field) sort keys to a comparable number so the
  // tiered headers can all sort. Everything else falls back to the raw field.
  const sortValueFor = (r, key) => {
    switch (key) {
      case 'short_signal_rank': {
        const sig = VrpUi.shortSignalFor(r.net_edge_p50_annual, r.net_edge_p05_annual,
          { shortable: r.short_directly_shortable !== false });
        const order = { top: 5, good: 4, thin: 3, nolocate: 2, skip: 1, none: -1 };
        return (order[sig.tier] ?? -1) * 1000 + (Number(r.net_edge_p50_annual) || 0);
      }
      case 'net_edge_band':
        return r.net_edge_p05_annual; // sort the band by its lower bound (robustness)
      case 'sync_rank':
        return r.quote_sync && r.quote_sync.sync_ok === true ? 1
          : (r.quote_sync && r.quote_sync.sync_ok === false ? -1 : 0);
      case 'short_directly_shortable':
        return r.short_directly_shortable === true ? 1
          : (r.short_directly_shortable === false ? -1 : 0);
      case 'short_align_rank':
        return (r.short_thesis_alignment && r.short_thesis_alignment.alignmentPp != null)
          ? r.short_thesis_alignment.alignmentPp : null;
      case 'signal':
        return r.edge_pp_of_max_loss;
      default:
        return r[key];
    }
  };

  const sorted = useMemo(() => {
    const out = [...filtered];
    const cmp = (a, b) => {
      const va = sortValueFor(a, sortKey);
      const vb = sortValueFor(b, sortKey);
      const an = (va == null || !Number.isFinite(Number(va))) ? null : Number(va);
      const bn = (vb == null || !Number.isFinite(Number(vb))) ? null : Number(vb);
      if (an == null && bn == null) return 0;
      if (an == null) return 1; // nulls last
      if (bn == null) return -1;
      return sortDesc ? bn - an : an - bn;
    };
    out.sort(cmp);
    return out;
  }, [filtered, sortKey, sortDesc]);

  const skewColor = (skew) => {
    const v = Number(skew);
    if (!Number.isFinite(v)) return 'var(--text-muted)';
    if (v <= 7) return 'var(--text-muted)';
    if (v <= 21) return '#f59e0b';
    return '#ef4444';
  };

  const Th = ({ k, label, hint, align = 'right', width = null }) => (
    <th
      title={hint}
      onClick={() => {
        if (sortKey === k) setSortDesc((d) => !d);
        else { setSortKey(k); setSortDesc(true); }
      }}
      style={{
        textAlign: align,
        cursor: 'pointer',
        userSelect: 'none',
        whiteSpace: 'nowrap',
        padding: '6px 8px',
        borderBottom: '1px solid var(--border)',
        position: 'sticky',
        top: 0,
        background: 'var(--bg-card)',
        zIndex: 1,
        width: width != null ? width : 'auto',
      }}
    >
      {label}{sortKey === k ? (sortDesc ? ' ↓' : ' ↑') : ''}
    </th>
  );

  const GroupTh = ({ span, label, bg }) => (
    <th
      colSpan={span}
      style={{
        textAlign: 'left',
        padding: '4px 8px',
        fontSize: 10,
        textTransform: 'uppercase',
        letterSpacing: 0.5,
        color: 'var(--text-muted)',
        background: bg || 'transparent',
        borderBottom: '1px solid var(--border)',
        position: 'sticky',
        top: 0,
        zIndex: 2,
        whiteSpace: 'nowrap',
      }}
    >{label}</th>
  );

  if (loadError && !vrpLive) {
    return (
      <div style={{ padding: 20 }}>
        <button onClick={onBack} className="topbar-btn" style={{ marginBottom: 12 }}>← Back</button>
        <div className="scenario-warning">{loadError}</div>
      </div>
    );
  }

  if (!vrpLive) {
    return (
      <div style={{ padding: 20 }}>
        <div className="scenario-sub">Loading YB edge ranking…</div>
      </div>
    );
  }

  return (
    <div style={{ padding: '16px 20px', maxWidth: '100%' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 12 }}>
        <button onClick={onBack} className="topbar-btn">← Back</button>
        <h1 style={{ margin: 0, fontSize: 20 }}>YieldBOOST · Most attractive shorts</h1>
      </div>
      <div className="scenario-sub" style={{ marginBottom: 12, lineHeight: 1.45, maxWidth: 920 }}>

        <strong> Locate only</strong> for actionable names. Expand <strong>Fund hedge</strong> for Granite&apos;s put-spread context only.
      </div>

      {/* Filters */}
      <div style={{ display: 'flex', gap: 14, alignItems: 'center', marginBottom: 12, fontSize: 13 }}>
        <label style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer' }}>
          <input type="checkbox" checked={includeGradeC} onChange={(e) => setIncludeGradeC(e.target.checked)} />

        </label>
        <label style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer' }}>
          <input type="checkbox" checked={includeGradeD} onChange={(e) => setIncludeGradeD(e.target.checked)} />
          Show D (stale)
        </label>
        <label style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer' }}>
          <input type="checkbox" checked={filterEarningsOnly} onChange={(e) => setFilterEarningsOnly(e.target.checked)} />

        </label>
        <label style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer' }}>
          <input type="checkbox" checked={shortableOnly} onChange={(e) => setShortableOnly(e.target.checked)} />
          Locate only

        <span style={{ color: 'var(--text-muted)' }}>·</span>
        <button
          className="topbar-btn"
          style={{ fontSize: 12, padding: '2px 8px' }}

        <button

        <div style={{ color: 'var(--text-muted)', marginLeft: 'auto' }}>

                    {fresh.label}
                  </td>
                  <td style={{ padding: '5px 8px', textAlign: 'center', fontWeight: 600,
                      color: shortable === true ? '#10b981' : (shortable === false ? '#ef4444' : 'var(--text-muted)') }}

                  </td>

                  {!collapseCarry && (
                    <td style={{ padding: '5px 8px', textAlign: 'right', color: '#10b981' }}

                  {!collapseCarry && (

                      {borrowDisp.text}

                  {!collapseCarry && (
                    <td style={{ padding: '5px 8px', textAlign: 'right', color: r.income_distributions_annual != null ? '#ef4444' : 'var(--text-muted)' }}

                      {r.income_distributions_annual != null ? VrpUi.fmtPctAnnual(r.income_distributions_annual) : '—'}
                    </td>

                  {/* ③ Fund hedge */}
                  {collapseOverlay ? (
                    <td style={{ padding: '5px 8px', whiteSpace: 'nowrap' }} title={vsModelTitle}>

                  ) : (
                    <React.Fragment>

                        {hedgeRich.label}
                      </td>
                      <td style={{
                        padding: '5px 8px', whiteSpace: 'nowrap',
                        color: edgePp == null ? 'var(--text-muted)' : VrpUi.edgeColor(edgePp),

                      }} title={vsModelTitle}>
                        {VrpUi.fmtEdgePp(edgePp)}
                        {align.label !== '—' ? <span style={{ marginLeft: 6, color: align.color, fontWeight: 500 }}>· {align.label}</span> : null}
                      </td>
                      <td style={{ padding: '5px 8px', textAlign: 'right', fontFamily: 'JetBrains Mono, monospace', fontSize: 11 }}
                          title={fmTitle}>
                        {r.model_fair != null ? Number(r.model_fair).toFixed(3) : '—'}
                        {' / '}
                        {r.spread_mid_market != null ? Number(r.spread_mid_market).toFixed(3) : '—'}
                      </td>
                      <td style={{ padding: '5px 8px', textAlign: 'right' }}
                          title={`Long leg IV ${r.iv_put_long != null ? (Number(r.iv_put_long) * 100).toFixed(1) + '%' : '—'} · Short leg IV ${r.iv_put_short != null ? (Number(r.iv_put_short) * 100).toFixed(1) + '%' : '—'} · Source ${r.iv_source || '—'} · Skew ${r.iv_expiry_skew_days != null ? r.iv_expiry_skew_days + 'd' : '?'}`
                            + (r.iv_synthesis ? `\nHeld-expiry IV method: ${r.iv_synthesis.method}`
                                + (r.iv_synthesis.sleeve_interp_expiries ? ` (interp ${r.iv_synthesis.sleeve_interp_expiries.join(' → ')})` : '')
                                + (r.iv_synthesis.underlying_skew_days != null ? ` · underlying expiry skew ${r.iv_synthesis.underlying_skew_days}d` : '')
                                + (r.iv_synthesis.iv_underlying_derived != null ? ` · underlying-derived IV ${(r.iv_synthesis.iv_underlying_derived * 100).toFixed(1)}%` : '') : '')
                            + (r.iv_disagreement_pct != null ? `\nSleeve vs underlying IV disagreement: ${(r.iv_disagreement_pct * 100).toFixed(0)}%${r.iv_disagreement_pct > 0.35 ? ' (capped at C)' : ''}` : '')}>
                        {r.iv_full_proxy != null ? `${(r.iv_full_proxy * 100).toFixed(1)}%` : '—'}
                        {r.iv_term_interp ? <span style={{ color: '#888', fontSize: '0.8em' }} title="Variance-time interpolated to held expiry"> ⇄</span> : null}
                      </td>
                      <td style={{
                        padding: '5px 8px', textAlign: 'right',
                        color: r.dollar_gamma_per_1pct_underlying != null && r.dollar_gamma_per_1pct_underlying < 0
                          ? '#ef4444' : undefined,
                      }} title={r.greeks_kernel === 'bs_proxy'
                        ? 'Greeks via BS finite-diff at sleeve IV (fallback — no kernel converged).'
                        : `Greeks via finite-diff on ${String(r.greeks_kernel || 'kernel').toUpperCase()} model_fair.`}>
                        {r.dollar_gamma_per_1pct_underlying != null ? Number(r.dollar_gamma_per_1pct_underlying).toFixed(3) : '—'}
                      </td>
                      <td style={{
                        padding: '5px 8px', textAlign: 'right',
                        color: r.theta_per_day != null && r.theta_per_day > 0 ? '#10b981' : undefined,
                      }}>
                        {r.theta_per_day != null
                          ? (Number(r.theta_per_day) >= 0 ? '+' : '') + Number(r.theta_per_day).toFixed(3)
                          : '—'}
                      </td>
                      <td style={{ padding: '5px 8px', textAlign: 'right' }}
                          title={fieldHint('expected_weekly_carry_usd')}>
                        {VrpUi.fmtUsd(r.expected_weekly_carry_usd)}
                      </td>
                      <td style={{ padding: '5px 8px', textAlign: 'right' }}>{r.days_to_exp ?? '—'}</td>
                      <td style={{ padding: '5px 8px', textAlign: 'right' }}>
                        {r.days_to_earnings != null ? (
                          <span style={{
                            padding: r.event_in_held_window ? '1px 6px' : 0,
                            borderRadius: r.event_in_held_window ? 8 : 0,
                            background: r.event_in_held_window ? 'rgba(239,68,68,0.20)' : 'transparent',
                            color: r.event_in_held_window ? '#ef4444'
                              : eventRich != null && Number(eventRich) >= 0.30 ? '#10b981'
                              : eventRich != null && Number(eventRich) <= -0.20 ? '#ef4444'
                              : 'var(--text-muted)',
                            fontWeight: (r.event_in_held_window || eventRich != null) ? 600 : 400,
                          }}
                          title={eventHover}
                          >{r.days_to_earnings}d{eventRich != null
                            ? ` · ${(Number(eventRich) >= 0 ? '+' : '') + (Number(eventRich) * 100).toFixed(0)}%`
                            : ''}</span>
                        ) : '—'}
                      </td>
                    </React.Fragment>
                  )}
                </tr>
              );
            })}
            {sorted.length === 0 && (
              <tr><td colSpan={8 + (collapseCarry ? 0 : 3) + (collapseOverlay ? 1 : 9)} style={{ padding: 16, textAlign: 'center', color: 'var(--text-muted)' }}>
                No rows match current filters.
              </td></tr>
            )}
          </tbody>
        </table>
      </div>

      <ul style={{ marginTop: 12, paddingLeft: 18, fontSize: 11, color: 'var(--text-muted)', lineHeight: 1.55, maxWidth: 720 }}>
        <li>Sort by <strong>Short edge %/yr</strong> — best shorts of the fund (annual, comparable).</li>
        <li><strong>Locate = no</strong> → <em>No locate</em>; edge can assume 0% borrow (see Borrow tooltip).</li>
        <li><strong>Fund hedge</strong> — rich / fair / cheap; <em>hurts</em> / <em>helps</em> = tilt on your short (context only).</li>
      </ul>
    </div>
  );
}

function NewsPage({
  eventsPayload,
  newsPayload,
  loadError,
  bucketOf,
  onNavigateToChart,
}) {
  const events = useMemo(() => eventsPayload?.events || [], [eventsPayload]);
  const items = useMemo(() => newsPayload?.items || [], [newsPayload]);

  const [category, setCategory] = useState('all');
  // Default to full window: corporate-action headlines are sparse (especially on free-tier
  // Polygon), and most split events are older than 30 days — a narrow default hid them all.
  const [windowKey, setWindowKey] = useState('all');
  const [sortKey, setSortKey] = useState('published_desc');
  const [search, setSearch] = useState('');
  const [onlyHighConfidence, setOnlyHighConfidence] = useState(true);
  const [hideInferredOnly, setHideInferredOnly] = useState(true);
  const [groupByTickerCategory, setGroupByTickerCategory] = useState(true);
  const [expandedGroups, setExpandedGroups] = useState({});

  const activeWindow = NEWS_TIME_WINDOWS.find(w => w.key === windowKey) || NEWS_TIME_WINDOWS[3];
  const cutoffMs = activeWindow.days == null ? -Infinity : Date.now() - activeWindow.days * 86400_000;

  const eventsById = useMemo(() => {
    const m = {};
    events.forEach(e => { if (e.id) m[e.id] = e; });
    return m;
  }, [events]);

  // Structured events (splits, delistings, …) share the same category + time window as
  // headlines so historical splits are visible when Window = All available.
  const { structuredMatchCount, filteredStructuredEvents } = useMemo(() => {
    let out = events.filter(ev => (category === 'all' ? true : ev.type === category));
    if (activeWindow.days != null) {
      out = out.filter(ev => corporateEventMs(ev) >= cutoffMs);
    }
    const matchCount = out.length;
    out.sort((a, b) => corporateEventMs(b) - corporateEventMs(a));
    return { structuredMatchCount: matchCount, filteredStructuredEvents: out.slice(0, 100) };
  }, [events, category, windowKey, activeWindow.days, cutoffMs]);

  const filteredItems = useMemo(() => {
    const s = (search || '').trim().toLowerCase();
    let out = items.filter(it => {
      if (category !== 'all' && it.category !== category) return false;
      if (activeWindow.days != null) {
        const t = it.published_utc ? new Date(it.published_utc).getTime() : 0;
        if (!Number.isFinite(t) || t < cutoffMs) return false;
      }
      if (s) {
        const hay = `${it.title || ''} ${it.summary || ''} ${(it.tickers || []).join(' ')}`.toLowerCase();
        if (!hay.includes(s)) return false;
      }
      if (onlyHighConfidence && Number.isFinite(it.confidence) && Number(it.confidence) < 0.8) return false;
      if (hideInferredOnly && (it.match_tier || '') === 'inferred') return false;
      return true;
    });

    const priorityOf = (c) => (NEWS_CATEGORIES.find(nc => nc.key === c)?.priority ?? 0);
    const pubMs = (iso) => (iso ? new Date(iso).getTime() : 0);
    out.sort((a, b) => {
      switch (sortKey) {
        case 'published_asc':  return pubMs(a.published_utc) - pubMs(b.published_utc);
        case 'priority':
          return (priorityOf(b.category) - priorityOf(a.category))
              || (pubMs(b.published_utc) - pubMs(a.published_utc));
        case 'ticker':
          return ((a.tickers?.[0] || '').localeCompare(b.tickers?.[0] || ''))
              || (pubMs(b.published_utc) - pubMs(a.published_utc));
        case 'published_desc':
        default:               return pubMs(b.published_utc) - pubMs(a.published_utc);
      }
    });
    return out;
  }, [items, category, windowKey, sortKey, search, onlyHighConfidence, hideInferredOnly]);

  const groupedHeadlines = useMemo(() => {
    const groups = {};
    for (const it of filteredItems) {
      const ticker = (it.tickers?.[0] || '').toUpperCase();
      const cat = it.category || 'other';
      const key = `${cat}::${ticker || 'UNKNOWN'}`;
      if (!groups[key]) groups[key] = { key, category: cat, ticker, items: [] };
      groups[key].items.push(it);
    }
    const rankTier = (t) => ({ explicit: 3, high: 2, inferred: 1 }[t] || 0);
    const pubMs = (iso) => (iso ? new Date(iso).getTime() : 0);
    const out = Object.values(groups).map(g => {
      g.items.sort((a, b) => pubMs(b.published_utc) - pubMs(a.published_utc));
      g.primary = [...g.items].sort((a, b) => (
        (rankTier(b.match_tier) - rankTier(a.match_tier))
        || ((Number(b.confidence) || 0) - (Number(a.confidence) || 0))
        || (pubMs(b.published_utc) - pubMs(a.published_utc))
      ))[0] || g.items[0];
      g.sourceCount = g.items.reduce((acc, it) => acc + (Number(it.source_count) > 0 ? Number(it.source_count) : 1), 0);
      g.publishers = Array.from(new Set(g.items.flatMap(it => it.source_publishers || (it.publisher ? [it.publisher] : []))));
      return g;
    });
    out.sort((a, b) => pubMs(b.primary?.published_utc) - pubMs(a.primary?.published_utc));
    return out;
  }, [filteredItems]);

  // Chip counts reflect everything the page actually renders for that category:
  // structured corporate-action events + classified news headlines.  The old
  // version counted only `items`, so e.g. "Reverse Split 1" was shown while the
  // page simultaneously listed 87 structured reverse-split events below the
  // chip — a confusing "count doesn't match what I see" discrepancy.
  const categoryCounts = useMemo(() => {
    const c = { all: events.length + items.length };
    events.forEach(ev => {
      const k = ev.type || 'other';
      c[k] = (c[k] || 0) + 1;
    });
    items.forEach(it => {
      const k = it.category || 'other';
      c[k] = (c[k] || 0) + 1;
    });
    return c;
  }, [events, items]);

  const buildTime = eventsPayload?.build_time || newsPayload?.build_time;
  const isSeed = !buildTime || buildTime.startsWith('1970');
  const hasAnyData = (events.length + items.length) > 0;

  return (
    <div className="news-page">
      <div className="news-header">
        <div>
          <div className="news-title">
            <span className="news-title-accent" />
            News & Corporate Actions
          </div>
          <div className="news-subtitle">
            Splits, delists, ticker changes, M&A — all tracked ETFs
          </div>
        </div>
        <div className="news-meta">
          {buildTime && !isSeed && <span>Last refresh <b>{fmtRelativeTime(buildTime)}</b></span>}
          <span>Events <b>{events.length}</b></span>
          <span>
            Headlines <b>{filteredItems.length}</b> shown
            {filteredItems.length !== items.length && (
              <span> · {items.length} loaded</span>
            )}
          </span>
        </div>
      </div>

      {loadError && (
        <div className="news-error-banner">
          {loadError}. Workflow fills <code>data/corporate_actions.json</code> + <code>data/etf_news.json</code> every 6h.
        </div>
      )}

      {/* Toolbar */}
      <div className="news-toolbar">
        <div className="news-chips">
          {NEWS_CATEGORIES.map(c => (
            <div
              key={c.key}
              className={cls('news-chip', category === c.key && 'active', c.key !== 'all' && `cat-${c.key}`)}
              onClick={() => setCategory(c.key)}
            >
              {c.label}
              <span className="count">{categoryCounts[c.key] ?? 0}</span>
            </div>
          ))}
        </div>
        <div className="news-toolbar-divider" />
        <span className="news-toolbar-label">Window</span>
        <select
          className="news-select"
          value={windowKey}
          onChange={e => setWindowKey(e.target.value)}
        >
          {NEWS_TIME_WINDOWS.map(w => (
            <option key={w.key} value={w.key}>{w.label}</option>
          ))}
        </select>
        <div className="news-toolbar-right">
          <span className="news-toolbar-label">Sort</span>
          <select
            className="news-select"
            value={sortKey}
            onChange={e => setSortKey(e.target.value)}
          >
            {NEWS_SORTS.map(s => (
              <option key={s.key} value={s.key}>{s.label}</option>
            ))}
          </select>
          <input
            className="news-search"
            placeholder="Search title, summary, ticker…"
            value={search}
            onChange={e => setSearch(e.target.value)}
          />
        </div>
      </div>
      <div className="news-toggles">
        <div
          className={cls('news-toggle', onlyHighConfidence && 'active')}
          onClick={() => setOnlyHighConfidence(v => !v)}
        >
          {onlyHighConfidence ? '[x]' : '[ ]'} Conf ≥ 80%
        </div>
        <div
          className={cls('news-toggle', hideInferredOnly && 'active')}
          onClick={() => setHideInferredOnly(v => !v)}
        >
          {hideInferredOnly ? '[x]' : '[ ]'} Hide inferred tier
        </div>
        <div
          className={cls('news-toggle', groupByTickerCategory && 'active')}
          onClick={() => setGroupByTickerCategory(v => !v)}
        >
          {groupByTickerCategory ? '[x]' : '[ ]'} Group by ticker + category
        </div>
      </div>

      {/* Structured corporate actions (splits, delistings, …) */}
      {filteredStructuredEvents.length > 0 && (
        <div className="pinned-section">
          <div className="pinned-section-title">
            Structured corporate actions · {filteredStructuredEvents.length}
            {structuredMatchCount > filteredStructuredEvents.length
              ? ` of ${structuredMatchCount} (newest 100)`
              : ''}
          </div>
          <div className="pinned-grid">
            {filteredStructuredEvents.map(ev => (
              <PinnedEventCard
                key={ev.id}
                event={ev}
                bucketOf={bucketOf}
                onNavigate={onNavigateToChart}
              />
            ))}
          </div>
        </div>
      )}
      {filteredStructuredEvents.length === 0 && events.length > 0 && (
        <div className="news-empty" style={{ marginBottom: 18, padding: '22px 18px' }}>
          <div className="news-empty-title">{events.length} structured events loaded</div>
          <div>
            Widen filters: category <b>All</b>, window <b>All available</b> — most splits are older than 30–60d.
          </div>
        </div>
      )}

      {/* News feed */}
      <div className="news-feed-title">
        Related Headlines · {groupByTickerCategory ? groupedHeadlines.length : filteredItems.length} of {items.length}
      </div>
      {(groupByTickerCategory ? groupedHeadlines.length === 0 : filteredItems.length === 0) ? (
        <div className="news-empty">
          <div className="news-empty-icon">◉</div>
          <div className="news-empty-title">
            {isSeed && !hasAnyData
              ? 'No data yet — first scheduled refresh pending'
              : 'No matching news in this window'}
          </div>
          <div>
            {isSeed && !hasAnyData
              ? 'Workflow `update-corporate-actions.yml` runs every 6h — first payload pending.'
              : 'Widen window, clear search, or pick All categories.'}
          </div>
        </div>
      ) : (
        groupByTickerCategory ? (
          <div className="news-group-list">
            {groupedHeadlines.map(g => {
              const primary = g.primary || g.items[0];
              const exp = !!expandedGroups[g.key];
              return (
                <div key={g.key} className="news-group">
                  <div
                    className="news-group-head"
                    onClick={() => setExpandedGroups(prev => ({ ...prev, [g.key]: !prev[g.key] }))}
                  >
                    <div className="news-group-main">
                      <div className="news-group-title">
                        <span className={cls('cat-badge', `cat-${g.category || 'other'}`)}>{fmtCategoryLabel(g.category)}</span>
                        {g.ticker && <NewsTickerChip symbol={g.ticker} bucketOf={bucketOf} onNavigate={onNavigateToChart} />}
                        {primary?.match_tier && (
                          <span className={cls('tier-badge', `tier-${primary.match_tier}`)} style={{ display: 'inline-flex' }} title="explicit = issuer text; high = model sure; inferred = weak match">
                            {primary.match_tier}
                          </span>
                        )}
                      </div>
                      <div className="news-group-meta">
                        <span>{fmtRelativeTime(primary?.published_utc)}</span>
                        <span>conf {Math.round((Number(primary?.confidence) || 0) * 100)}%</span>
                        <span title={(g.publishers || []).join(', ')}>{g.sourceCount} sources</span>
