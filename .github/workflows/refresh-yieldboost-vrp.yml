name: Refresh YieldBOOST VRP

# Targeted YieldBOOST sleeve options + vrp_live.json / vrp_health.json.
# Refreshes all sleeve symbols each run (~40) without waiting for bucket-3 sharding.

on:
  schedule:
    - cron: "*/5 * * * 1-5"  # every 5 min on UTC weekdays
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "yieldboost-vrp"
  cancel-in-progress: false

jobs:
  refresh-yieldboost-vrp:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY || secrets.POLYGON_IO_API_KEY }}
      TRADIER_TOKEN: ${{ secrets.TRADIER_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh YieldBOOST sleeve options + VRP panel
        env:
          POLYGON_API_KEY: ${{ env.POLYGON_API_KEY }}
          TRADIER_TOKEN: ${{ env.TRADIER_TOKEN }}
          YIELDBOOST_OPTIONS_MAX_SYMBOLS: "40"
          OPTIONS_SYMBOLS_PER_RUN: "40"
          OPTIONS_SHARD_COUNT: "1"
          OPTIONS_SHARD_INTERVAL_MINUTES: "5"
          OPTIONS_ACCUMULATE_CACHE: "1"
          OPTIONS_INCLUDE_YIELDBOOST: "1"
          OPTIONS_ONLY_BUCKET3: "0"
          POLYGON_MAX_REQUESTS_PER_MINUTE: "25"
          POLYGON_MAX_TOTAL_REQUESTS: "120"
          POLYGON_MAX_SNAPSHOT_PAGES_PER_SYMBOL: "2"
          POLYGON_CHAIN_MAX_EXPIRIES: "8"
          POLYGON_CHAIN_STRIKE_BAND_PCT: "0.35"
          OPTIONS_REFRESH_SLEEP_MS: "200"
        run: python scripts/build_data.py --yieldboost-vrp-only

      - name: VRP pipeline diagnostics
        run: python scripts/vrp_pipeline_diagnostics.py --require-vrp-file --fail-on-missing-vrp-when-spreads

      - name: Commit data if changed
        uses: ./.github/actions/commit-data
        with:
          files: >-
            data/options_cache.json
            data/vrp_live.json
            data/vrp_health.json
            data/yieldboost_put_spreads_latest.json
            data/yieldboost_options_target.json
          commit_message: "chore: refresh YieldBOOST VRP"
