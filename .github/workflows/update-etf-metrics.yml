name: Update ETF Metrics Daily

on:
  schedule:
    # Run Tue-Sat at 6:00 AM ET (handles both EDT and EST).
    #   ET 6 AM = 10:00 UTC during EDT (Mar-Nov) / 11:00 UTC during EST (Nov-Mar)
    #
    # Schedule rationale (see README: docs/etf-metrics-freshness.md):
    #   Trading day T's EOD metrics become available at these times:
    #     - AXS / Tradr (NSDEAXS2.MMDDYYYY.csv)         : T   ~18:00 ET (same day)
    #     - ProShares   (historical_nav.csv)           : T   ~21:00 ET (same day)
    #     - Direxion    (per-ticker holdings CSV)      : T+1 ~05:00 ET
    #     - Roundhill   (FilepointRoundhill DailyNAV)  : T   ~EOD    (same day)
    #     - YieldMax    (HTML fund-info-table)         : T   ~EOD    (same day)
    #     - REX Shares  (HTML fund-details table)      : T   ~EOD    (same day)
    #     - Polygon     (v2/aggs/ticker)               : T+1 ~04:00 ET
    #     - yfinance    (fast_info/info)               : T+1 morning
    #
    #   Running at T+1 06:00 ET means every provider has had at least 1 hour to publish.
    #   Day-of-week set to 2-6 (Tue-Sat) so:
    #     Tue -> Mon EOD,  Wed -> Tue EOD, Thu -> Wed EOD,
    #     Fri -> Thu EOD,  Sat -> Fri EOD
    #   Sunday and Monday are skipped (no new trading-day data since Friday's close).
    - cron: "0 10 * * 2-6"
    - cron: "0 11 * * 2-6"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "etf-metrics-refresh"
  cancel-in-progress: true

jobs:
  refresh-etf-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY || secrets.POLYGON_IO_API_KEY }}
      # Issuer feeds (ProShares bulk CSV, Direxion per-ticker CSV, AXS/Tradr) take the bulk of
      # traffic now. Keep timeouts generous so we don't abort mid-request on transient stalls.
      ETF_METRICS_HTTP_TIMEOUT_SEC: "30"
      ETF_METRICS_HTTP_RETRY_TOTAL: "3"
      ETF_METRICS_HTTP_RETRY_BACKOFF: "0.5"
      ETF_METRICS_MAX_STALE_BUSINESS_DAYS: "3"
      # Scheduled runs only: skip a full re-pull if we already ingested the target trading day
      # for the full universe within this many hours (avoids duplicate work when cron overlaps
      # or Actions retries). Manual workflow_dispatch sets 0 via the expression below.
      ETF_METRICS_SKIP_IF_RECENT_HOURS: ${{ github.event_name == 'schedule' && '8' || '0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate Polygon key
        run: |
          if [ -z "${POLYGON_API_KEY}" ]; then
            echo "POLYGON_API_KEY (or POLYGON_IO_API_KEY) is missing in repo secrets."
            exit 1
          fi

      - name: Skip duplicate DST slot (run only at 6 AM ET Tue-Sat)
        if: ${{ github.event_name == 'schedule' }}
        run: |
          SLOT=$(python - <<'PY'
          from datetime import datetime
          import pytz
          now_et = datetime.now(pytz.timezone("America/New_York"))
          # dow: Mon=0 ... Sun=6 ; we want Tue(1)..Sat(5)
          print(f"{now_et.hour} {now_et.weekday()}")
          PY
          )
          ET_HOUR=$(echo $SLOT | awk '{print $1}')
          ET_DOW=$(echo $SLOT | awk '{print $2}')
          echo "Current ET hour=$ET_HOUR weekday(0=Mon)=$ET_DOW"
          if [ "$ET_HOUR" != "6" ]; then
            echo "Not 6 AM ET slot; exiting."
            exit 0
          fi
          if [ "$ET_DOW" -lt "1" ] || [ "$ET_DOW" -gt "5" ]; then
            echo "Not a Tue-Sat run (weekday=$ET_DOW); exiting."
            exit 0
          fi

      - name: Ingest ETF metrics
        run: python scripts/ingest_etf_metrics.py --lookback-days 10 --polygon-lookback-days 5

      - name: Backfill historical close prices
        # One yfinance batch call fills close_price for every (date,ticker) row
        # that predates the column. Uses --only-missing (default) so re-runs are
        # no-ops once the store is caught up. Tolerates yfinance outages --
        # failures are logged but non-fatal for the rest of the workflow.
        continue-on-error: true
        run: python scripts/backfill_close_prices.py --chunk 50

      - name: Ingest ETF distribution history
        # Used by the frontend to render a distribution-adjusted ("total return") NAV
        # series alongside raw NAV on the Stats tab -- critical for YieldMax-class
        # option-income ETFs where raw NAV drops on every ex-date.
        run: python scripts/ingest_distributions.py --sleep 0.1

      - name: Print latest metrics status
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          p = Path("data/etf_metrics_latest.json")
          if not p.exists():
              raise SystemExit("Missing data/etf_metrics_latest.json")
          payload = json.loads(p.read_text(encoding="utf-8"))
          latest_date = payload.get("latest_date")
          rows = payload.get("rows", [])
          ok = sum(1 for r in rows if r.get("status") == "ok")
          partial = sum(1 for r in rows if r.get("status") == "partial")
          missing = sum(1 for r in rows if r.get("status") == "missing")
          print(f"latest_date={latest_date} rows={len(rows)} ok={ok} partial={partial} missing={missing}")
          hp = Path("data/etf_metrics_health.json")
          if hp.exists():
              h = json.loads(hp.read_text(encoding="utf-8"))
              print("health.provider_counts=", h.get("latest_provider_counts"))
              print("health.provider_status_counts=", h.get("latest_provider_status_counts"))
              print("health.latest_stale_ok=", h.get("latest_stale_ok"))
              mt = h.get("missing_tickers") or []
              print(f"health.missing_tickers ({len(mt)}):", mt[:30], "..." if len(mt) > 30 else "")
              pt = h.get("partial_tickers") or []
              print(f"health.partial_tickers ({len(pt)}):", pt[:30], "..." if len(pt) > 30 else "")
          PY

      - name: Commit metrics artifacts
        run: |
          BRANCH="${GITHUB_REF_NAME:-main}"
          # Full list of artifacts this workflow *may* produce.  Any individual
          # file can legitimately be missing on a given run (e.g. holdings
          # ingestion fails transiently and etf_holdings_latest.json isn't
          # written).  We filter to only the files that actually exist before
          # calling `git add`, because `git add` on a missing pathspec aborts
          # the whole step and previously dropped committed close_price data
          # with it.
          ALL_FILES="data/etf_metrics_daily.parquet data/etf_metrics_daily.csv data/etf_metrics_daily.json data/etf_metrics_latest.json data/etf_metrics_health.json data/etf_distributions.json data/etf_holdings_daily.parquet data/etf_holdings_daily.csv data/etf_holdings_latest.json"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          EXISTING_FILES=""
          MISSING_FILES=""
          for f in ${ALL_FILES}; do
            if [ -f "$f" ]; then
              EXISTING_FILES="${EXISTING_FILES} $f"
            else
              MISSING_FILES="${MISSING_FILES} $f"
            fi
          done
          if [ -n "${MISSING_FILES}" ]; then
            echo "::warning::Skipping absent artifacts from commit:${MISSING_FILES}"
          fi
          if [ -z "${EXISTING_FILES# }" ]; then
            echo "No ETF metrics artifacts present on disk; nothing to commit."
            exit 0
          fi
          git add ${EXISTING_FILES}
          if git diff --staged --quiet; then
            echo "No ETF metrics changes to commit"
          else
            TMP_DIR="$(mktemp -d)"
            for f in ${EXISTING_FILES}; do
              mkdir -p "${TMP_DIR}/$(dirname "$f")"
              cp "$f" "${TMP_DIR}/$f"
            done
            pushed=0
            for i in 1 2 3; do
              git fetch origin "${BRANCH}"
              git reset --hard || true
              git clean -fd || true
              git checkout -B "${BRANCH}" "origin/${BRANCH}" --force
              ROUND_FILES=""
              for f in ${EXISTING_FILES}; do
                if [ -f "${TMP_DIR}/$f" ]; then
                  mkdir -p "$(dirname "$f")"
                  cp "${TMP_DIR}/$f" "$f"
                  ROUND_FILES="${ROUND_FILES} $f"
                fi
              done
              if [ -z "${ROUND_FILES# }" ]; then
                echo "No files to stage after rebase"
                pushed=1
                break
              fi
              git add ${ROUND_FILES}
              if git diff --staged --quiet; then
                echo "No ETF metrics changes against latest origin"
                pushed=1
                break
              fi
              git commit -m "chore: refresh ETF metrics [$(date -u '+%Y-%m-%d %H:%M UTC')]"
              if git push origin "HEAD:${BRANCH}"; then
                pushed=1
                break
              fi
              git reset --hard "origin/${BRANCH}" || true
              sleep $((i * 5))
            done
            rm -rf "${TMP_DIR}"
            if [ "$pushed" -ne 1 ]; then
              echo "Push failed after retries"
              exit 1
            fi
          fi
