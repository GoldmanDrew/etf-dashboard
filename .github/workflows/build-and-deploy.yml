name: Build Data & Deploy Pages

on:
  # Daily full refresh of universe + analytics + borrow.
  schedule:
    - cron: "30 21 * * 1-5"  # Mon-Fri 21:30 UTC (4:30 PM ET)

  # Run on push to main
  push:
    branches: [main]

  # Allow manual trigger
  workflow_dispatch:

# Sets permissions for GitHub Pages deployment
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY || secrets.POLYGON_IO_API_KEY }}
      TRADIER_TOKEN: ${{ secrets.TRADIER_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate Polygon key
        run: |
          if [ -z "${POLYGON_API_KEY}" ]; then
            echo "POLYGON_API_KEY (or POLYGON_IO_API_KEY) is missing in repo secrets."
            exit 1
          fi

      - name: Build dashboard data
        env:
          GITHUB_TOKEN: ${{ secrets.LS_ALGO_TOKEN }}
          POLYGON_API_KEY: ${{ env.POLYGON_API_KEY }}
          TRADIER_TOKEN: ${{ env.TRADIER_TOKEN }}
          POLYGON_OPTIONS_MAX_SYMBOLS: "1200"
          POLYGON_FORCE_SYMBOLS: "APLD,APLZ"
        run: python scripts/build_data.py

      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dashboard_data.json data/etf_screened_today.csv data/borrow_history.json data/options_cache.json
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: update dashboard data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              if [ "$i" -eq 3 ]; then
                echo "Push failed after retries"
                exit 1
              fi
              git rebase --abort || true
              sleep $((i * 5))
            done
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build site artifact
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r data _site/
          [ -d assets ] && cp -r assets _site/ || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
