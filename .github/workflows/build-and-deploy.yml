name: Build Data & Deploy Pages

on:
  # Daily full refresh of universe + analytics + borrow.
  schedule:
    - cron: "30 21 * * 1-5"  # Mon-Fri 21:30 UTC (4:30 PM ET)

  # Run on push to main
  push:
    branches: [main]

  # Allow manual trigger
  workflow_dispatch:

# Sets permissions for GitHub Pages deployment
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages-deploy"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY || secrets.POLYGON_IO_API_KEY }}
      TRADIER_TOKEN: ${{ secrets.TRADIER_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate Polygon key
        run: |
          if [ -z "${POLYGON_API_KEY}" ]; then
            echo "POLYGON_API_KEY (or POLYGON_IO_API_KEY) is missing in repo secrets."
            exit 1
          fi

      # build_data.py is Polygon / Tradier quota-sensitive and can transiently
      # fail (rate-limit, API outages, upstream issuer feeds going 503 for an
      # hour, etc.).  Previously that failure cascaded into the Pages deploy
      # step and meant the live site stayed pinned to the last successful
      # build, even though update-etf-metrics.yml and update-corporate-actions.yml
      # had just committed fresh JSON to `data/`.  We now mark the heavy
      # build + diagnostics as non-fatal: if they flake, we still publish
      # whatever JSON is currently committed to `data/` on `main`.  The data
      # itself is defended by the upstream workflows' own rate-limit / timeout
      # logic, and by the `git diff --staged --quiet` check in "Commit data
      # if changed" (which no-ops on a partial run).
      - name: Build dashboard data
        id: build_data
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.LS_ALGO_TOKEN }}
          POLYGON_API_KEY: ${{ env.POLYGON_API_KEY }}
          TRADIER_TOKEN: ${{ env.TRADIER_TOKEN }}
          POLYGON_OPTIONS_MAX_SYMBOLS: "100"
          POLYGON_FORCE_SYMBOLS: ""
          POLYGON_MAX_REQUESTS_PER_MINUTE: "25"
          POLYGON_MAX_TOTAL_REQUESTS: "90"
          POLYGON_MAX_SNAPSHOT_PAGES_PER_SYMBOL: "1"
          POLYGON_MAX_CONTRACT_PAGES_PER_SYMBOL: "0"
          POLYGON_RETRY_MAX_429: "1"
          POLYGON_CHAIN_MAX_EXPIRIES: "16"
          POLYGON_CHAIN_STRIKE_BAND_PCT: "0.50"
          POLYGON_CHAIN_STRIKE_BAND_DOWN_PCT: "0.50"
          POLYGON_CHAIN_STRIKE_BAND_UP_PCT: "0.50"
          APLZ_CHAIN_STRIKE_BAND_UP_PCT: "2.50"
          POLYGON_CHAIN_MONEYNESS_MODE: "atm_otm"
          POLYGON_DROP_NULL_QUOTES: "0"
          OPTIONS_REFRESH_SLEEP_MS: "400"
          OPTIONS_SYMBOLS_PER_RUN: "16"
          OPTIONS_SHARD_COUNT: "12"
          OPTIONS_SHARD_INTERVAL_MINUTES: "3"
          OPTIONS_STALE_AFTER_MINUTES: "120"
          OPTIONS_ONLY_BUCKET3: "1"
          OPTIONS_INCLUDE_BUCKET3_UNDERLYING: "1"
          OPTIONS_ACCUMULATE_CACHE: "1"
          OPTIONS_MAX_ROWS_PER_SYMBOL: "1500"
          TRADIER_CHAIN_SYMBOLS: ""
          TRADIER_CHAIN_MAX_EXPIRIES: "16"
          TRADIER_CHAIN_MAX_CONTRACTS_PER_SYMBOL: "320"
          TRADIER_CHAIN_STRIKE_BAND_PCT: "0.50"
          TRADIER_CHAIN_STRIKE_BAND_DOWN_PCT: "0.50"
          TRADIER_CHAIN_STRIKE_BAND_UP_PCT: "0.50"
          TRADIER_APLZ_CHAIN_STRIKE_BAND_UP_PCT: "2.50"
          TRADIER_CHAIN_MONEYNESS_MODE: "atm_otm"
          TRADIER_MAX_REQUESTS_PER_MINUTE: "25"
          TRADIER_MAX_TOTAL_REQUESTS: "70"
        run: python scripts/build_data.py

      - name: Print options coverage diagnostics (with hard gate)
        # Same rationale as the build step: don't let a quota-limited options
        # refresh block the Pages deploy.  The diagnostic warning is still
        # visible in the workflow log for operator review.
        continue-on-error: true
        run: python scripts/options_cache_diagnostics.py --path data/options_cache.json --fail-when-both-zero

      # If build_data.py crashed (continue-on-error above), skip the commit
      # step entirely.  Otherwise we'd risk staging a partially-written JSON
      # into main.  We still proceed to the Pages deploy steps below, so the
      # live site redeploys with whatever the upstream metrics / corporate-
      # actions workflows have already committed to `data/` on main.
      - name: Commit data if changed
        if: steps.build_data.outcome == 'success'
        run: |
          BRANCH="${GITHUB_REF_NAME:-main}"
          FILES="data/dashboard_data.json data/etf_screened_today.csv data/borrow_history.json data/borrow_spike_risk.json data/options_cache.json"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${FILES}
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            TMP_DIR="$(mktemp -d)"
            for f in ${FILES}; do
              mkdir -p "${TMP_DIR}/$(dirname "$f")"
              cp "$f" "${TMP_DIR}/$f"
            done
            pushed=0
            for i in 1 2 3; do
              git fetch origin "${BRANCH}"
              git reset --hard || true
              git clean -fd || true
              git checkout -B "${BRANCH}" "origin/${BRANCH}" --force
              for f in ${FILES}; do
                if [ -f "${TMP_DIR}/$f" ]; then
                  mkdir -p "$(dirname "$f")"
                  cp "${TMP_DIR}/$f" "$f"
                fi
              done
              git add ${FILES}
              if git diff --staged --quiet; then
                echo "No data changes against latest origin"
                pushed=1
                break
              fi
              git commit -m "chore: update dashboard data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
              if git push origin "HEAD:${BRANCH}"; then
                pushed=1
                break
              fi
              git reset --hard "origin/${BRANCH}" || true
              sleep $((i * 5))
            done
            rm -rf "${TMP_DIR}"
            if [ "$pushed" -ne 1 ]; then
              echo "Push failed after retries"
              exit 1
            fi
          fi

      # If build_data.py crashed, the working tree may contain partially-
      # written JSON.  Reset `data/` (and `index.html` just in case) to the
      # current tip of origin/main before assembling the Pages artifact so
      # the live site always reflects what is actually committed to the
      # repository -- including fresh pushes from update-etf-metrics.yml /
      # update-corporate-actions.yml that landed between checkout and now.
      - name: Restore committed data/index.html before deploy
        if: steps.build_data.outcome != 'success'
        run: |
          git fetch origin main
          git checkout origin/main -- data index.html || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build site artifact
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r data _site/
          [ -d assets ] && cp -r assets _site/ || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
