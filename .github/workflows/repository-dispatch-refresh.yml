name: External Dispatch Refresh

# Ping from cron on a home server / VPS:
# curl -X POST -H "Authorization: token $GH_PAT" \
#   -H "Accept: application/vnd.github+json" \
#   https://api.github.com/repos/GoldmanDrew/etf-dashboard/dispatches \
#   -d '{"event_type":"refresh-options"}'
on:
  repository_dispatch:
    types: [refresh-options, refresh-yieldboost-vrp]

permissions:
  contents: write

concurrency:
  group: "dispatch-${{ github.event.action }}"
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY || secrets.POLYGON_IO_API_KEY }}
      TRADIER_TOKEN: ${{ secrets.TRADIER_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run dispatched refresh
        env:
          OPTIONS_REFRESH_SLEEP_MS: "150"
          OPTIONS_SYMBOLS_PER_RUN: "20"
          OPTIONS_SHARD_COUNT: "6"
          OPTIONS_INCLUDE_YIELDBOOST: "1"
          OPTIONS_ONLY_BUCKET3: "1"
          YIELDBOOST_OPTIONS_MAX_SYMBOLS: "40"
        run: |
          if [ "${{ github.event.action }}" = "refresh-yieldboost-vrp" ]; then
            python scripts/build_data.py --yieldboost-vrp-only
          else
            python scripts/build_data.py --options-only
          fi

      - name: VRP pipeline diagnostics
        run: python scripts/vrp_pipeline_diagnostics.py --require-vrp-file --fail-on-missing-vrp-when-spreads

      - name: Commit data if changed
        uses: ./.github/actions/commit-data
        with:
          files: >-
            data/options_cache.json
            data/vrp_live.json
            data/vrp_health.json
            data/yieldboost_put_spreads_latest.json
            data/yieldboost_options_target.json
          commit_message: "chore: dispatch refresh (${{ github.event.action }})"
