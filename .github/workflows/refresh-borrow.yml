name: Refresh Borrow Every 10m

on:
  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "borrow-refresh"
  cancel-in-progress: true

jobs:
  refresh-borrow:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY || secrets.POLYGON_IO_API_KEY }}
      TRADIER_TOKEN: ${{ secrets.TRADIER_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh borrow + shares
        env:
          POLYGON_API_KEY: ${{ env.POLYGON_API_KEY }}
        run: python scripts/build_data.py --borrow-only

      - name: Score borrow spike predictions
        continue-on-error: true
        run: python scripts/score_borrow_spikes.py

      - name: Commit data if changed
        run: |
          BRANCH="${GITHUB_REF_NAME:-main}"
          FILES="data/dashboard_data.json data/borrow_history.json data/borrow_spike_risk.json data/borrow_spike_predictions data/borrow_spike_realized.jsonl data/borrow_spike_metrics.json"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          EXISTING=""
          for f in ${FILES}; do
            if [ -e "$f" ]; then EXISTING="${EXISTING} $f"; fi
          done
          if [ -z "${EXISTING# }" ]; then
            echo "No borrow artifacts to stage"
            exit 0
          fi
          git add ${EXISTING}
          if git diff --staged --quiet; then
            echo "No borrow changes to commit"
          else
            TMP_DIR="$(mktemp -d)"
            for f in ${EXISTING}; do
              mkdir -p "${TMP_DIR}/$(dirname "$f")"
              if [ -d "$f" ]; then
                mkdir -p "${TMP_DIR}/$f"
                cp -a "$f"/. "${TMP_DIR}/$f"/
              else
                cp "$f" "${TMP_DIR}/$f"
              fi
            done
            pushed=0
            for i in 1 2 3; do
              git fetch origin "${BRANCH}"
              git checkout -B "${BRANCH}" "origin/${BRANCH}"
              for f in ${EXISTING}; do
                if [ -d "${TMP_DIR}/$f" ]; then
                  mkdir -p "$f"
                  cp -a "${TMP_DIR}/$f"/. "$f"/
                elif [ -f "${TMP_DIR}/$f" ]; then
                  mkdir -p "$(dirname "$f")"
                  cp "${TMP_DIR}/$f" "$f"
                fi
              done
              git add ${EXISTING}
              if git diff --staged --quiet; then
                echo "No borrow changes against latest origin"
                pushed=1
                break
              fi
              git commit -m "chore: refresh borrow data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
              if git push origin "HEAD:${BRANCH}"; then
                pushed=1
                break
              fi
              git reset --hard "origin/${BRANCH}" || true
              sleep $((i * 5))
            done
            rm -rf "${TMP_DIR}"
            if [ "$pushed" -ne 1 ]; then
              echo "Push failed after retries"
              exit 1
            fi
          fi

