name: Refresh Borrow Every 30m

on:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  refresh-borrow:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY || secrets.POLYGON_IO_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh borrow + shares
        env:
          POLYGON_API_KEY: ${{ env.POLYGON_API_KEY }}
        run: python scripts/build_data.py --borrow-only

      - name: Refresh options cache
        env:
          POLYGON_API_KEY: ${{ env.POLYGON_API_KEY }}
          POLYGON_OPTIONS_MAX_SYMBOLS: "1200"
          POLYGON_FORCE_SYMBOLS: "APLD,APLZ"
        run: python scripts/build_data.py --options-only

      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dashboard_data.json data/options_cache.json
          if git diff --staged --quiet; then
            echo "No borrow changes to commit"
          else
            git commit -m "chore: refresh borrow data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              if [ "$i" -eq 3 ]; then
                echo "Push failed after retries"
                exit 1
              fi
              git rebase --abort || true
              sleep $((i * 5))
            done
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build site artifact
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r data _site/
          [ -d assets ] && cp -r assets _site/ || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
