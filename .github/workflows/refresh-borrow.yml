name: Refresh Borrow Every 10m

on:
  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "borrow-refresh"
  cancel-in-progress: true

jobs:
  refresh-borrow:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY || secrets.POLYGON_IO_API_KEY }}
      TRADIER_TOKEN: ${{ secrets.TRADIER_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh borrow + shares
        env:
          POLYGON_API_KEY: ${{ env.POLYGON_API_KEY }}
        run: python scripts/build_data.py --borrow-only

      - name: Commit data if changed
        run: |
          BRANCH="${GITHUB_REF_NAME:-main}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dashboard_data.json
          if git diff --staged --quiet; then
            echo "No borrow changes to commit"
          else
            git commit -m "chore: refresh borrow data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            pushed=0
            for i in 1 2 3; do
              git fetch origin "${BRANCH}"
              if git rebase "origin/${BRANCH}" && git push origin "HEAD:${BRANCH}"; then
                pushed=1
                break
              fi
              git rebase --abort || true
              sleep $((i * 5))
            done
            if [ "$pushed" -ne 1 ]; then
              echo "Push failed after retries"
              exit 1
            fi
          fi

