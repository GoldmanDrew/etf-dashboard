name: Refresh Borrow Every 30m

on:
  schedule:
    - cron: "*/30 * * * *"  # every 30 minutes
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "borrow-refresh"
  cancel-in-progress: true

jobs:
  refresh-borrow:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY || secrets.POLYGON_IO_API_KEY }}
      TRADIER_TOKEN: ${{ secrets.TRADIER_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh borrow + shares
        env:
          POLYGON_API_KEY: ${{ env.POLYGON_API_KEY }}
        run: python scripts/build_data.py --borrow-only

      - name: Commit data if changed
        uses: ./.github/actions/commit-data
        with:
          files: "data/dashboard_data.json data/borrow_history.json"
          commit_message: "chore: refresh borrow data"
