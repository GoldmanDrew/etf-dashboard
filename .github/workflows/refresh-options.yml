name: Refresh Options

# Single sharded options refresh (replaces former shard A/B + YieldBOOST VRP cron).
# YieldBOOST sleeves are included via OPTIONS_INCLUDE_YIELDBOOST=1; VRP artifacts
# rebuild inside --options-only. Pages deploy is handled by deploy-pages-data.yml.

on:
  schedule:
    - cron: "*/10 * * * *"  # every 10 minutes
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "options-refresh"
  cancel-in-progress: false

jobs:
  refresh-options:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY || secrets.POLYGON_IO_API_KEY }}
      TRADIER_TOKEN: ${{ secrets.TRADIER_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh options cache (sharded)
        env:
          POLYGON_API_KEY: ${{ env.POLYGON_API_KEY }}
          TRADIER_TOKEN: ${{ env.TRADIER_TOKEN }}
          POLYGON_OPTIONS_MAX_SYMBOLS: "100"
          POLYGON_FORCE_SYMBOLS: ""
          POLYGON_MAX_REQUESTS_PER_MINUTE: "25"
          POLYGON_MAX_TOTAL_REQUESTS: "90"
          POLYGON_MAX_SNAPSHOT_PAGES_PER_SYMBOL: "1"
          POLYGON_MAX_CONTRACT_PAGES_PER_SYMBOL: "0"
          POLYGON_RETRY_MAX_429: "1"
          POLYGON_CHAIN_MAX_EXPIRIES: "16"
          POLYGON_CHAIN_STRIKE_BAND_PCT: "0.50"
          POLYGON_CHAIN_STRIKE_BAND_DOWN_PCT: "0.50"
          POLYGON_CHAIN_STRIKE_BAND_UP_PCT: "0.50"
          APLZ_CHAIN_STRIKE_BAND_UP_PCT: "2.50"
          POLYGON_CHAIN_MONEYNESS_MODE: "atm_otm"
          POLYGON_DROP_NULL_QUOTES: "0"
          OPTIONS_REFRESH_SLEEP_MS: "150"
          OPTIONS_SYMBOLS_PER_RUN: "20"
          OPTIONS_SHARD_COUNT: "6"
          OPTIONS_SHARD_INTERVAL_MINUTES: "10"
          OPTIONS_STALE_AFTER_MINUTES: "120"
          OPTIONS_ONLY_BUCKET3: "1"
          OPTIONS_INCLUDE_YIELDBOOST: "1"
          OPTIONS_INCLUDE_BUCKET3_UNDERLYING: "1"
          OPTIONS_ACCUMULATE_CACHE: "1"
          OPTIONS_MAX_ROWS_PER_SYMBOL: "1500"
          TRADIER_CHAIN_SYMBOLS: ""
          TRADIER_CHAIN_MAX_EXPIRIES: "8"
          TRADIER_CHAIN_MAX_CONTRACTS_PER_SYMBOL: "320"
          TRADIER_CHAIN_STRIKE_BAND_PCT: "0.50"
          TRADIER_CHAIN_STRIKE_BAND_DOWN_PCT: "0.50"
          TRADIER_CHAIN_STRIKE_BAND_UP_PCT: "0.50"
          TRADIER_APLZ_CHAIN_STRIKE_BAND_UP_PCT: "2.50"
          TRADIER_CHAIN_MONEYNESS_MODE: "atm_otm"
          TRADIER_MAX_REQUESTS_PER_MINUTE: "25"
          TRADIER_MAX_TOTAL_REQUESTS: "140"
        run: python scripts/build_data.py --options-only

      - name: Print options coverage diagnostics (with hard gate)
        run: python scripts/options_cache_diagnostics.py --path data/options_cache.json --fail-when-both-zero

      - name: VRP pipeline diagnostics
        run: python scripts/vrp_pipeline_diagnostics.py --require-vrp-file --fail-on-missing-vrp-when-spreads

      - name: Commit data if changed
        uses: ./.github/actions/commit-data
        with:
          files: >-
            data/options_cache.json
            data/vrp_live.json
            data/vrp_health.json
            data/yieldboost_put_spreads_latest.json
            data/yieldboost_options_target.json
          commit_message: "chore: refresh options cache"
