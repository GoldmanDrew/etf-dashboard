name: Refresh Options Every 5m

on:
  schedule:
    - cron: "*/5 * * * *"  # every 5 minutes
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "options-refresh"
  cancel-in-progress: true

jobs:
  refresh-options:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY || secrets.POLYGON_IO_API_KEY }}
      TRADIER_TOKEN: ${{ secrets.TRADIER_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh options cache (ultra-safe throttled shard)
        env:
          POLYGON_API_KEY: ${{ env.POLYGON_API_KEY }}
          TRADIER_TOKEN: ${{ env.TRADIER_TOKEN }}
          POLYGON_OPTIONS_MAX_SYMBOLS: "100"
          POLYGON_FORCE_SYMBOLS: "APLD,APLZ"
          POLYGON_MAX_REQUESTS_PER_MINUTE: "25"
          POLYGON_MAX_TOTAL_REQUESTS: "90"
          POLYGON_MAX_SNAPSHOT_PAGES_PER_SYMBOL: "1"
          POLYGON_MAX_CONTRACT_PAGES_PER_SYMBOL: "0"
          POLYGON_RETRY_MAX_429: "1"
          OPTIONS_REFRESH_SLEEP_MS: "300"
          OPTIONS_SYMBOLS_PER_RUN: "8"
          OPTIONS_SHARD_COUNT: "36"
          OPTIONS_SHARD_INTERVAL_MINUTES: "5"
          TRADIER_CHAIN_SYMBOLS: "APLD,APLZ"
          TRADIER_CHAIN_MAX_EXPIRIES: "16"
          TRADIER_CHAIN_MAX_CONTRACTS_PER_SYMBOL: "120"
          TRADIER_CHAIN_STRIKE_BAND_PCT: "0.12"
          TRADIER_CHAIN_MONEYNESS_MODE: "atm_otm"
          TRADIER_MAX_REQUESTS_PER_MINUTE: "25"
          TRADIER_MAX_TOTAL_REQUESTS: "70"
        run: python scripts/build_data.py --options-only

      - name: Commit data if changed
        run: |
          BRANCH="${GITHUB_REF_NAME:-main}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/options_cache.json
          if git diff --staged --quiet; then
            echo "No options changes to commit"
          else
            git commit -m "chore: refresh options cache [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git stash push --include-untracked -m "ci-autostash-before-rebase" || true
            pushed=0
            for i in 1 2 3; do
              git fetch origin "${BRANCH}"
              if git rebase "origin/${BRANCH}" && git push origin "HEAD:${BRANCH}"; then
                pushed=1
                break
              fi
              git rebase --abort || true
              sleep $((i * 5))
            done
            if [ "$pushed" -ne 1 ]; then
              echo "Push failed after retries"
              exit 1
            fi
          fi

