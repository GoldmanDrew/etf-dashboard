name: Deploy Pages (hourly safety net)

# Fallback deploy if a commit landed without an inline deploy step.
# Primary deploy path: market-hours.yml, nightly.yml, build-and-deploy.yml.

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-deploy"
  cancel-in-progress: false

jobs:
  deploy-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Pages
        uses: ./.github/actions/deploy-pages
