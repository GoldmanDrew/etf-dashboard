name: Deploy GitHub Pages
description: Build _site from index.html + data/ + assets/ and publish to GitHub Pages
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Materialize deploy-only data artifacts
      shell: bash
      run: |
        set -euo pipefail
        pip install -q pyarrow pandas numpy
        if [ -f data/etf_metrics_daily.parquet ]; then
          python scripts/export_etf_metrics_daily_json.py
        else
          echo "No etf_metrics_daily.parquet; skipping JSON materialization"
        fi

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Build site artifact
      shell: bash
      run: |
        mkdir -p _site
        cp index.html _site/
        cp -r data _site/
        [ -d assets ] && cp -r assets _site/ || true

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site

    - name: Deploy to GitHub Pages
      id: deploy_attempt_1
      continue-on-error: true
      uses: actions/deploy-pages@v4

    - name: Wait before Pages deploy retry
      if: steps.deploy_attempt_1.outcome == 'failure'
      shell: bash
      run: sleep 60

    - name: Deploy to GitHub Pages (retry 1)
      id: deploy_attempt_2
      if: steps.deploy_attempt_1.outcome == 'failure'
      continue-on-error: true
      uses: actions/deploy-pages@v4

    - name: Wait before final Pages deploy retry
      if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
      shell: bash
      run: sleep 120

    - name: Deploy to GitHub Pages (retry 2)
      if: steps.deploy_attempt_1.outcome == 'failure' && steps.deploy_attempt_2.outcome == 'failure'
      uses: actions/deploy-pages@v4
