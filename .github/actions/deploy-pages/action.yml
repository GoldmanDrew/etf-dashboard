name: Deploy GitHub Pages
description: Build _site from index.html + data/ + assets/ and publish to GitHub Pages
runs:
  using: composite
  steps:
    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Build site artifact
      shell: bash
      run: |
        mkdir -p _site
        cp index.html _site/
        cp -r data _site/
        [ -d assets ] && cp -r assets _site/ || true

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site

    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
