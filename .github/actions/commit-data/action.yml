name: Commit data with retry
description: Stage data artifacts (files or directories), commit, and push with merge retry
inputs:
  files:
    description: Space-separated paths to stage (files or directories; missing paths are skipped)
    required: true
  commit_message:
    description: Git commit message
    required: true
  branch:
    description: Branch to push (defaults to GITHUB_REF_NAME or main)
    required: false
    default: ""
outputs:
  changed:
    description: "1 if a commit was pushed, 0 otherwise"
    value: ${{ steps.commit.outputs.changed }}
runs:
  using: composite
  steps:
    - name: Commit and push data
      id: commit
      shell: bash
      run: |
        set -euo pipefail
        BRANCH="${{ inputs.branch }}"
        if [ -z "$BRANCH" ]; then
          BRANCH="${GITHUB_REF_NAME:-main}"
        fi
        FILES="${{ inputs.files }}"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        EXISTING=""
        for f in ${FILES}; do
          if [ -e "$f" ]; then EXISTING="${EXISTING} $f"; fi
        done
        if [ -z "${EXISTING# }" ]; then
          echo "No artifacts to stage"
          echo "changed=0" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Snapshot artifacts before any git branch movement. Build steps leave
        # modified JSON in the working tree; a plain `git checkout` to rebase
        # onto origin/main fails with "would be overwritten by checkout".
        TMP_DIR="$(mktemp -d)"
        restore_from_backup() {
          local restored=""
          for f in ${EXISTING}; do
            if [ -d "${TMP_DIR}/$f" ]; then
              rm -rf "$f"
              mkdir -p "$(dirname "$f")"
              cp -a "${TMP_DIR}/$f" "$f"
              restored="${restored} $f"
            elif [ -f "${TMP_DIR}/$f" ]; then
              mkdir -p "$(dirname "$f")"
              cp "${TMP_DIR}/$f" "$f"
              restored="${restored} $f"
            fi
          done
          echo "${restored# }"
        }

        for f in ${EXISTING}; do
          mkdir -p "${TMP_DIR}/$(dirname "$f")"
          if [ -d "$f" ]; then
            mkdir -p "${TMP_DIR}/$f"
            cp -a "$f"/. "${TMP_DIR}/$f"/
          else
            cp "$f" "${TMP_DIR}/$f"
          fi
        done

        pushed=0
        changed=0
        for i in 1 2 3; do
          git fetch origin "${BRANCH}"
          git reset --hard "origin/${BRANCH}"
          git clean -fd || true
          git checkout -B "${BRANCH}" "origin/${BRANCH}"

          RESTORED="$(restore_from_backup)"
          if [ -z "${RESTORED}" ]; then
            echo "Backup restore produced no files"
            exit 1
          fi

          git add ${RESTORED}
          if git diff --staged --quiet; then
            echo "No changes against latest origin/${BRANCH}"
            pushed=1
            changed=0
            break
          fi

          git commit -m "${{ inputs.commit_message }} [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          if git push origin "HEAD:${BRANCH}"; then
            pushed=1
            changed=1
            break
          fi

          echo "Push rejected (attempt ${i}/3); retrying after backoff..."
          sleep $((i * 5))
        done

        rm -rf "${TMP_DIR}"

        if [ "$pushed" -ne 1 ]; then
          echo "Push failed after retries"
          exit 1
        fi
        echo "changed=${changed}" >> "$GITHUB_OUTPUT"
